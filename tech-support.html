<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Support | TrueBeast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --accent-green: #22c55e;
            --accent-green-dark: #16a34a;
            --accent-green-light: #4ade80;
            --accent-neon: #39ff14;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: #050505;
            color: #ffffff;
            overflow-x: hidden;
        }
        
        .font-display {
            font-family: 'Space Grotesk', sans-serif;
        }
        
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(34, 197, 94, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(57, 255, 20, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 60%, rgba(22, 163, 74, 0.1) 0%, transparent 40%),
                #050505;
        }
        
        .liquid-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 var(--glass-highlight),
                inset 0 -1px 0 rgba(0, 0, 0, 0.1);
        }
        
        .liquid-glass-strong {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.2),
                inset 0 -1px 0 rgba(0, 0, 0, 0.1);
        }
        
        .glass-glow {
            position: relative;
        }
        
        .glass-glow::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, 
                rgba(34, 197, 94, 0.6), 
                rgba(57, 255, 20, 0.4),
                rgba(22, 163, 74, 0.5),
                rgba(74, 222, 128, 0.4)
            );
            -webkit-mask: 
                linear-gradient(#fff 0 0) content-box, 
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: borderRotate 8s linear infinite;
        }
        
        @keyframes borderRotate {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
        
        .text-gradient {
            background: linear-gradient(135deg, #fff 0%, #4ade80 50%, #22c55e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .pulse-glow {
            animation: pulseGlow 3s ease-in-out infinite;
        }
        
        @keyframes pulseGlow {
            0%, 100% { 
                box-shadow: 0 0 20px rgba(34, 197, 94, 0.3),
                            0 0 40px rgba(34, 197, 94, 0.1);
            }
            50% { 
                box-shadow: 0 0 30px rgba(34, 197, 94, 0.5),
                            0 0 60px rgba(34, 197, 94, 0.2);
            }
        }
        
        .btn-glass {
            transition: all 0.3s ease;
        }
        
        .btn-glass:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(34, 197, 94, 0.3);
        }
        
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #050505;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #22c55e, #16a34a);
            border-radius: 4px;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.3);
        }
        
        .ticket-card {
            transition: all 0.3s ease;
        }
        
        .ticket-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        
        .status-badge {
            transition: all 0.3s ease;
        }
        
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .priority-high { background: rgba(239, 68, 68, 0.2); color: #ef4444; border-color: rgba(239, 68, 68, 0.3); }
        .priority-medium { background: rgba(245, 158, 11, 0.2); color: #f59e0b; border-color: rgba(245, 158, 11, 0.3); }
        .priority-low { background: rgba(34, 197, 94, 0.2); color: #22c55e; border-color: rgba(34, 197, 94, 0.3); }
        
        .status-open { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .status-in-progress { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .status-resolved { background: rgba(107, 114, 128, 0.2); color: #9ca3af; }
        .status-urgent { background: rgba(239, 68, 68, 0.2); color: #ef4444; }

        /* Admin panel specific styles */
        .admin-panel {
            min-height: calc(100vh - 200px);
        }
        
        .ticket-list {
            max-height: 600px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Initialize EmailJS
        const initEmailJS = () => {
            emailjs.init("YOUR_PUBLIC_KEY"); // Replace with your EmailJS public key
        };

        const useScrollReveal = () => {
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('active');
                        }
                    });
                }, { threshold: 0.1 });
                
                document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
                
                return () => observer.disconnect();
            }, []);
        };

        // Email sending function
        const sendTicketConfirmation = async (ticketData) => {
            try {
                // Send to user
                await emailjs.send(
                    "YOUR_SERVICE_ID", // Replace with your EmailJS service ID
                    "YOUR_TEMPLATE_ID", // Replace with your EmailJS template ID
                    {
                        to_email: ticketData.email,
                        to_name: ticketData.name,
                        ticket_id: ticketData.id,
                        subject: ticketData.subject,
                        category: ticketData.category,
                        priority: ticketData.priority,
                        description: ticketData.description,
                        status_page_url: window.location.origin + "/tech-support.html",
                        discord_link: "https://discord.gg/Nk8vekY"
                    }
                );

                // BCC to admin
                await emailjs.send(
                    "YOUR_SERVICE_ID",
                    "YOUR_ADMIN_TEMPLATE_ID", // Create a similar template for admin notifications
                    {
                        to_email: "kiernenyt@gmail.com",
                        user_email: ticketData.email,
                        user_name: ticketData.name,
                        ticket_id: ticketData.id,
                        subject: ticketData.subject,
                        category: ticketData.category,
                        priority: ticketData.priority,
                        description: ticketData.description,
                        discord: ticketData.discord || "Not provided",
                        device_info: ticketData.deviceInfo || "Not provided"
                    }
                );

                return true;
            } catch (error) {
                console.error("Email failed:", error);
                // Still return true so ticket isn't lost, just log the error
                return true;
            }
        };

        // Navigation
        const Navigation = () => {
            const [scrolled, setScrolled] = useState(false);
            
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);
            
            return (
                <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-500 ${scrolled ? 'py-3' : 'py-6'}`}>
                    <div className="max-w-7xl mx-auto px-6">
                        <div className={`liquid-glass rounded-2xl px-6 py-4 transition-all duration-500 ${scrolled ? 'shadow-2xl' : ''}`}>
                            <div className="flex items-center justify-between">
                                <a href="index.html" className="flex items-center gap-3 group">
                                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-green-500 to-emerald-600 flex items-center justify-center pulse-glow">
                                        <span className="font-display font-bold text-lg">TB</span>
                                    </div>
                                    <span className="font-display font-bold text-xl tracking-tight group-hover:text-green-400 transition-colors">TrueBeast</span>
                                </a>
                                
                                <div className="flex items-center gap-4">
                                    <a href="index.html" className="text-gray-300 hover:text-white transition-colors">Home</a>
                                    <a href="https://www.youtube.com/@RealTrueBeast" target="_blank" rel="noopener noreferrer"
                                       className="btn-glass liquid-glass px-5 py-2.5 rounded-xl text-sm font-medium text-white hover:bg-white/10 flex items-center gap-2">
                                        <i data-lucide="youtube" className="w-4 h-4"></i>
                                        Subscribe
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </nav>
            );
        };

        // Ticket Form Component
        const TicketForm = ({ onSubmit, onViewTickets }) => {
            const [formData, setFormData] = useState({
                name: '',
                email: '',
                discord: '',
                category: 'general',
                priority: 'medium',
                subject: '',
                description: '',
                deviceInfo: ''
            });
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [showSuccess, setShowSuccess] = useState(false);
            const [ticketId, setTicketId] = useState(null);

            const categories = [
                { value: 'general', label: 'General Support', icon: 'help-circle' },
                { value: 'pc-build', label: 'PC Build Help', icon: 'cpu' },
                { value: 'software', label: 'Software Issues', icon: 'terminal' },
                { value: 'networking', label: 'Networking/WiFi', icon: 'wifi' },
                { value: 'peripherals', label: 'Peripherals', icon: 'mouse' },
                { value: 'streaming', label: 'Streaming Setup', icon: 'video' },
                { value: 'gaming', label: 'Gaming Performance', icon: 'gamepad-2' }
            ];

            const priorities = [
                { value: 'low', label: 'Low - General Question', color: 'text-green-400' },
                { value: 'medium', label: 'Medium - Need Help Soon', color: 'text-yellow-400' },
                { value: 'high', label: 'High - Urgent Issue', color: 'text-red-400' }
            ];

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);

                // Simulate API call
                await new Promise(resolve => setTimeout(resolve, 1500));

                const newTicket = {
                    id: 'TB-' + Date.now().toString(36).toUpperCase(),
                    ...formData,
                    status: 'open',
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString(),
                    responses: []
                };

                // Store in localStorage
                const existing = JSON.parse(localStorage.getItem('tb_tickets') || '[]');
                localStorage.setItem('tb_tickets', JSON.stringify([newTicket, ...existing]));

                // Send confirmation email
                await sendTicketConfirmation(newTicket);

                setTicketId(newTicket.id);
                setShowSuccess(true);
                setIsSubmitting(false);

                if (onSubmit) onSubmit(newTicket);
            };

            if (showSuccess) {
                return (
                    <div className="liquid-glass-strong glass-glow rounded-3xl p-8 md:p-12 text-center">
                        <div className="w-20 h-20 rounded-full bg-green-500/20 flex items-center justify-center mx-auto mb-6 pulse-glow">
                            <i data-lucide="check" className="w-10 h-10 text-green-400"></i>
                        </div>
                        <h3 className="font-display font-bold text-3xl mb-4">Ticket Submitted!</h3>
                        <p className="text-gray-400 mb-2">Your ticket ID is:</p>
                        <div className="inline-block liquid-glass px-6 py-3 rounded-xl font-mono text-xl text-green-400 mb-6">
                            {ticketId}
                        </div>
                        <p className="text-gray-400 mb-4 max-w-md mx-auto">
                            A confirmation email has been sent to <strong>{formData.email}</strong> with your ticket details.
                        </p>
                        <p className="text-gray-500 text-sm mb-8 max-w-md mx-auto">
                            Save this ID to check your ticket status. You'll receive a response within 24-48 hours.
                        </p>
                        <div className="flex flex-col sm:flex-row gap-4 justify-center">
                            <button onClick={() => {
                                setShowSuccess(false);
                                setFormData({
                                    name: '', email: '', discord: '', category: 'general',
                                    priority: 'medium', subject: '', description: '', deviceInfo: ''
                                });
                            }} className="btn-glass liquid-glass px-6 py-3 rounded-xl font-medium">
                                Submit Another
                            </button>
                            <button onClick={onViewTickets} className="btn-glass liquid-glass-strong glass-glow px-6 py-3 rounded-xl font-medium text-green-400">
                                View My Tickets
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="liquid-glass-strong glass-glow rounded-3xl p-6 md:p-8">
                    <div className="flex items-center gap-4 mb-8">
                        <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-green-500/20 to-emerald-600/20 flex items-center justify-center">
                            <i data-lucide="ticket" className="w-6 h-6 text-green-400"></i>
                        </div>
                        <div>
                            <h3 className="font-display font-bold text-2xl">Submit a Ticket</h3>
                            <p className="text-gray-400 text-sm">Get help with your tech issues</p>
                        </div>
                    </div>

                    <form onSubmit={handleSubmit} className="space-y-6">
                        <div className="grid md:grid-cols-2 gap-6">
                            <div>
                                <label className="block text-sm font-medium text-gray-300 mb-2">Name *</label>
                                <input type="text" required value={formData.name}
                                    onChange={e => setFormData({...formData, name: e.target.value})}
                                    className="w-full liquid-glass bg-transparent px-4 py-3 rounded-xl text-white placeholder-gray-500"
                                    placeholder="Your name" />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-300 mb-2">Email *</label>
                                <input type="email" required value={formData.email}
                                    onChange={e => setFormData({...formData, email: e.target.value})}
                                    className="w-full liquid-glass bg-transparent px-4 py-3 rounded-xl text-white placeholder-gray-500"
                                    placeholder="your@email.com" />
                            </div>
                        </div>

                        <div className="grid md:grid-cols-2 gap-6">
                            <div>
                                <label className="block text-sm font-medium text-gray-300 mb-2">Discord (Optional)</label>
                                <input type="text" value={formData.discord}
                                    onChange={e => setFormData({...formData, discord: e.target.value})}
                                    className="w-full liquid-glass bg-transparent px-4 py-3 rounded-xl text-white placeholder-gray-500"
                                    placeholder="Username#1234" />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-300 mb-2">Priority *</label>
                                <select required value={formData.priority}
                                    onChange={e => setFormData({...formData, priority: e.target.value})}
                                    className="w-full liquid-glass bg-transparent px-4 py-3 rounded-xl text-white">
                                    {priorities.map(p => (
                                        <option key={p.value} value={p.value} className="bg-gray-900">{p.label}</option>
                                    ))}
                                </select>
                            </div>
                        </div>

                        <div className="grid md:grid-cols-2 gap-6">
                            <div>
                                <label className="block text-sm font-medium text-gray-300 mb-2">Category *</label>
                                <select required value={formData.category}
                                    onChange={e => setFormData({...formData, category: e.target.value})}
                                    className="w-full liquid-glass bg-transparent px-4 py-3 rounded-xl text-white">
                                    {categories.map(c => (
                                        <option key={c.value} value={c.value} className="bg-gray-900">{c.label}</option>
                                    ))}
                                </select>
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-300 mb-2">Subject *</label>
                                <input type="text" required value={formData.subject}
                                    onChange={e => setFormData({...formData, subject: e.target.value})}
                                    className="w-full liquid-glass bg-transparent px-4 py-3 rounded-xl text-white placeholder-gray-500"
                                    placeholder="Brief summary of your issue" />
                            </div>
                        </div>

                        <div>
                            <label className="block text-sm font-medium text-gray-300 mb-2">Description *</label>
                            <textarea required value={formData.description}
                                onChange={e => setFormData({...formData, description: e.target.value})}
                                className="w-full liquid-glass bg-transparent px-4 py-3 rounded-xl text-white placeholder-gray-500 h-32 resize-none"
                                placeholder="Describe your issue in detail. What happened? What have you tried?"></textarea>
                        </div>

                        <div>
                            <label className="block text-sm font-medium text-gray-300 mb-2">Device/Setup Info (Optional)</label>
                            <textarea value={formData.deviceInfo}
                                onChange={e => setFormData({...formData, deviceInfo: e.target.value})}
                                className="w-full liquid-glass bg-transparent px-4 py-3 rounded-xl text-white placeholder-gray-500 h-24 resize-none"
                                placeholder="PC specs, OS version, software versions, etc."></textarea>
                        </div>

                        <button type="submit" disabled={isSubmitting}
                            className="w-full btn-glass liquid-glass-strong glass-glow px-8 py-4 rounded-2xl font-semibold text-lg flex items-center justify-center gap-3 disabled:opacity-50">
                            {isSubmitting ? (
                                <>
                                    <i data-lucide="loader-2" className="w-5 h-5 animate-spin"></i>
                                    Submitting...
                                </>
                            ) : (
                                <>
                                    <i data-lucide="send" className="w-5 h-5"></i>
                                    Submit Ticket
                                </>
                            )}
                        </button>
                    </form>
                </div>
            );
        };

        // Ticket Status Checker
        const TicketStatus = ({ onBack }) => {
            const [searchId, setSearchId] = useState('');
            const [ticket, setTicket] = useState(null);
            const [notFound, setNotFound] = useState(false);
            const [replyText, setReplyText] = useState('');

            const handleSearch = (e) => {
                e.preventDefault();
                const tickets = JSON.parse(localStorage.getItem('tb_tickets') || '[]');
                const found = tickets.find(t => t.id.toLowerCase() === searchId.toLowerCase());
                if (found) {
                    setTicket(found);
                    setNotFound(false);
                } else {
                    setNotFound(true);
                    setTicket(null);
                }
            };

            const handleReply = (e) => {
                e.preventDefault();
                if (!replyText.trim()) return;
                
                const tickets = JSON.parse(localStorage.getItem('tb_tickets') || '[]');
                const updated = tickets.map(t => {
                    if (t.id === ticket.id) {
                        return {
                            ...t,
                            responses: [...(t.responses || []), {
                                text: replyText,
                                from: 'user',
                                timestamp: new Date().toISOString()
                            }],
                            updatedAt: new Date().toISOString()
                        };
                    }
                    return t;
                });

                localStorage.setItem('tb_tickets', JSON.stringify(updated));
                setTicket(updated.find(t => t.id === ticket.id));
                setReplyText('');
            };

            const getStatusColor = (status) => {
                const colors = {
                    open: 'status-open',
                    'in-progress': 'status-in-progress',
                    resolved: 'status-resolved',
                    urgent: 'status-urgent'
                };
                return colors[status] || 'status-open';
            };

            const getPriorityClass = (priority) => {
                return `priority-${priority}`;
            };

            if (ticket) {
                return (
                    <div className="liquid-glass-strong glass-glow rounded-3xl p-6 md:p-8 animate-fade-in">
                        <button onClick={() => setTicket(null)} className="flex items-center gap-2 text-gray-400 hover:text-white mb-6 transition-colors">
                            <i data-lucide="arrow-left" className="w-4 h-4"></i>
                            Back to Search
                        </button>

                        <div className="flex flex-wrap items-center gap-3 mb-6">
                            <span className="font-mono text-lg text-green-400">{ticket.id}</span>
                            <span className={`px-3 py-1 rounded-full text-xs font-medium border ${getStatusColor(ticket.status)}`}>
                                {ticket.status.replace('-', ' ').toUpperCase()}
                            </span>
                            <span className={`px-3 py-1 rounded-full text-xs font-medium border ${getPriorityClass(ticket.priority)}`}>
                                {ticket.priority.toUpperCase()}
                            </span>
                        </div>

                        <h3 className="font-display font-bold text-2xl mb-2">{ticket.subject}</h3>
                        <p className="text-gray-400 text-sm mb-6">
                            Submitted {new Date(ticket.createdAt).toLocaleDateString()} • 
                            Category: {ticket.category.replace('-', ' ').toUpperCase()}
                        </p>

                        <div className="space-y-4 mb-8">
                            <div className="liquid-glass rounded-xl p-4">
                                <div className="flex items-center gap-3 mb-3">
                                    <div className="w-8 h-8 rounded-full bg-gradient-to-br from-green-500 to-emerald-600 flex items-center justify-center text-sm font-bold">
                                        {ticket.name.charAt(0).toUpperCase()}
                                    </div>
                                    <div>
                                        <div className="font-medium text-sm">{ticket.name}</div>
                                        <div className="text-xs text-gray-500">{new Date(ticket.createdAt).toLocaleString()}</div>
                                    </div>
                                </div>
                                <p className="text-gray-300 whitespace-pre-wrap">{ticket.description}</p>
                                {ticket.deviceInfo && (
                                    <div className="mt-4 pt-4 border-t border-white/10">
                                        <p className="text-xs text-gray-500 mb-1">Device Info:</p>
                                        <p className="text-sm text-gray-400">{ticket.deviceInfo}</p>
                                    </div>
                                )}
                            </div>

                            {(ticket.responses || []).map((resp, i) => (
                                <div key={i} className={`liquid-glass rounded-xl p-4 ${resp.from === 'support' ? 'border-l-4 border-l-green-500' : ''}`}>
                                    <div className="flex items-center gap-3 mb-3">
                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold ${resp.from === 'support' ? 'bg-gradient-to-br from-violet-500 to-blue-500' : 'bg-gradient-to-br from-green-500 to-emerald-600'}`}>
                                            {resp.from === 'support' ? 'TB' : ticket.name.charAt(0).toUpperCase()}

                                        <div>
                                            <div className="font-medium text-sm">{resp.from === 'support' ? 'TrueBeast Support' : ticket.name}</div>

                        {ticket.status !== 'resolved' && (
                            <form onSubmit={handleReply} className="flex gap-3">
                                <input type="text" value={replyText}

                                    placeholder="Add a reply..."
                                    className="flex-1 liquid-glass bg-transparent px-4 py-3 rounded-xl text-white placeholder-gray-500" />
                                <button type="submit" className="btn-glass liquid-glass px-6 py-3 rounded-xl font-medium text-green-400">
                                    <i data-lucide="send" className="w-5 h-5"></i>
                                </button>
                            </form>
                        )}
                    </div>
                );
            }

            return (
                <div className="liquid-glass-strong glass-glow rounded-3xl p-6 md:p-8">
                    <div className="flex items-center gap-4 mb-6">
                        <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-blue-500/20 to-cyan-600/20 flex items-center justify-center">
                            <i data-lucide="search" className="w-6 h-6 text-blue-400"></i>
                        </div>
                        <div>
                            <h3 className="font-display font-bold text-2xl">Check Ticket Status</h3>
                            <p className="text-gray-400 text-sm">Enter your ticket ID to view updates</p>
                        </div>
                    </div>

                    <form onSubmit={handleSearch} className="space-y-4">
                        <div className="flex gap-3">
                            <input type="text" value={searchId}
                                onChange={e => setSearchId(e.target.value)}
                                placeholder="Enter ticket ID (e.g., TB-ABC123)"
                                className="flex-1 liquid-glass bg-transparent px-4 py-3 rounded-xl text-white placeholder-gray-500 font-mono uppercase" />
                            <button type="submit" className="btn-glass liquid-glass-strong px-6 py-3 rounded-xl font-medium text-green-400">
                                <i data-lucide="search" className="w-5 h-5"></i>
                            </button>
                        </div>
                    </form>

                    {notFound && (
                        <div className="mt-6 p-4 liquid-glass rounded-xl border border-red-500/30 bg-red-500/10">
                            <div className="flex items-center gap-3 text-red-400">
                                <i data-lucide="alert-circle" className="w-5 h-5"></i>
                                <span>Ticket not found. Please check your ID and try again.</span>
                            </div>
                        </div>
                    )}

                    <div className="mt-8 pt-6 border-t border-white/10">
                        <p className="text-sm text-gray-400 mb-4">Common ticket ID locations:</p>
                        <ul className="space-y-2 text-sm text-gray-500">
                            <li className="flex items-center gap-2">
                                <i data-lucide="check" className="w-4 h-4 text-green-400"></i>
                                Confirmation email after submission
                            </li>
                            <li className="flex items-center gap-2">
                                <i data-lucide="check" className="w-4 h-4 text-green-400"></i>
                                Success page after creating a ticket
                            </li>
                            <li className="flex items-center gap-2">
                                <i data-lucide="check" className="w-4 h-4 text-green-400"></i>
                                Discord DM from TrueBeast Bot
                            </li>
                        </ul>
                    </div>
                </div>
            );
        };

        // Admin Panel - Fixed Version
        const AdminPanel = ({ onBack }) => {
            const [tickets, setTickets] = useState([]);
            const [filter, setFilter] = useState('all');
            const [selectedTicket, setSelectedTicket] = useState(null);
            const [replyText, setReplyText] = useState('');
            const [password, setPassword] = useState('');
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                // Load tickets on mount
                const loadTickets = () => {
                    const stored = JSON.parse(localStorage.getItem('tb_tickets') || '[]');
                    setTickets(stored);
                    setLoading(false);
                };
                loadTickets();
            }, []);

            const handleLogin = (e) => {
                e.preventDefault();
                if (password === 'beastmode2024') {
                    setIsAuthenticated(true);
                } else {
                    alert('Invalid password');
                }
            };

            const updateTicketStatus = (ticketId, newStatus) => {
                const updated = tickets.map(t => 
                    t.id === ticketId ? { ...t, status: newStatus, updatedAt: new Date().toISOString() } : t
                );
                localStorage.setItem('tb_tickets', JSON.stringify(updated));
                setTickets(updated);
                if (selectedTicket?.id === ticketId) {
                    setSelectedTicket({ ...selectedTicket, status: newStatus });
                }
            };

            const handleReply = (e) => {
                e.preventDefault();
                if (!replyText.trim() || !selectedTicket) return;
                
                const updated = tickets.map(t => {
                    if (t.id === selectedTicket.id) {
                        return {
                            ...t,
                            responses: [...(t.responses || []), {
                                text: replyText,
                                from: 'support',
                                timestamp: new Date().toISOString()
                            }],
                            status: 'in-progress',
                            updatedAt: new Date().toISOString()
                        };
                    }
                    return t;
                });

                localStorage.setItem('tb_tickets', JSON.stringify(updated));
                setTickets(updated);
                setSelectedTicket(updated.find(t => t.id === selectedTicket.id));
                setReplyText('');
            };

            const deleteTicket = (ticketId) => {
                if (!confirm('Are you sure you want to delete this ticket?')) return;
                const updated = tickets.filter(t => t.id !== ticketId);
                localStorage.setItem('tb_tickets', JSON.stringify(updated));
                setTickets(updated);
                if (selectedTicket?.id === ticketId) {
                    setSelectedTicket(null);
                }
            };

            const filteredTickets = tickets.filter(t => {
                if (filter === 'all') return true;
                return t.status === filter;
            }).sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));

            const stats = {
                total: tickets.length,
                open: tickets.filter(t => t.status === 'open').length,
                inProgress: tickets.filter(t => t.status === 'in-progress').length,
                resolved: tickets.filter(t => t.status === 'resolved').length,
                urgent: tickets.filter(t => t.priority === 'high' && t.status !== 'resolved').length
            };

            // Login Screen
            if (!isAuthenticated) {
                return (
                    <div className="min-h-[60vh] flex items-center justify-center">
                        <div className="liquid-glass-strong glass-glow rounded-3xl p-8 max-w-md w-full">
                            <div className="text-center mb-6">
                                <div className="w-16 h-16 rounded-full bg-gradient-to-br from-violet-500/20 to-blue-600/20 flex items-center justify-center mx-auto mb-4">
                                    <i data-lucide="shield" className="w-8 h-8 text-violet-400"></i>
                                </div>
                                <h3 className="font-display font-bold text-2xl">Admin Access</h3>
                                <p className="text-gray-400 text-sm">Enter password to manage tickets</p>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input type="password" value={password}
                                    onChange={e => setPassword(e.target.value)}
                                    placeholder="Enter password"
                                    className="w-full liquid-glass bg-transparent px-4 py-3 rounded-xl text-white placeholder-gray-500" />
                                <div className="flex gap-3">
                                    <button type="button" onClick={onBack} className="flex-1 liquid-glass px-4 py-3 rounded-xl text-gray-300 hover:text-white">
                                        Cancel
                                    </button>
                                    <button type="submit" className="flex-1 btn-glass liquid-glass-strong px-4 py-3 rounded-xl text-violet-400 font-medium">
                                        Login
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                );
            }

            // Single Ticket View
            if (selectedTicket) {

                            <div className="flex items-center justify-between mb-6 flex-wrap gap-4">
                                <button onClick={() => setSelectedTicket(null)} className="flex items-center gap-2 text-gray-400 hover:text-white transition-colors">
                                    <i data-lucide="arrow-left" className="w-4 h-4"></i>

                                <div className="flex gap-2 flex-wrap">
                                    {['open', 'in-progress', 'resolved', 'urgent'].map(status => (
                                        <button key={status}
                                            onClick={() => updateTicketStatus(selectedTicket.id, status)}
                                            className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-colors ${selectedTicket.status === status ? 'bg-green-500/30 text-green-400 border border-green-500/50' : 'liquid-glass text-gray-400 hover:text-white'}`}>
                                            {status.replace('-', ' ').toUpperCase()}
                                        </button>
                                    ))}
                                    <button onClick={() => deleteTicket(selectedTicket.id)}
                                        className="px-3 py-1.5 rounded-lg text-xs font-medium bg-red-500/20 text-red-400 border border-red-500/30 hover:bg-red-500/30">
                                        <i data-lucide="trash-2" className="w-3 h-3 inline mr-1"></i>
                                        Delete
                                    </button>
                                </div>
                            </div>

                            <div className="grid md:grid-cols-3 gap-4 mb-6">
                                <div className="liquid-glass rounded-xl p-4">
                                    <p className="text-xs text-gray-500 mb-1">From</p>
                                    <p className="font-medium">{selectedTicket.name}</p>
                                    <p className="text-sm text-gray-400">{selectedTicket.email}</p>
                                    {selectedTicket.discord && <p className="text-sm text-violet-400">{selectedTicket.discord}</p>}
                                </div>
                                <div className="liquid-glass rounded-xl p-4">
                                    <p className="text-xs text-gray-500 mb-1">Category</p>
                                    <p className="font-medium">{selectedTicket.category.replace('-', ' ').toUpperCase()}</p>
                                    <p className={`text-xs mt-1 ${selectedTicket.priority === 'high' ? 'text-red-400' : selectedTicket.priority === 'medium' ? 'text-yellow-400' : 'text-green-400'}`}>
                                        Priority: {selectedTicket.priority.toUpperCase()}
                                    </p>
                                </div>
                                <div className="liquid-glass rounded-xl p-4">
                                    <p className="text-xs text-gray-500 mb-1">Timeline</p>
                                    <p className="font-medium text-sm">Created: {new Date(selectedTicket.createdAt).toLocaleDateString()}</p>
                                    <p className="text-xs text-gray-400">Updated: {new Date(selectedTicket.updatedAt).toLocaleDateString()}</p>
                                    <p className="text-xs text-gray-500 mt-1">ID: {selectedTicket.id}</p>
                                </div>
                            </div>

                            <h4 className="font-display font-bold text-xl mb-4">{selectedTicket.subject}</h4>

                            <div className="space-y-4 mb-6 max-h-96 overflow-y-auto pr-2">

                                    <p className="text-gray-300 whitespace-pre-wrap">{selectedTicket.description}</p>
                                    {selectedTicket.deviceInfo && (
                                        <div className="mt-4 pt-4 border-t border-white/10">
                                            <p className="text-xs text-gray-500 mb-1">Device Info:</p>
                                            <p className="text-sm text-gray-400 font-mono">{selectedTicket.deviceInfo}</p>
                                        </div>
                                    )}
                                </div>

                                {(selectedTicket.responses || []).map((resp, i) => (
                                    <div key={i} className={`liquid-glass rounded-xl p-4 ${resp.from === 'support' ? 'border-l-4 border-l-violet-500 bg-violet-500/5' : 'border-l-4 border-l-green-500 bg-green-500/5'}`}>
                                        <div className="flex items-center gap-3 mb-2">
                                            <span className={`text-xs font-medium ${resp.from === 'support' ? 'text-violet-400' : 'text-green-400'}`}>

                                            <span className="text-xs text-gray-500">{new Date(resp.timestamp).toLocaleString()}</span>
                                        </div>
                                        <p className="text-gray-300 whitespace-pre-wrap">{resp.text}</p>
                                    </div>
                                ))}
                            </div>

                            <form onSubmit={handleReply} className="flex gap-3">
                                <textarea value={replyText}
                                    onChange={e => setReplyText(e.target.value)}
                                    placeholder="Type your response..."
                                    className="flex-1 liquid-glass bg-transparent px-4 py-3 rounded-xl text-white placeholder-gray-500 h-24 resize-none"></textarea>
                                <button type="submit" className="btn-glass liquid-glass-strong px-6 py-3 rounded-xl font-medium text-violet-400 self-end">
                                    <i data-lucide="send" className="w-5 h-5"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                );

            return (

                    <div className="flex flex-wrap items-center justify-between gap-4">

                                <i data-lucide="arrow-left" className="w-5 h-5"></i>

                            <div>
                                <h3 className="font-display font-bold text-2xl">Ticket Dashboard</h3>
                                <p className="text-gray-400 text-sm">Manage all support tickets</p>
                            </div>
                        </div>
                        <button onClick={() => setIsAuthenticated(false)} className="liquid-glass px-4 py-2 rounded-xl text-sm text-gray-400 hover:text-white">
                            <i data-lucide="log-out" className="w-4 h-4 inline mr-2"></i>
                            Logout
                        </button>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
                        {[
                            { label: 'Total', value: stats.total, color: 'text-white', bg: 'from-gray-500/20 to-gray-600/20' },
                            { label: 'Open', value: stats.open, color: 'text-green-400', bg: 'from-green-500/20 to-emerald-600/20' },
                            { label: 'In Progress', value: stats.inProgress, color: 'text-blue-400', bg: 'from-blue-500/20 to-cyan-600/20' },
                            { label: 'Resolved', value: stats.resolved, color: 'text-gray-400', bg: 'from-gray-500/20 to-slate-600/20' },
                            { label: 'Urgent', value: stats.urgent, color: 'text-red-400', bg: 'from-red-500/20 to-orange-600/20' }
                        ].map(stat => (
                            <div key={stat.label} className="liquid-glass rounded-2xl p-4 text-center">
                                <div className={`text-3xl font-display font-bold ${stat.color}`}>{stat.value}</div>
                                <div className="text-xs text-gray-500 mt-1">{stat.label}</div>
                            </div>
                        ))}
                    </div>

                    <div className="flex gap-2 flex-wrap">
                        {['all', 'open', 'in-progress', 'resolved', 'urgent'].map(f => (
                            <button key={f}
                                onClick={() => setFilter(f)}
                                className={`px-4 py-2 rounded-xl text-sm font-medium transition-colors ${filter === f ? 'bg-green-500/30 text-green-400 border border-green-500/50' : 'liquid-glass text-gray-400 hover:text-white'}`}>
                                {f.replace('-', ' ').toUpperCase()}
                            </button>
                        ))}
                    </div>

                    <div className="ticket-list space-y-3">
                        {loading ? (
                            <div className="liquid-glass rounded-2xl p-8 text-center text-gray-500">
                                <i data-lucide="loader-2" className="w-8 h-8 animate-spin mx-auto mb-4"></i>
                                Loading tickets...
                            </div>

                            <div className="liquid-glass rounded-2xl p-8 text-center text-gray-500">
                                <i data-lucide="inbox" className="w-12 h-12 mx-auto mb-4 opacity-50"></i>
                                <p>No tickets found</p>
                            </div>
                        ) : (
                            filteredTickets.map(ticket => (
                                <div key={ticket.id}
                                    onClick={() => setSelectedTicket(ticket)}
                                    className="ticket-card liquid-glass rounded-2xl p-4 cursor-pointer hover:bg-white/5">
                                    <div className="flex items-center justify-between flex-wrap gap-3">
                                        <div className="flex items-center gap-4 min-w-0">
                                            <span className="font-mono text-green-400 text-sm flex-shrink-0">{ticket.id}</span>
                                            <div className="min-w-0">
                                                <h4 className="font-medium truncate">{ticket.subject}</h4>
                                                <p className="text-sm text-gray-500 truncate">{ticket.name} • {ticket.category.replace('-', ' ')}</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-3 flex-shrink-0">
                                            <span className={`px-3 py-1 rounded-full text-xs font-medium border ${ticket.priority === 'high' ? 'priority-high' : ticket.priority === 'medium' ? 'priority-medium' : 'priority-low'}`}>
                                                {ticket.priority}
                                            </span>
                                            <span className={`px-3 py-1 rounded-full text-xs font-medium ${ticket.status === 'open' ? 'status-open' : ticket.status === 'in-progress' ? 'status-in-progress' : ticket.status === 'resolved' ? 'status-resolved' : 'status-urgent'}`}>
                                                {ticket.status.replace('-', ' ').toUpperCase()}
                                            </span>
                                            <i data-lucide="chevron-right" className="w-5 h-5 text-gray-500"></i>
                                        </div>
                                    </div>
                                    <div className="mt-3 pt-3 border-t border-white/5 flex items-center gap-4 text-xs text-gray-500">
                                        <span>{new Date(ticket.createdAt).toLocaleDateString()}</span>
                                        <span>•</span>
                                        <span>{ticket.responses?.length || 0} replies</span>
                                        <span>•</span>
                                        <span className="truncate">{ticket.email}</span>
                                    </div>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        };

        // FAQ Section
        const FAQSection = () => {
            const [openIndex, setOpenIndex] = useState(null);
            
            const faqs = [
                {
                    q: "How long does it take to get a response?",
                    a: "I typically respond to tickets within 24-48 hours. For urgent issues marked as 'High' priority, I try to respond same-day when possible."
                },
                {
                    q: "What kind of tech issues can you help with?",
                    a: "PC builds, troubleshooting, software issues, networking problems, streaming setup, gaming performance optimization, and general tech advice. If it's tech-related, I can probably help!"
                },
                {
                    q: "Do you charge for tech support?",
                    a: "Nope! Tech support is completely free for the community. It's my way of giving back to everyone who supports the channel."
                },
                {
                    q: "Can I get help through Discord instead?",
                    a: "For quick questions, hop in the Discord! For complex issues that need detailed troubleshooting, submitting a ticket here ensures nothing gets lost and we can track progress."
                },
                {
                    q: "What info should I include in my ticket?",
                    a: "Be as specific as possible! Include error messages, what you've already tried, your PC specs if relevant, and when the issue started. Screenshots help too!"
                }
            ];
            
            return (
                <div className="reveal">
                    <h3 className="font-display font-bold text-2xl mb-6 text-center">Frequently Asked Questions</h3>
                    <div className="space-y-3">
                        {faqs.map((faq, i) => (
                            <div key={i} className="liquid-glass rounded-2xl overflow-hidden">
                                <button onClick={() => setOpenIndex(openIndex === i ? null : i)}
                                    className="w-full flex items-center justify-between p-5 text-left hover:bg-white/5 transition-colors">
                                    <span className="font-medium pr-4">{faq.q}</span>
                                    <i data-lucide={openIndex === i ? "chevron-up" : "chevron-down"} className="w-5 h-5 text-gray-400 flex-shrink-0"></i>
                                </button>
                                {openIndex === i && (
                                    <div className="px-5 pb-5 text-gray-400 animate-fade-in">
                                        {faq.a}
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // Main App
        const App = () => {
            const [activeTab, setActiveTab] = useState('submit');
            const [showAdmin, setShowAdmin] = useState(false);
            
            useScrollReveal();
            
            useEffect(() => {
                initEmailJS();
                lucide.createIcons();
            }, []);

            useEffect(() => {
                lucide.createIcons();
            }, [activeTab, showAdmin]);
            
            if (showAdmin) {
                return (
                    <div className="relative min-h-screen">
                        <Navigation />
                        <main className="pt-32 pb-12 px-6">
                            <div className="max-w-6xl mx-auto">
                                <AdminPanel onBack={() => setShowAdmin(false)} />
                            </div>
                        </main>
                    </div>
                );
            }
            
            return (
                <div className="relative min-h-screen">
                    <Navigation />
                    
                    <main className="pt-32 pb-12 px-6">
                        <div className="max-w-6xl mx-auto">
                            {/* Hero */}
                            <div className="text-center mb-16 reveal">
                                <div className="inline-flex items-center gap-2 liquid-glass px-4 py-2 rounded-full mb-6">
                                    <i data-lucide="headphones" className="w-4 h-4 text-green-400"></i>
                                    <span className="text-sm font-medium text-gray-300">Free Community Support</span>
                                </div>
                                <h1 className="font-display font-bold text-5xl md:text-7xl mb-6">
                                    Tech <span className="text-gradient">Support</span>
                                </h1>
                                <p className="text-xl text-gray-400 max-w-2xl mx-auto">
                                    Stuck with a tech problem? I got you. Submit a ticket and I'll help you figure it out.
                                </p>
                            </div>
                            
                            {/* Tab Navigation */}
                            <div className="flex justify-center gap-4 mb-12 reveal">
                                <button onClick={() => setActiveTab('submit')}
                                    className={`px-6 py-3 rounded-xl font-medium flex items-center gap-2 transition-all ${activeTab === 'submit' ? 'liquid-glass-strong text-green-400' : 'liquid-glass text-gray-400 hover:text-white'}`}>
                                    <i data-lucide="plus-circle" className="w-5 h-5"></i>
                                    New Ticket
                                </button>
                                <button onClick={() => setActiveTab('status')}
                                    className={`px-6 py-3 rounded-xl font-medium flex items-center gap-2 transition-all ${activeTab === 'status' ? 'liquid-glass-strong text-green-400' : 'liquid-glass text-gray-400 hover:text-white'}`}>
                                    <i data-lucide="search" className="w-5 h-5"></i>
                                    Check Status
                                </button>
                                <button onClick={() => setShowAdmin(true)}
                                    className="liquid-glass px-6 py-3 rounded-xl font-medium text-gray-400 hover:text-white flex items-center gap-2">

                            {/* Content */}

                                        <TicketStatus onBack={() => setActiveTab('submit')} />
                                    )}
                                </div>
                                
                                <div className="space-y-6">
                                    <div className="liquid-glass rounded-2xl p-6 reveal">
                                        <h4 className="font-display font-bold text-lg mb-4 flex items-center gap-2">

                                            Response Times
                                        </h4>
                                        <div className="space-y-3">
