<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | TrueBeast Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="js/config.js"></script>
    <script src="js/firebase-db.js"></script>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/glass.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="gradient-bg"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // ── Not-configured notice ────────────────────────────────────────
        const NotConfigured = () => (
            <div className="min-h-screen flex items-center justify-center px-6">
                <div className="liquid-glass-strong glass-glow rounded-3xl p-8 max-w-md w-full text-center">
                    <div className="w-16 h-16 rounded-2xl bg-orange-500/20 flex items-center justify-center mx-auto mb-6">
                        <i data-lucide="settings" className="w-8 h-8 text-orange-400"></i>
                    </div>
                    <h2 className="font-display font-bold text-2xl mb-3">Firebase Not Configured</h2>
                    <p className="text-gray-400 text-sm mb-6 leading-relaxed">
                        The admin panel requires Firebase to be set up. Open <code className="text-orange-400 bg-orange-500/10 px-2 py-0.5 rounded">js/config.js</code> and follow the step-by-step instructions in the Firebase section to get started — it takes about 10 minutes and is completely free.
                    </p>
                    <a href="index.html" className="btn-glass liquid-glass px-6 py-3 rounded-xl text-sm font-medium text-gray-300 hover:text-white inline-flex items-center gap-2">
                        <i data-lucide="arrow-left" className="w-4 h-4"></i>
                        Back to Site
                    </a>
                </div>
            </div>
        );

        // ── Login screen ─────────────────────────────────────────────────
        const LoginScreen = ({ onLogin, error, loading }) => {
            const [email, setEmail]       = useState('');
            const [password, setPassword] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                onLogin(email, password);
            };

            return (
                <div className="min-h-screen flex items-center justify-center px-6">
                    <div className="liquid-glass-strong glass-glow rounded-3xl p-8 max-w-sm w-full animate-fade-in">
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 rounded-full bg-gradient-to-br from-violet-500/20 to-blue-600/20 flex items-center justify-center mx-auto mb-4 pulse-glow">
                                <i data-lucide="shield" className="w-8 h-8 text-violet-400"></i>
                            </div>
                            <h2 className="font-display font-bold text-2xl">Admin Access</h2>
                            <p className="text-gray-400 text-sm mt-1">Sign in with your Firebase admin account</p>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-300 mb-2">Email</label>
                                <input type="email" required value={email} onChange={e => setEmail(e.target.value)}
                                    className="w-full liquid-glass bg-transparent px-4 py-3 rounded-xl text-white placeholder-gray-500"
                                    placeholder="your@email.com" autoFocus />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-300 mb-2">Password</label>
                                <input type="password" required value={password} onChange={e => setPassword(e.target.value)}
                                    className="w-full liquid-glass bg-transparent px-4 py-3 rounded-xl text-white placeholder-gray-500"
                                    placeholder="••••••••" />
                            </div>

                            {error && (
                                <div className="flex items-center gap-2 text-red-400 text-sm bg-red-500/10 rounded-lg px-3 py-2">
                                    <i data-lucide="alert-circle" className="w-4 h-4 flex-shrink-0"></i>
                                    <span>{error}</span>
                                </div>
                            )}

                            <div className="flex gap-3 pt-2">
                                <a href="tech-support.html" className="flex-1 liquid-glass px-4 py-3 rounded-xl text-gray-300 hover:text-white text-center text-sm font-medium">
                                    Cancel
                                </a>
                                <button type="submit" disabled={loading}
                                    className="flex-1 btn-glass liquid-glass-strong px-4 py-3 rounded-xl text-violet-400 font-semibold disabled:opacity-50 flex items-center justify-center gap-2">
                                    {loading ? (
                                        <><i data-lucide="loader-2" className="w-4 h-4 animate-spin"></i> Signing in...</>
                                    ) : (
                                        <><i data-lucide="log-in" className="w-4 h-4"></i> Sign In</>
                                    )}
                                </button>
                            </div>
                        </form>

                        <p className="text-center text-xs text-gray-600 mt-6">
                            Admin accounts are managed in your Firebase console.<br/>
                            Authentication &gt; Users.
                        </p>
                    </div>
                </div>
            );
        };

        // ── Single ticket detail view ────────────────────────────────────
        const TicketDetail = ({ ticket, onBack, onUpdate, onDelete }) => {
            const [replyText, setReplyText]   = useState('');
            const [saving, setSaving]         = useState(false);
            const [localTicket, setLocal]     = useState(ticket);

            useEffect(() => { setLocal(ticket); }, [ticket]);

            const statusClass = {
                'open': 'status-open', 'in-progress': 'status-in-progress',
                'resolved': 'status-resolved', 'urgent': 'status-urgent'
            }[localTicket.status] || 'status-open';

            const handleStatusChange = async (newStatus) => {
                setSaving(true);
                const updated = await onUpdate(localTicket.id, { status: newStatus });
                if (updated) setLocal(updated);
                setSaving(false);
            };

            const handleReply = async (e) => {
                e.preventDefault();
                if (!replyText.trim()) return;
                setSaving(true);
                const newResponses = [...(localTicket.responses || []), {
                    text: replyText.trim(),
                    from: 'support',
                    timestamp: new Date().toISOString()
                }];
                const updated = await onUpdate(localTicket.id, { responses: newResponses, status: 'in-progress' });
                if (updated) setLocal(updated);
                setReplyText('');
                setSaving(false);
            };

            const handleDelete = () => {
                if (!confirm('Delete this ticket permanently? This cannot be undone.')) return;
                onDelete(localTicket.id);
                onBack();
            };

            return (
                <div className="animate-fade-in">
                    {/* Action bar */}
                    <div className="flex items-center justify-between flex-wrap gap-3 mb-6">
                        <button onClick={onBack} className="flex items-center gap-2 text-gray-400 hover:text-white transition-colors">
                            <i data-lucide="arrow-left" className="w-4 h-4"></i>
                            Back to List
                        </button>
                        <div className="flex gap-2 flex-wrap">
                            {['open', 'in-progress', 'resolved', 'urgent'].map(s => (
                                <button key={s} disabled={saving} onClick={() => handleStatusChange(s)}
                                    className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-colors disabled:opacity-50 ${localTicket.status === s ? 'bg-green-500/30 text-green-400 border border-green-500/50' : 'liquid-glass text-gray-400 hover:text-white'}`}>
                                    {s.replace('-', ' ').toUpperCase()}
                                </button>
                            ))}
                            <button onClick={handleDelete} className="px-3 py-1.5 rounded-lg text-xs font-medium bg-red-500/20 text-red-400 border border-red-500/30 hover:bg-red-500/30">
                                <i data-lucide="trash-2" className="w-3 h-3 inline mr-1"></i>
                                Delete
                            </button>
                        </div>
                    </div>

                    <div className="liquid-glass-strong glass-glow rounded-3xl p-6 md:p-8">
                        {/* Header */}
                        <div className="flex flex-wrap items-center gap-3 mb-2">
                            <span className="font-mono text-lg text-green-400">{localTicket.id}</span>
                            <span className={`px-3 py-1 rounded-full text-xs font-semibold ${statusClass}`}>
                                {localTicket.status.replace('-', ' ').toUpperCase()}
                            </span>
                            <span className={`px-3 py-1 rounded-full text-xs font-semibold border priority-${localTicket.priority}`}>
                                {localTicket.priority.toUpperCase()}
                            </span>
                        </div>
                        <h3 className="font-display font-bold text-2xl mb-6">{localTicket.subject}</h3>

                        {/* Submitter info */}
                        <div className="grid sm:grid-cols-3 gap-4 mb-6">
                            <div className="liquid-glass rounded-xl p-4">
                                <p className="text-xs text-gray-500 mb-1">From</p>
                                <p className="font-semibold">{localTicket.name}</p>
                                <p className="text-sm text-gray-400">{localTicket.email}</p>
                                {localTicket.discord && <p className="text-sm text-indigo-400 mt-1">{localTicket.discord}</p>}
                            </div>
                            <div className="liquid-glass rounded-xl p-4">
                                <p className="text-xs text-gray-500 mb-1">Category</p>
                                <p className="font-semibold">{localTicket.category.replace(/-/g, ' ').toUpperCase()}</p>
                                <p className={`text-xs mt-1 ${localTicket.priority === 'high' ? 'text-red-400' : localTicket.priority === 'medium' ? 'text-yellow-400' : 'text-green-400'}`}>
                                    Priority: {localTicket.priority.toUpperCase()}
                                </p>
                            </div>
                            <div className="liquid-glass rounded-xl p-4">
                                <p className="text-xs text-gray-500 mb-1">Timeline</p>
                                <p className="font-semibold text-sm">Created {new Date(localTicket.createdAt).toLocaleDateString()}</p>
                                <p className="text-xs text-gray-400 mt-1">Updated {new Date(localTicket.updatedAt).toLocaleDateString()}</p>
                            </div>
                        </div>

                        {/* Thread */}
                        <div className="space-y-4 mb-6 max-h-96 overflow-y-auto pr-1">
                            <div className="liquid-glass rounded-xl p-4">
                                <div className="flex items-center gap-3 mb-3">
                                    <div className="w-8 h-8 rounded-full bg-gradient-to-br from-green-500 to-emerald-600 flex items-center justify-center text-sm font-bold flex-shrink-0">
                                        {localTicket.name.charAt(0).toUpperCase()}
                                    </div>
                                    <div>
                                        <div className="font-medium text-sm">{localTicket.name}</div>
                                        <div className="text-xs text-gray-500">{new Date(localTicket.createdAt).toLocaleString()}</div>
                                    </div>
                                </div>
                                <p className="text-gray-300 whitespace-pre-wrap text-sm leading-relaxed">{localTicket.description}</p>
                                {localTicket.deviceInfo && (
                                    <div className="mt-4 pt-4 border-t border-white/10">
                                        <p className="text-xs text-gray-500 mb-1">Device Info:</p>
                                        <p className="text-sm text-gray-400 font-mono">{localTicket.deviceInfo}</p>
                                    </div>
                                )}
                            </div>

                            {(localTicket.responses || []).map((resp, i) => (
                                <div key={i} className={`liquid-glass rounded-xl p-4 ${resp.from === 'support' ? 'border-l-4 border-l-violet-500 bg-violet-500/5' : 'border-l-4 border-l-green-500 bg-green-500/5'}`}>
                                    <div className="flex items-center gap-3 mb-2">
                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold flex-shrink-0 ${resp.from === 'support' ? 'bg-gradient-to-br from-violet-500 to-blue-500' : 'bg-gradient-to-br from-green-500 to-emerald-600'}`}>
                                            {resp.from === 'support' ? 'TB' : localTicket.name.charAt(0).toUpperCase()}
                                        </div>
                                        <div>
                                            <span className={`text-xs font-medium ${resp.from === 'support' ? 'text-violet-400' : 'text-green-400'}`}>
                                                {resp.from === 'support' ? 'You (Support)' : localTicket.name}
                                            </span>
                                            <span className="text-xs text-gray-500 ml-2">{new Date(resp.timestamp).toLocaleString()}</span>
                                        </div>
                                    </div>
                                    <p className="text-gray-300 whitespace-pre-wrap text-sm">{resp.text}</p>
                                </div>
                            ))}
                        </div>

                        {/* Reply form */}
                        <form onSubmit={handleReply} className="flex gap-3">
                            <textarea value={replyText} onChange={e => setReplyText(e.target.value)}
                                placeholder="Type your reply to the user..."
                                className="flex-1 liquid-glass bg-transparent px-4 py-3 rounded-xl text-white placeholder-gray-500 h-20 resize-none text-sm" />
                            <button type="submit" disabled={saving || !replyText.trim()}
                                className="btn-glass liquid-glass-strong px-5 py-3 rounded-xl font-medium text-violet-400 self-end disabled:opacity-50">
                                {saving
                                    ? <i data-lucide="loader-2" className="w-5 h-5 animate-spin"></i>
                                    : <i data-lucide="send" className="w-5 h-5"></i>
                                }
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // ── Ticket list / dashboard ──────────────────────────────────────
        const Dashboard = ({ user, onSignOut }) => {
            const [tickets, setTickets]             = useState([]);
            const [loading, setLoading]             = useState(true);
            const [error, setError]                 = useState('');
            const [filter, setFilter]               = useState('all');
            const [selectedTicket, setSelected]     = useState(null);

            const loadTickets = useCallback(async () => {
                setLoading(true);
                setError('');
                try {
                    const all = await FirebaseDB.getAllTickets();
                    setTickets(all);
                } catch (err) {
                    setError('Failed to load tickets. Make sure you are signed in and Firestore rules are set correctly.');
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            }, []);

            useEffect(() => { loadTickets(); }, [loadTickets]);

            useEffect(() => { lucide.createIcons(); });

            const handleUpdate = async (id, updates) => {
                const updated = await FirebaseDB.updateTicket(id, updates);
                setTickets(prev => prev.map(t => t.id === id ? (updated || { ...t, ...updates }) : t));
                return updated;
            };

            const handleDelete = async (id) => {
                await FirebaseDB.deleteTicket(id);
                setTickets(prev => prev.filter(t => t.id !== id));
            };

            if (selectedTicket) {
                return (
                    <div className="min-h-screen pt-8 pb-16 px-6">
                        <div className="max-w-4xl mx-auto">
                            <TicketDetail
                                ticket={selectedTicket}
                                onBack={() => setSelected(null)}
                                onUpdate={handleUpdate}
                                onDelete={handleDelete}
                            />
                        </div>
                    </div>
                );
            }

            const filtered = tickets.filter(t => filter === 'all' || t.status === filter);
            const stats = {
                total:      tickets.length,
                open:       tickets.filter(t => t.status === 'open').length,
                inProgress: tickets.filter(t => t.status === 'in-progress').length,
                resolved:   tickets.filter(t => t.status === 'resolved').length,
                urgent:     tickets.filter(t => t.priority === 'high' && t.status !== 'resolved').length,
            };

            return (
                <div className="min-h-screen pt-28 pb-16 px-6">
                    <div className="max-w-5xl mx-auto">

                        {/* Page header */}
                        <div className="flex flex-wrap items-center justify-between gap-4 mb-8">
                            <div>
                                <h1 className="font-display font-bold text-3xl md:text-4xl">
                                    Ticket <span className="text-gradient">Dashboard</span>
                                </h1>
                                <p className="text-gray-400 text-sm mt-1">Signed in as {user.email}</p>
                            </div>
                            <div className="flex gap-3">
                                <button onClick={loadTickets} className="btn-glass liquid-glass px-4 py-2 rounded-xl text-sm text-gray-300 hover:text-white flex items-center gap-2">
                                    <i data-lucide="refresh-cw" className="w-4 h-4"></i>
                                    Refresh
                                </button>
                                <button onClick={onSignOut} className="liquid-glass px-4 py-2 rounded-xl text-sm text-gray-400 hover:text-white flex items-center gap-2">
                                    <i data-lucide="log-out" className="w-4 h-4"></i>
                                    Sign Out
                                </button>
                            </div>
                        </div>

                        {/* Stats */}
                        <div className="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
                            {[
                                { label: 'Total',       value: stats.total,      color: 'text-white' },
                                { label: 'Open',        value: stats.open,       color: 'text-green-400' },
                                { label: 'In Progress', value: stats.inProgress, color: 'text-blue-400' },
                                { label: 'Resolved',    value: stats.resolved,   color: 'text-gray-400' },
                                { label: 'Urgent',      value: stats.urgent,     color: 'text-red-400' },
                            ].map(s => (
                                <div key={s.label} className="liquid-glass rounded-2xl p-4 text-center">
                                    <div className={`text-3xl font-display font-bold ${s.color}`}>{s.value}</div>
                                    <div className="text-xs text-gray-500 mt-1">{s.label}</div>
                                </div>
                            ))}
                        </div>

                        {/* Filter tabs */}
                        <div className="flex gap-2 flex-wrap mb-6">
                            {['all', 'open', 'in-progress', 'resolved', 'urgent'].map(f => (
                                <button key={f} onClick={() => setFilter(f)}
                                    className={`px-4 py-2 rounded-xl text-sm font-medium transition-colors ${filter === f ? 'bg-violet-500/30 text-violet-400 border border-violet-500/50' : 'liquid-glass text-gray-400 hover:text-white'}`}>
                                    {f.replace('-', ' ').toUpperCase()}
                                </button>
                            ))}
                        </div>

                        {/* Error */}
                        {error && (
                            <div className="liquid-glass rounded-2xl p-4 mb-6 border border-red-500/30 bg-red-500/10 flex items-center gap-3">
                                <i data-lucide="alert-triangle" className="w-5 h-5 text-red-400 flex-shrink-0"></i>
                                <p className="text-red-400 text-sm">{error}</p>
                            </div>
                        )}

                        {/* Ticket list */}
                        <div className="ticket-list space-y-3">
                            {loading ? (
                                <div className="liquid-glass rounded-2xl p-10 text-center">
                                    <i data-lucide="loader-2" className="w-8 h-8 animate-spin mx-auto mb-4 text-violet-400"></i>
                                    <p className="text-gray-500">Loading tickets...</p>
                                </div>
                            ) : filtered.length === 0 ? (
                                <div className="liquid-glass rounded-2xl p-10 text-center">
                                    <i data-lucide="inbox" className="w-12 h-12 mx-auto mb-4 text-gray-600"></i>
                                    <p className="text-gray-500">No tickets {filter !== 'all' ? `with status "${filter}"` : 'yet'}</p>
                                </div>
                            ) : (
                                filtered.map(t => (
                                    <div key={t.id} onClick={() => setSelected(t)}
                                        className="ticket-card liquid-glass rounded-2xl p-4 cursor-pointer hover:bg-white/5 animate-fade-in">
                                        <div className="flex items-center justify-between flex-wrap gap-3">
                                            <div className="flex items-center gap-4 min-w-0">
                                                <span className="font-mono text-green-400 text-sm flex-shrink-0">{t.id}</span>
                                                <div className="min-w-0">
                                                    <h4 className="font-medium truncate">{t.subject}</h4>
                                                    <p className="text-sm text-gray-500 truncate">{t.name} · {t.category.replace(/-/g, ' ')}</p>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-2 flex-shrink-0">
                                                <span className={`px-3 py-1 rounded-full text-xs font-medium border priority-${t.priority}`}>{t.priority}</span>
                                                <span className={`px-3 py-1 rounded-full text-xs font-medium ${t.status === 'open' ? 'status-open' : t.status === 'in-progress' ? 'status-in-progress' : t.status === 'resolved' ? 'status-resolved' : 'status-urgent'}`}>
                                                    {t.status.replace('-', ' ').toUpperCase()}
                                                </span>
                                                <i data-lucide="chevron-right" className="w-5 h-5 text-gray-500"></i>
                                            </div>
                                        </div>
                                        <div className="mt-3 pt-3 border-t border-white/5 flex items-center gap-4 text-xs text-gray-500">
                                            <span>{new Date(t.createdAt).toLocaleDateString()}</span>
                                            <span>·</span>
                                            <span>{t.responses?.length || 0} replies</span>
                                            <span>·</span>
                                            <span className="truncate">{t.email}</span>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // ── Navbar ────────────────────────────────────────────────────────
        const Nav = ({ user, onSignOut }) => {
            const [scrolled, setScrolled] = useState(false);
            useEffect(() => {
                const h = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', h, { passive: true });
                return () => window.removeEventListener('scroll', h);
            }, []);
            return (
                <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-500 ${scrolled ? 'py-3' : 'py-6'}`}>
                    <div className="max-w-5xl mx-auto px-6">
                        <div className={`liquid-glass rounded-2xl px-6 py-4 ${scrolled ? 'shadow-2xl' : ''}`}>
                            <div className="flex items-center justify-between">
                                <a href="index.html" className="flex items-center gap-3 group">
                                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-violet-500 to-blue-600 flex items-center justify-center pulse-glow">
                                        <span className="font-display font-bold text-lg">TB</span>
                                    </div>
                                    <div>
                                        <span className="font-display font-bold text-lg tracking-tight group-hover:text-violet-400 transition-colors">TrueBeast</span>
                                        <span className="ml-2 text-xs text-violet-400 bg-violet-500/10 px-2 py-0.5 rounded-full font-medium">Admin</span>
                                    </div>
                                </a>
                                <div className="flex items-center gap-3">
                                    <a href="tech-support.html" className="text-gray-400 hover:text-white text-sm transition-colors">Support Portal</a>
                                    {user && (
                                        <button onClick={onSignOut} className="liquid-glass px-3 py-2 rounded-xl text-sm text-gray-400 hover:text-white flex items-center gap-2">
                                            <i data-lucide="log-out" className="w-4 h-4"></i>
                                            Sign Out
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </nav>
            );
        };

        // ── Root App ─────────────────────────────────────────────────────
        const App = () => {
            const [user, setUser]         = useState(undefined); // undefined = still checking
            const [loginError, setLoginError] = useState('');
            const [loginLoading, setLoginLoading] = useState(false);

            useEffect(() => {
                lucide.createIcons();
                // Watch Firebase auth state
                FirebaseDB.onAuthStateChanged(u => setUser(u || null));
            }, []);

            useEffect(() => { lucide.createIcons(); });

            if (!FirebaseDB.isConfigured()) return <NotConfigured />;

            // Still checking auth state
            if (user === undefined) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <i data-lucide="loader-2" className="w-10 h-10 text-violet-400 animate-spin"></i>
                    </div>
                );
            }

            const handleLogin = async (email, password) => {
                setLoginError('');
                setLoginLoading(true);
                try {
                    await FirebaseDB.adminSignIn(email, password);
                } catch (err) {
                    const msg = err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password'
                        ? 'Incorrect email or password.'
                        : err.code === 'auth/too-many-requests'
                        ? 'Too many attempts. Try again later.'
                        : 'Sign-in failed. Check your credentials.';
                    setLoginError(msg);
                } finally {
                    setLoginLoading(false);
                }
            };

            const handleSignOut = () => FirebaseDB.adminSignOut();

            return (
                <div className="relative">
                    <Nav user={user} onSignOut={handleSignOut} />
                    {user
                        ? <Dashboard user={user} onSignOut={handleSignOut} />
                        : <LoginScreen onLogin={handleLogin} error={loginError} loading={loginLoading} />
                    }
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
