        // Custom hook for scroll reveal
        const useScrollReveal = () => {
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('active');
                        }
                    });
                }, { threshold: 0.1 });

                const observeNew = () => {
                    document.querySelectorAll('.reveal:not(.active)').forEach(el => observer.observe(el));
                };
                observeNew();

                // Re-observe when async content (e.g. YouTube cards) renders into the DOM
                const mutation = new MutationObserver(observeNew);
                mutation.observe(document.body, { childList: true, subtree: true });

                return () => { observer.disconnect(); mutation.disconnect(); };
            }, []);
        };
        
        // Custom hook for mouse tracking
        const useMouseTracking = () => {
            useEffect(() => {
                const cursorGlow = document.getElementById('cursorGlow');
                let rafId;
                let mouseX = 0, mouseY = 0;
                
                const handleMouseMove = (e) => {
                    mouseX = e.clientX;
                    mouseY = e.clientY;
                };
                
                const updateCursor = () => {
                    cursorGlow.style.left = mouseX + 'px';
                    cursorGlow.style.top = mouseY + 'px';
                    rafId = requestAnimationFrame(updateCursor);
                };
                
                document.addEventListener('mousemove', handleMouseMove, { passive: true });
                rafId = requestAnimationFrame(updateCursor);
                
                return () => {
                    document.removeEventListener('mousemove', handleMouseMove);
                    cancelAnimationFrame(rafId);
                };
            }, []);
        };

        // ── YouTube API helpers ──────────────────────────────────────────────
        const YT_CFG = () => (typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.youtube) || {};
        const YT_API_CONFIGURED = () => {
            const cfg = YT_CFG();
            return cfg.channelId && cfg.apiKey && cfg.apiKey !== 'PASTE_YOUR_YOUTUBE_API_KEY';
        };

        const YT_CACHE_KEY = 'tb_yt_slots_v8';
        const YT_CACHE_TTL = 60 * 60 * 1000; // 1 hour

        async function fetchYouTubeSlots() {
            // Return cached data if fresh
            try {
                const cached = JSON.parse(localStorage.getItem(YT_CACHE_KEY) || 'null');
                if (cached && Date.now() - cached.ts < YT_CACHE_TTL) return cached.slots;
            } catch {}

            const cfg = YT_CFG();
            const ch  = cfg.channelId;
            const k   = cfg.apiKey;
            const base  = 'https://www.googleapis.com/youtube/v3/search';
            const vbase = 'https://www.googleapis.com/youtube/v3/videos';
            const slots = { latest: null, short: null, stream: null, popular: null };

            // Helper: returns a Set of video IDs that are/were livestreams (batches 50 at a time)
            async function getLiveIds(ids) {
                if (!ids.length) return new Set();
                const result = new Set();
                for (let i = 0; i < ids.length; i += 50) {
                    try {
                        const batch = ids.slice(i, i + 50);
                        const r = await fetch(`${vbase}?part=liveStreamingDetails&id=${batch.join(',')}&key=${k}`);
                        const d = await r.json();
                        (d.items || []).filter(v => v.liveStreamingDetails).forEach(v => result.add(v.id));
                    } catch {}
                }
                return result;
            }

            // Slot: Latest Stream — try currently live first, then most recent completed
            try {
                let r = await fetch(`${base}?part=snippet&channelId=${ch}&type=video&eventType=live&maxResults=1&key=${k}`);
                let d = await r.json();
                if (!d.items?.length) {
                    r = await fetch(`${base}?part=snippet&channelId=${ch}&type=video&eventType=completed&order=date&maxResults=1&key=${k}`);
                    d = await r.json();
                }
                if (d.error) console.warn('[TrueBeast YouTube] stream slot:', d.error.message);
                if (d.items?.length) {
                    const v = d.items[0];
                    const isLive = v.snippet.liveBroadcastContent === 'live';
                    slots.stream = { id: v.id.videoId, title: v.snippet.title, category: isLive ? 'LIVE NOW' : 'Latest Stream', isLive };
                }
            } catch (e) { console.warn('[TrueBeast YouTube] stream fetch failed:', e.message); }

            // Slot: Latest Short — short-duration video that is NOT a stream archive
            try {
                const r = await fetch(`${base}?part=snippet&channelId=${ch}&type=video&videoDuration=short&order=date&maxResults=5&key=${k}`);
                const d = await r.json();
                if (d.error) console.warn('[TrueBeast YouTube] shorts slot:', d.error.message);
                const candidates = (d.items || []).filter(v => v.id.videoId !== slots.stream?.id);
                const liveIds = await getLiveIds(candidates.map(v => v.id.videoId));
                const pick = candidates.find(v => !liveIds.has(v.id.videoId));
                if (pick) slots.short = { id: pick.id.videoId, title: pick.snippet.title, category: 'Latest Short' };
            } catch (e) { console.warn('[TrueBeast YouTube] shorts fetch failed:', e.message); }

            // Slot: Latest Video — most recent medium/long upload (explicitly excludes Shorts < 4min)
            try {
                const exclude = new Set([slots.short?.id, slots.stream?.id].filter(Boolean));
                // Fetch medium (4-20min) AND long (>20min) in parallel so no regular video is missed
                const [rMed, rLong] = await Promise.all([
                    fetch(`${base}?part=snippet&channelId=${ch}&type=video&videoDuration=medium&order=date&maxResults=10&key=${k}`),
                    fetch(`${base}?part=snippet&channelId=${ch}&type=video&videoDuration=long&order=date&maxResults=5&key=${k}`),
                ]);
                const [dMed, dLong] = await Promise.all([rMed.json(), rLong.json()]);
                if (dMed.error) console.warn('[TrueBeast YouTube] latest video slot:', dMed.error.message);
                // Merge, dedupe, sort by most recent, drop excluded IDs
                const seen = new Set();
                const allCandidates = [...(dMed.items || []), ...(dLong.items || [])]
                    .filter(v => { if (seen.has(v.id.videoId) || exclude.has(v.id.videoId)) return false; seen.add(v.id.videoId); return true; })
                    .sort((a, b) => new Date(b.snippet.publishedAt) - new Date(a.snippet.publishedAt));
                const liveIds = await getLiveIds(allCandidates.map(v => v.id.videoId));
                const pick = allCandidates.find(v => !liveIds.has(v.id.videoId));
                if (pick) slots.latest = { id: pick.id.videoId, title: pick.snippet.title, category: 'Latest Video' };
            } catch (e) { console.warn('[TrueBeast YouTube] latest video fetch failed:', e.message); }

            // Slot: Most Popular — scan ALL channel uploads, get real view counts, sort numerically
            // Paginated so it covers the full upload history, not just the most recent 50
            try {
                const uploadsId = ch.replace(/^UC/, 'UU');
                let allItems = [];
                let pageToken = '';
                do {
                    const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${uploadsId}&maxResults=50&key=${k}${pageToken ? '&pageToken=' + pageToken : ''}`;
                    const plR = await fetch(url);
                    const plD = await plR.json();
                    if (plD.error) { console.warn('[TrueBeast YouTube] popular slot:', plD.error.message); break; }
                    allItems.push(...(plD.items || []).map(item => ({ id: item.snippet.resourceId.videoId, title: item.snippet.title })));
                    pageToken = plD.nextPageToken || '';
                } while (pageToken);

                const exclude = new Set([slots.short?.id, slots.stream?.id, slots.latest?.id].filter(Boolean));
                const candidates = allItems.filter(v => !exclude.has(v.id));
                const liveIds = await getLiveIds(candidates.map(v => v.id));
                const nonStreams = candidates.filter(v => !liveIds.has(v.id));
                if (nonStreams.length) {
                    // Get statistics in batches of 50 (API limit per request)
                    const viewMap = {};
                    for (let i = 0; i < nonStreams.length; i += 50) {
                        const batch = nonStreams.slice(i, i + 50);
                        const statsR = await fetch(`${vbase}?part=statistics&id=${batch.map(v => v.id).join(',')}&key=${k}`);
                        const statsD = await statsR.json();
                        (statsD.items || []).forEach(v => { viewMap[v.id] = parseInt(v.statistics?.viewCount || '0'); });
                    }
                    nonStreams.sort((a, b) => (viewMap[b.id] || 0) - (viewMap[a.id] || 0));
                    const pick = nonStreams[0];
                    if (pick) slots.popular = { id: pick.id, title: pick.title, category: 'Most Viewed' };
                }
            } catch (e) { console.warn('[TrueBeast YouTube] popular fetch failed:', e.message); }

            // Cache result — only if at least one slot has data (avoid caching failures)
            if (Object.values(slots).some(Boolean)) {
                try { localStorage.setItem(YT_CACHE_KEY, JSON.stringify({ ts: Date.now(), slots })); } catch {}
            }
            return slots;
        }

        // Single video card (used by ContentSection)
        const VideoCard = ({ video, portrait, style }) => {
            if (!video) {
                // Placeholder card
                return (
                    <div className={`reveal video-card liquid-glass rounded-2xl overflow-hidden opacity-40${portrait ? ' flex flex-col' : ''}`} style={style}>
                        <div className={`${portrait ? 'flex-1' : 'aspect-video'} bg-gray-900 flex items-center justify-center`}>
                            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="text-gray-600"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
                        </div>
                        <div className="p-5">
                            <div className="h-4 bg-gray-800 rounded w-3/4 mb-3"></div>
                            <div className="h-3 bg-gray-800 rounded w-1/2"></div>
                        </div>
                    </div>
                );
            }
            const isLive = video.isLive;
            const isShort = video.category === 'Shorts';
            const href = isShort
                ? `https://www.youtube.com/shorts/${video.id}`
                : `https://www.youtube.com/watch?v=${video.id}`;
            return (
                <a href={href} target="_blank" rel="noopener noreferrer"
                   className={`reveal video-card liquid-glass rounded-2xl overflow-hidden group cursor-pointer${portrait ? ' flex flex-col' : ''}`}
                   style={{textDecoration:'none', color:'inherit', ...style}}>
                    <div className={`${portrait ? 'flex-1' : 'aspect-video'} relative overflow-hidden bg-gray-900`}>
                        <img src={`https://img.youtube.com/vi/${video.id}/maxresdefault.jpg`}
                             alt={video.title}
                             className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                        <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                            <div className="w-16 h-16 rounded-full liquid-glass-strong flex items-center justify-center">
                                <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6 ml-1" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                            </div>
                        </div>
                        <div className={`absolute top-3 left-3 liquid-glass px-2 py-1 rounded-lg text-xs font-medium flex items-center gap-1 ${isLive ? 'text-red-400' : 'text-green-400'}`}>
                            {isLive && <span className="w-2 h-2 rounded-full bg-red-400 animate-pulse inline-block"></span>}
                            {video.category}
                        </div>
                    </div>
                    <div className="p-5">
                        <h3 className="font-semibold text-lg mb-2 group-hover:text-green-400 transition-colors leading-snug line-clamp-2">{video.title}</h3>
                        <div className="flex items-center gap-2 text-sm text-gray-500">
                            <i data-lucide="youtube" className="w-4 h-4 text-red-500"></i>
                            <span>{isLive ? 'Watch Live' : isShort ? 'Watch Short' : 'Watch on YouTube'}</span>
                        </div>
                    </div>
                </a>
            );
        };

        // Fill any null API slots with static fallback videos (so cards are never blank)
        function fillSlots(apiSlots) {
            const keys = ['latest', 'short', 'stream', 'popular'];
            const used = new Set(Object.values(apiSlots).filter(Boolean).map(v => v.id));
            const fallbacks = ((typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.videos) || []).filter(v => !used.has(v.id));
            let fi = 0;
            const result = { ...apiSlots };
            for (const k of keys) {
                if (!result[k] && fallbacks[fi]) {
                    result[k] = { ...fallbacks[fi] };
                    fi++;
                }
            }
            return result;
        }

        // Seed initial state with static videos so cards show on first render
        function staticSlots() {
            const vids = (typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.videos) || [];
            const keys = ['latest', 'short', 'stream', 'popular'];
            return Object.fromEntries(keys.map((k, i) => [k, vids[i] || null]));
        }

        // Content Section
        const ContentSection = () => {
            const [slots, setSlots] = useState(staticSlots);

            useEffect(() => {
                if (!YT_API_CONFIGURED()) {
                    console.warn('[TrueBeast YouTube] API not configured — set youtube.channelId + youtube.apiKey in js/config.js');
                    return;
                }
                fetchYouTubeSlots()
                    .then(s => setSlots(fillSlots(s)))

            return (

                                Latest <span className="text-gradient">Creations</span>

                        </div>

                        <div className="grid gap-6" style={{
                            gridTemplateColumns: 'repeat(2, minmax(0, 1fr))',

                        }}>
                            <VideoCard video={slots.latest} style={{gridArea: 'latest'}} />
                            <VideoCard video={slots.short}  portrait style={{gridArea: 'short'}} />

                                View All Videos

                        text:      text.trim(),

                        createdAt: new Date().toISOString(),

                    setSubmitted(true);

                    <div className="liquid-glass-strong glass-glow rounded-3xl p-8 w-full max-w-lg animate-fade-in">
                        {submitted ? (
                            <div className="text-center py-4">
                                <div className="text-5xl mb-4">🎉</div>
                                <h3 className="font-display font-bold text-2xl mb-2">Thanks for the review!</h3>
                                <p className="text-gray-400 mb-6">Your feedback means a lot. It'll be reviewed shortly.</p>
                                <button onClick={onClose}
                                    className="btn-glass liquid-glass-strong px-8 py-3 rounded-2xl font-semibold text-green-400">
                                    Close
                                </button>
                            </div>
                        ) : (
                            <>
                                <div className="flex items-center justify-between mb-6">
                                    <h3 className="font-display font-bold text-xl">Leave a Review</h3>
                                    <button onClick={onClose} className="text-gray-500 hover:text-white transition-colors">
                                        <svg className="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                    </button>
                                </div>
                                <form onSubmit={handleSubmit} className="space-y-5">
                                    {/* Rating */}
                                    <div>
                                        <label className="block text-sm font-medium text-gray-300 mb-3">How was your experience?</label>
                                        <div className="flex gap-3">
                                            {ratingOpts.map(opt => (
                                                <button key={opt.value} type="button"
                                                    onClick={() => setRating(opt.value)}
                                                    className={`flex-1 liquid-glass rounded-xl py-3 flex flex-col items-center gap-1 transition-all ${rating === opt.value ? 'ring-2 ' + opt.ring + ' bg-white/5' : ''}`}>
                                                    <span className="text-2xl">{opt.emoji}</span>
                                                    <span className={`text-xs font-medium ${rating === opt.value ? opt.color : 'text-gray-400'}`}>{opt.label}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    {/* Name */}
                                    <div>
                                        <label className="block text-sm font-medium text-gray-300 mb-2">Your name <span className="text-gray-500">(optional)</span></label>
                                        <input type="text" value={name} onChange={e => setName(e.target.value)}
                                            placeholder="e.g. ShadowHunter"
                                            className="w-full liquid-glass bg-transparent px-4 py-3 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500/50" />

                                            className="w-full liquid-glass bg-transparent px-4 py-3 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500/50" />
                                    </div>
                                    {/* Text */}
                                    <div>
                                        <label className="block text-sm font-medium text-gray-300 mb-2">Your review</label>
                                        <textarea value={text} onChange={e => setText(e.target.value)} required
                                            placeholder="Share your experience with TrueBeast…"
                                            rows={4}
                                            className="w-full liquid-glass bg-transparent px-4 py-3 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500/50 resize-none" />
                                    </div>
                                    {error && (
                                        <p className="text-red-400 text-sm bg-red-500/10 rounded-lg px-3 py-2">{error}</p>
                                    )}
                                    <div className="flex gap-3">
                                        <button type="button" onClick={onClose}
                                            className="flex-1 liquid-glass px-4 py-3 rounded-xl text-gray-300 hover:text-white font-medium">
                                            Cancel
                                        </button>
                                        <button type="submit" disabled={submitting}
                                            className="flex-1 btn-glass liquid-glass-strong px-4 py-3 rounded-xl font-semibold text-green-400 disabled:opacity-50 flex items-center justify-center gap-2">
                                            {submitting ? (
                                                <>
                                                    <svg className="w-4 h-4 spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                                                    Submitting…
                                                </>
                                            ) : (
                                                <>
                                                    <svg className="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                                                    Submit Review
                                                </>
                                            )}
                                        </button>
                                    </div>
                                </form>
                            </>
                        )}
                    </div>
                </div>
            );
        };

        // Palette for assigning avatar colours to Firebase reviews
        const REVIEW_COLORS = [
            'from-green-500 to-emerald-600',
            'from-blue-500 to-cyan-500',
            'from-purple-500 to-violet-600',
            'from-orange-500 to-red-500',
            'from-pink-500 to-rose-500',
            'from-indigo-500 to-blue-600',
        ];
        const FALLBACK_REVIEWS = [
            { id: 'f1', name: "ShadowHunter", tag: "#2417", text: "TrueBeast helped me fix my PC when no one else could. Legend!", color: "from-green-500 to-emerald-600" },
            { id: 'f2', name: "GameOn",       tag: "#8832", text: "The Discord community is amazing. Made so many friends here!", color: "from-blue-500 to-cyan-500" },
            { id: 'f3', name: "TechWiz",      tag: "#1205", text: "Kiernen actually responds and cares about his community. Rare these days.", color: "from-purple-500 to-violet-600" },
            { id: 'f4', name: "NightOwl",     tag: "#4451", text: "Best gaming streams hands down. Always a good time.", color: "from-orange-500 to-red-500" },
        ];

        // Normalise Firebase reviews into the shape the cards expect
        function normaliseReview(r, idx) {
            return {
                id:    r.id,
                name:  r.name || 'Anonymous',
                tag:   r.tag  || ('#' + String(r.id).replace(/[^A-Z0-9]/gi,'').slice(-4).toUpperCase()),
                text:  r.text,
                color: r.color || REVIEW_COLORS[idx % REVIEW_COLORS.length],
            };
        }

        const useCommunityReviews = () => {
            const [pool,    setPool]    = useState([]);
            const [shown,   setShown]   = useState([]);
            const [visible, setVisible] = useState(true);

            // Load approved reviews from Firebase, fall back to hardcoded
            useEffect(() => {
                if (typeof FirebaseDB !== 'undefined') {
                    FirebaseDB.getAllReviews().then(reviews => {
                        const approved = reviews
                            .filter(r => r.status === 'approved')
                            .map(normaliseReview);
                        console.log('[TrueBeast Reviews] Total fetched:', reviews.length, '| Approved:', approved.length);
                        if (approved.length > 0) {
                            setPool(approved);
                            setShown(approved.slice(0, Math.min(4, approved.length)));
                            return;
                        }
                        // No approved reviews yet — use fallback placeholders
                        console.warn('[TrueBeast Reviews] 0 approved reviews found. Using placeholders. Check Firestore rules allow unauthenticated list/get on the reviews collection.');
                        setPool(FALLBACK_REVIEWS);
                        setShown(FALLBACK_REVIEWS);
                    }).catch(err => {
                        console.error('[TrueBeast Reviews] Failed to load:', err);
                        setPool(FALLBACK_REVIEWS);
                        setShown(FALLBACK_REVIEWS);
                    });
                } else {
                    setPool(FALLBACK_REVIEWS);
                    setShown(FALLBACK_REVIEWS);
                }
            }, []);

            // Cycle through reviews when there are more than 4:
            // fade grid out → swap content → fade back in
            useEffect(() => {
                if (pool.length <= 4) return;
                const interval = setInterval(() => {
                    setVisible(false);
                    setTimeout(() => {
                        const shuffled = [...pool].sort(() => Math.random() - 0.5);
                        setShown(shuffled.slice(0, 4));
                        setVisible(true);
                    }, 450); // matches CSS transition duration
                }, 9000);
                return () => clearInterval(interval);
            }, [pool]);

            return { displayReviews: shown, visible };
        };
        
        // Community Section
        const CommunitySection = () => {
            const { displayReviews, visible } = useCommunityReviews();
            const [showReviewModal, setShowReviewModal] = useState(false);

            return (
                <section id="community" className="py-24 px-6 relative">
                {showReviewModal && <ReviewModal onClose={() => setShowReviewModal(false)} />}
                    <div className="max-w-6xl mx-auto">
                        <div className="liquid-glass-strong glass-glow rounded-3xl p-8 md:p-16 relative overflow-hidden reveal">
                            {/* Background decoration */}
                            <div className="absolute top-0 right-0 w-96 h-96 bg-gradient-to-br from-green-500/20 to-emerald-500/20 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2"></div>
                            
                            <div className="relative z-10 grid lg:grid-cols-2 gap-12 items-center">
                                <div>
                                    <span className="text-green-400 font-medium text-sm tracking-wider uppercase mb-4 block">Community</span>
                                    <h2 className="font-display font-bold text-4xl md:text-5xl mb-6">
                                        Join the <span className="text-gradient">Discord</span>
                                    </h2>
                                    <p className="text-gray-400 text-lg leading-relaxed mb-8">
                                        This isn't just a Discord server, it's a family. We game together, hang out, support each other, and have a blast doing it. Come meet the squad and see what TrueBeast is really about.
                                    </p>
                                    
                                    <div className="space-y-4 mb-8">
                                        {[
                                            { icon: 'gamepad-2', text: 'Game nights every Friday — hop in and play' },
                                            { icon: 'film', text: 'Movie nights every Saturday — grab the popcorn' },
                                            { icon: 'mic', text: 'Voice chats that go way too late' },
                                            { icon: 'users', text: 'Meet friends who actually get you' },
                                        ].map((item, i) => (
                                            <div key={i} className="flex items-center gap-3 text-gray-300">
                                                <div className="w-8 h-8 rounded-lg liquid-glass flex items-center justify-center">
                                                    <i data-lucide={item.icon} className="w-4 h-4 text-green-400"></i>
                                                </div>
                                                <span>{item.text}</span>
                                            </div>
                                        ))}
                                    </div>
                                    
                                    <div className="flex flex-wrap gap-4">
                                        <a href="https://discord.gg/Nk8vekY" target="_blank" rel="noopener noreferrer"
                                           className="btn-glass liquid-glass-strong px-8 py-4 rounded-2xl font-semibold inline-flex items-center gap-3 text-lg">
                                            <DiscordIcon className="w-5 h-5" />
                                            Join Discord
                                        </a>
                                        <button onClick={() => setShowReviewModal(true)}
                                           className="btn-glass liquid-glass px-8 py-4 rounded-2xl font-semibold inline-flex items-center gap-3 text-gray-300 hover:text-white">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                                            Leave a Review
                                        </button>
                                    </div>
                                </div>
                                
                                <div className="relative">
                                    {/* opacity transition handles smooth cycling — content swaps while invisible */}
                                    <div className={`grid ${displayReviews.length === 1 ? 'grid-cols-1' : 'grid-cols-2'} gap-4 items-start`}
                                         style={{ opacity: visible ? 1 : 0, transition: 'opacity 0.45s ease' }}>
                                        {displayReviews.map((review, i) => (
                                            <div key={i} className={`liquid-glass rounded-2xl p-4 ${i % 2 === 0 ? 'float' : 'float-delayed'}`}>
                                                <div className="flex items-center gap-3 mb-3">
                                                    <div className={`w-10 h-10 rounded-full bg-gradient-to-br ${review.color} flex-shrink-0`}></div>
                                                    <div>
                                                        <div className="font-medium text-sm">{review.name}</div>
                                                        <div className="text-xs text-gray-500">{review.tag}</div>
                                                    </div>
                                                </div>
                                                <p className="text-xs text-gray-400">"{review.text}"</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };
        
        // Connect Section
        const ConnectSection = () => {
            const socialCfg = (typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.social) || {};

            const renderSocialIcon = (iconKey, cls) => {
                switch (iconKey) {
                    case 'youtube':
                        return <svg xmlns="http://www.w3.org/2000/svg" className={cls} viewBox="0 0 24 24" fill="currentColor"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.95 1.96A29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58A2.78 2.78 0 0 0 3.4 19.54C5.12 20 12 20 12 20s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"/></svg>;
                    case 'discord':
                        return <DiscordIcon className={cls} />;
                    case 'twitter':
                        return <svg xmlns="http://www.w3.org/2000/svg" className={cls} viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.845L1.255 2.25H8.08l4.258 5.63 5.906-5.63zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>;
                    case 'instagram':
                        return <svg xmlns="http://www.w3.org/2000/svg" className={cls} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>;
                    case 'tiktok':
                        return <svg xmlns="http://www.w3.org/2000/svg" className={cls} viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.76a4.85 4.85 0 0 1-1.01-.07z"/></svg>;
                    case 'twitch':
                        return <svg xmlns="http://www.w3.org/2000/svg" className={cls} viewBox="0 0 24 24" fill="currentColor"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg>;
                    default:
                        return null;
                }
            };

            const socials = [
                { name: 'YouTube',   icon: 'youtube',   url: socialCfg.youtube,   color: 'text-red-500',    bg: 'from-red-500/20 to-red-600/20' },
                { name: 'Discord',   icon: 'discord',   url: socialCfg.discord,   color: 'text-indigo-400', bg: 'from-indigo-500/20 to-indigo-600/20' },
                { name: 'Twitter',   icon: 'twitter',   url: socialCfg.twitter,   color: 'text-sky-400',    bg: 'from-sky-500/20 to-sky-600/20' },
                { name: 'Instagram', icon: 'instagram', url: socialCfg.instagram, color: 'text-pink-400',   bg: 'from-pink-500/20 to-pink-600/20' },
                { name: 'TikTok',    icon: 'tiktok',    url: socialCfg.tiktok,    color: 'text-cyan-400',   bg: 'from-cyan-500/20 to-cyan-600/20' },
                { name: 'Twitch',    icon: 'twitch',    url: socialCfg.twitch,    color: 'text-purple-400', bg: 'from-purple-500/20 to-purple-600/20' },
            ].filter(s => s.url);

            return (
                <section id="connect" className="py-24 px-6">
                    <div className="max-w-6xl mx-auto">
                        <div className="text-center mb-16 reveal">
                            <span className="text-green-400 font-medium text-sm tracking-wider uppercase mb-4 block">Connect</span>
                            <h2 className="font-display font-bold text-4xl md:text-5xl mb-4">
                                Let's <span className="text-gradient">Link Up</span>
                            </h2>
                            <p className="text-gray-400 max-w-xl mx-auto">
                                Catch me on all platforms. I try to stay active everywhere and respond when I can. Let's connect!
                            </p>
                        </div>

                        <div className="grid grid-cols-2 md:grid-cols-3 gap-4 reveal">
                            {socials.map((social, i) => (
                                <a key={i} href={social.url} target="_blank" rel="noopener noreferrer"
                                   className="video-card liquid-glass rounded-2xl p-6 text-center group hover:bg-white/5">
                                    <div className={`w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br ${social.bg} flex items-center justify-center social-icon`}>
                                        {renderSocialIcon(social.icon, `w-8 h-8 ${social.color}`)}
                                    </div>
                                    <h3 className="font-semibold text-lg mb-1">{social.name}</h3>
                                    <p className="text-sm text-gray-500 group-hover:text-gray-400 transition-colors">Follow</p>
                                </a>
                            ))}
                        </div>

                        <div className="mt-12 flex flex-col sm:flex-row gap-4 justify-center items-center reveal">
                            <a href="tech-support/"
                               className="btn-glass liquid-glass px-8 py-4 rounded-2xl font-medium inline-flex items-center gap-2 text-gray-300 hover:text-white">
                                <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>
                                Need Tech Help? Submit a Ticket
                            </a>
                            {typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.donationUrl && (
                                <a href={SITE_CONFIG.donationUrl} target="_blank" rel="noopener noreferrer"
                                   className="btn-glass liquid-glass px-8 py-4 rounded-2xl font-medium inline-flex items-center gap-2 text-yellow-400 hover:text-yellow-300">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                                    Support the Channel
                                </a>
                            )}
                        </div>
                    </div>
                </section>
            );
        };
        
        // Footer
        const Footer = () => {
            return (
                <footer className="py-12 px-6 border-t border-white/5">
                    <div className="max-w-6xl mx-auto">
                        <div className="flex flex-col md:flex-row items-center justify-between gap-6">
                            <div className="flex items-center gap-3">
                                <img src="assets/logos/logo.png" alt="TrueBeast" className="w-10 h-10 object-contain flex-shrink-0" />
                                <span className="font-display font-bold text-xl">TrueBeast</span>
                            </div>
                            
                            <div className="flex flex-col items-center gap-1">
                                <p className="text-gray-500 text-sm">© 2026 TrueBeast. Stay grinding. 🎮</p>
                                {typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.donationUrl && (
                                    <a href={SITE_CONFIG.donationUrl} target="_blank" rel="noopener noreferrer"
                                       className="text-yellow-500/60 hover:text-yellow-400 text-xs transition-colors">
                                        Support the channel ♥
                                    </a>
                                )}
                            </div>
                            
                            <div className="flex items-center gap-4">
                                <a href="https://www.youtube.com/@RealTrueBeast" target="_blank" rel="noopener noreferrer"
                                   className="liquid-glass p-3 rounded-xl hover:bg-white/10 transition-colors text-red-500">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.95 1.96A29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58A2.78 2.78 0 0 0 3.4 19.54C5.12 20 12 20 12 20s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"/></svg>
                                </a>
                                <a href="https://discord.gg/Nk8vekY" target="_blank" rel="noopener noreferrer"
                                   className="liquid-glass p-3 rounded-xl hover:bg-white/10 transition-colors text-indigo-400">
                                    <DiscordIcon className="w-5 h-5" />
                                </a>
                            </div>
                        </div>
                    </div>
                </footer>
            );
        };
        
        // Main App
        const App = () => {
            useScrollReveal();
            useMouseTracking();
            
            useEffect(() => {
                lucide.createIcons();
            }, []);
            
            return (
                <div className="relative">
                    <Navigation />
                    <main>
                        <HeroSection />
                        <AboutSection />
                        <ContentSection />
                        <CommunitySection />
                        <ConnectSection />
                    </main>
                    <Footer />
                </div>
            );
        };
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
