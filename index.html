  <script>
    // Restore path redirected by 404.html for GitHub Pages SPA routing
    (function () {
      var p = new URLSearchParams(window.location.search).get('p');
      if (p) {
        var q = new URLSearchParams(window.location.search).get('q');
        window.history.replaceState(
          null, null,
          p.replace(/~and~/g, '&') + (q ? '?' + q.replace(/~and~/g, '&') : '') + window.location.hash
        );
      }
    })();
  </script>
