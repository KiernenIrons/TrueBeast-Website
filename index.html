    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --accent-green: #22c55e;
            --accent-green-dark: #16a34a;
            --accent-green-light: #4ade80;
            --accent-neon: #39ff14;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            overflow-x: hidden;
        }
        
        .font-display {
            font-family: 'Space Grotesk', sans-serif;
        }
        
        /* Animated Gradient Background */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(34, 197, 94, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(57, 255, 20, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 60%, rgba(22, 163, 74, 0.1) 0%, transparent 40%),
                #050505;
        }
        
        .gradient-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 60% 30%, rgba(74, 222, 128, 0.06) 0%, transparent 40%);
            animation: gradientShift 20s ease-in-out infinite;
        }
        
        @keyframes gradientShift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(5%, -5%) scale(1.1); }
            50% { transform: translate(-5%, 5%) scale(0.95); }
            75% { transform: translate(3%, 3%) scale(1.05); }
        }
        
        /* Liquid Glass Effect */
        .liquid-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 var(--glass-highlight),
                inset 0 -1px 0 rgba(0, 0, 0, 0.1);
        }
        
        .liquid-glass-strong {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.2),
                inset 0 -1px 0 rgba(0, 0, 0, 0.1);
        }
        
        /* Animated border glow */
        .glass-glow {
            position: relative;
        }
        
        .glass-glow::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, 
                rgba(34, 197, 94, 0.6), 
                rgba(57, 255, 20, 0.4),
                rgba(22, 163, 74, 0.5),
                rgba(74, 222, 128, 0.4)
            );
            -webkit-mask:
                linear-gradient(#fff, #fff) content-box,
                linear-gradient(#fff, #fff);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: borderRotate 8s linear infinite;
        }
        
        @keyframes borderRotate {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
        
        /* Floating animation */
        .float {
            animation: float 6s ease-in-out infinite;
        }
        
        .float-delayed {
            animation: float 6s ease-in-out infinite;
            animation-delay: -3s;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        /* Pulse glow */
        .pulse-glow {
            animation: pulseGlow 3s ease-in-out infinite;
        }
        
        @keyframes pulseGlow {
            0%, 100% { 
                box-shadow: 0 0 20px rgba(34, 197, 94, 0.3),
                            0 0 40px rgba(34, 197, 94, 0.1);
            }
            50% { 
                box-shadow: 0 0 30px rgba(34, 197, 94, 0.5),
                            0 0 60px rgba(34, 197, 94, 0.2);
            }
        }
        
        /* Scroll animations */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #050505;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #22c55e, #16a34a);
            border-radius: 4px;
        }
        
        /* Noise texture overlay */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            pointer-events: none;
        }
        
        /* Button hover effects */
        .btn-glass {
            transition: all 0.3s ease;
        }
        
        .btn-glass:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(34, 197, 94, 0.3);
        }
        
        /* Video card hover */
        .video-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .video-card:hover {
            transform: translateY(-8px) scale(1.02);
        }
        
        /* Text gradient */
        .text-gradient {
            background: linear-gradient(135deg, #fff 0%, #4ade80 50%, #22c55e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .text-green-glow {
            color: #22c55e;
            text-shadow: 0 0 20px rgba(34, 197, 94, 0.5);
        }
        
        /* Social icon hover */
        .social-icon {
            transition: all 0.3s ease;
        }
        
        .social-icon:hover {
            transform: scale(1.1) rotate(5deg);
            filter: drop-shadow(0 0 20px currentColor);
        }
        
        /* Cursor glow effect */
        .cursor-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(34, 197, 94, 0.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s ease;
        }
    </style>
</head>

        const { useState, useEffect, useRef } = React;
        
        // Custom hook for scroll reveal
        const useScrollReveal = () => {
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('active');
                        }
                    });
                }, { threshold: 0.1 });
                
                document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
                
                return () => observer.disconnect();
            }, []);
        };
        
        // Custom hook for mouse tracking
        const useMouseTracking = () => {
            useEffect(() => {
                const cursorGlow = document.getElementById('cursorGlow');
                let rafId;
                let mouseX = 0, mouseY = 0;
                
                const handleMouseMove = (e) => {
                    mouseX = e.clientX;
                    mouseY = e.clientY;
                };
                
                const updateCursor = () => {
                    cursorGlow.style.left = mouseX + 'px';
                    cursorGlow.style.top = mouseY + 'px';
                    rafId = requestAnimationFrame(updateCursor);
                };
                
                document.addEventListener('mousemove', handleMouseMove, { passive: true });
                rafId = requestAnimationFrame(updateCursor);
                
                return () => {
                    document.removeEventListener('mousemove', handleMouseMove);
                    cancelAnimationFrame(rafId);
                };
            }, []);
        };

        // Community Reviews Data - stored in localStorage for demo
        const useCommunityReviews = () => {
            const [reviews, setReviews] = useState([]);
            const [currentReviewIndex, setCurrentReviewIndex] = useState(0);
            
            useEffect(() => {
                // Load approved reviews from localStorage
                const stored = localStorage.getItem('tb_approved_reviews');
                let approvedReviews = stored ? JSON.parse(stored) : [];
                
                // Default reviews if none exist
                if (approvedReviews.length === 0) {
                    approvedReviews = [
                        { id: 1, name: "ShadowHunter", tag: "#2417", text: "TrueBeast helped me fix my PC when no one else could. Legend!", color: "from-green-500 to-emerald-600", approved: true },
                        { id: 2, name: "GameOn", tag: "#8832", text: "The Discord community is amazing. Made so many friends here!", color: "from-blue-500 to-cyan-500", approved: true },
                        { id: 3, name: "TechWiz", tag: "#1205", text: "Kiernen actually responds and cares about his community. Rare these days.", color: "from-purple-500 to-violet-600", approved: true },
                        { id: 4, name: "NightOwl", tag: "#4451", text: "Best gaming streams hands down. Always a good time.", color: "from-orange-500 to-red-500", approved: true },
                    ];
                    localStorage.setItem('tb_approved_reviews', JSON.stringify(approvedReviews));
                }
                
                setReviews(approvedReviews);
            }, []);
            
            // Rotate through reviews
            useEffect(() => {
                if (reviews.length === 0) return;
                const interval = setInterval(() => {
                    setCurrentReviewIndex((prev) => (prev + 1) % reviews.length);
                }, 5000);
                return () => clearInterval(interval);
            }, [reviews]);
            
            const getDisplayReviews = () => {
                if (reviews.length === 0) return [];
                const displayCount = Math.min(4, reviews.length);
                const display = [];
                for (let i = 0; i < displayCount; i++) {
                    const idx = (currentReviewIndex + i) % reviews.length;
                    display.push({ ...reviews[idx], position: i });
                }
                return display;
            };
            
            return { reviews, displayReviews: getDisplayReviews() };
        };
        
        // Community Section
        const CommunitySection = () => {
            const { displayReviews } = useCommunityReviews();
            
            return (
                <section id="community" className="py-24 px-6 relative">
                    <div className="max-w-6xl mx-auto">
                        <div className="liquid-glass-strong glass-glow rounded-3xl p-8 md:p-16 relative overflow-hidden reveal">
                            {/* Background decoration */}
                            <div className="absolute top-0 right-0 w-96 h-96 bg-gradient-to-br from-green-500/20 to-emerald-500/20 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2"></div>
                            
                            <div className="relative z-10 grid lg:grid-cols-2 gap-12 items-center">
                                <div>
                                    <span className="text-green-400 font-medium text-sm tracking-wider uppercase mb-4 block">Community</span>
                                    <h2 className="font-display font-bold text-4xl md:text-5xl mb-6">
                                        Join the <span className="text-gradient">Family</span>
                                    </h2>
                                    <p className="text-gray-400 text-lg leading-relaxed mb-8">
                                        This isn't just a Discord server — it's a family. We game together, hang out, support each other, and have a blast doing it. Come meet the squad and see what TrueBeast is really about.
                                    </p>
                                    
                                    <div className="space-y-4 mb-8">
                                        {[
                                            { icon: 'gamepad-2', text: 'Daily gaming sessions & party games' },
                                            { icon: 'mic', text: 'Voice chats that go way too late' },
                                            { icon: 'users', text: 'Meet friends who actually get you' },
                                            { icon: 'star', text: 'Community events & exclusive drops' },
                                        ].map((item, i) => (
                                            <div key={i} className="flex items-center gap-3 text-gray-300">
                                                <div className="w-8 h-8 rounded-lg liquid-glass flex items-center justify-center">
                                                    <i data-lucide={item.icon} className="w-4 h-4 text-green-400"></i>
                                                </div>
                                                <span>{item.text}</span>
                                            </div>
                                        ))}
                                    </div>
                                    
                                    <div className="flex flex-wrap gap-4">
                                        <a href="https://discord.gg/Nk8vekY" target="_blank" rel="noopener noreferrer"
                                           className="btn-glass liquid-glass-strong px-8 py-4 rounded-2xl font-semibold inline-flex items-center gap-3 text-lg">
                                            <i data-lucide="message-circle" className="w-5 h-5"></i>
                                            Join Discord
                                        </a>
                                        <a href="https://discord.gg/Nk8vekY" target="_blank" rel="noopener noreferrer"
                                           className="btn-glass liquid-glass px-8 py-4 rounded-2xl font-semibold inline-flex items-center gap-3 text-gray-300 hover:text-white">
                                            <i data-lucide="heart" className="w-5 h-5"></i>
                                            Leave a Review
                                        </a>
                                    </div>
                                </div>
                                
                                <div className="relative">
                                    <div className="grid grid-cols-2 gap-4">
                                        {displayReviews.map((review, i) => (
                                            <div key={review.id} className={`liquid-glass rounded-2xl p-4 ${i % 2 === 0 ? 'float' : 'float-delayed'} animate-fade-in`}>
                                                <div className="flex items-center gap-3 mb-3">
                                                    <div className={`w-10 h-10 rounded-full bg-gradient-to-br ${review.color}`}></div>
                                                    <div>
                                                        <div className="font-medium text-sm">{review.name}</div>
                                                        <div className="text-xs text-gray-500">{review.tag}</div>
                                                    </div>
                                                </div>
                                                <p className="text-xs text-gray-400">"{review.text}"</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };
        
        // Connect Section
        const ConnectSection = () => {
            const socialCfg = (typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.social) || {};
            const socials = [
                { name: 'YouTube',   icon: 'youtube',         url: socialCfg.youtube,   color: 'text-red-500',    bg: 'from-red-500/20 to-red-600/20' },
                { name: 'Discord',   icon: 'message-circle',  url: socialCfg.discord,   color: 'text-indigo-400', bg: 'from-indigo-500/20 to-indigo-600/20' },
                { name: 'Twitter',   icon: 'twitter',         url: socialCfg.twitter,   color: 'text-sky-400',    bg: 'from-sky-500/20 to-sky-600/20' },
                { name: 'Instagram', icon: 'instagram',       url: socialCfg.instagram, color: 'text-pink-400',   bg: 'from-pink-500/20 to-pink-600/20' },
                { name: 'TikTok',    icon: 'music',           url: socialCfg.tiktok,    color: 'text-cyan-400',   bg: 'from-cyan-500/20 to-cyan-600/20' },
                { name: 'Twitch',    icon: 'tv',              url: socialCfg.twitch,    color: 'text-green-400',  bg: 'from-green-500/20 to-emerald-600/20' },
            ].filter(s => s.url);
            
            return (
                <section id="connect" className="py-24 px-6">
                    <div className="max-w-6xl mx-auto">
                        <div className="text-center mb-16 reveal">
                            <span className="text-green-400 font-medium text-sm tracking-wider uppercase mb-4 block">Connect</span>
                            <h2 className="font-display font-bold text-4xl md:text-5xl mb-4">
                                Let's <span className="text-gradient">Link Up</span>
                            </h2>
                            <p className="text-gray-400 max-w-xl mx-auto">
                                Catch me on all platforms. I try to stay active everywhere and respond when I can. Let's connect!
                            </p>
                        </div>
                        
                        <div className="grid grid-cols-2 md:grid-cols-3 gap-4 reveal">
                            {socials.map((social, i) => (
                                <a key={i} href={social.url} target="_blank" rel="noopener noreferrer"
                                   className="video-card liquid-glass rounded-2xl p-6 text-center group hover:bg-white/5">
                                    <div className={`w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br ${social.bg} flex items-center justify-center social-icon`}>
                                        <i data-lucide={social.icon} className={`w-8 h-8 ${social.color}`}></i>
                                    </div>
                                    <h3 className="font-semibold text-lg mb-1">{social.name}</h3>
                                    <p className="text-sm text-gray-500 group-hover:text-gray-400 transition-colors">Follow</p>
                                </a>
                            ))}
                        </div>
                        
                        <div className="mt-12 text-center reveal">
                            <a href="tech-support.html"
                               className="btn-glass liquid-glass px-8 py-4 rounded-2xl font-medium inline-flex items-center gap-2 text-gray-300 hover:text-white">
                                <i data-lucide="headphones" className="w-5 h-5"></i>
                                Need Tech Help? Submit a Ticket
                            </a>
                        </div>
                    </div>
                </section>
            );
        };
        
        // Footer
        const Footer = () => {
            return (
                <footer className="py-12 px-6 border-t border-white/5">
                    <div className="max-w-6xl mx-auto">
                        <div className="flex flex-col md:flex-row items-center justify-between gap-6">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-green-500 to-emerald-600 flex items-center justify-center">
                                    <span className="font-display font-bold text-lg">TB</span>
                                </div>
                                <span className="font-display font-bold text-xl">TrueBeast</span>
                            </div>
                            
                            <p className="text-gray-500 text-sm">
                                © 2026 TrueBeast. Stay grinding. 🎮
                            </p>
                            
                            <div className="flex items-center gap-4">
                                <a href="https://www.youtube.com/@RealTrueBeast" target="_blank" rel="noopener noreferrer"
                                   className="liquid-glass p-3 rounded-xl hover:bg-white/10 transition-colors">
                                    <i data-lucide="youtube" className="w-5 h-5"></i>
                                </a>
                                <a href="https://discord.gg/Nk8vekY" target="_blank" rel="noopener noreferrer"
                                   className="liquid-glass p-3 rounded-xl hover:bg-white/10 transition-colors">
                                    <i data-lucide="message-circle" className="w-5 h-5"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </footer>
            );
        };
        
        // Main App
        const App = () => {
            useScrollReveal();
            useMouseTracking();
            
            useEffect(() => {
                lucide.createIcons();
            }, []);
            
            return (
                <div className="relative">
                    <Navigation />
                    <main>
                        <HeroSection />
                        <AboutSection />
                        <ContentSection />
                        <CommunitySection />
                        <ConnectSection />
                    </main>
                    <Footer />
                </div>
            );
        };
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
