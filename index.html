        const { useState, useEffect, useRef, useCallback, useMemo } = React;
        
        // Custom hook for scroll reveal
        const useScrollReveal = () => {
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('active');
                            observer.unobserve(entry.target); // stop watching once revealed
                        }
                    });
                }, { threshold: 0.1 });

                const observeNew = () => {
                    document.querySelectorAll('.reveal:not(.active)').forEach(el => observer.observe(el));
                };
                observeNew();

                // Debounced re-observe for async content (e.g. YouTube cards)
                let mutationTimer;
                const mutation = new MutationObserver(() => {
                    clearTimeout(mutationTimer);
                    mutationTimer = setTimeout(observeNew, 150);
                });
                mutation.observe(document.body, { childList: true, subtree: true });

                return () => { observer.disconnect(); mutation.disconnect(); clearTimeout(mutationTimer); };
            }, []);
        };
        
        // Custom hook for mouse tracking
        const useMouseTracking = () => {
            useEffect(() => {
                const cursorGlow = document.getElementById('cursorGlow');
                if (!cursorGlow) return;
                // Update via transform only — no left/top (avoids reflow), no RAF loop (avoids idle CPU)
                const handleMouseMove = (e) => {
                    cursorGlow.style.transform = 'translate(' + (e.clientX - 150) + 'px,' + (e.clientY - 150) + 'px)';
                };
                document.addEventListener('mousemove', handleMouseMove, { passive: true });
                return () => document.removeEventListener('mousemove', handleMouseMove);
            }, []);
        };
        
        // Shared inline Discord SVG (with fillRule=evenodd for proper eye holes)
        const DiscordIcon = ({ className }) => (

                <path fillRule="evenodd" d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>

        // Theme toggle button — sun (dark mode) / moon (light mode)

                                           className="border border-white/10 bg-white/5 hover:bg-white/10 hover:border-white/20 px-3 py-2.5 rounded-xl text-sm font-medium text-red-500 hover:text-red-400 transition-all flex items-center justify-center gap-2">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2.5 17a24.12 24.12 0 0 1 0-10 2 2 0 0 1 1.4-1.4 49.56 49.56 0 0 1 16.2 0A2 2 0 0 1 21.5 7a24.12 24.12 0 0 1 0 10 2 2 0 0 1-1.4 1.4 49.55 49.55 0 0 1-16.2 0A2 2 0 0 1 2.5 17"/><path d="m10 15 5-3-5-3z"/></svg>
                                            Subscribe
                                        </a>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </nav>
            );
        };
        
        // Hero Section
        const HeroSection = () => {
            return (
                <section id="home" className="min-h-screen flex items-center justify-center relative pt-24 pb-12 px-6">
                    <div className="max-w-6xl mx-auto text-center relative z-10">

                        {/* Main content */}

                        <h1 className="reveal font-display font-bold text-6xl md:text-8xl lg:text-9xl mb-6 leading-none">
                            <span className="text-gradient">TrueBeast</span>
                        </h1>
                        
                        <p className="reveal text-xl md:text-2xl text-gray-400 max-w-2xl mx-auto mb-4 font-light">

                        <p className="reveal text-gray-400 max-w-xl mx-auto mb-12">
                            Welcome to my world. I game hard, hang with friends, and share my life with the best community out there. Come through and meet some amazing people while you're at it.
                        </p>
                        
                        <div className="reveal flex flex-col sm:flex-row items-center justify-center gap-4">
                            <a href="https://www.youtube.com/@RealTrueBeast" target="_blank" rel="noopener noreferrer" data-track="hero_youtube"
                               className="btn-glass liquid-glass-strong glass-glow px-8 py-4 rounded-2xl font-semibold text-lg flex items-center gap-3 group">
                                <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5 group-hover:scale-110 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2.5 17a24.12 24.12 0 0 1 0-10 2 2 0 0 1 1.4-1.4 49.56 49.56 0 0 1 16.2 0A2 2 0 0 1 21.5 7a24.12 24.12 0 0 1 0 10 2 2 0 0 1-1.4 1.4 49.55 49.55 0 0 1-16.2 0A2 2 0 0 1 2.5 17"/><path d="m10 15 5-3-5-3z"/></svg>

        // ── ProfileCard ──────────────────────────────────────────────────────
        const PC_DEFAULT_GRADIENT = 'linear-gradient(145deg,#60496e8c 0%,#71C4FF44 100%)';
        const PC_ANIM = { INITIAL_DURATION: 1200, INITIAL_X_OFFSET: 70, INITIAL_Y_OFFSET: 60,
                          DEVICE_BETA_OFFSET: 20, ENTER_TRANSITION_MS: 180 };
        const pcClamp = (v, mn = 0, mx = 100) => Math.min(Math.max(v, mn), mx);
        const pcRound = (v, p = 3) => parseFloat(v.toFixed(p));
        const pcAdjust = (v, fMin, fMax, tMin, tMax) =>
            pcRound(tMin + ((tMax - tMin) * (v - fMin)) / (fMax - fMin));

        const ProfileCard = React.memo(({
            avatarUrl = '', iconUrl, grainUrl, innerGradient,
            behindGlowEnabled = true, behindGlowColor, behindGlowSize,
            shineOpacity, glareOpacity,
            className = '', enableTilt = true, enableMobileTilt = false,
            mobileTiltSensitivity = 5, miniAvatarUrl,
            name = '', title = '', handle = '', status = 'Online',
            contactText = 'Contact', showUserInfo = true, onContactClick
        }) => {
            const wrapRef  = useRef(null);
            const shellRef = useRef(null);
            const enterTimerRef = useRef(null);
            const leaveRafRef   = useRef(null);

            const tiltEngine = useMemo(() => {
                if (!enableTilt) return null;
                let rafId = null, running = false, lastTs = 0;
                let currentX = 0, currentY = 0, targetX = 0, targetY = 0;
                const DEFAULT_TAU = 0.14, INITIAL_TAU = 0.6;
                let initialUntil = 0;

                const setVarsFromXY = (x, y) => {
                    const shell = shellRef.current, wrap = wrapRef.current;
                    if (!shell || !wrap) return;
                    const w = shell.clientWidth || 1, h = shell.clientHeight || 1;
                    const px = pcClamp((100 / w) * x), py = pcClamp((100 / h) * y);
                    const cx = px - 50, cy = py - 50;
                    const vars = {
                        '--pointer-x': `${px}%`, '--pointer-y': `${py}%`,
                        '--background-x': `${pcAdjust(px, 0, 100, 35, 65)}%`,
                        '--background-y': `${pcAdjust(py, 0, 100, 35, 65)}%`,
                        '--pointer-from-center': `${pcClamp(Math.hypot(py - 50, px - 50) / 50, 0, 1)}`,
                        '--pointer-from-top': `${py / 100}`, '--pointer-from-left': `${px / 100}`,
                        '--rotate-x': `${pcRound(-(cx / 5))}deg`, '--rotate-y': `${pcRound(cy / 4)}deg`
                    };
                    for (const [k, v] of Object.entries(vars)) wrap.style.setProperty(k, v);
                };

                const step = (ts) => {
                    if (!running) return;
                    if (lastTs === 0) lastTs = ts;
                    const dt = (ts - lastTs) / 1000; lastTs = ts;
                    const tau = ts < initialUntil ? INITIAL_TAU : DEFAULT_TAU;
                    const k = 1 - Math.exp(-dt / tau);
                    currentX += (targetX - currentX) * k;
                    currentY += (targetY - currentY) * k;
                    setVarsFromXY(currentX, currentY);
                    const stillFar = Math.abs(targetX - currentX) > 0.05 || Math.abs(targetY - currentY) > 0.05;
                    if (stillFar || document.hasFocus()) { rafId = requestAnimationFrame(step); }
                    else { running = false; lastTs = 0; if (rafId) { cancelAnimationFrame(rafId); rafId = null; } }
                };
                const start = () => { if (running) return; running = true; lastTs = 0; rafId = requestAnimationFrame(step); };

                return {
                    setImmediate(x, y) { currentX = x; currentY = y; setVarsFromXY(x, y); },
                    setTarget(x, y)    { targetX = x; targetY = y; start(); },
                    toCenter()         { const s = shellRef.current; if (s) this.setTarget(s.clientWidth / 2, s.clientHeight / 2); },
                    beginInitial(ms)   { initialUntil = performance.now() + ms; start(); },
                    getCurrent()       { return { x: currentX, y: currentY, tx: targetX, ty: targetY }; },
                    cancel()           { if (rafId) cancelAnimationFrame(rafId); rafId = null; running = false; lastTs = 0; }
                };
            }, [enableTilt]);

            const getOffsets = (evt, el) => { const r = el.getBoundingClientRect(); return { x: evt.clientX - r.left, y: evt.clientY - r.top }; };

            const handlePointerMove  = useCallback((e) => { const s = shellRef.current; if (s && tiltEngine) { const {x,y} = getOffsets(e,s); tiltEngine.setTarget(x,y); } }, [tiltEngine]);
            const handlePointerEnter = useCallback((e) => {
                const s = shellRef.current; if (!s || !tiltEngine) return;
                s.classList.add('active', 'entering');
                if (enterTimerRef.current) window.clearTimeout(enterTimerRef.current);
                enterTimerRef.current = window.setTimeout(() => s.classList.remove('entering'), PC_ANIM.ENTER_TRANSITION_MS);
                const {x,y} = getOffsets(e, s); tiltEngine.setTarget(x,y);
            }, [tiltEngine]);
            const handlePointerLeave = useCallback(() => {
                const s = shellRef.current; if (!s || !tiltEngine) return;
                tiltEngine.toCenter();
                const check = () => {
                    const {x,y,tx,ty} = tiltEngine.getCurrent();
                    if (Math.hypot(tx-x, ty-y) < 0.6) { s.classList.remove('active'); leaveRafRef.current = null; }
                    else leaveRafRef.current = requestAnimationFrame(check);
                };
                if (leaveRafRef.current) cancelAnimationFrame(leaveRafRef.current);
                leaveRafRef.current = requestAnimationFrame(check);
            }, [tiltEngine]);
            const handleDeviceOrientation = useCallback((e) => {
                const s = shellRef.current; if (!s || !tiltEngine) return;

                const x = pcClamp(s.clientWidth/2  + gamma * mobileTiltSensitivity, 0, s.clientWidth);
                const y = pcClamp(s.clientHeight/2 + (beta - PC_ANIM.DEVICE_BETA_OFFSET) * mobileTiltSensitivity, 0, s.clientHeight);
                tiltEngine.setTarget(x, y);

                    } else window.addEventListener('deviceorientation', handleDeviceOrientation);

                s.addEventListener('click', handleClick);

                tiltEngine.toCenter();
                tiltEngine.beginInitial(PC_ANIM.INITIAL_DURATION);
                return () => {

        // ── YouTube API helpers ──────────────────────────────────────────────
        const YT_CFG = () => (typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.youtube) || {};
        const YT_API_CONFIGURED = () => {
            const cfg = YT_CFG();
            return cfg.channelId && cfg.apiKey && cfg.apiKey !== 'PASTE_YOUR_YOUTUBE_API_KEY';
        };

        const YT_CACHE_KEY = 'tb_yt_slots_v9';
        const YT_CACHE_TTL = 60 * 60 * 1000; // 1 hour

        async function fetchYouTubeSlots() {
            // Return cached data if fresh
            try {
                const cached = JSON.parse(localStorage.getItem(YT_CACHE_KEY) || 'null');
                if (cached && Date.now() - cached.ts < YT_CACHE_TTL) return cached.slots;
            } catch {}

            const cfg    = YT_CFG();
            const ch     = cfg.channelId;
            const k      = cfg.apiKey;
            const plBase = 'https://www.googleapis.com/youtube/v3/playlistItems';
            const vBase  = 'https://www.googleapis.com/youtube/v3/videos';
            const slots  = { latest: null, short: null, stream: null, popular: null };

            // Parse ISO 8601 duration (PT#H#M#S) → total seconds
            const parseDuration = iso => {
                const m = (iso || '').match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
                return m ? (parseInt(m[1]||0)*3600) + (parseInt(m[2]||0)*60) + parseInt(m[3]||0) : 0;
            };

            try {
                // Step 1: Fetch all uploads from the uploads playlist (1 unit/page, newest first)
                const uploadsId = ch.replace(/^UC/, 'UU');
                let allItems = [], pageToken = '';
                do {
                    const url = `${plBase}?part=snippet&playlistId=${uploadsId}&maxResults=50&key=${k}${pageToken ? '&pageToken=' + pageToken : ''}`;
                    const d = await fetch(url).then(r => r.json());
                    if (d.error) { console.warn('[TrueBeast YouTube] playlist:', d.error.message); break; }
                    allItems.push(...(d.items || []).map(it => ({
                        id:          it.snippet.resourceId.videoId,
                        title:       it.snippet.title,
                        publishedAt: it.snippet.publishedAt,
                    })));
                    pageToken = d.nextPageToken || '';
                } while (pageToken);

                if (!allItems.length) { console.warn('[TrueBeast YouTube] No uploads found.'); return slots; }

                // Step 2: Fetch contentDetails + liveStreamingDetails + statistics in batches of 50
                const detailMap = {};
                for (let i = 0; i < allItems.length; i += 50) {
                    const ids = allItems.slice(i, i + 50).map(v => v.id).join(',');
                    const d = await fetch(`${vBase}?part=contentDetails,liveStreamingDetails,statistics&id=${ids}&key=${k}`).then(r => r.json());
                    if (d.error) { console.warn('[TrueBeast YouTube] video details:', d.error.message); break; }
                    (d.items || []).forEach(v => { detailMap[v.id] = v; });
                }

                // Step 3: Classify each video (uploads playlist is already newest-first)
                const streams = [], shorts = [], videos = [];
                for (const item of allItems) {
                    const detail = detailMap[item.id];
                    if (!detail) continue;
                    const dur      = parseDuration(detail.contentDetails?.duration);
                    const isStream = !!detail.liveStreamingDetails;
                    const isShort  = !isStream && dur > 0 && dur <= 60;
                    const views    = parseInt(detail.statistics?.viewCount || '0');
                    const enriched = { ...item, views, dur };
                    if (isStream)     streams.push(enriched);
                    else if (isShort) shorts.push(enriched);
                    else              videos.push(enriched);
                }

                // Step 4: Fill slots — arrays are newest-first from the playlist
                if (streams.length) slots.stream = { id: streams[0].id, title: streams[0].title, category: 'Latest Stream' };
                if (shorts.length)  slots.short  = { id: shorts[0].id,  title: shorts[0].title,  category: 'Latest Short'  };
                if (videos.length)  slots.latest = { id: videos[0].id,  title: videos[0].title,  category: 'Latest Video'  };

                // Most Viewed: highest view count across all non-stream uploads not already in a slot
                const usedIds = new Set([slots.stream?.id, slots.short?.id, slots.latest?.id].filter(Boolean));
                const popular = [...shorts, ...videos]
                    .filter(v => !usedIds.has(v.id))
                    .sort((a, b) => b.views - a.views)[0];
                if (popular) slots.popular = { id: popular.id, title: popular.title, category: 'Most Viewed' };

            } catch (e) { console.warn('[TrueBeast YouTube] fetchYouTubeSlots failed:', e.message); }

            // Cache result — only if at least one slot has data
            if (Object.values(slots).some(Boolean)) {
                try { localStorage.setItem(YT_CACHE_KEY, JSON.stringify({ ts: Date.now(), slots })); } catch {}
            }
            return slots;
        }

                                            {submitting ? (
                                                <>

                                                    Submitting…
                                                </>

                                                <>

                            </>
                        )}
                    </div>
                </div>
            );
        };

        // Palette for assigning avatar colours to Firebase reviews
        const REVIEW_COLORS = [
            'from-green-500 to-emerald-600',
            'from-blue-500 to-cyan-500',
            'from-purple-500 to-violet-600',
            'from-orange-500 to-red-500',
            'from-pink-500 to-rose-500',
            'from-indigo-500 to-blue-600',
        ];
        const FALLBACK_REVIEWS = [
            { id: 'f1', name: "ShadowHunter", tag: "#2417", text: "TrueBeast helped me fix my PC when no one else could. Legend!", color: "from-green-500 to-emerald-600" },
            { id: 'f2', name: "GameOn",       tag: "#8832", text: "The Discord community is amazing. Made so many friends here!", color: "from-blue-500 to-cyan-500" },
            { id: 'f3', name: "TechWiz",      tag: "#1205", text: "Kiernen actually responds and cares about his community. Rare these days.", color: "from-purple-500 to-violet-600" },
            { id: 'f4', name: "NightOwl",     tag: "#4451", text: "Best gaming streams hands down. Always a good time.", color: "from-orange-500 to-red-500" },
        ];

        // Normalise Firebase reviews into the shape the cards expect
        function normaliseReview(r, idx) {
            return {
                id:    r.id,
                name:  r.name || 'Anonymous',
                tag:   r.tag  || ('#' + String(r.id).replace(/[^A-Z0-9]/gi,'').slice(-4).toUpperCase()),
                text:  r.text,
                color: r.color || REVIEW_COLORS[idx % REVIEW_COLORS.length],
            };
        }

        const useCommunityReviews = () => {
            const [pool,    setPool]    = useState([]);
            const [shown,   setShown]   = useState([]);
            const [visible, setVisible] = useState(true);

            // Load approved reviews from Firebase, fall back to hardcoded
            useEffect(() => {
                if (typeof FirebaseDB !== 'undefined') {
                    FirebaseDB.getAllReviews().then(reviews => {
                        const approved = reviews
                            .filter(r => r.status === 'approved')
                            .map(normaliseReview);
                        console.log('[TrueBeast Reviews] Total fetched:', reviews.length, '| Approved:', approved.length);
                        if (approved.length > 0) {
                            setPool(approved);
                            setShown(approved.slice(0, Math.min(4, approved.length)));
                            return;
                        }
                        // No approved reviews yet — use fallback placeholders
                        console.warn('[TrueBeast Reviews] 0 approved reviews found. Using placeholders. Check Firestore rules allow unauthenticated list/get on the reviews collection.');
                        setPool(FALLBACK_REVIEWS);
                        setShown(FALLBACK_REVIEWS);
                    }).catch(err => {
                        console.error('[TrueBeast Reviews] Failed to load:', err);
                        setPool(FALLBACK_REVIEWS);
                        setShown(FALLBACK_REVIEWS);
                    });
                } else {
                    setPool(FALLBACK_REVIEWS);
                    setShown(FALLBACK_REVIEWS);
                }
            }, []);

            // Cycle through reviews when there are more than 4:
            // fade grid out → swap content → fade back in
            useEffect(() => {
                if (pool.length <= 4) return;
                const interval = setInterval(() => {
                    setVisible(false);
                    setTimeout(() => {
                        const shuffled = [...pool].sort(() => Math.random() - 0.5);
                        setShown(shuffled.slice(0, 4));
                        setVisible(true);
                    }, 450); // matches CSS transition duration
                }, 9000);
                return () => clearInterval(interval);
            }, [pool]);

            return { displayReviews: shown, visible };
        };

        const CommunitySection = () => {

                                            { icon: (<svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 text-green-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>), text: 'Voice chats that go way too late' },
                                            { icon: (<svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 text-green-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>), text: 'Meet friends who actually get you' },
                                        ].map((item, i) => (
                                            <div key={i} className="flex items-center gap-3 text-gray-300">
                                                <div className="w-8 h-8 rounded-lg liquid-glass flex items-center justify-center">
                                                    {item.icon}
                                                </div>
                                                <span>{item.text}</span>
                                            </div>
                                        ))}
                                    </div>
                                    
                                    <div className="flex flex-wrap gap-4">
                                        <a href="https://discord.gg/Nk8vekY" target="_blank" rel="noopener noreferrer" data-track="community_discord"
                                           className="btn-glass liquid-glass-strong px-8 py-4 rounded-2xl font-semibold inline-flex items-center gap-3 text-lg">
                                            <DiscordIcon className="w-5 h-5" />
                                            Join Discord
                                        </a>
                                        <button onClick={() => setShowReviewModal(true)}
                                           className="btn-glass liquid-glass px-8 py-4 rounded-2xl font-semibold inline-flex items-center gap-3 text-gray-300 hover:text-white">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                                            Leave a Review
                                        </button>
                                    </div>
                                </div>
                                
                                <div className="relative">
                                    {/* opacity transition handles smooth cycling — content swaps while invisible */}
                                    <div className={displayReviews.length > 1 ? 'flex gap-4' : ''}
                                         style={{ opacity: visible ? 1 : 0, transition: 'opacity 0.45s ease' }}>
                                        {displayReviews.length > 1 ? [0, 1].map(col => (
                                            <div key={col} className="flex-1 flex flex-col gap-2">
                                                {displayReviews.filter((_, i) => i % 2 === col).map((review, j) => (
                                                    <div key={j} className={`liquid-glass rounded-2xl p-4 ${col === 0 ? 'float' : 'float-delayed'}`}>

                                </div>
                            </div>

        // Connect Section
        const ConnectSection = () => {

            const renderSocialIcon = (iconKey, cls) => {

                { name: 'Twitch',    icon: 'twitch',    url: socialCfg.twitch,    color: 'text-purple-400', bg: 'from-purple-500/20 to-purple-600/20' },
            ].filter(s => s.url);

            return (
                <section id="connect" className="py-24 px-6">
                    <div className="max-w-6xl mx-auto">
                        <div className="text-center mb-16 reveal">
                            <span className="text-green-400 font-medium text-sm tracking-wider uppercase mb-4 block">Connect</span>
                            <h2 className="font-display font-bold text-4xl md:text-5xl mb-4">
                                Let's <span className="text-gradient">Link Up</span>
                            </h2>
                            <p className="text-gray-400 max-w-xl mx-auto">
                                Catch me on all platforms. I try to stay active everywhere and respond when I can. Let's connect!
                            </p>
                        </div>

                        <div className="grid grid-cols-2 md:grid-cols-3 gap-4 reveal">
                            {socials.map((social, i) => (
                                <a key={i} href={social.url} target="_blank" rel="noopener noreferrer" data-track={`connect_${social.icon}`}
                                   className="video-card liquid-glass rounded-2xl p-6 text-center group hover:bg-white/5">
                                    <div className={`w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br ${social.bg} flex items-center justify-center social-icon`}>
                                        {renderSocialIcon(social.icon, `${social.iconSize || 'w-8 h-8'} ${social.color}`)}

                                    <h3 className="font-semibold text-lg mb-1">{social.name}</h3>

                        <div className="mt-12 flex flex-col sm:flex-row gap-4 justify-center items-center reveal">

        // Footer
        const Footer = () => {

                                       className="text-yellow-500/60 hover:text-yellow-400 text-xs transition-colors">
                                        Support the channel ♥
                                    </a>
                                )}
                            </div>
                            <div className="flex items-center gap-4">
                                <a href="https://www.youtube.com/@RealTrueBeast" target="_blank" rel="noopener noreferrer" data-track="footer_youtube"
                                   className="liquid-glass p-3 rounded-xl hover:bg-white/10 transition-colors text-gray-400 hover:text-white">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2.5 17a24.12 24.12 0 0 1 0-10 2 2 0 0 1 1.4-1.4 49.56 49.56 0 0 1 16.2 0A2 2 0 0 1 21.5 7a24.12 24.12 0 0 1 0 10 2 2 0 0 1-1.4 1.4 49.55 49.55 0 0 1-16.2 0A2 2 0 0 1 2.5 17"/><path d="m10 15 5-3-5-3z"/></svg>
                                </a>
                                <a href="https://discord.gg/Nk8vekY" target="_blank" rel="noopener noreferrer" data-track="footer_discord"
                                   className="liquid-glass p-3 rounded-xl hover:bg-white/10 transition-colors text-indigo-400 hover:text-indigo-300">

        // Main App
        const App = () => {

            useMouseTracking();
            
            useEffect(() => {
                lucide.createIcons();
            }, []);
            
            return (
                <div className="relative">
                    <Navigation />
                    <main>
                        <HeroSection />
                        <AboutSection />
                        <ContentSection />
                        <CommunitySection />
                        <ConnectSection />

                    <Footer />

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    <script>
    /* ── Dot-grid background — adapted from ReactBits DotGrid (home page only) ── */
    if (typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.dotGrid) {
        document.getElementById('dot-grid-canvas').style.display = '';
    }
    if (typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.dotGrid) (function () {
        var DOT_SIZE       = 6;
        var GAP            = 16;
        var PROXIMITY      = 150;
        var SPEED_TRIGGER  = 80;
        var SHOCK_RADIUS   = 250;
        var SHOCK_STRENGTH = 50;
        var RETURN_DUR     = 1.5;

        var canvas = document.getElementById('dot-grid-canvas');
        var ctx    = canvas.getContext('2d');
        var dots   = [];
        var canvasW = 0, canvasH = 0;

        var circlePath = new Path2D();
        circlePath.arc(0, 0, DOT_SIZE / 2, 0, Math.PI * 2);

        var pointer = { x: -9999, y: -9999, vx: 0, vy: 0, speed: 0,
                        lastTime: 0, lastX: 0, lastY: 0 };

        function isLight() { return document.documentElement.classList.contains('light'); }

        function hexToRgb(hex) {
            var m = hex.match(/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i);
            return m ? { r: parseInt(m[1],16), g: parseInt(m[2],16), b: parseInt(m[3],16) }
                     : { r: 0, g: 0, b: 0 };
        }

        function getColors() {
            return isLight()
                ? { base: '#8fcc8f', active: '#15803d' }   // light: muted → dark green
                : { base: '#1e3320', active: '#22c55e' };  // dark:  near-black → bright green
        }

        function buildGrid() {
            var dpr = window.devicePixelRatio || 1;
            canvasW = window.innerWidth;
            canvasH = window.innerHeight;
            canvas.width  = canvasW * dpr;
            canvas.height = canvasH * dpr;
            canvas.style.width  = canvasW + 'px';
            canvas.style.height = canvasH + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

            var cell   = DOT_SIZE + GAP;
            var cols   = Math.floor((canvasW + GAP) / cell);
            var rows   = Math.floor((canvasH + GAP) / cell);
            var gridW  = cell * cols - GAP;
            var gridH  = cell * rows - GAP;
            var startX = (canvasW - gridW) / 2 + DOT_SIZE / 2;
            var startY = (canvasH - gridH) / 2 + DOT_SIZE / 2;

            dots.forEach(function (d) { gsap.killTweensOf(d); });
            dots = [];
            for (var r = 0; r < rows; r++) {
                for (var c = 0; c < cols; c++) {
                    dots.push({ cx: startX + c * cell, cy: startY + r * cell,
                                 xOffset: 0, yOffset: 0, _inertiaApplied: false });
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvasW, canvasH);

            var colors   = getColors();
            var baseRgb  = hexToRgb(colors.base);
            var actRgb   = hexToRgb(colors.active);
            var proxSq   = PROXIMITY * PROXIMITY;
            var px = pointer.x, py = pointer.y;

            for (var i = 0; i < dots.length; i++) {
                var d  = dots[i];
                var ox = d.cx + d.xOffset;
                var oy = d.cy + d.yOffset;
                var dx = d.cx - px,  dy = d.cy - py;
                var dsq = dx * dx + dy * dy;

                var fill;
                if (dsq <= proxSq) {
                    var dist = Math.sqrt(dsq);
                    var t = 1 - dist / PROXIMITY;
                    fill = 'rgb(' +
                        Math.round(baseRgb.r + (actRgb.r - baseRgb.r) * t) + ',' +
                        Math.round(baseRgb.g + (actRgb.g - baseRgb.g) * t) + ',' +
                        Math.round(baseRgb.b + (actRgb.b - baseRgb.b) * t) + ')';
                } else {
                    fill = colors.base;
                }

                ctx.save();
                ctx.translate(ox, oy);
                ctx.fillStyle = fill;
                ctx.fill(circlePath);
                ctx.restore();
            }

            requestAnimationFrame(draw);
        }

        var lastMove = 0;
        function onMove(e) {
            var now = performance.now();
            if (now - lastMove < 16) return;
            lastMove = now;

            var pr = pointer;
            var dt = pr.lastTime ? now - pr.lastTime : 16;
            var dx = e.clientX - pr.lastX,  dy = e.clientY - pr.lastY;
            var vx = dx / dt * 1000,         vy = dy / dt * 1000;
            var speed = Math.hypot(vx, vy);
            if (speed > 5000) { vx *= 5000/speed; vy *= 5000/speed; speed = 5000; }

            pr.lastTime = now; pr.lastX = e.clientX; pr.lastY = e.clientY;
            pr.vx = vx; pr.vy = vy; pr.speed = speed;
            pr.x = e.clientX; pr.y = e.clientY;

            if (speed > SPEED_TRIGGER) {
                for (var i = 0; i < dots.length; i++) {
                    var dot = dots[i];
                    if (dot._inertiaApplied) continue;
                    var dist = Math.hypot(dot.cx - pr.x, dot.cy - pr.y);
                    if (dist < PROXIMITY) {
                        dot._inertiaApplied = true;
                        gsap.killTweensOf(dot);
                        var pushX = (dot.cx - pr.x) * 0.4 + vx * 0.003;
                        var pushY = (dot.cy - pr.y) * 0.4 + vy * 0.003;
                        var pd = Math.hypot(pushX, pushY);
                        if (pd > 40) { pushX *= 40/pd; pushY *= 40/pd; }
                        (function (d, px2, py2) {
                            gsap.to(d, { xOffset: px2, yOffset: py2, duration: 0.07, ease: 'none', overwrite: true,
                                onComplete: function () {
                                    gsap.to(d, { xOffset: 0, yOffset: 0, duration: RETURN_DUR,
                                        ease: 'elastic.out(1,0.75)', overwrite: true,
                                        onComplete: function () { d._inertiaApplied = false; } });
                                }
                            });
                        })(dot, pushX, pushY);
                    }
                }
            }
        }

        function onClick(e) {
            var cx = e.clientX, cy = e.clientY;
            for (var i = 0; i < dots.length; i++) {
                var dot = dots[i];
                var dist = Math.hypot(dot.cx - cx, dot.cy - cy);
                if (dist < SHOCK_RADIUS && !dot._inertiaApplied) {
                    dot._inertiaApplied = true;
                    gsap.killTweensOf(dot);
                    var falloff = Math.max(0, 1 - dist / SHOCK_RADIUS);
                    var d2 = dist || 1;
                    var pushX = (dot.cx - cx) / d2 * SHOCK_STRENGTH * falloff;
                    var pushY = (dot.cy - cy) / d2 * SHOCK_STRENGTH * falloff;
                    (function (d, px2, py2) {
                        gsap.to(d, { xOffset: px2, yOffset: py2, duration: 0.08, ease: 'none', overwrite: true,
                            onComplete: function () {
                                gsap.to(d, { xOffset: 0, yOffset: 0, duration: RETURN_DUR,
                                    ease: 'elastic.out(1,0.75)', overwrite: true,
                                    onComplete: function () { d._inertiaApplied = false; } });
                            }
                        });
                    })(dot, pushX, pushY);
                }
            }
        }

        window.addEventListener('mousemove', onMove, { passive: true });
        window.addEventListener('click', onClick);
        window.addEventListener('resize', buildGrid);

        buildGrid();
        draw();
    })();
    </script>

    <script>
    /* ── Aurora background — adapted from ReactBits Aurora (home page only) ── */
    (function () {
        var cfg = typeof SITE_CONFIG !== 'undefined' ? SITE_CONFIG.aurora : null;
        if (!cfg || !cfg.enabled) return;

        var colorStops = cfg.colorStops || ['#4ade80', '#22c55e', '#0a0a0f'];
        var amplitude  = cfg.amplitude  !== undefined ? cfg.amplitude : 1.0;
        var blend      = cfg.blend      !== undefined ? cfg.blend     : 0.5;
        var speed      = cfg.speed      !== undefined ? cfg.speed     : 0.3;

        var canvas = document.getElementById('aurora-canvas');
        canvas.style.display = '';

        var gl = canvas.getContext('webgl2', { alpha: true, premultipliedAlpha: true, antialias: true });
        if (!gl) { canvas.style.display = 'none'; return; }

        gl.clearColor(0, 0, 0, 0);
        gl.enable(gl.BLEND);
        gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA);

        var VERT = '#version 300 es\nin vec2 position;\nvoid main(){\n  gl_Position=vec4(position,0.0,1.0);\n}';

        var FRAG = `#version 300 es
precision highp float;

uniform float uTime;
uniform float uAmplitude;
uniform vec3 uColorStops[3];
uniform vec2 uResolution;
uniform float uBlend;

out vec4 fragColor;

vec3 permute(vec3 x){return mod(((x*34.0)+1.0)*x,289.0);}

float snoise(vec2 v){
  const vec4 C=vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);
  vec2 i=floor(v+dot(v,C.yy));
  vec2 x0=v-i+dot(i,C.xx);
  vec2 i1=(x0.x>x0.y)?vec2(1.0,0.0):vec2(0.0,1.0);
  vec4 x12=x0.xyxy+C.xxzz;
  x12.xy-=i1;
  i=mod(i,289.0);
  vec3 p=permute(permute(i.y+vec3(0.0,i1.y,1.0))+i.x+vec3(0.0,i1.x,1.0));
  vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);
  m=m*m;m=m*m;
  vec3 x=2.0*fract(p*C.www)-1.0;
  vec3 h=abs(x)-0.5;
  vec3 ox=floor(x+0.5);
  vec3 a0=x-ox;
  m*=1.79284291400159-0.85373472095314*(a0*a0+h*h);
  vec3 g;
  g.x=a0.x*x0.x+h.x*x0.y;
  g.yz=a0.yz*x12.xz+h.yz*x12.yw;
  return 130.0*dot(m,g);
}

struct ColorStop{vec3 color;float position;};

#define COLOR_RAMP(colors,factor,finalColor) {\
  int index=0;\
  for(int i=0;i<2;i++){\
    ColorStop cc=colors[i];\
    bool inBetween=cc.position<=factor;\
    index=int(mix(float(index),float(i),float(inBetween)));\
  }\
  ColorStop cc=colors[index];\
  ColorStop nc=colors[index+1];\
  float range=nc.position-cc.position;\
  float lf=(factor-cc.position)/range;\
  finalColor=mix(cc.color,nc.color,lf);\
}

void main(){
  vec2 uv=gl_FragCoord.xy/uResolution;
  ColorStop colors[3];
  colors[0]=ColorStop(uColorStops[0],0.0);
  colors[1]=ColorStop(uColorStops[1],0.5);
  colors[2]=ColorStop(uColorStops[2],1.0);
  vec3 rampColor;
  COLOR_RAMP(colors,uv.x,rampColor);
  float height=snoise(vec2(uv.x*2.0+uTime*0.1,uTime*0.25))*0.5*uAmplitude;
  height=exp(height);
  height=(uv.y*2.0-height+0.2);
  float intensity=0.6*height;
  float midPoint=0.20;
  float auroraAlpha=smoothstep(midPoint-uBlend*0.5,midPoint+uBlend*0.5,intensity);
  vec3 auroraColor=intensity*rampColor;
  fragColor=vec4(auroraColor*auroraAlpha,auroraAlpha);
}`;

        function compile(type, src) {
            var s = gl.createShader(type);
            gl.shaderSource(s, src);
            gl.compileShader(s);
            if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
                console.error('Aurora shader error:', gl.getShaderInfoLog(s));
                gl.deleteShader(s); return null;
            }
            return s;
        }

        var vert = compile(gl.VERTEX_SHADER, VERT);
        var frag = compile(gl.FRAGMENT_SHADER, FRAG);
        if (!vert || !frag) { canvas.style.display = 'none'; return; }

        var prog = gl.createProgram();
        gl.attachShader(prog, vert);
        gl.attachShader(prog, frag);
        gl.linkProgram(prog);
        if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
            console.error('Aurora link error:', gl.getProgramInfoLog(prog));
            canvas.style.display = 'none'; return;
        }
        gl.useProgram(prog);

        // Full-screen triangle (covers the whole clip space with 3 vertices)
        var buf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
        var posLoc = gl.getAttribLocation(prog, 'position');
        gl.enableVertexAttribArray(posLoc);
        gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

        var uTime       = gl.getUniformLocation(prog, 'uTime');
        var uAmpl       = gl.getUniformLocation(prog, 'uAmplitude');
        var uColorStops = gl.getUniformLocation(prog, 'uColorStops[0]');
        var uResolution = gl.getUniformLocation(prog, 'uResolution');
        var uBlendLoc   = gl.getUniformLocation(prog, 'uBlend');

        function hexToRgb(hex) {
            var m = hex.match(/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i);
            return m ? [parseInt(m[1],16)/255, parseInt(m[2],16)/255, parseInt(m[3],16)/255] : [0,0,0];
        }

        var c0 = hexToRgb(colorStops[0] || '#4ade80');
        var c1 = hexToRgb(colorStops[1] || '#22c55e');
        var c2 = hexToRgb(colorStops[2] || '#0a0a0f');
        gl.uniform3fv(uColorStops, c0.concat(c1).concat(c2));
        gl.uniform1f(uAmpl, amplitude);
        gl.uniform1f(uBlendLoc, blend);

        function resize() {
            var w = window.innerWidth, h = window.innerHeight;
            canvas.width = w; canvas.height = h;
            canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
            gl.viewport(0, 0, w, h);
            gl.uniform2f(uResolution, w, h);
        }
        window.addEventListener('resize', resize);
        resize();

        var animId;
        function render(t) {
            animId = requestAnimationFrame(render);
            gl.clear(gl.COLOR_BUFFER_BIT);
            gl.uniform1f(uTime, t * 0.001 * speed);
            gl.drawArrays(gl.TRIANGLES, 0, 3);
        }
        animId = requestAnimationFrame(render);
    })();
    </script>
