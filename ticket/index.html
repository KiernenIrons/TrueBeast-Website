<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Open Graph / Discord embeds -->
    <meta property="og:type"        content="website">
    <meta property="og:site_name"   content="TrueBeast">
    <meta property="og:title"       content="View Ticket — TrueBeast Support">
    <meta property="og:description" content="Check the status of your TrueBeast tech support ticket and chat with the team.">
    <meta property="og:url"         content="https://truebeast.io/ticket/">
    <meta property="og:image"       content="https://truebeast.io/assets/images/og-image.png">
    <meta name="twitter:card"       content="summary_large_image">
    <title>View Ticket | TrueBeast Support</title>
    <link rel="icon" href="../favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="../js/config.js?v=6"></script>
    <script src="../js/firebase-db.js?v=4"></script>
    <link rel="stylesheet" href="../css/shared.css">
    <link rel="stylesheet" href="../css/glass.css">
    <link rel="stylesheet" href="../css/ticket.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="gradient-bg"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ── Email helper ───────────────────────────────────────────────
        const sendEmail = async ({ to, toName, subject, html }) => {
            const cfg = typeof SITE_CONFIG !== 'undefined' ? SITE_CONFIG.email : null;
            console.log('[Email] sendEmail called', { to, subject, hasConfig: !!cfg, workerConfigured: !!(cfg?.workerUrl && cfg.workerUrl !== 'PASTE_YOUR_CLOUDFLARE_WORKER_URL') });
            if (!cfg?.workerUrl || cfg.workerUrl === 'PASTE_YOUR_CLOUDFLARE_WORKER_URL') {
                console.warn('[Email] Skipped — workerUrl not set in js/config.js');
                return;
            }
            try {
                const payload = { sender: { name: cfg.senderName, email: cfg.senderEmail }, to: [{ email: to, name: toName || to }], subject, htmlContent: html };
                console.log('[Email] Sending to worker...', { to, subject, workerUrl: cfg.workerUrl });
                const res = await fetch(cfg.workerUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const text = await res.text();
                if (res.ok) { console.log('[Email] Sent OK', { status: res.status, response: text }); }
                else { console.error('[Email] Worker returned error', { status: res.status, response: text }); }
            } catch (err) {
                console.error('[Email] Request failed:', err);
            }
        };

        // ── Navigation ──────────────────────────────────────────────────────
        const Navigation = () => {
            const [scrolled,   setScrolled]   = useState(false);
            const [mobileOpen, setMobileOpen] = useState(false);
            const discordUrl = (typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.social?.discord) || 'https://discord.gg/Nk8vekY';
            useEffect(() => {
                const h = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', h, { passive: true });
                return () => window.removeEventListener('scroll', h);
            }, []);
            const btn = "border border-white/10 bg-white/5 hover:bg-white/10 hover:border-white/20 px-3.5 py-2 rounded-xl text-sm font-medium text-gray-200 hover:text-white transition-all";
            return (
                <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-500 ${scrolled ? 'py-3' : 'py-6'}`}>
                    <div className="max-w-7xl mx-auto px-6">
                        <div className={`liquid-glass rounded-2xl px-6 py-4 transition-all duration-500 ${scrolled ? 'shadow-2xl' : ''}`}>
                            <div className="flex items-center justify-between">
                                <a href="../" className="flex items-center gap-3 group flex-shrink-0">
                                    <img src="../assets/logos/logo.png" alt="TrueBeast" className="w-10 h-10 object-contain rounded-full pulse-glow flex-shrink-0" />
                                    <span className="font-display font-bold text-xl tracking-tight group-hover:text-green-400 transition-colors">TrueBeast</span>
                                </a>
                                <div className="hidden md:flex items-center gap-2">
                                    <a href="../"            className={btn}>Home</a>
                                    <a href="../giveaways/"  className={btn}>Giveaways</a>
                                    <a href="../tools/"      className={btn}>Toolkit</a>
                                    <a href="../tech-support/" className={btn}>Tech Support</a>
                                    <a href={discordUrl} target="_blank" rel="noopener noreferrer"
                                       className={`${btn} flex items-center gap-1.5 text-indigo-400 hover:text-indigo-300`}>
                                        <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor" fillRule="evenodd"><path fillRule="evenodd" d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
                                        Discord
                                    </a>
                                    <a href="https://www.youtube.com/@RealTrueBeast" target="_blank" rel="noopener noreferrer"
                                       className={`${btn} text-red-500 hover:text-red-400 flex items-center gap-1.5`}>
                                        <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2.5 17a24.12 24.12 0 0 1 0-10 2 2 0 0 1 1.4-1.4 49.56 49.56 0 0 1 16.2 0A2 2 0 0 1 21.5 7a24.12 24.12 0 0 1 0 10 2 2 0 0 1-1.4 1.4 49.55 49.55 0 0 1-16.2 0A2 2 0 0 1 2.5 17"/><path d="m10 15 5-3-5-3z"/></svg>
                                        Subscribe
                                    </a>
                                </div>
                                <button onClick={() => setMobileOpen(!mobileOpen)} className="md:hidden liquid-glass p-2 rounded-xl">
                                    {mobileOpen
                                        ? <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                        : <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                                    }
                                </button>
                            </div>
                            {mobileOpen && (
                                <div className="md:hidden mt-4 pt-4 border-t border-white/10">
                                    <div className="flex flex-col gap-1">
                                        <a href="../"            onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-colors font-medium">Home</a>
                                        <a href="../giveaways/"  onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-colors font-medium">Giveaways</a>
                                        <a href="../tools/"      onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-colors font-medium">Toolkit</a>
                                        <a href="../tech-support/" onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-colors font-medium">Tech Support</a>
                                        <div className="h-px bg-white/10 my-2"></div>
                                        <a href={discordUrl} target="_blank" rel="noopener noreferrer" onClick={() => setMobileOpen(false)}
                                           className="px-3 py-2.5 rounded-xl text-indigo-400 hover:text-indigo-300 hover:bg-white/5 transition-colors font-medium flex items-center gap-2">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor" fillRule="evenodd"><path fillRule="evenodd" d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
                                            Discord
                                        </a>
                                        <a href="https://www.youtube.com/@RealTrueBeast" target="_blank" rel="noopener noreferrer" onClick={() => setMobileOpen(false)}
                                           className="border border-white/10 bg-white/5 hover:bg-white/10 hover:border-white/20 px-3 py-2.5 rounded-xl text-sm font-medium text-red-500 hover:text-red-400 transition-all flex items-center justify-center gap-2">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2.5 17a24.12 24.12 0 0 1 0-10 2 2 0 0 1 1.4-1.4 49.56 49.56 0 0 1 16.2 0A2 2 0 0 1 21.5 7a24.12 24.12 0 0 1 0 10 2 2 0 0 1-1.4 1.4 49.55 49.55 0 0 1-16.2 0A2 2 0 0 1 2.5 17"/><path d="m10 15 5-3-5-3z"/></svg>
                                            Subscribe
                                        </a>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </nav>
            );
        };

        // ── Ticket search form (shown when no ID in URL) ──────────────────
        const SearchForm = ({ onSearch, notFound }) => {
            const [query, setQuery] = useState('');
            return (
                <div className="liquid-glass-strong glass-glow rounded-3xl p-8 max-w-lg mx-auto animate-fade-in">
                    <div className="text-center mb-8">
                        <div className="w-16 h-16 rounded-2xl bg-gradient-to-br from-green-500/20 to-emerald-600/20 flex items-center justify-center mx-auto mb-4">
                            <i data-lucide="search" className="w-8 h-8 text-green-400"></i>
                        </div>
                        <h2 className="font-display font-bold text-2xl mb-2">Find Your Ticket</h2>
                        <p className="text-gray-400 text-sm">Enter the ticket ID from your confirmation email</p>
                    </div>
                    <form onSubmit={e => { e.preventDefault(); onSearch(query.trim()); }} className="space-y-4">
                        <input
                            type="text" value={query} onChange={e => setQuery(e.target.value)}
                            placeholder="e.g. TB-2QK1Z9"
                            className="w-full liquid-glass bg-transparent px-4 py-3 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500/50 font-mono uppercase text-center tracking-widest text-lg"
                            autoFocus
                        />
                        {notFound && (
                            <div className="flex items-center gap-2 text-red-400 text-sm bg-red-500/10 rounded-lg px-3 py-2">
                                <i data-lucide="alert-circle" className="w-4 h-4 flex-shrink-0"></i>
                                <span>Ticket not found. Check the ID and try again.</span>
                            </div>
                        )}
                        <button type="submit" className="w-full btn-glass liquid-glass-strong glass-glow py-3 rounded-xl font-semibold text-green-400 flex items-center justify-center gap-2">
                            <i data-lucide="search" className="w-5 h-5"></i>
                            Look Up Ticket
                        </button>
                    </form>
                    <p className="text-center text-xs text-gray-500 mt-6">
                        Your ticket ID is in the confirmation email you received when submitting.
                    </p>
                </div>
            );
        };

        // ── Full ticket view (with inline reply) ─────────────────────────
        const TicketView = ({ ticket: initialTicket }) => {
            const [ticket,    setTicket]    = useState(initialTicket);
            const [replyText, setReplyText] = useState('');
            const [replying,  setReplying]  = useState(false);
            const [replyErr,  setReplyErr]  = useState('');

            const statusClass = {
                'open': 'status-open', 'in-progress': 'status-in-progress',
                'resolved': 'status-resolved', 'urgent': 'status-urgent'
            }[ticket.status] || 'status-open';

            const priorityClass = `priority-${ticket.priority}`;

            const handleReply = async (e) => {
                e.preventDefault();
                if (!replyText.trim()) return;
                setReplying(true);
                setReplyErr('');
                try {
                    const newResponses = [...(ticket.responses || []), {
                        text:      replyText.trim(),
                        from:      'user',
                        timestamp: new Date().toISOString(),
                    }];
                    const updated = await FirebaseDB.updateTicket(ticket.id, { responses: newResponses });
                    setTicket(updated || { ...ticket, responses: newResponses, updatedAt: new Date().toISOString() });
                    setReplyText('');
                    // Notify admin of the new user reply
                    const siteUrl  = (typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.siteUrl) || window.location.origin;
                    const adminEmail = (typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.email?.adminEmail) || 'kiernenyt@gmail.com';
                    sendEmail({
                        to: adminEmail, toName: 'TrueBeast',
                        subject: `[TrueBeast Support] User replied on ticket ${ticket.id}`,
                        html: `<div style="font-family:sans-serif;max-width:600px;margin:0 auto;background:#0a0a0f;color:#e5e7eb;padding:32px;border-radius:16px"><h2 style="color:#22c55e;margin-top:0">New Reply on Ticket ${ticket.id}</h2><p><strong>${ticket.name}</strong> added a message to their ticket:</p><blockquote style="background:#1f2937;border-left:4px solid #22c55e;padding:12px 16px;border-radius:8px;margin:16px 0;font-size:14px">${replyText.trim()}</blockquote><p style="color:#9ca3af;font-size:13px">Subject: ${ticket.subject}</p><a href="${siteUrl}/admin/" style="display:inline-block;background:#818cf8;color:#000;padding:12px 24px;border-radius:10px;text-decoration:none;font-weight:600">Open Admin Panel</a></div>`,
                    }).catch(() => {});
                } catch (err) {
                    console.error('Reply failed:', err);
                    setReplyErr('Failed to send reply. Please try again.');
                } finally {
                    setReplying(false);
                }
            };

            return (
                <div className="liquid-glass-strong glass-glow rounded-3xl p-6 md:p-8 animate-fade-in">
                    {/* Header row */}
                    <div className="flex flex-wrap items-start gap-3 mb-6">
                        <span className="font-mono text-xl font-bold text-green-400">{ticket.id}</span>
                        <span className={`px-3 py-1 rounded-full text-xs font-semibold ${statusClass}`}>
                            {ticket.status.replace('-', ' ').toUpperCase()}
                        </span>
                        <span className={`px-3 py-1 rounded-full text-xs font-semibold border ${priorityClass}`}>
                            {ticket.priority.toUpperCase()} PRIORITY
                        </span>
                    </div>

                    <h2 className="font-display font-bold text-2xl md:text-3xl mb-2">{ticket.subject}</h2>
                    <p className="text-gray-500 text-sm mb-8">
                        Submitted {new Date(ticket.createdAt).toLocaleString()} &nbsp;·&nbsp; {ticket.category.replace(/-/g, ' ').toUpperCase()}
                    </p>

                    {/* Info grid */}
                    <div className="grid sm:grid-cols-3 gap-4 mb-8">
                        <div className="liquid-glass rounded-xl p-4">
                            <p className="text-xs text-gray-500 mb-1">From</p>
                            <p className="font-semibold">{ticket.name}</p>
                            <p className="text-sm text-gray-400 truncate">{ticket.email}</p>
                            {ticket.discord && <p className="text-sm text-indigo-400 mt-1">{ticket.discord}</p>}
                        </div>
                        <div className="liquid-glass rounded-xl p-4">
                            <p className="text-xs text-gray-500 mb-1">Category</p>
                            <p className="font-semibold">{ticket.category.replace(/-/g, ' ').toUpperCase()}</p>
                            <p className={`text-xs mt-1 ${ticket.priority === 'high' ? 'text-red-400' : ticket.priority === 'medium' ? 'text-yellow-400' : 'text-green-400'}`}>
                                Priority: {ticket.priority.toUpperCase()}
                            </p>
                        </div>
                        <div className="liquid-glass rounded-xl p-4">
                            <p className="text-xs text-gray-500 mb-1">Timeline</p>
                            <p className="font-semibold text-sm">Created {new Date(ticket.createdAt).toLocaleDateString()}</p>
                            <p className="text-xs text-gray-400 mt-1">Updated {new Date(ticket.updatedAt).toLocaleDateString()}</p>
                        </div>
                    </div>

                    {/* Conversation thread */}
                    <div className="space-y-4 mb-6">
                        {/* Original message */}
                        <div className="liquid-glass rounded-xl p-4">
                            <div className="flex items-center gap-3 mb-3">
                                <div className="w-8 h-8 rounded-full bg-gradient-to-br from-green-500 to-emerald-600 flex items-center justify-center text-sm font-bold flex-shrink-0">
                                    {ticket.name.charAt(0).toUpperCase()}
                                </div>
                                <div>
                                    <div className="font-medium text-sm">{ticket.name}</div>
                                    <div className="text-xs text-gray-500">{new Date(ticket.createdAt).toLocaleString()}</div>
                                </div>
                            </div>
                            <p className="text-gray-300 whitespace-pre-wrap text-sm leading-relaxed">{ticket.description}</p>
                            {ticket.deviceInfo && (
                                <div className="mt-4 pt-4 border-t border-white/10">
                                    <p className="text-xs text-gray-500 mb-1">Device / Setup Info</p>
                                    <p className="text-sm text-gray-400 font-mono">{ticket.deviceInfo}</p>
                                </div>
                            )}
                        </div>

                        {/* Responses */}
                        {(ticket.responses || []).map((resp, i) => (
                            <div key={i} className={`liquid-glass rounded-xl p-4 ${resp.from === 'support' ? 'border-l-4 border-l-green-500 bg-green-500/5' : ''}`}>
                                <div className="flex items-center gap-3 mb-3">
                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold flex-shrink-0 ${resp.from === 'support' ? 'bg-gradient-to-br from-violet-500 to-blue-500' : 'bg-gradient-to-br from-green-500 to-emerald-600'}`}>
                                        {resp.from === 'support' ? 'TB' : ticket.name.charAt(0).toUpperCase()}
                                    </div>
                                    <div>
                                        <div className={`font-medium text-sm ${resp.from === 'support' ? 'text-green-400' : ''}`}>
                                            {resp.from === 'support' ? 'TrueBeast Support' : ticket.name}
                                        </div>
                                        <div className="text-xs text-gray-500">{new Date(resp.timestamp).toLocaleString()}</div>
                                    </div>
                                </div>
                                <p className="text-gray-300 whitespace-pre-wrap text-sm leading-relaxed">{resp.text}</p>
                            </div>
                        ))}
                    </div>

                    {/* Reply form or resolved notice */}
                    {ticket.status === 'resolved' ? (
                        <div className="flex items-center gap-3 liquid-glass rounded-xl p-4 border-l-4 border-l-gray-500">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-gray-400 flex-shrink-0"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                            <p className="text-gray-400 text-sm">This ticket has been marked as resolved. Need more help? <a href="../tech-support/" className="text-green-400 hover:underline">Submit a new ticket.</a></p>
                        </div>
                    ) : (
                        <div className="space-y-3">
                            <div className="flex items-center gap-3 liquid-glass rounded-xl p-4 border-l-4 border-l-green-500/50">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-green-400 flex-shrink-0"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                                <p className="text-gray-400 text-sm">Your ticket is open. TrueBeast will respond within the usual timeframe.</p>
                            </div>
                            <form onSubmit={handleReply} className="flex gap-3">
                                <textarea
                                    value={replyText}
                                    onChange={e => setReplyText(e.target.value)}
                                    placeholder="Add a message to your ticket…"
                                    rows={2}
                                    className="flex-1 liquid-glass bg-transparent px-4 py-3 rounded-xl text-white placeholder-gray-500 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-green-500/40"
                                />
                                <button type="submit" disabled={replying || !replyText.trim()}
                                    className="self-end btn-glass liquid-glass px-5 py-3 rounded-xl font-medium text-green-400 disabled:opacity-50 flex items-center gap-2 whitespace-nowrap">
                                    {replying ? (
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                                    ) : (
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                                    )}
                                    {replying ? 'Sending…' : 'Send'}
                                </button>
                            </form>
                            {replyErr && <p className="text-red-400 text-xs">{replyErr}</p>}
                        </div>
                    )}

                    {/* Footer CTAs */}
                    <div className="mt-6 pt-6 border-t border-white/10 flex flex-wrap gap-3">
                        <a href="../tech-support/" className="btn-glass liquid-glass px-5 py-2.5 rounded-xl text-sm font-medium text-gray-300 hover:text-white flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                            Submit New Ticket
                        </a>
                        <a href="https://discord.gg/Nk8vekY" target="_blank" rel="noopener noreferrer"
                           className="btn-glass liquid-glass px-5 py-2.5 rounded-xl text-sm font-medium text-indigo-400 hover:text-indigo-300 flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.492c-1.53-.69-3.17-1.2-4.885-1.49a.075.075 0 0 0-.079.036c-.21.369-.444.85-.608 1.23a18.566 18.566 0 0 0-5.487 0 12.36 12.36 0 0 0-.617-1.23A.077.077 0 0 0 8.562 3c-1.714.29-3.354.8-4.885 1.491a.07.07 0 0 0-.032.027C.533 9.093-.32 13.555.099 17.961a.08.08 0 0 0 .031.055 20.03 20.03 0 0 0 5.993 2.98.078.078 0 0 0 .084-.026 13.83 13.83 0 0 0 1.226-1.963.074.074 0 0 0-.041-.104 13.175 13.175 0 0 1-1.872-.878.075.075 0 0 1-.008-.125c.126-.093.252-.19.372-.287a.075.075 0 0 1 .078-.01c3.927 1.764 8.18 1.764 12.061 0a.075.075 0 0 1 .079.009c.12.098.245.195.372.288a.075.075 0 0 1-.006.125c-.598.344-1.22.635-1.873.877a.075.075 0 0 0-.041.105c.36.687.772 1.341 1.225 1.962a.077.077 0 0 0 .084.028 19.963 19.963 0 0 0 6.002-2.981.076.076 0 0 0 .032-.054c.5-5.094-.838-9.52-3.549-13.442a.06.06 0 0 0-.031-.028zM8.02 15.278c-1.182 0-2.157-1.069-2.157-2.38 0-1.312.956-2.38 2.157-2.38 1.21 0 2.176 1.077 2.157 2.38 0 1.312-.956 2.38-2.157 2.38zm7.975 0c-1.183 0-2.157-1.069-2.157-2.38 0-1.312.955-2.38 2.157-2.38 1.21 0 2.176 1.077 2.157 2.38 0 1.312-.946 2.38-2.157 2.38z"/></svg>
                            Join Discord
                        </a>
                        {typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.donationUrl && (
                            <a href={SITE_CONFIG.donationUrl} target="_blank" rel="noopener noreferrer"
                               className="btn-glass liquid-glass px-5 py-2.5 rounded-xl text-sm font-medium text-yellow-400 hover:text-yellow-300 flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                                Support TrueBeast
                            </a>
                        )}
                    </div>
                </div>
            );
        };

        // ── Main App ─────────────────────────────────────────────────────
        const App = () => {
            const [scrolled, setScrolled]   = useState(false);
            const [ticket, setTicket]       = useState(null);
            const [notFound, setNotFound]   = useState(false);
            const [loading, setLoading]     = useState(false);
            const [loadError, setLoadError] = useState('');

            // Read ?id= from URL on load
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                lucide.createIcons();
            });

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                if (id) loadTicket(id);
            }, []);

            const loadTicket = async (id) => {
                setLoading(true);
                setNotFound(false);
                setLoadError('');
                try {
                    const found = await FirebaseDB.getTicket(id);
                    if (found) {
                        setTicket(found);
                    } else {
                        setNotFound(true);
                    }
                } catch (err) {
                    setLoadError('Could not load ticket. Please try again.');
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            };

            const handleSearch = (id) => {
                // Update URL without full page reload
                window.history.pushState({}, '', `?id=${id.toUpperCase()}`);
                loadTicket(id);
            };

            return (
                <div className="relative min-h-screen">
                    <Navigation scrolled={scrolled} />

                    <main className="pt-32 pb-16 px-6">
                        <div className="max-w-3xl mx-auto">

                            {/* Page title */}
                            <div className="text-center mb-12">
                                <span className="inline-flex items-center gap-2 liquid-glass px-4 py-2 rounded-full mb-6 text-sm font-medium text-gray-300">
                                    <i data-lucide="ticket" className="w-4 h-4 text-green-400"></i>
                                    Ticket Status
                                </span>
                                <h1 className="font-display font-bold text-4xl md:text-5xl mb-3">
                                    Your <span className="text-gradient">Ticket</span>
                                </h1>
                                <p className="text-gray-400">Track the status of your support request</p>
                            </div>

                            {/* States */}
                            {loading && (
                                <div className="text-center py-16">
                                    <i data-lucide="loader-2" className="w-10 h-10 text-green-400 animate-spin mx-auto mb-4"></i>
                                    <p className="text-gray-400">Loading your ticket...</p>
                                </div>
                            )}

                            {!loading && loadError && (
                                <div className="liquid-glass rounded-2xl p-6 text-center border border-red-500/30 bg-red-500/10">
                                    <i data-lucide="alert-triangle" className="w-8 h-8 text-red-400 mx-auto mb-3"></i>
                                    <p className="text-red-400">{loadError}</p>
                                    <button onClick={() => { setLoadError(''); setTicket(null); }} className="mt-4 btn-glass liquid-glass px-4 py-2 rounded-xl text-sm text-gray-300">Try Again</button>
                                </div>
                            )}

                            {!loading && !loadError && ticket && <TicketView ticket={ticket} />}

                            {!loading && !loadError && !ticket && (
                                <SearchForm onSearch={handleSearch} notFound={notFound} />
                            )}

                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="py-8 px-6 border-t border-white/5 text-center">
                        <p className="text-gray-600 text-sm">© 2026 TrueBeast. Free tech support for the community.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
