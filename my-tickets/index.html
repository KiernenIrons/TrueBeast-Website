<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Open Graph / Discord embeds -->
    <meta property="og:type"        content="website">
    <meta property="og:site_name"   content="TrueBeast">
    <meta property="og:title"       content="My Tickets — TrueBeast Support">
    <meta property="og:description" content="View all your TrueBeast tech support tickets in one place.">
    <meta property="og:url"         content="https://truebeast.io/my-tickets/">
    <meta property="og:image"       content="https://truebeast.io/assets/images/og-image.png">
    <meta name="twitter:card"       content="summary_large_image">
    <title>My Tickets | TrueBeast Support</title>
    <link rel="icon" href="../favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="../js/config.js?v=6"></script>
    <script src="../js/firebase-db.js?v=4"></script>
    <link rel="stylesheet" href="../css/shared.css">
    <link rel="stylesheet" href="../css/glass.css">
    <link rel="stylesheet" href="../css/ticket.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="gradient-bg"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const LS_KEY = 'tb_my_ticket_ids';

        function getSavedIds() {
            try { return JSON.parse(localStorage.getItem(LS_KEY) || '[]'); } catch { return []; }
        }
        function saveIds(ids) {
            localStorage.setItem(LS_KEY, JSON.stringify(ids));
        }

        // ── Navigation ──────────────────────────────────────────────────────
        const Navigation = () => {
            const [scrolled,   setScrolled]   = useState(false);
            const [mobileOpen, setMobileOpen] = useState(false);
            const discordUrl = (typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.social?.discord) || 'https://discord.gg/Nk8vekY';
            useEffect(() => {
                const h = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', h, { passive: true });
                return () => window.removeEventListener('scroll', h);
            }, []);
            const btn = "border border-white/10 bg-white/5 hover:bg-white/10 hover:border-white/20 px-3.5 py-2 rounded-xl text-sm font-medium text-gray-200 hover:text-white transition-all";
            return (
                <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-500 ${scrolled ? 'py-3' : 'py-6'}`}>
                    <div className="max-w-7xl mx-auto px-6">
                        <div className={`liquid-glass rounded-2xl px-6 py-4 transition-all duration-500 ${scrolled ? 'shadow-2xl' : ''}`}>
                            <div className="flex items-center justify-between">
                                <a href="../" className="flex items-center gap-3 group flex-shrink-0">
                                    <img src="../assets/logos/logo.png" alt="TrueBeast" className="w-10 h-10 object-contain rounded-full pulse-glow flex-shrink-0" />
                                    <span className="font-display font-bold text-xl tracking-tight group-hover:text-green-400 transition-colors">TrueBeast</span>
                                </a>
                                <div className="hidden md:flex items-center gap-2">
                                    <a href="../"            className={btn}>Home</a>
                                    <a href="../giveaways/"  className={btn}>Giveaways</a>
                                    <a href="../tools/"      className={btn}>Toolkit</a>
                                    <a href="../tech-support/" className={btn}>Tech Support</a>
                                    <a href={discordUrl} target="_blank" rel="noopener noreferrer"
                                       className={`${btn} flex items-center gap-1.5 text-indigo-400 hover:text-indigo-300`}>
                                        <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor" fillRule="evenodd"><path fillRule="evenodd" d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
                                        Discord
                                    </a>
                                    <a href="https://www.youtube.com/@RealTrueBeast" target="_blank" rel="noopener noreferrer"
                                       className={`${btn} text-red-500 hover:text-red-400 flex items-center gap-1.5`}>
                                        <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2.5 17a24.12 24.12 0 0 1 0-10 2 2 0 0 1 1.4-1.4 49.56 49.56 0 0 1 16.2 0A2 2 0 0 1 21.5 7a24.12 24.12 0 0 1 0 10 2 2 0 0 1-1.4 1.4 49.55 49.55 0 0 1-16.2 0A2 2 0 0 1 2.5 17"/><path d="m10 15 5-3-5-3z"/></svg>
                                        Subscribe
                                    </a>
                                </div>
                                <button onClick={() => setMobileOpen(!mobileOpen)} className="md:hidden liquid-glass p-2 rounded-xl">
                                    {mobileOpen
                                        ? <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                        : <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                                    }
                                </button>
                            </div>
                            {mobileOpen && (
                                <div className="md:hidden mt-4 pt-4 border-t border-white/10">
                                    <div className="flex flex-col gap-1">
                                        <a href="../"            onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-colors font-medium">Home</a>
                                        <a href="../giveaways/"  onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-colors font-medium">Giveaways</a>
                                        <a href="../tools/"      onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-colors font-medium">Toolkit</a>
                                        <a href="../tech-support/" onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-colors font-medium">Tech Support</a>
                                        <div className="h-px bg-white/10 my-2"></div>
                                        <a href={discordUrl} target="_blank" rel="noopener noreferrer" onClick={() => setMobileOpen(false)}
                                           className="px-3 py-2.5 rounded-xl text-indigo-400 hover:text-indigo-300 hover:bg-white/5 transition-colors font-medium flex items-center gap-2">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor" fillRule="evenodd"><path fillRule="evenodd" d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
                                            Discord
                                        </a>
                                        <a href="https://www.youtube.com/@RealTrueBeast" target="_blank" rel="noopener noreferrer" onClick={() => setMobileOpen(false)}
                                           className="border border-white/10 bg-white/5 hover:bg-white/10 hover:border-white/20 px-3 py-2.5 rounded-xl text-sm font-medium text-red-500 hover:text-red-400 transition-all flex items-center justify-center gap-2">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2.5 17a24.12 24.12 0 0 1 0-10 2 2 0 0 1 1.4-1.4 49.56 49.56 0 0 1 16.2 0A2 2 0 0 1 21.5 7a24.12 24.12 0 0 1 0 10 2 2 0 0 1-1.4 1.4 49.55 49.55 0 0 1-16.2 0A2 2 0 0 1 2.5 17"/><path d="m10 15 5-3-5-3z"/></svg>
                                            Subscribe
                                        </a>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </nav>
            );
        };

        // ── Status helpers ───────────────────────────────────────────────────
        const STATUS_STYLE = {
            open:          { bg: 'bg-green-500/20',  text: 'text-green-400',  label: 'OPEN' },
            'in-progress': { bg: 'bg-blue-500/20',   text: 'text-blue-400',   label: 'IN PROGRESS' },
            resolved:      { bg: 'bg-gray-500/20',   text: 'text-gray-400',   label: 'RESOLVED' },
            urgent:        { bg: 'bg-red-500/20',    text: 'text-red-400',    label: 'URGENT' },
        };
        const PRIORITY_STYLE = {
            high:   'text-red-400',
            medium: 'text-yellow-400',
            low:    'text-green-400',
        };

        const StatusBadge = ({ status }) => {
            const s = STATUS_STYLE[status] || STATUS_STYLE.open;
            return (
                <span className={`px-2.5 py-1 rounded-full text-xs font-medium ${s.bg} ${s.text}`}>{s.label}</span>
            );
        };

        // ── Single ticket card ───────────────────────────────────────────────
        const TicketCard = ({ ticket, onRemove }) => {
            const unread = (ticket.responses || []).filter(r => r.from === 'support').length;
            return (
                <div className="liquid-glass rounded-2xl p-5 flex flex-col gap-3 animate-fade-in" style={{ transform: 'translateZ(0)' }}>
                    <div className="flex items-start justify-between gap-3">
                        <div>
                            <span className="font-mono text-green-400 text-sm">{ticket.id}</span>
                            <h3 className="font-display font-semibold text-lg mt-0.5 leading-snug">{ticket.subject}</h3>
                        </div>
                        <StatusBadge status={ticket.status} />
                    </div>

                    <div className="flex items-center gap-3 text-xs text-gray-500">
                        <span className={`font-medium ${PRIORITY_STYLE[ticket.priority] || 'text-gray-400'}`}>
                            {(ticket.priority || 'medium').toUpperCase()} PRIORITY
                        </span>
                        <span>·</span>
                        <span>{new Date(ticket.createdAt).toLocaleDateString()}</span>
                        {unread > 0 && (
                            <>
                                <span>·</span>
                                <span className="text-green-400 font-medium">{unread} support {unread === 1 ? 'reply' : 'replies'}</span>
                            </>
                        )}
                    </div>

                    <p className="text-gray-400 text-sm line-clamp-2">{ticket.description}</p>

                    <div className="flex items-center gap-3 pt-1">
                        <a href={`../ticket/?id=${ticket.id}`}
                           className="btn-glass liquid-glass px-4 py-2 rounded-xl text-sm font-medium text-green-400 flex items-center gap-2 flex-1 justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            View Ticket
                        </a>
                        <button onClick={() => onRemove(ticket.id)}
                            title="Remove from My Tickets"
                            className="btn-glass liquid-glass p-2 rounded-xl text-gray-600 hover:text-red-400 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                        </button>
                    </div>
                </div>
            );
        };

        // ── Add-a-ticket-ID form ─────────────────────────────────────────────
        const AddTicketForm = ({ onAdd }) => {
            const [val, setVal] = useState('');
            const [status, setStatus] = useState(null); // null | 'loading' | 'error'

            const handleSubmit = async (e) => {
                e.preventDefault();
                const id = val.trim().toUpperCase();
                if (!id) return;
                setStatus('loading');
                try {
                    const ticket = await FirebaseDB.getTicket(id);
                    if (!ticket) { setStatus('error'); return; }
                    onAdd(ticket);
                    setVal('');
                    setStatus(null);
                } catch {
                    setStatus('error');
                }
            };

            return (
                <form onSubmit={handleSubmit} className="flex gap-3">
                    <input
                        type="text" value={val} onChange={e => setVal(e.target.value)}
                        placeholder="Add a ticket ID (e.g. TB-ABC123)"
                        className="flex-1 liquid-glass bg-transparent px-4 py-3 rounded-xl text-white placeholder-gray-500 font-mono uppercase focus:outline-none focus:ring-2 focus:ring-green-500/40"
                    />
                    <button type="submit" disabled={!val.trim() || status === 'loading'}
                        className="btn-glass liquid-glass-strong px-5 py-3 rounded-xl font-medium text-green-400 disabled:opacity-50 flex items-center gap-2 whitespace-nowrap">
                        {status === 'loading' ? (
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                        ) : (
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        )}
                        Add
                    </button>
                    {status === 'error' && (
                        <span className="absolute mt-14 text-red-400 text-xs">Ticket not found. Check the ID.</span>
                    )}
                </form>
            );
        };

        // ── Main App ─────────────────────────────────────────────────────────
        const App = () => {
            const [tickets, setTickets] = useState([]);
            const [loading, setLoading] = useState(true);
            const [addError, setAddError] = useState('');

            const loadTickets = useCallback(async () => {
                setLoading(true);
                const ids = getSavedIds();
                if (ids.length === 0) { setTickets([]); setLoading(false); return; }
                try {
                    const results = await Promise.all(ids.map(id => FirebaseDB.getTicket(id).catch(() => null)));
                    setTickets(results.filter(Boolean));
                } catch {
                    setTickets([]);
                } finally {
                    setLoading(false);
                }
            }, []);

            useEffect(() => { loadTickets(); }, [loadTickets]);

            const handleAdd = (ticket) => {
                setAddError('');
                const ids = getSavedIds();
                if (!ids.includes(ticket.id)) {
                    saveIds([ticket.id, ...ids]);
                }
                setTickets(prev => {
                    if (prev.find(t => t.id === ticket.id)) return prev;
                    return [ticket, ...prev];
                });
            };

            const handleAddError = () => setAddError('Ticket not found. Double-check the ID.');

            const handleRemove = (id) => {
                const ids = getSavedIds().filter(i => i !== id);
                saveIds(ids);
                setTickets(prev => prev.filter(t => t.id !== id));
            };

            return (
                <div className="relative min-h-screen">
                    <Navigation />
                    <main className="pt-32 pb-16 px-6">
                        <div className="max-w-3xl mx-auto">

                            {/* Hero */}
                            <div className="text-center mb-12">
                                <div className="inline-flex items-center gap-2 liquid-glass px-4 py-2 rounded-full mb-6">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-green-400"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                                    <span className="text-sm font-medium text-gray-300">Your Tickets</span>
                                </div>
                                <h1 className="font-display font-bold text-4xl md:text-5xl mb-4">
                                    My <span className="text-gradient">Tickets</span>
                                </h1>
                                <p className="text-gray-400 max-w-md mx-auto">
                                    Track all your support tickets in one place. Only tickets submitted from this browser are shown.
                                </p>
                            </div>

                            {/* Add ticket form */}
                            <div className="liquid-glass rounded-2xl p-5 mb-8">
                                <p className="text-sm text-gray-400 mb-3">Have a ticket ID from another device? Add it here:</p>
                                <div className="relative">
                                    <AddTicketForm onAdd={handleAdd} />
                                    {addError && <p className="text-red-400 text-xs mt-2">{addError}</p>}
                                </div>
                            </div>

                            {/* Ticket list */}
                            {loading ? (
                                <div className="text-center py-20 text-gray-500">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin mx-auto mb-4 text-green-400"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                                    Loading your tickets…
                                </div>
                            ) : tickets.length === 0 ? (
                                <div className="liquid-glass-strong rounded-3xl p-12 text-center">
                                    <div className="w-16 h-16 rounded-2xl bg-green-500/10 flex items-center justify-center mx-auto mb-6">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-green-400"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                                    </div>
                                    <h3 className="font-display font-bold text-2xl mb-3">No tickets yet</h3>
                                    <p className="text-gray-400 mb-8 max-w-sm mx-auto">
                                        You haven't submitted any support tickets from this browser. Submit one and it'll appear here automatically.
                                    </p>
                                    <a href="../tech-support/"
                                       className="btn-glass liquid-glass-strong glass-glow px-8 py-3 rounded-xl font-medium text-green-400 inline-flex items-center gap-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                                        Submit a Ticket
                                    </a>
                                </div>
                            ) : (
                                <div className="space-y-4">
                                    <p className="text-sm text-gray-500 mb-2">{tickets.length} ticket{tickets.length !== 1 ? 's' : ''} found</p>
                                    {tickets.map(t => (
                                        <TicketCard key={t.id} ticket={t} onRemove={handleRemove} />
                                    ))}
                                </div>
                            )}

                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="py-12 px-6 border-t border-white/5">
                        <div className="max-w-6xl mx-auto">
                            <div className="flex flex-col md:flex-row items-center justify-between gap-6">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-green-500 to-emerald-600 flex items-center justify-center flex-shrink-0"><span className="font-display font-bold text-lg">TB</span></div>
                                    <span className="font-display font-bold text-xl">TrueBeast</span>
                                </div>
                                <p className="text-gray-500 text-sm">© 2026 TrueBeast. Stay grinding. 🎮</p>
