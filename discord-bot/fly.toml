# Fly.io config for TrueBeast Beast Bot
# Deploy with: fly deploy (from the discord-bot/ directory)
# Secrets:     fly secrets set DISCORD_BOT_TOKEN=... SUPPORT_CHANNEL_ID=... etc.

app = 'truebeast-beast-bot'
primary_region = 'ord'

[build]

[env]
  NODE_ENV = 'production'

# No HTTP service — headless Discord bot, runs continuously via WebSocket.

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

[deploy]
  # Give the bot 30s to flush voice data to Firestore before SIGKILL
  kill_timeout = '30s'
  # Headless bot must always stay running — never auto-stop
  auto_stop_machines = 'off'
  min_machines_running = 1
