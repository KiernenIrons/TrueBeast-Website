# fly.io config for TrueBeast Radio Bot
# Deploy with: flyctl deploy (from the discord-bot/ directory)

app = 'truebeast-radio-bot'
primary_region = 'ord'

[build]

[env]
  NODE_ENV = 'production'

# No HTTP service — this is a headless Discord bot.
# fly.io won't health-check it, it just runs continuously.

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
