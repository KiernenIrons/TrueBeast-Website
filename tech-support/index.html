<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="../css/shared.css">
    <link rel="stylesheet" href="../css/glass.css">
    <link rel="stylesheet" href="../css/tech-support.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="gradient-bg"></div>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Inline SVG icon component — avoids Lucide createIcons() timing issues with React
        const ICONS = {
            'youtube':        '<path d="M2.5 17a24.12 24.12 0 0 1 0-10 2 2 0 0 1 1.4-1.4 49.56 49.56 0 0 1 16.2 0A2 2 0 0 1 21.5 7a24.12 24.12 0 0 1 0 10 2 2 0 0 1-1.4 1.4 49.55 49.55 0 0 1-16.2 0A2 2 0 0 1 2.5 17"/><path d="m10 15 5-3-5-3z"/>',
            'check':          '<polyline points="20 6 9 17 4 12"/>',
            'ticket':         '<path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/>',
            'alert-circle':   '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>',
            'loader-2':       '<path d="M21 12a9 9 0 1 1-6.219-8.56"/>',
            'send':           '<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>',
            'arrow-left':     '<line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>',
            'search':         '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',
            'chevron-up':     '<polyline points="18 15 12 9 6 15"/>',
            'chevron-down':   '<polyline points="6 9 12 15 18 9"/>',
            'headphones':     '<path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>',
            'plus-circle':    '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>',
            'shield':         '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>',
            'clock':          '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
            'message-circle': '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
        };
        // Brand icons that use fill instead of stroke
        const FILL_ICONS = {
            'discord': '<path d="M20.317 4.492c-1.53-.69-3.17-1.2-4.885-1.49a.075.075 0 0 0-.079.036c-.21.369-.444.85-.608 1.23a18.566 18.566 0 0 0-5.487 0 12.36 12.36 0 0 0-.617-1.23A.077.077 0 0 0 8.562 3c-1.714.29-3.354.8-4.885 1.491a.07.07 0 0 0-.032.027C.533 9.093-.32 13.555.099 17.961a.08.08 0 0 0 .031.055 20.03 20.03 0 0 0 5.993 2.98.078.078 0 0 0 .084-.026 13.83 13.83 0 0 0 1.226-1.963.074.074 0 0 0-.041-.104 13.175 13.175 0 0 1-1.872-.878.075.075 0 0 1-.008-.125c.126-.093.252-.19.372-.287a.075.075 0 0 1 .078-.01c3.927 1.764 8.18 1.764 12.061 0a.075.075 0 0 1 .079.009c.12.098.245.195.372.288a.075.075 0 0 1-.006.125c-.598.344-1.22.635-1.873.877a.075.075 0 0 0-.041.105c.36.687.772 1.341 1.225 1.962a.077.077 0 0 0 .084.028 19.963 19.963 0 0 0 6.002-2.981.076.076 0 0 0 .032-.054c.5-5.094-.838-9.52-3.549-13.442a.06.06 0 0 0-.031-.028zM8.02 15.278c-1.182 0-2.157-1.069-2.157-2.38 0-1.312.956-2.38 2.157-2.38 1.21 0 2.176 1.077 2.157 2.38 0 1.312-.956 2.38-2.157 2.38zm7.975 0c-1.183 0-2.157-1.069-2.157-2.38 0-1.312.955-2.38 2.157-2.38 1.21 0 2.176 1.077 2.157 2.38 0 1.312-.946 2.38-2.157 2.38z"/>',
        };
        const Icon = ({ name, className }) => {
            if (FILL_ICONS[name]) {
                return <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24"
                            fill="currentColor" fillRule="evenodd" dangerouslySetInnerHTML={{ __html: FILL_ICONS[name] }} />;
            }
            return <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                        dangerouslySetInnerHTML={{ __html: ICONS[name] || '' }} />;
        };

        // Email helper (Gmail via Cloudflare Worker + Apps Script)
        const sendEmail = async ({ to, toName, subject, html }) => {
            const cfg = typeof SITE_CONFIG !== 'undefined' ? SITE_CONFIG.email : null;
            console.log('[Email] sendEmail called', { to, subject, hasConfig: !!cfg, workerConfigured: !!(cfg?.workerUrl && cfg.workerUrl !== 'PASTE_YOUR_CLOUDFLARE_WORKER_URL') });
            if (!cfg?.workerUrl || cfg.workerUrl === 'PASTE_YOUR_CLOUDFLARE_WORKER_URL') {
                console.warn('[Email] Skipped — workerUrl not set in js/config.js');
                return;
            }
            try {
                const payload = { to, subject, html, senderName: cfg.senderName, senderEmail: cfg.senderEmail };
                console.log('[Email] Sending to worker...', { to, subject, workerUrl: cfg.workerUrl });
                const res = await fetch(cfg.workerUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const text = await res.text();
                if (res.ok) { console.log('[Email] Sent OK', { status: res.status, response: text }); }
                else { console.error('[Email] Worker returned error', { status: res.status, response: text }); }
            } catch (err) {
                console.error('[Email] Request failed:', err);
            }
        };

        const useScrollReveal = () => {
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('active');
                        }
                    });
                }, { threshold: 0.1 });
                
                document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
                
                return () => observer.disconnect();
            }, []);
        };

        // Ticket confirmation emails
        const sendTicketConfirmation = async (ticketData) => {
            console.log('[Email] sendTicketConfirmation called for', ticketData.id, '— email:', ticketData.email);
            const siteUrl     = (typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.siteUrl) || window.location.origin;
            const adminEmail  = (typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.email?.adminEmail) || 'kiernenyt@gmail.com';
            const discordLink = (typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.social?.discord) || 'https://discord.gg/Nk8vekY';
            const viewUrl     = `${siteUrl}/ticket/?id=${ticketData.id}`;
            const adminUrl    = `${siteUrl}/admin/`;
            const cat         = ticketData.category.replace(/-/g, ' ');

            // Email to user
            await sendEmail({
                to: ticketData.email, toName: ticketData.name,
                subject: `[TrueBeast Support] Ticket ${ticketData.id} received`,
                html: `
<div style="font-family:sans-serif;max-width:600px;margin:0 auto;background:#0a0a0f;color:#e5e7eb;padding:32px;border-radius:16px">
  <h2 style="color:#22c55e;margin-top:0">Ticket Received ✓</h2>
  <p>Hey ${ticketData.name}, your ticket has been submitted. TrueBeast will get back to you soon.</p>
  <table style="width:100%;border-collapse:collapse;margin:20px 0">
    <tr><td style="padding:8px 0;color:#9ca3af;width:130px">Ticket ID</td><td style="padding:8px 0;font-weight:600">${ticketData.id}</td></tr>
    <tr><td style="padding:8px 0;color:#9ca3af">Subject</td><td style="padding:8px 0">${ticketData.subject}</td></tr>
    <tr><td style="padding:8px 0;color:#9ca3af">Category</td><td style="padding:8px 0">${cat}</td></tr>
    <tr><td style="padding:8px 0;color:#9ca3af">Priority</td><td style="padding:8px 0">${ticketData.priority}</td></tr>
    ${ticketData.discord ? `<tr><td style="padding:8px 0;color:#9ca3af">Discord</td><td style="padding:8px 0">${ticketData.discord}</td></tr>` : ''}
  </table>
  <a href="${viewUrl}" style="display:inline-block;background:#22c55e;color:#000;padding:12px 24px;border-radius:10px;text-decoration:none;font-weight:600;margin:8px 0">View Ticket</a>
  <p style="margin-top:24px;color:#6b7280;font-size:13px">This is a free service. If you'd like to support TrueBeast: <a href="${(typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.donationUrl) || ''}" style="color:#22c55e">donate here</a>. Join the community: <a href="${discordLink}" style="color:#818cf8">Discord</a></p>
</div>`,
            });

            // Notification to admin
            await sendEmail({
                to: adminEmail, toName: 'TrueBeast',
                subject: `[TrueBeast Support] New ticket ${ticketData.id} — ${ticketData.subject}`,
                html: `
<div style="font-family:sans-serif;max-width:600px;margin:0 auto;background:#0a0a0f;color:#e5e7eb;padding:32px;border-radius:16px">
  <h2 style="color:#818cf8;margin-top:0">New Support Ticket</h2>
  <table style="width:100%;border-collapse:collapse;margin:16px 0">
    <tr><td style="padding:6px 0;color:#9ca3af;width:130px">Ticket ID</td><td style="padding:6px 0;font-weight:600">${ticketData.id}</td></tr>
    <tr><td style="padding:6px 0;color:#9ca3af">From</td><td style="padding:6px 0">${ticketData.name} &lt;${ticketData.email}&gt;</td></tr>
    <tr><td style="padding:6px 0;color:#9ca3af">Subject</td><td style="padding:6px 0">${ticketData.subject}</td></tr>
    <tr><td style="padding:6px 0;color:#9ca3af">Category</td><td style="padding:6px 0">${cat}</td></tr>
    <tr><td style="padding:6px 0;color:#9ca3af">Priority</td><td style="padding:6px 0">${ticketData.priority}</td></tr>
    ${ticketData.discord ? `<tr><td style="padding:6px 0;color:#9ca3af">Discord</td><td style="padding:6px 0">${ticketData.discord}</td></tr>` : ''}
    ${ticketData.deviceInfo ? `<tr><td style="padding:6px 0;color:#9ca3af">Device Info</td><td style="padding:6px 0">${ticketData.deviceInfo}</td></tr>` : ''}
  </table>
  <p style="background:#1f2937;padding:12px;border-radius:8px;font-size:14px;white-space:pre-wrap">${ticketData.description}</p>
  <a href="${adminUrl}" style="display:inline-block;background:#818cf8;color:#000;padding:12px 24px;border-radius:10px;text-decoration:none;font-weight:600">Open Admin Panel</a>
</div>`,
            });
        };

        // Theme toggle button
        const ThemeToggle = () => {
            const [light, setLight] = React.useState(() => document.documentElement.classList.contains('light'));
            React.useEffect(() => {
                const h = (e) => setLight(e.detail.light);
                window.addEventListener('tb-theme-change', h);
                return () => window.removeEventListener('tb-theme-change', h);
            }, []);
            return (
                <button onClick={() => window.TBTheme && window.TBTheme.toggle()}
                    className="liquid-glass p-2 rounded-xl transition-all flex-shrink-0"
                    title={light ? 'Switch to dark mode' : 'Switch to light mode'}>
                    {light
                        ? <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                        : <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
                    }
                </button>
            );
        };

        // Navigation
        const Navigation = () => {
            const [scrolled,   setScrolled]   = useState(false);
            const [mobileOpen, setMobileOpen] = useState(false);
            const discordUrl = (typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.social?.discord) || 'https://discord.gg/Nk8vekY';
            useEffect(() => {
                const onScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', onScroll, { passive: true });
                return () => window.removeEventListener('scroll', onScroll);
            }, []);
            const btn = "border border-white/10 bg-white/5 hover:bg-white/10 hover:border-white/20 px-3.5 py-2 rounded-xl text-sm font-medium text-gray-200 hover:text-white transition-all";
            return (
                <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-500 ${scrolled ? 'py-3' : 'py-6'}`}>
                    <div className="max-w-7xl mx-auto px-6">
                        <div className={`liquid-glass rounded-2xl px-6 py-4 transition-all duration-500 ${scrolled ? 'shadow-2xl' : ''}`}>
                            <div className="flex items-center justify-between">
                                <a href="../" className="flex items-center gap-3 group flex-shrink-0">
                                    <img src="../assets/logos/logo.png" alt="TrueBeast" className="w-10 h-10 object-contain rounded-full pulse-glow flex-shrink-0" />
                                    <span className="font-display font-bold text-xl tracking-tight group-hover:text-green-400 transition-colors">TrueBeast</span>
                                </a>
                                <div className="hidden md:flex items-center gap-2">
                                    <a href="../"            className={btn}>Home</a>
                                    <a href="../giveaways/"  className={btn}>Giveaways</a>
                                    <a href="../tools/"      className={btn}>Toolkit</a>
                                    <a href="../tech-support/" className={`${btn} text-white bg-white/10`}>Tech Support</a>
                                    <a href="../my-tickets/" className={btn}>My Tickets</a>
                                    <a href={discordUrl} target="_blank" rel="noopener noreferrer"
                                       className={`${btn} flex items-center gap-1.5 text-indigo-400 hover:text-indigo-300`}>
                                        <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor" fillRule="evenodd"><path fillRule="evenodd" d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
                                        Discord
                                    </a>
                                    <a href="https://www.youtube.com/@RealTrueBeast" target="_blank" rel="noopener noreferrer"
                                       className={`${btn} text-red-500 hover:text-red-400 flex items-center gap-1.5`}>
                                        <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2.5 17a24.12 24.12 0 0 1 0-10 2 2 0 0 1 1.4-1.4 49.56 49.56 0 0 1 16.2 0A2 2 0 0 1 21.5 7a24.12 24.12 0 0 1 0 10 2 2 0 0 1-1.4 1.4 49.55 49.55 0 0 1-16.2 0A2 2 0 0 1 2.5 17"/><path d="m10 15 5-3-5-3z"/></svg>
                                        Subscribe
                                    </a>
                                </div>
                                <div className="flex items-center gap-2">
                                    <ThemeToggle />
                                    <button onClick={() => setMobileOpen(!mobileOpen)} className="md:hidden liquid-glass p-2 rounded-xl">
                                        {mobileOpen
                                            ? <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                            : <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                                        }
                                    </button>
                                </div>
                            </div>
                            {mobileOpen && (
                                <div className="md:hidden mt-4 pt-4 border-t border-white/10">
                                    <div className="flex flex-col gap-1">
                                        <a href="../"            onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-colors font-medium">Home</a>
                                        <a href="../giveaways/"  onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-colors font-medium">Giveaways</a>
                                        <a href="../tools/"      onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-colors font-medium">Toolkit</a>
                                        <a href="../tech-support/" onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-white bg-white/5 hover:bg-white/10 transition-colors font-medium">Tech Support</a>
                                        <a href="../my-tickets/" onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-colors font-medium">My Tickets</a>
                                        <div className="h-px bg-white/10 my-2"></div>
                                        <a href={discordUrl} target="_blank" rel="noopener noreferrer" onClick={() => setMobileOpen(false)}
                                           className="px-3 py-2.5 rounded-xl text-indigo-400 hover:text-indigo-300 hover:bg-white/5 transition-colors font-medium flex items-center gap-2">

        // Ticket Form Component
        const TicketForm = ({ onSubmit, onViewTickets }) => {
            const [formData, setFormData] = useState({
                name: '',

            const [isSubmitting, setIsSubmitting] = useState(false);
            const [showSuccess, setShowSuccess] = useState(false);
            const [ticketId, setTicketId] = useState(null);
            const [submitError, setSubmitError] = useState('');

            const categories = [
                { value: 'general', label: 'General Support', icon: 'help-circle' },

                { value: 'networking', label: 'Networking/WiFi', icon: 'wifi' },
                { value: 'peripherals', label: 'Peripherals', icon: 'mouse' },
                { value: 'streaming', label: 'Streaming Setup', icon: 'video' },
                { value: 'gaming', label: 'Gaming Performance', icon: 'gamepad-2' },
                { value: 'other', label: 'Other', icon: 'more-horizontal' }
            ];

            const priorities = [
                { value: 'low', label: 'Low - General Question', color: 'text-green-400' },
                { value: 'medium', label: 'Medium - Need Help Soon', color: 'text-yellow-400' },

            ];

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                setSubmitError('');

                try {
                    const newTicket = {
                        id: 'TB-' + Date.now().toString(36).toUpperCase(),
                        ...formData,
                        status: 'open',
                        createdAt: new Date().toISOString(),
                        updatedAt: new Date().toISOString(),
                        responses: []
                    };

                    // Save ticket (Firebase if configured, localStorage fallback)
                    await FirebaseDB.saveTicket(newTicket);

                    // Remember this ticket ID so the user can find it on My Tickets
                    const myIds = JSON.parse(localStorage.getItem('tb_my_ticket_ids') || '[]');
                    if (!myIds.includes(newTicket.id)) {
                        myIds.unshift(newTicket.id);
                        localStorage.setItem('tb_my_ticket_ids', JSON.stringify(myIds));
                    }

                    // Send confirmation email
                    console.log('[Email] Ticket submitted, firing sendTicketConfirmation for', newTicket.id);
                    sendTicketConfirmation(newTicket).catch(err => console.warn('[Email] sendTicketConfirmation threw:', err));

                        <div className="grid md:grid-cols-2 gap-6">
                            <div>
                                <label className="block text-sm font-medium text-gray-300 mb-2">Discord (Optional)</label>
                                <input type="text" value={formData.discord}
                                    onChange={e => setFormData({...formData, discord: e.target.value})}
                                    className="w-full liquid-glass bg-transparent px-4 py-3 rounded-xl text-white placeholder-gray-500"
                                    placeholder="Username#1234" />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-300 mb-2">Priority *</label>
                                <select required value={formData.priority}
                                    onChange={e => setFormData({...formData, priority: e.target.value})}
                                    className="w-full liquid-glass bg-transparent px-4 py-3 rounded-xl text-white">
                                    {priorities.map(p => (
                                        <option key={p.value} value={p.value} className="bg-gray-900">{p.label}</option>
                                    ))}
                                </select>
                            </div>
                        </div>

                        <div className="grid md:grid-cols-2 gap-6">
                            <div>
                                <label className="block text-sm font-medium text-gray-300 mb-2">Category *</label>
                                <select required value={formData.category}
                                    onChange={e => setFormData({...formData, category: e.target.value})}

                                <label className="block text-sm font-medium text-gray-300 mb-2">Subject *</label>

                        </div>

                        <div>
                            <label className="block text-sm font-medium text-gray-300 mb-2">Device/Setup Info (Optional)</label>
                            <textarea value={formData.deviceInfo}
                                onChange={e => setFormData({...formData, deviceInfo: e.target.value})}

                                    <Icon name="send" className="w-5 h-5" />
                                    Submit Ticket
                                </>

                        </button>

            );

        // Ticket Status Checker
        const TicketStatus = ({ onBack }) => {
            const [searchId, setSearchId] = useState('');
            const [ticket, setTicket] = useState(null);
            const [notFound, setNotFound] = useState(false);
            const [searching, setSearching] = useState(false);
            const [replyText, setReplyText] = useState('');
            const [replying, setReplying] = useState(false);

            const handleSearch = async (e) => {
                e.preventDefault();
                setSearching(true);
                setNotFound(false);
                setTicket(null);
                try {
                    const found = await FirebaseDB.getTicket(searchId.trim());
                    if (found) {
                        setTicket(found);
                    } else {
                        setNotFound(true);
                    }
                } catch (err) {
                    console.error('Ticket lookup failed:', err);
                    setNotFound(true);
                } finally {
                    setSearching(false);
                }
            };

            const handleReply = async (e) => {
                e.preventDefault();
                if (!replyText.trim()) return;
                setReplying(true);
                try {
                    const newResponses = [...(ticket.responses || []), {
                        text: replyText.trim(),
                        from: 'user',
                        timestamp: new Date().toISOString()
                    }];
                    const updated = await FirebaseDB.updateTicket(ticket.id, { responses: newResponses });
                    setTicket(updated || { ...ticket, responses: newResponses });
                    setReplyText('');
                } catch (err) {
                    console.error('Reply failed:', err);
                } finally {
                    setReplying(false);
                }
            };

            const getStatusColor = (status) => {
                const colors = {
                    open: 'status-open',
                    'in-progress': 'status-in-progress',
                    resolved: 'status-resolved',
                    urgent: 'status-urgent'
                };
                return colors[status] || 'status-open';
            };

            const getPriorityClass = (priority) => {
                return `priority-${priority}`;
            };

                                        {ticket.name.charAt(0).toUpperCase()}
                                    </div>
                                    <div>
                                        <div className="font-medium text-sm">{ticket.name}</div>
                                        <div className="text-xs text-gray-500">{new Date(ticket.createdAt).toLocaleString()}</div>
                                    </div>
                                </div>
                                <p className="text-gray-300 whitespace-pre-wrap">{ticket.description}</p>
                                {ticket.deviceInfo && (
                                    <div className="mt-4 pt-4 border-t border-white/10">
                                        <p className="text-xs text-gray-500 mb-1">Device Info:</p>

                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold ${resp.from === 'support' ? 'bg-gradient-to-br from-violet-500 to-blue-500' : 'bg-gradient-to-br from-green-500 to-emerald-600'}`}>

                            <form onSubmit={handleReply} className="flex gap-3">
                                <input type="text" value={replyText}
                                    onChange={e => setReplyText(e.target.value)}

                                    className="flex-1 liquid-glass bg-transparent px-4 py-3 rounded-xl text-white placeholder-gray-500" />
                                <button type="submit" disabled={replying || !replyText.trim()} className="btn-glass liquid-glass px-6 py-3 rounded-xl font-medium text-green-400 disabled:opacity-50 flex items-center gap-2">
                                    {replying ? (
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                                    ) : (
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                                    )}

                            </form>

                                    : <Icon name="search" className="w-5 h-5" />
                                }
                            </button>
                        </div>

                        <div className="mt-6 p-4 liquid-glass rounded-xl border border-red-500/30 bg-red-500/10">

        // Reviews Section
        const ReviewsSection = () => {
            const [reviews,    setReviews]    = React.useState([]);
            const [loading,    setLoading]    = React.useState(true);
            const [form,       setForm]       = React.useState({ name: '', email: '', rating: 'positive', text: '', ticketId: '' });
            const [submitting, setSubmitting] = React.useState(false);
            const [submitted,  setSubmitted]  = React.useState(false);
            const [formErr,    setFormErr]    = React.useState('');

            React.useEffect(() => {
                FirebaseDB.getAllReviews()
                    .then(all => setReviews((all || []).filter(r => r.status === 'approved')))
                    .catch(() => {})
                    .finally(() => setLoading(false));
            }, []);

            const handleReviewSubmit = async (e) => {
                e.preventDefault();
                if (!form.name.trim() || !form.text.trim()) return;
                setSubmitting(true);
                setFormErr('');
                try {
                    const review = {
                        id:        'REV-' + Date.now().toString(36).toUpperCase(),
                        name:      form.name.trim(),
                        email:     form.email.trim(),
                        rating:    form.rating,
                        text:      form.text.trim(),
                        ticketId:  form.ticketId.trim(),
                        status:    'pending',
                        createdAt: new Date().toISOString(),
                    };
                    await FirebaseDB.saveReview(review);
                    setSubmitted(true);
                } catch (err) {
                    setFormErr('Failed to submit review. Please try again.');
                } finally {
                    setSubmitting(false);
                }
            };

            const ratingOpts = [
                { val: 'positive', emoji: '👍', label: 'Positive', border: 'border-green-500',  bg: 'bg-green-500/10',  text: 'text-green-400' },
                { val: 'neutral',  emoji: '😐', label: 'Neutral',  border: 'border-yellow-500', bg: 'bg-yellow-500/10', text: 'text-yellow-400' },
                { val: 'negative', emoji: '👎', label: 'Negative', border: 'border-red-500',    bg: 'bg-red-500/10',    text: 'text-red-400' },
            ];
            const ratingEmoji = { positive: '👍', neutral: '😐', negative: '👎' };
            const ratingText  = { positive: 'text-green-400', neutral: 'text-yellow-400', negative: 'text-red-400' };
            const ratingLabel = { positive: 'Positive', neutral: 'Neutral', negative: 'Negative' };

            return (
                <div className="mb-16 reveal">
                    <div className="text-center mb-10">
                        <h3 className="font-display font-bold text-3xl mb-2">
                            Community <span className="text-gradient">Reviews</span>
                        </h3>
                        <p className="text-gray-400">What the community says about TrueBeast support</p>
                    </div>

                    {/* Approved reviews grid */}
                    {loading ? (
                        <div className="text-center py-8 text-gray-500">Loading reviews…</div>
                    ) : reviews.length > 0 ? (
                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4 mb-10">
                            {reviews.map(r => (
                                <div key={r.id} className="liquid-glass rounded-2xl p-5">
                                    <div className="flex items-center gap-3 mb-3">
                                        <span className="text-2xl">{ratingEmoji[r.rating] || '⭐'}</span>
                                        <div>
                                            <p className="font-semibold text-sm">{r.name}</p>
                                            <p className={`text-xs font-medium ${ratingText[r.rating] || 'text-gray-400'}`}>{ratingLabel[r.rating]}</p>
                                        </div>
                                    </div>
                                    <p className="text-gray-300 text-sm leading-relaxed">{r.text}</p>
                                    <p className="text-xs text-gray-600 mt-3">{new Date(r.createdAt).toLocaleDateString()}</p>
                                </div>
                            ))}
                        </div>
                    ) : (
                        <div className="text-center py-8 text-gray-600 mb-8">
                            <p>No reviews yet — be the first!</p>
                        </div>
                    )}

                    {/* Submit review form */}
                    <div className="liquid-glass-strong glass-glow rounded-3xl p-6 md:p-8 max-w-2xl mx-auto">
                        <h4 className="font-display font-bold text-xl mb-6 flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5 text-green-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.123 2.123 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.123 2.123 0 0 0 1.597-1.16z"/></svg>
                            Leave a Review
                        </h4>

                        {submitted ? (
                            <div className="text-center py-6">
                                <div className="w-16 h-16 rounded-full bg-green-500/20 flex items-center justify-center mx-auto mb-4">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="w-8 h-8 text-green-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                                </div>
                                <h5 className="font-semibold text-lg mb-2">Thanks for your feedback!</h5>
                                <p className="text-gray-400 text-sm">Your review has been submitted and will appear here once approved.</p>
                            </div>
                        ) : (
                            <form onSubmit={handleReviewSubmit} className="space-y-4">
                                <div className="grid sm:grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-300 mb-2">Name *</label>
                                        <input type="text" required value={form.name}
                                            onChange={e => setForm({...form, name: e.target.value})}
                                            className="w-full liquid-glass bg-transparent px-4 py-3 rounded-xl text-white placeholder-gray-500"
                                            placeholder="Your name or gamertag" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-300 mb-2">Email <span className="text-gray-500 font-normal">(optional, not shown)</span></label>
                                        <input type="email" value={form.email}
                                            onChange={e => setForm({...form, email: e.target.value})}
                                            className="w-full liquid-glass bg-transparent px-4 py-3 rounded-xl text-white placeholder-gray-500"
                                            placeholder="your@email.com" />
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-sm font-medium text-gray-300 mb-2">Rating *</label>
                                    <div className="flex gap-3">
                                        {ratingOpts.map(opt => (
                                            <button key={opt.val} type="button"
                                                onClick={() => setForm({...form, rating: opt.val})}
                                                className={`flex-1 liquid-glass border py-3 rounded-xl text-sm font-medium transition-all flex flex-col items-center gap-1 ${form.rating === opt.val ? `${opt.border} ${opt.bg} ${opt.text}` : 'border-white/10 text-gray-400 hover:text-white'}`}>
                                                <span className="text-xl">{opt.emoji}</span>
                                                {opt.label}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-sm font-medium text-gray-300 mb-2">Your Review *</label>
                                    <textarea required value={form.text}
                                        onChange={e => setForm({...form, text: e.target.value})}
                                        className="w-full liquid-glass bg-transparent px-4 py-3 rounded-xl text-white placeholder-gray-500 h-28 resize-none"
                                        placeholder="Tell others about your experience with TrueBeast tech support…" />
                                </div>

                                <div>
                                    <label className="block text-sm font-medium text-gray-300 mb-2">Ticket ID <span className="text-gray-500 font-normal">(optional)</span></label>
                                    <input type="text" value={form.ticketId}
                                        onChange={e => setForm({...form, ticketId: e.target.value})}
                                        className="w-full liquid-glass bg-transparent px-4 py-3 rounded-xl text-white placeholder-gray-500 font-mono"
                                        placeholder="e.g. TB-ABC123" />
                                </div>

                                {formErr && (
                                    <div className="p-3 liquid-glass rounded-xl border border-red-500/30 bg-red-500/10 text-red-400 text-sm">{formErr}</div>
                                )}

                                <button type="submit" disabled={submitting}
                                    className="w-full btn-glass liquid-glass-strong glass-glow px-6 py-3 rounded-xl font-semibold flex items-center justify-center gap-2 disabled:opacity-50">
                                    {submitting ? (
                                        <>
                                            <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                                            Submitting…
                                        </>
                                    ) : (
                                        <>
                                            <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                                            Submit Review
                                        </>
                                    )}
                                </button>
                            </form>
                        )}
                    </div>
                </div>
            );
        };

        // FAQ Section
        const FAQSection = () => {
            const [openIndex, setOpenIndex] = useState(null);
            
            const faqs = [
                {
                    q: "How long does it take to get a response?",
                    a: "I typically respond to tickets within 24-48 hours. For urgent issues marked as 'High' priority, I try to respond same-day when possible."
                },
                {
                    q: "What kind of tech issues can you help with?",
                    a: "PC builds, troubleshooting, software issues, networking problems, streaming setup, gaming performance optimization, and general tech advice. If it's tech-related, I can probably help!"
                },
                {
                    q: "Do you charge for tech support?",
                    a: "Nope! Tech support is completely free for the community. It's my way of giving back to everyone who supports the channel."
                },
                {
                    q: "Can I get help through Discord instead?",
                    a: "For quick questions, hop in the Discord! For complex issues that need detailed troubleshooting, submitting a ticket here ensures nothing gets lost and we can track progress."
                },
                {
                    q: "What info should I include in my ticket?",
                    a: "Be as specific as possible! Include error messages, what you've already tried, your PC specs if relevant, and when the issue started. Screenshots help too!"
                }
            ];
            
            return (
                <div className="reveal">
                    <h3 className="font-display font-bold text-2xl mb-6 text-center">Frequently Asked Questions</h3>
                    <div className="space-y-3">
                        {faqs.map((faq, i) => (
                            <div key={i} className="liquid-glass rounded-2xl overflow-hidden">
                                <button onClick={() => setOpenIndex(openIndex === i ? null : i)}
                                    className="w-full flex items-center justify-between p-5 text-left hover:bg-white/5 transition-colors">
                                    <span className="font-medium pr-4">{faq.q}</span>
                                    <Icon name={openIndex === i ? "chevron-up" : "chevron-down"} className="w-5 h-5 text-gray-400 flex-shrink-0" />
                                </button>
                                {openIndex === i && (
                                    <div className="px-5 pb-5 text-gray-400 animate-fade-in">
                                        {faq.a}
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // Main App
        const App = () => {
            const [activeTab, setActiveTab] = useState('submit');

            useScrollReveal();

            useEffect(() => {}, []);

            return (
                <div className="relative min-h-screen">
                    <Navigation />
                    
                    <main className="pt-32 pb-12 px-6">
                        <div className="max-w-6xl mx-auto">
                            {/* Hero */}
                            <div className="text-center mb-16 reveal">
                                <div className="inline-flex items-center gap-2 liquid-glass px-4 py-2 rounded-full mb-6">
                                    <Icon name="headphones" className="w-4 h-4 text-green-400" />
                                    <span className="text-sm font-medium text-gray-300">Free Community Support</span>
                                </div>
                                <h1 className="font-display font-bold text-5xl md:text-7xl mb-6">
                                    Tech <span className="text-gradient">Support</span>
                                </h1>
                                <p className="text-xl text-gray-400 max-w-2xl mx-auto">
                                    Stuck with a tech problem? I got you. Submit a ticket and I'll help you figure it out.
                                </p>
                            </div>
                            
                            {/* Tab Navigation */}
                            <div className="flex justify-center gap-4 mb-12 reveal">
                                <button onClick={() => setActiveTab('submit')}
                                    className={`px-6 py-3 rounded-xl font-medium flex items-center gap-2 transition-all ${activeTab === 'submit' ? 'liquid-glass-strong text-green-400' : 'liquid-glass text-gray-400 hover:text-white'}`}>
                                    <Icon name="plus-circle" className="w-5 h-5" />
                                    New Ticket
                                </button>
                                <button onClick={() => setActiveTab('status')}
                                    className={`px-6 py-3 rounded-xl font-medium flex items-center gap-2 transition-all ${activeTab === 'status' ? 'liquid-glass-strong text-green-400' : 'liquid-glass text-gray-400 hover:text-white'}`}>
                                    <Icon name="search" className="w-5 h-5" />
                                    Check Status
                                </button>
                                <a href="../admin/"
                                    className="liquid-glass px-6 py-3 rounded-xl font-medium text-gray-400 hover:text-white flex items-center gap-2">
                                    <Icon name="shield" className="w-5 h-5" />
                                    Admin
                                </a>
                            </div>
                            
                            {/* Content */}
                            <div className="grid lg:grid-cols-3 gap-8 mb-16">
                                <div className="lg:col-span-2 reveal">
                                    {activeTab === 'submit' ? (
                                        <TicketForm onViewTickets={() => setActiveTab('status')} />
                                    ) : (
                                        <TicketStatus onBack={() => setActiveTab('submit')} />
                                    )}
                                </div>
                                
                                <div className="space-y-6">
                                    <div className="liquid-glass rounded-2xl p-6 reveal">
                                        <h4 className="font-display font-bold text-lg mb-4 flex items-center gap-2">
                                            <Icon name="clock" className="w-5 h-5 text-green-400" />
                                            Response Times
                                        </h4>
                                        <div className="space-y-3">
                                            <div className="flex justify-between items-center">
                                                <span className="text-gray-400">Low Priority</span>
                                                <span className="text-green-400 font-medium">48-72 hours</span>
                                            </div>
                                            <div className="flex justify-between items-center">
                                                <span className="text-gray-400">Medium Priority</span>
                                                <span className="text-yellow-400 font-medium">24-48 hours</span>
                                            </div>
                                            <div className="flex justify-between items-center">
                                                <span className="text-gray-400">High Priority</span>
                                                <span className="text-red-400 font-medium">Same day</span>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="liquid-glass rounded-2xl p-6 reveal">
                                        <h4 className="font-display font-bold text-lg mb-4 flex items-center gap-2">
                                            <Icon name="discord" className="w-5 h-5 text-indigo-400" />
                                            Quick Help
                                        </h4>
                                        <p className="text-gray-400 text-sm mb-4">
                                            For faster responses on simple questions, join the Discord community.
                                        </p>
                                        <a href="https://discord.gg/Nk8vekY" target="_blank" rel="noopener noreferrer"
                                           className="btn-glass liquid-glass w-full py-3 rounded-xl font-medium text-center flex items-center justify-center gap-2">
                                            <Icon name="discord" className="w-5 h-5" />
                                            Join Discord
                                        </a>
                                    </div>
                                    
                                    <div className="liquid-glass rounded-2xl p-6 reveal">
                                        <h4 className="font-display font-bold text-lg mb-4">Support Hours</h4>
                                        <div className="space-y-2 text-sm">
                                            <div className="flex justify-between">
                                                <span className="text-gray-400">Monday - Friday</span>
                                                <span>6PM - 12AM EST</span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-gray-400">Saturday</span>
                                                <span>2PM - 12AM EST</span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-gray-400">Sunday</span>
                                                <span>12PM - 10PM EST</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            {/* Reviews */}
                            <ReviewsSection />

                            {/* FAQ */}
                            <div className="max-w-3xl mx-auto">
                                <FAQSection />
                            </div>
                        </div>
                    </main>
                    
                    {/* Footer */}
                    <footer className="py-12 px-6 border-t border-white/5">
                        <div className="max-w-6xl mx-auto">
                            <div className="flex flex-col md:flex-row items-center justify-between gap-6">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-green-500 to-emerald-600 flex items-center justify-center">
                                        <span className="font-display font-bold text-lg">TB</span>
                                    </div>
                                    <span className="font-display font-bold text-xl">TrueBeast</span>
                                </div>
                                <p className="text-gray-500 text-sm">
                                    Free tech support for the community. Stay grinding. 🎮
                                </p>
                                <div className="flex items-center gap-4">
                                    <a href="../" className="text-gray-400 hover:text-white transition-colors">Home</a>
                                    <a href="https://www.youtube.com/@RealTrueBeast" target="_blank" rel="noopener noreferrer"
                                       className="liquid-glass p-3 rounded-xl hover:bg-white/10 transition-colors text-gray-400 hover:text-white">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2.5 17a24.12 24.12 0 0 1 0-10 2 2 0 0 1 1.4-1.4 49.56 49.56 0 0 1 16.2 0A2 2 0 0 1 21.5 7a24.12 24.12 0 0 1 0 10 2 2 0 0 1-1.4 1.4 49.55 49.55 0 0 1-16.2 0A2 2 0 0 1 2.5 17"/><path d="m10 15 5-3-5-3z"/></svg>
                                    </a>
                                    <a href="https://discord.gg/Nk8vekY" target="_blank" rel="noopener noreferrer"
                                       className="liquid-glass p-3 rounded-xl hover:bg-white/10 transition-colors text-indigo-400 hover:text-indigo-300">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="currentColor" fillRule="evenodd"><path fillRule="evenodd" d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
