<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Open Graph / Discord embeds -->
    <meta property="og:type"        content="website">
    <meta property="og:site_name"   content="TrueBeast">
    <meta property="og:title"       content="Admin — TrueBeast Support">
    <meta property="og:description" content="TrueBeast support admin panel.">
    <meta property="og:url"         content="https://truebeast.io/admin/">
    <meta property="og:image"       content="https://truebeast.io/assets/images/og-image.png">
    <meta name="twitter:card"       content="summary_large_image">
    <title>Admin Panel | TrueBeast Support</title>
    <link rel="icon" href="../favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="../js/config.js?v=5"></script>
    <script src="../js/firebase-db.js?v=4"></script>
    <link rel="stylesheet" href="../css/shared.css">
    <link rel="stylesheet" href="../css/glass.css?v=4">
    <link rel="stylesheet" href="../css/admin.css?v=3">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .screen { display: none; }
        .status-open        { background: rgba(34,197,94,0.2);  color: #22c55e; }
        .status-in-progress { background: rgba(59,130,246,0.2); color: #3b82f6; }
        .status-resolved    { background: rgba(107,114,128,0.2); color: #9ca3af; }
        .status-urgent      { background: rgba(239,68,68,0.2);  color: #ef4444; }
        .priority-high   { background: rgba(239,68,68,0.2);  color: #ef4444; border-color: rgba(239,68,68,0.3); }
        .priority-medium { background: rgba(245,158,11,0.2); color: #f59e0b; border-color: rgba(245,158,11,0.3); }
        .priority-low    { background: rgba(34,197,94,0.2);  color: #22c55e; border-color: rgba(34,197,94,0.3); }
        .rating-positive { background: rgba(34,197,94,0.2);  color: #22c55e; }
        .rating-neutral  { background: rgba(245,158,11,0.2); color: #f59e0b; }
        .rating-negative { background: rgba(239,68,68,0.2);  color: #ef4444; }
        .review-status-pending  { background: rgba(245,158,11,0.2); color: #f59e0b; }
        .review-status-approved { background: rgba(34,197,94,0.2);  color: #22c55e; }
        .review-status-rejected { background: rgba(107,114,128,0.2); color: #9ca3af; }
        .ticket-card { transition: all 0.2s ease; cursor: pointer; }
        .ticket-card:hover { transform: translateY(-2px); background: rgba(255,255,255,0.06); }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .thread { max-height: 24rem; overflow-y: auto; }
        .list-scroll { max-height: calc(100vh - 420px); overflow-y: auto; }
        input:focus, textarea:focus { outline: none; box-shadow: 0 0 0 2px rgba(124,58,237,0.4); }
        .tab-active { background: rgba(124,58,237,0.25); color: #a78bfa; border: 1px solid rgba(124,58,237,0.4); }
        .tab-inactive { background: rgba(255,255,255,0.04); color: #9ca3af; border: 1px solid rgba(255,255,255,0.06); }
        .filter-active { background: rgba(34,197,94,0.2); color: #22c55e; border: 1px solid rgba(34,197,94,0.4); }
        .filter-inactive { background: rgba(255,255,255,0.04); color: #9ca3af; border: 1px solid rgba(255,255,255,0.06); }
        .send-btn { background: rgba(124,58,237,0.3); color: #c4b5fd; border: 1px solid rgba(124,58,237,0.4); transition: background 0.2s; }
        .send-btn:hover { background: rgba(124,58,237,0.5); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
<div class="gradient-bg"></div>

<!-- ── NAV ─────────────────────────────────────────────────────────── -->
<nav class="fixed top-0 left-0 right-0 z-50 py-4">
    <div class="max-w-5xl mx-auto px-6">
        <div class="liquid-glass rounded-2xl px-6 py-4">
            <div class="flex items-center justify-between gap-3">
                <a href="../" class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl overflow-hidden pulse-glow flex-shrink-0">
                        <img src="../assets/logos/logo.png" alt="TrueBeast" class="w-full h-full object-contain" />
                    </div>
                    <div>
                        <span class="font-display font-bold text-lg">TrueBeast</span>
                        <span class="ml-2 text-xs text-violet-400 bg-violet-500/10 px-2 py-0.5 rounded-full">Admin</span>
                    </div>
                </a>
                <div class="flex items-center gap-2" id="nav-actions">
                    <a href="../tech-support/" class="text-gray-400 hover:text-white text-sm transition-colors px-3 py-2">Support Portal</a>
                    <button id="nav-refresh" onclick="refreshCurrent()" style="display:none"
                        class="liquid-glass px-3 py-2 rounded-xl text-sm text-gray-400 hover:text-white transition-colors">
                        Refresh
                    </button>
                    <button id="signout-btn" onclick="doSignOut()" style="display:none"
                        class="liquid-glass px-3 py-2 rounded-xl text-sm text-gray-400 hover:text-white transition-colors">
                        Sign Out
                    </button>
                </div>
            </div>
        </div>
    </div>
</nav>

<!-- ── LOADING ────────────────────────────────────────────────────── -->
<div id="screen-loading" style="display:flex; min-height:100vh; align-items:center; justify-content:center;">
    <div class="text-center">
        <div class="w-12 h-12 border-2 border-violet-500/30 border-t-violet-500 rounded-full spin mx-auto mb-4"></div>
        <p class="text-gray-500 text-sm">Loading...</p>
    </div>
</div>

<!-- ── LOGIN ──────────────────────────────────────────────────────── -->
<div id="screen-login" class="screen" style="min-height:100vh; align-items:center; justify-content:center; padding:1.5rem;">
    <div class="liquid-glass-strong glass-glow rounded-3xl p-8 w-full animate-fade-in" style="max-width:24rem;">
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-full bg-violet-500/10 flex items-center justify-center mx-auto mb-4 pulse-glow">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                     stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
            </div>
            <h2 class="font-display font-bold text-2xl">Admin Access</h2>
            <p class="text-gray-400 text-sm mt-1">Sign in with your Firebase admin account</p>
        </div>
        <form onsubmit="doLogin(event)" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Email</label>
                <input type="email" id="l-email" required autocomplete="email"
                    placeholder="your@email.com"
                    class="w-full liquid-glass bg-transparent px-4 py-3 rounded-xl text-white placeholder-gray-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                <input type="password" id="l-pass" required autocomplete="current-password"
                    placeholder="••••••••"
                    class="w-full liquid-glass bg-transparent px-4 py-3 rounded-xl text-white placeholder-gray-500">
            </div>
            <div id="l-err" style="display:none" class="text-red-400 text-sm bg-red-500/10 rounded-lg px-3 py-2"></div>
            <div class="flex gap-3 pt-2">
                <a href="../tech-support/" class="flex-1 liquid-glass px-4 py-3 rounded-xl text-gray-300 hover:text-white text-center text-sm font-medium">Cancel</a>
                <button type="submit" id="l-btn" class="flex-1 send-btn px-4 py-3 rounded-xl font-semibold">
                    Sign In
                </button>
            </div>
        </form>
        <p class="text-center text-xs text-gray-600 mt-6">
            Manage admin accounts in Firebase Console → Authentication → Users.
        </p>
    </div>
</div>

<!-- ── DASHBOARD ──────────────────────────────────────────────────── -->
<div id="screen-dashboard" class="screen" style="padding-top:7rem; padding-bottom:4rem; padding-left:1.5rem; padding-right:1.5rem;">
    <div class="max-w-5xl mx-auto">

        <!-- Header -->
        <div class="mb-8">
            <h1 class="font-display font-bold text-3xl">Ticket <span class="text-gradient">Dashboard</span></h1>
            <p id="d-user" class="text-gray-400 text-sm mt-1"></p>
        </div>

        <!-- Stats: Tickets -->
        <div class="mb-3">
            <p class="text-xs text-gray-500 uppercase tracking-wider font-medium mb-3">Tickets</p>
            <div id="d-ticket-stats" class="grid grid-cols-3 md:grid-cols-5 gap-3"></div>
        </div>

        <!-- Stats: Reviews -->
        <div class="mb-8">
            <p class="text-xs text-gray-500 uppercase tracking-wider font-medium mb-3 mt-5">Reviews</p>
            <div id="d-review-stats" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
        </div>

        <!-- Top-level tabs: Tickets / Reviews -->
        <div class="flex gap-2 mb-5">
            <button id="tab-tickets" onclick="setMainTab('tickets')" class="px-5 py-2 rounded-xl text-sm font-semibold tab-active">Tickets</button>
            <button id="tab-reviews" onclick="setMainTab('reviews')" class="px-5 py-2 rounded-xl text-sm font-semibold tab-inactive">Reviews</button>
        </div>

        <!-- Error banner -->
        <div id="d-err" style="display:none" class="liquid-glass rounded-2xl p-4 mb-6 border border-red-500/30 bg-red-500/10">
            <p id="d-err-msg" class="text-red-400 text-sm"></p>
        </div>

        <!-- Ticket panel -->
        <div id="panel-tickets">
            <div id="d-filters" class="flex gap-2 flex-wrap mb-4"></div>
            <div id="d-list" class="list-scroll space-y-3"></div>
        </div>

        <!-- Review panel -->
        <div id="panel-reviews" style="display:none">
            <div id="r-filters" class="flex gap-2 flex-wrap mb-4"></div>
            <div id="r-list" class="list-scroll space-y-3"></div>
        </div>



    </div>
</div>

<!-- ── DETAIL ─────────────────────────────────────────────────────── -->
<div id="screen-detail" class="screen" style="padding-top:7rem; padding-bottom:4rem; padding-left:1.5rem; padding-right:1.5rem;">
    <div class="max-w-4xl mx-auto" id="detail-wrap"></div>
</div>

<!-- ── REVIEW DETAIL ──────────────────────────────────────────────── -->
<div id="screen-review-detail" class="screen" style="padding-top:7rem; padding-bottom:4rem; padding-left:1.5rem; padding-right:1.5rem;">
    <div class="max-w-3xl mx-auto" id="review-detail-wrap"></div>
</div>

<!-- ── SCRIPT ─────────────────────────────────────────────────────── -->
<script>
    'use strict';

    /* ── state ── */
    let currentUser    = null;
    let allTickets     = [];
    let allReviews     = [];
    let activeFilter   = 'all';
    let reviewFilter   = 'all';
    let activeTicket   = null;
    let activeReview   = null;
    let mainTab        = 'tickets';

    /* ── screens ── */
    const SCREENS = ['loading','login','dashboard','detail','review-detail'];
    function show(name) {
        SCREENS.forEach(s => {
            document.getElementById('screen-' + s).style.display = 'none';
        });
        const target = document.getElementById('screen-' + name);
        target.style.display = (name === 'loading' || name === 'login') ? 'flex' : 'block';
        const authed = (name === 'dashboard' || name === 'detail' || name === 'review-detail');
        document.getElementById('signout-btn').style.display = authed ? 'block' : 'none';
        document.getElementById('nav-refresh').style.display  = authed ? 'block' : 'none';
    }

    /* ── html escape ── */
    function esc(s) {
        return String(s == null ? '' : s)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ── nav refresh ── */
    function refreshCurrent() {
        if (mainTab === 'reviews') loadReviews();
        else                      loadTickets();
    }

    /* ── auth ── */
    FirebaseDB.onAuthStateChanged(function(user) {
        currentUser = user;
        if (user) {
            document.getElementById('d-user').textContent = 'Signed in as ' + user.email;
            show('dashboard');
            loadTickets();
            loadReviews();
        } else {
            show('login');
        }
    });

    function doLogin(e) {
        e.preventDefault();
        const email = document.getElementById('l-email').value;
        const pass  = document.getElementById('l-pass').value;
        const btn   = document.getElementById('l-btn');
        const err   = document.getElementById('l-err');
        btn.disabled = true;
        btn.textContent = 'Signing in…';
        err.style.display = 'none';

        FirebaseDB.adminSignIn(email, pass).catch(function(ex) {
            var msg = 'Sign-in failed. Check your credentials.';
            if (ex.code === 'auth/invalid-credential' || ex.code === 'auth/wrong-password') msg = 'Incorrect email or password.';
            if (ex.code === 'auth/user-not-found')     msg = 'No account found with that email.';
            if (ex.code === 'auth/too-many-requests')  msg = 'Too many attempts — try again later.';
            if (ex.code === 'auth/invalid-email')      msg = 'Invalid email address.';
            err.textContent = msg;
            err.style.display = 'block';
        }).finally(function() {
            btn.disabled = false;
            btn.textContent = 'Sign In';
        });
    }

    function doSignOut() {
        FirebaseDB.adminSignOut().finally(function() { show('login'); });
    }

    /* ── main tab switch ── */
    function setMainTab(tab) {
        mainTab = tab;
        document.getElementById('tab-tickets').className = 'px-5 py-2 rounded-xl text-sm font-semibold ' + (tab === 'tickets' ? 'tab-active' : 'tab-inactive');
        document.getElementById('tab-reviews').className = 'px-5 py-2 rounded-xl text-sm font-semibold ' + (tab === 'reviews' ? 'tab-active' : 'tab-inactive');
        document.getElementById('panel-tickets').style.display = tab === 'tickets' ? 'block' : 'none';
        document.getElementById('panel-reviews').style.display  = tab === 'reviews'  ? 'block' : 'none';
    }

    /* ════════════════════════════════════════════════════════
       TICKETS
    ════════════════════════════════════════════════════════ */
    function loadTickets() {
        document.getElementById('d-list').innerHTML =
            '<div class="liquid-glass rounded-2xl p-10 text-center">' +
            '<div class="w-8 h-8 border-2 border-violet-500/30 border-t-violet-500 rounded-full spin mx-auto mb-4"></div>' +
            '<p class="text-gray-500">Loading tickets…</p></div>';
        document.getElementById('d-err').style.display = 'none';

        FirebaseDB.getAllTickets().then(function(tickets) {
            allTickets = tickets;
            renderTicketStats();
            renderFilters();
            renderList();
        }).catch(function(ex) {
            document.getElementById('d-err-msg').textContent = 'Failed to load tickets: ' + ex.message;
            document.getElementById('d-err').style.display = 'block';
            document.getElementById('d-list').innerHTML = '';
        });
    }

    function renderTicketStats() {
        var urgent = allTickets.filter(function(t){ return t.priority === 'high' && t.status !== 'resolved'; }).length;
        var rows = [
            { label:'Total',       value: allTickets.length,                                                       color:'text-white' },
            { label:'Open',        value: allTickets.filter(function(t){return t.status==='open';}).length,        color:'text-green-400' },
            { label:'In Progress', value: allTickets.filter(function(t){return t.status==='in-progress';}).length, color:'text-blue-400' },
            { label:'Resolved',    value: allTickets.filter(function(t){return t.status==='resolved';}).length,    color:'text-gray-400' },
            { label:'Urgent',      value: urgent,                                                                   color:'text-red-400' },
        ];
        document.getElementById('d-ticket-stats').innerHTML = rows.map(function(r) {
            return '<div class="liquid-glass rounded-2xl p-4 text-center">' +
                   '<div class="text-3xl font-display font-bold ' + r.color + '">' + r.value + '</div>' +
                   '<div class="text-xs text-gray-500 mt-1">' + r.label + '</div></div>';
        }).join('');
    }

    function renderFilters() {
        var filters = ['all','open','in-progress','resolved','urgent'];
        document.getElementById('d-filters').innerHTML = filters.map(function(f) {
            var active = f === activeFilter;
            return '<button onclick="setFilter(\'' + f + '\')" class="px-4 py-2 rounded-xl text-sm font-medium ' + (active ? 'filter-active' : 'filter-inactive') + '">' +
                   f.replace('-',' ').toUpperCase() + '</button>';
        }).join('');
    }

    function setFilter(f) {
        activeFilter = f;
        renderFilters();
        renderList();
    }

    function renderList() {
        var list = activeFilter === 'all' ? allTickets
            : activeFilter === 'urgent'
                ? allTickets.filter(function(t){ return t.priority==='high' && t.status!=='resolved'; })
                : allTickets.filter(function(t){ return t.status === activeFilter; });

        if (!list.length) {
            document.getElementById('d-list').innerHTML =
                '<div class="liquid-glass rounded-2xl p-10 text-center">' +
                '<p class="text-gray-500">No tickets' +
                (activeFilter !== 'all' ? ' with status "' + activeFilter + '"' : ' yet') + '</p></div>';
            return;
        }

        document.getElementById('d-list').innerHTML = list.map(function(t) {
            var scls = {open:'status-open','in-progress':'status-in-progress',resolved:'status-resolved',urgent:'status-urgent'}[t.status] || 'status-open';
            return '<div class="ticket-card liquid-glass rounded-2xl p-4" onclick="openTicket(\'' + esc(t.id) + '\')">' +
                '<div class="flex items-center justify-between flex-wrap gap-3">' +
                  '<div class="flex items-center gap-4 min-w-0">' +
                    '<span class="font-mono text-green-400 text-sm flex-shrink-0">' + esc(t.id) + '</span>' +
                    '<div class="min-w-0">' +
                      '<h4 class="font-medium truncate">' + esc(t.subject) + '</h4>' +
                      '<p class="text-sm text-gray-500 truncate">' + esc(t.name) + ' · ' + t.category.replace(/-/g,' ') + '</p>' +
                    '</div>' +
                  '</div>' +
                  '<div class="flex items-center gap-2 flex-shrink-0">' +
                    '<span class="px-3 py-1 rounded-full text-xs font-medium border priority-' + t.priority + '">' + t.priority + '</span>' +
                    '<span class="px-3 py-1 rounded-full text-xs font-medium ' + scls + '">' + t.status.replace('-',' ').toUpperCase() + '</span>' +
                  '</div>' +
                '</div>' +
                '<div class="mt-3 pt-3 border-t border-white/5 flex items-center gap-4 text-xs text-gray-500">' +
                  '<span>' + new Date(t.createdAt).toLocaleDateString() + '</span>' +
                  '<span>·</span><span>' + (t.responses||[]).length + ' replies</span>' +
                  '<span>·</span><span class="truncate">' + esc(t.email) + '</span>' +
                '</div>' +
                '</div>';
        }).join('');
    }

    /* ── ticket detail ── */
    function openTicket(id) {
        activeTicket = allTickets.find(function(t){ return t.id === id; });
        if (!activeTicket) return;
        renderDetail();
        show('detail');
    }

    function backToDash() {
        activeTicket = null;
        show('dashboard');
    }

    function renderDetail() {
        var t = activeTicket;
        var scls = {open:'status-open','in-progress':'status-in-progress',resolved:'status-resolved',urgent:'status-urgent'}[t.status] || 'status-open';
        var statusBtns = ['open','in-progress','resolved','urgent'].map(function(s) {
            var active = s === t.status;
            return '<button onclick="changeStatus(\'' + s + '\')" class="px-3 py-1.5 rounded-lg text-xs font-medium ' + (active ? 'filter-active' : 'filter-inactive') + '">' + s.replace('-',' ').toUpperCase() + '</button>';
        }).join('');

        var firstMsg =
            '<div class="liquid-glass rounded-xl p-4">' +
              '<div class="flex items-center gap-3 mb-3">' +
                '<div class="w-8 h-8 rounded-full bg-gradient-to-br from-green-500 to-emerald-600 flex items-center justify-center text-sm font-bold flex-shrink-0">' + esc(t.name.charAt(0).toUpperCase()) + '</div>' +
                '<div><div class="font-medium text-sm">' + esc(t.name) + '</div><div class="text-xs text-gray-500">' + new Date(t.createdAt).toLocaleString() + '</div></div>' +
              '</div>' +
              '<p class="text-gray-300 text-sm whitespace-pre-wrap">' + esc(t.description) + '</p>' +
              (t.deviceInfo ? '<div class="mt-4 pt-4 border-t border-white/10"><p class="text-xs text-gray-500 mb-1">Device Info:</p><p class="text-sm text-gray-400 font-mono">' + esc(t.deviceInfo) + '</p></div>' : '') +
            '</div>';

        var responses = (t.responses||[]).map(function(r) {
            var isSupport = r.from === 'support';
            return '<div class="liquid-glass rounded-xl p-4 ' + (isSupport ? 'border-l-4 border-l-violet-500 bg-violet-500/5' : 'border-l-4 border-l-green-500 bg-green-500/5') + '">' +
              '<div class="flex items-center gap-3 mb-2">' +
                '<div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold flex-shrink-0 ' + (isSupport ? 'bg-gradient-to-br from-violet-500 to-blue-500' : 'bg-gradient-to-br from-green-500 to-emerald-600') + '">' + (isSupport ? 'TB' : esc(t.name.charAt(0).toUpperCase())) + '</div>' +
                '<div><span class="text-xs font-medium ' + (isSupport ? 'text-violet-400' : 'text-green-400') + '">' + (isSupport ? 'You (Support)' : esc(t.name)) + '</span>' +
                '<span class="text-xs text-gray-500 ml-2">' + new Date(r.timestamp).toLocaleString() + '</span></div>' +
              '</div>' +
              '<p class="text-gray-300 text-sm whitespace-pre-wrap">' + esc(r.text) + '</p>' +
            '</div>';
        }).join('');

        var replyForm = t.status !== 'resolved'
            ? '<form onsubmit="sendReply(event)" class="flex gap-3 mt-2">' +
                '<textarea id="reply-text" placeholder="Type your reply…" class="flex-1 liquid-glass bg-transparent px-4 py-3 rounded-xl text-white placeholder-gray-500 h-20 resize-none text-sm"></textarea>' +
                '<button type="submit" id="reply-btn" class="send-btn px-5 py-3 rounded-xl font-semibold self-end flex items-center gap-2 whitespace-nowrap">' +
                  '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>' +
                  'Send' +
                '</button>' +
              '</form>'
            : '<p class="text-gray-500 text-sm text-center py-4">This ticket is resolved.</p>';

        document.getElementById('detail-wrap').innerHTML =
            '<div class="animate-fade-in">' +
              '<div class="flex items-center justify-between flex-wrap gap-3 mb-6">' +
                '<button onclick="backToDash()" class="text-gray-400 hover:text-white transition-colors text-sm flex items-center gap-2">← Back to List</button>' +
                '<div class="flex gap-2 flex-wrap">' + statusBtns +
                  '<button onclick="doDelete(\'' + esc(t.id) + '\')" class="px-3 py-1.5 rounded-lg text-xs font-medium bg-red-500/20 text-red-400 border border-red-500/30 hover:bg-red-500/30">Delete</button>' +
                '</div>' +
              '</div>' +
              '<div class="liquid-glass-strong glass-glow rounded-3xl p-6 md:p-8">' +
                '<div class="flex flex-wrap items-center gap-3 mb-2">' +
                  '<span class="font-mono text-lg text-green-400">' + esc(t.id) + '</span>' +
                  '<span class="px-3 py-1 rounded-full text-xs font-semibold ' + scls + '">' + t.status.replace('-',' ').toUpperCase() + '</span>' +
                  '<span class="px-3 py-1 rounded-full text-xs font-semibold border priority-' + t.priority + '">' + t.priority.toUpperCase() + '</span>' +
                '</div>' +
                '<h3 class="font-display font-bold text-2xl mb-6">' + esc(t.subject) + '</h3>' +
                '<div class="grid sm:grid-cols-3 gap-4 mb-6">' +
                  '<div class="liquid-glass rounded-xl p-4"><p class="text-xs text-gray-500 mb-1">From</p><p class="font-semibold">' + esc(t.name) + '</p><p class="text-sm text-gray-400">' + esc(t.email) + '</p>' + (t.discord ? '<p class="text-sm text-indigo-400 mt-1">' + esc(t.discord) + '</p>' : '') + '</div>' +
                  '<div class="liquid-glass rounded-xl p-4"><p class="text-xs text-gray-500 mb-1">Category</p><p class="font-semibold">' + t.category.replace(/-/g,' ').toUpperCase() + '</p><p class="text-xs mt-1 ' + (t.priority==='high'?'text-red-400':t.priority==='medium'?'text-yellow-400':'text-green-400') + '">Priority: ' + t.priority.toUpperCase() + '</p></div>' +
                  '<div class="liquid-glass rounded-xl p-4"><p class="text-xs text-gray-500 mb-1">Timeline</p><p class="font-semibold text-sm">Created ' + new Date(t.createdAt).toLocaleDateString() + '</p><p class="text-xs text-gray-400 mt-1">Updated ' + new Date(t.updatedAt).toLocaleDateString() + '</p></div>' +
                '</div>' +
                '<div class="thread space-y-4 mb-6 pr-1">' + firstMsg + responses + '</div>' +
                '<div id="reply-err" style="display:none" class="text-red-400 text-sm mb-3"></div>' +
                replyForm +
              '</div>' +
            '</div>';
    }

    function changeStatus(newStatus) {
        if (!activeTicket) return;
        FirebaseDB.updateTicket(activeTicket.id, { status: newStatus }).then(function(updated) {
            if (updated) {
                activeTicket = updated;
                var idx = allTickets.findIndex(function(t){ return t.id === activeTicket.id; });
                if (idx !== -1) allTickets[idx] = activeTicket;
            }
            renderDetail();
        }).catch(function(ex) { alert('Status update failed: ' + ex.message); });
    }

    function doDelete(id) {
        if (!confirm('Delete this ticket permanently? This cannot be undone.')) return;
        FirebaseDB.deleteTicket(id).then(function() {
            allTickets = allTickets.filter(function(t){ return t.id !== id; });
            backToDash();
            renderTicketStats();
            renderList();
        }).catch(function(ex) { alert('Delete failed: ' + ex.message); });
    }

    function sendReply(e) {
        e.preventDefault();
        var input  = document.getElementById('reply-text');
        var btn    = document.getElementById('reply-btn');
        var errDiv = document.getElementById('reply-err');
        var text   = input.value.trim();
        if (!text) return;

        btn.disabled    = true;
        btn.innerHTML   = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" class="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>&nbsp;Sending…';
        errDiv.style.display = 'none';

        var newResponses = (activeTicket.responses || []).concat([{
            text: text, from: 'support', timestamp: new Date().toISOString()
        }]);
        FirebaseDB.updateTicket(activeTicket.id, { responses: newResponses, status: 'in-progress' })
            .then(function(updated) {
                if (updated) {
                    activeTicket = updated;
                    var idx = allTickets.findIndex(function(t){ return t.id === activeTicket.id; });
                    if (idx !== -1) allTickets[idx] = activeTicket;
                }
                renderDetail();
            })
            .catch(function(ex) {
                errDiv.textContent    = 'Send failed: ' + ex.message;
                errDiv.style.display  = 'block';
                btn.disabled          = false;
                btn.innerHTML         = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Send';
            });
    }

    /* ════════════════════════════════════════════════════════
       REVIEWS
    ════════════════════════════════════════════════════════ */
    function loadReviews() {
        document.getElementById('r-list').innerHTML =
            '<div class="liquid-glass rounded-2xl p-10 text-center">' +
            '<div class="w-8 h-8 border-2 border-violet-500/30 border-t-violet-500 rounded-full spin mx-auto mb-4"></div>' +
            '<p class="text-gray-500">Loading reviews…</p></div>';

        FirebaseDB.getAllReviews().then(function(reviews) {
            allReviews = reviews;
            renderReviewStats();
            renderReviewFilters();
            renderReviewList();
        }).catch(function(ex) {
            document.getElementById('d-err-msg').textContent = 'Failed to load reviews: ' + ex.message;
            document.getElementById('d-err').style.display = 'block';
            document.getElementById('r-list').innerHTML = '';
        });
    }

    function renderReviewStats() {
        var rows = [
            { label:'Total',     value: allReviews.length,                                                             color:'text-white' },
            { label:'Positive',  value: allReviews.filter(function(r){return r.rating==='positive';}).length,          color:'text-green-400' },
            { label:'Neutral',   value: allReviews.filter(function(r){return r.rating==='neutral';}).length,           color:'text-yellow-400' },
            { label:'Negative',  value: allReviews.filter(function(r){return r.rating==='negative';}).length,          color:'text-red-400' },
        ];
        document.getElementById('d-review-stats').innerHTML = rows.map(function(r) {
            return '<div class="liquid-glass rounded-2xl p-4 text-center" style="transform:translateZ(0)">' +
                   '<div class="text-3xl font-display font-bold ' + r.color + '">' + r.value + '</div>' +
                   '<div class="text-xs text-gray-500 mt-1">' + r.label + '</div></div>';
        }).join('');
    }

    function renderReviewFilters() {
        var filters = ['all','positive','neutral','negative','pending','approved'];
        document.getElementById('r-filters').innerHTML = filters.map(function(f) {
            var active = f === reviewFilter;
            return '<button onclick="setReviewFilter(\'' + f + '\')" class="px-4 py-2 rounded-xl text-sm font-medium ' + (active ? 'filter-active' : 'filter-inactive') + '">' +
                   f.toUpperCase() + '</button>';
        }).join('');
    }

    function setReviewFilter(f) {
        reviewFilter = f;
        renderReviewFilters();
        renderReviewList();
    }

    function renderReviewList() {
        var list = reviewFilter === 'all' ? allReviews
            : (reviewFilter === 'positive' || reviewFilter === 'neutral' || reviewFilter === 'negative')
                ? allReviews.filter(function(r){ return r.rating === reviewFilter; })
                : allReviews.filter(function(r){ return r.status === reviewFilter; });

        if (!list.length) {
            document.getElementById('r-list').innerHTML =
                '<div class="liquid-glass rounded-2xl p-10 text-center">' +
                '<p class="text-gray-500">No reviews' + (reviewFilter !== 'all' ? ' matching "' + reviewFilter + '"' : ' yet') + '</p></div>';
            return;
        }

        document.getElementById('r-list').innerHTML = list.map(function(r) {
            var ratingCls = { positive:'rating-positive', neutral:'rating-neutral', negative:'rating-negative' }[r.rating] || 'rating-neutral';
            var statusCls = { pending:'review-status-pending', approved:'review-status-approved', rejected:'review-status-rejected' }[r.status] || 'review-status-pending';
            var ratingEmoji = { positive: '👍', neutral: '😐', negative: '👎' }[r.rating] || '❓';
            return '<div class="ticket-card liquid-glass rounded-2xl p-4" onclick="openReview(\'' + esc(r.id) + '\')">' +
                '<div class="flex items-center justify-between flex-wrap gap-3">' +
                  '<div class="flex items-center gap-3 min-w-0">' +
                    '<span class="text-xl">' + ratingEmoji + '</span>' +
                    '<div class="min-w-0">' +
                      '<h4 class="font-medium truncate">' + esc(r.name) + '</h4>' +
                      '<p class="text-sm text-gray-500 truncate">' + esc(r.text.slice(0, 80)) + (r.text.length > 80 ? '…' : '') + '</p>' +
                    '</div>' +
                  '</div>' +
                  '<div class="flex items-center gap-2 flex-shrink-0">' +
                    '<span class="px-3 py-1 rounded-full text-xs font-medium ' + ratingCls + '">' + r.rating.toUpperCase() + '</span>' +
                    '<span class="px-3 py-1 rounded-full text-xs font-medium ' + statusCls + '">' + r.status.toUpperCase() + '</span>' +
                  '</div>' +
                '</div>' +
                '<div class="mt-2 pt-2 border-t border-white/5 text-xs text-gray-500">' +
                  '<span>' + new Date(r.createdAt).toLocaleDateString() + '</span>' +
                  (r.email ? '<span class="ml-3">' + esc(r.email) + '</span>' : '') +
                '</div>' +
                '</div>';
        }).join('');
    }

    function openReview(id) {
        activeReview = allReviews.find(function(r){ return r.id === id; });
        if (!activeReview) return;
        renderReviewDetail();
        show('review-detail');
    }

    function backToReviews() {
        activeReview = null;
        setMainTab('reviews');
        show('dashboard');
    }

    function renderReviewDetail() {
        var r = activeReview;
        var ratingCls = { positive:'rating-positive', neutral:'rating-neutral', negative:'rating-negative' }[r.rating] || 'rating-neutral';
        var statusCls = { pending:'review-status-pending', approved:'review-status-approved', rejected:'review-status-rejected' }[r.status] || 'review-status-pending';
        var ratingEmoji = { positive: '👍 Positive', neutral: '😐 Neutral', negative: '👎 Negative' }[r.rating] || r.rating;

        var statusBtns = ['pending','approved','rejected'].map(function(s) {
            var active = s === r.status;
            return '<button onclick="changeReviewStatus(\'' + s + '\')" class="px-3 py-1.5 rounded-lg text-xs font-medium ' + (active ? 'filter-active' : 'filter-inactive') + '">' + s.toUpperCase() + '</button>';
        }).join('');

        document.getElementById('review-detail-wrap').innerHTML =
            '<div class="animate-fade-in">' +
              '<div class="flex items-center justify-between flex-wrap gap-3 mb-6">' +
                '<button onclick="backToReviews()" class="text-gray-400 hover:text-white transition-colors text-sm">← Back to Reviews</button>' +
                '<div class="flex gap-2 flex-wrap items-center">' +
                  statusBtns +
                  '<button onclick="doDeleteReview(\'' + esc(r.id) + '\')" class="px-3 py-1.5 rounded-lg text-xs font-medium bg-red-500/20 text-red-400 border border-red-500/30 hover:bg-red-500/30">Delete</button>' +
                '</div>' +
              '</div>' +
              '<div class="liquid-glass-strong glass-glow rounded-3xl p-6 md:p-8">' +
                '<div class="flex flex-wrap items-center gap-3 mb-4">' +
                  '<span class="px-3 py-1 rounded-full text-sm font-semibold ' + ratingCls + '">' + ratingEmoji + '</span>' +
                  '<span class="px-3 py-1 rounded-full text-xs font-semibold ' + statusCls + '">' + r.status.toUpperCase() + '</span>' +
                '</div>' +
                '<h3 class="font-display font-bold text-2xl mb-6">' + esc(r.name) + '\'s Review</h3>' +
                '<div class="grid sm:grid-cols-2 gap-4 mb-6">' +
                  '<div class="liquid-glass rounded-xl p-4"><p class="text-xs text-gray-500 mb-1">Reviewer</p><p class="font-semibold">' + esc(r.name) + '</p>' + (r.email ? '<p class="text-sm text-gray-400 mt-1">' + esc(r.email) + '</p>' : '<p class="text-sm text-gray-600 mt-1">No email provided</p>') + '</div>' +
                  '<div class="liquid-glass rounded-xl p-4"><p class="text-xs text-gray-500 mb-1">Submitted</p><p class="font-semibold text-sm">' + new Date(r.createdAt).toLocaleString() + '</p></div>' +
                '</div>' +
                '<div class="liquid-glass rounded-xl p-6">' +
                  '<p class="text-xs text-gray-500 mb-3">Review</p>' +
                  '<p class="text-gray-200 leading-relaxed text-base whitespace-pre-wrap">' + esc(r.text) + '</p>' +
                '</div>' +
              '</div>' +
            '</div>';
    }

    function changeReviewStatus(newStatus) {
        if (!activeReview) return;
        FirebaseDB.updateReview(activeReview.id, { status: newStatus }).then(function(updated) {
            if (updated) {
                activeReview = updated;
                var idx = allReviews.findIndex(function(r){ return r.id === activeReview.id; });
                if (idx !== -1) allReviews[idx] = activeReview;
            }
            renderReviewDetail();
            renderReviewStats();
        }).catch(function(ex) { alert('Status update failed: ' + ex.message); });
    }

    function doDeleteReview(id) {
        if (!confirm('Delete this review permanently? This cannot be undone.')) return;
        FirebaseDB.deleteReview(id).then(function() {
            allReviews = allReviews.filter(function(r){ return r.id !== id; });
            backToReviews();
            renderReviewStats();
            renderReviewList();
        }).catch(function(ex) { alert('Delete failed: ' + ex.message); });
    }

</script>
</body>
</html>
