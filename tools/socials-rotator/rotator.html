<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Rotator</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            background: transparent;
            overflow: hidden;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        #rotator {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            padding: 6px 4px;
            perspective: 800px;
        }

        #platform-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #platform-logo svg { display: block; }
        #platform-logo img { display: block; object-fit: contain; }

        #platform-username {
            font-weight: 600;
            white-space: nowrap;
            line-height: 1;
        }

        /* ── Transition animations ── */
        @keyframes fadeOut      { from { opacity: 1; }                               to { opacity: 0; } }
        @keyframes fadeIn       { from { opacity: 0; }                               to { opacity: 1; } }

        @keyframes slideOut     { from { transform: translateX(0);     opacity: 1; } to { transform: translateX(-50px);  opacity: 0; } }
        @keyframes slideIn      { from { transform: translateX(50px);  opacity: 0; } to { transform: translateX(0);      opacity: 1; } }

        @keyframes slideUpOut   { from { transform: translateY(0);     opacity: 1; } to { transform: translateY(-35px);  opacity: 0; } }
        @keyframes slideUpIn    { from { transform: translateY(35px);  opacity: 0; } to { transform: translateY(0);      opacity: 1; } }

        /* Fade ↓ / ↑ — fades OUT upward, fades IN from above */
        @keyframes fadeOutUp    { from { transform: translateY(0);     opacity: 1; } to { transform: translateY(-35px);  opacity: 0; } }
        @keyframes fadeInDown   { from { transform: translateY(-35px); opacity: 0; } to { transform: translateY(0);      opacity: 1; } }

        @keyframes zoomOut      { from { transform: scale(1);     opacity: 1; } to { transform: scale(0.65);  opacity: 0; } }
        @keyframes zoomIn       { from { transform: scale(1.35);  opacity: 0; } to { transform: scale(1);     opacity: 1; } }

        @keyframes flipOut      { from { transform: rotateY(0deg);    opacity: 1; } to { transform: rotateY(90deg);   opacity: 0; } }
        @keyframes flipIn       { from { transform: rotateY(-90deg);  opacity: 0; } to { transform: rotateY(0deg);    opacity: 1; } }

        @keyframes spin3dOut    { from { transform: rotate3d(1,1,0,0deg);    opacity: 1; } to { transform: rotate3d(1,1,0,90deg);   opacity: 0; } }
        @keyframes spin3dIn     { from { transform: rotate3d(1,1,0,-90deg);  opacity: 0; } to { transform: rotate3d(1,1,0,0deg);    opacity: 1; } }
    </style>
    <script src="../../js/config.js?v=6"></script>
    <script src="../../js/analytics.js"></script>
</head>
<body>
    <div id="rotator">
        <div id="platform-logo"></div>
        <div id="platform-username"></div>
    </div>

    <script>
        /* ── Platform SVGs ── */
        const SVGS = {

            instagram: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>`,

            discord:   `<svg viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>`,
            facebook:  `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>`,
            bluesky:   `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 10.8c-1.087-2.114-4.046-6.053-6.798-7.995C2.566.944 1.561 1.266.902 1.565.139 1.908 0 3.08 0 3.768c0 .69.378 5.65.624 6.479.815 2.736 3.713 3.66 6.383 3.364.136-.02.275-.039.415-.056-.138.022-.276.04-.415.056-3.912.58-7.387 2.005-2.83 7.078 5.013 5.19 6.87-1.113 7.823-4.308.953 3.195 2.05 9.271 7.733 4.308 4.267-4.308 1.172-6.498-2.74-7.078a8.741 8.741 0 0 1-.415-.056c.14.017.279.036.415.056 2.67.297 5.568-.628 6.383-3.364.246-.828.624-5.79.624-6.478 0-.69-.139-1.861-.902-2.206-.659-.299-1.664-.62-4.3 1.24C16.046 4.748 13.087 8.687 12 10.8z"/></svg>`,
            snapchat:  `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.206.793c.99 0 4.347.276 5.93 3.821.529 1.193.403 3.219.317 4.788-.03.582-.056 1.13-.064 1.582.291.156.883.382 1.718.27.301-.04.59.195.59.493 0 .528-.682.977-1.508 1.124-.143.027-.236.08-.281.142.173.316.64.74 1.573.779.307.012.572.293.568.597-.01.718-.783 1.223-1.91 1.502.093.184.15.385.15.597 0 .76-.583 1.352-1.35 1.464-.57.082-1.162-.068-1.672-.355-.27-.154-.56-.245-.85-.245-.347 0-.701.107-1.028.326-1.187.784-2.174 1.19-2.936 1.207-.06.002-.12.003-.18.003-.76 0-1.748-.406-2.936-1.21-.327-.22-.68-.326-1.03-.326-.286 0-.576.09-.845.245-.51.288-1.103.437-1.672.355-.767-.112-1.35-.705-1.35-1.464 0-.212.057-.413.15-.597C2.94 14.6 2.168 14.096 2.158 13.378c-.004-.304.261-.585.568-.597.933-.04 1.4-.463 1.573-.78-.045-.06-.138-.114-.281-.14-.826-.148-1.508-.597-1.508-1.125 0-.298.289-.532.59-.492.835.112 1.427-.114 1.718-.27-.008-.452-.034-1-.064-1.582-.087-1.569-.212-3.595.317-4.788C6.258 1.07 9.615.793 10.605.793z"/></svg>`,
            cashapp:   `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.59 3.773C22.1 1.498 19.938.11 17.527.006L17.5 0h-11C2.91 0 .5 2.41.5 6v12c0 3.59 2.41 6 6 6h11c3.41 0 5.77-2.293 5.984-5.604L23.5 18V6c0-.786-.108-1.535-.308-2.227h-.003zM7.8 17.667l.503-1.674a5.091 5.091 0 0 1-2.17-1.244l1.12-.799a3.54 3.54 0 0 0 2.04.938l.032.003c.826 0 1.37-.414 1.37-.996 0-.498-.34-.814-1.332-1.089C7.8 12.24 6.82 11.54 6.82 10.2c0-1.327.99-2.32 2.49-2.573l.49-1.627h1.23l-.47 1.56a4.64 4.64 0 0 1 1.81.915l-1.058.857a3.127 3.127 0 0 0-1.66-.666h-.026c-.74 0-1.213.373-1.213.912 0 .47.37.764 1.453 1.063 1.667.456 2.564 1.2 2.564 2.594 0 1.384-1.037 2.41-2.65 2.628l-.51 1.7H7.8zm7.493-.034h-1.56l2.507-9.266h1.56l-2.507 9.266z"/></svg>`,
            paypal:    `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7.076 21.337H2.47a.641.641 0 0 1-.633-.74L4.944.901C5.026.382 5.474 0 5.998 0h7.46c2.57 0 4.578.543 5.69 1.81 1.01 1.15 1.304 2.42 1.012 4.287-.023.143-.047.288-.077.437-.983 5.05-4.349 6.797-8.647 6.797h-2.19c-.524 0-.968.382-1.05.9l-1.12 7.106zm14.146-14.42a3.35 3.35 0 0 0-.607-.541c-.013.076-.026.175-.041.254-.93 4.778-4.005 7.201-9.138 7.201h-2.19a.563.563 0 0 0-.556.479l-1.187 7.527h-.506l-.24 1.516a.56.56 0 0 0 .554.647h3.882c.46 0 .85-.334.922-.788.06-.26.76-4.852.816-5.09a.932.932 0 0 1 .923-.788h.58c3.76 0 6.705-1.528 7.565-5.946.36-1.847.174-3.388-.777-4.471z"/></svg>`,
        };

        const COLORS = {
            twitch: '#9147ff', youtube: '#FF0000', kick: '#53fc18',
            tiktok: '#fe2c55', instagram: '#E1306C', twitter: '#e7e9ea',
            discord: '#5865F2', facebook: '#1877F2', bluesky: '#0085ff',
            snapchat: '#FFFC00', cashapp: '#00D632', paypal: '#003087',
        };

        /* Simpleicons CDN slugs */
        const SIMPLEICONS = {
            twitch: 'twitch', youtube: 'youtube', kick: 'kick',
            tiktok: 'tiktok', instagram: 'instagram', twitter: 'x',
            discord: 'discord', facebook: 'facebook', bluesky: 'bluesky',
            snapchat: 'snapchat', cashapp: 'cashapp', paypal: 'paypal',
        };

        /* Branded SVGs with real colors/gradients — used in logo mode */
        const BRAND_SVGS = {
            instagram: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:block">
  <defs>
    <radialGradient id="ig-brand" cx="25%" cy="110%" r="140%">
      <stop offset="0%"   stop-color="#ffd600"/>
      <stop offset="20%"  stop-color="#ff7a00"/>
      <stop offset="40%"  stop-color="#ff0069"/>
      <stop offset="65%"  stop-color="#d300c5"/>
      <stop offset="100%" stop-color="#7638fa"/>
    </radialGradient>
  </defs>
  <rect width="24" height="24" rx="5.5" fill="url(#ig-brand)"/>
  <rect x="2.5" y="2.5" width="19" height="19" rx="5" fill="none" stroke="white" stroke-width="1.5"/>
  <circle cx="12" cy="12" r="4.5" fill="none" stroke="white" stroke-width="1.5"/>
  <circle cx="17.3" cy="6.7" r="1.2" fill="white"/>
</svg>`,
        };

        const LOGO_SIZES = { sm: 28, md: 40, lg: 56 };

        const ANIMS = {
            fade:       { out: 'fadeOut 0.55s ease forwards',     in: 'fadeIn 0.55s ease forwards'     },
            slide:      { out: 'slideOut 0.55s ease forwards',    in: 'slideIn 0.55s ease forwards'    },
            slideup:    { out: 'slideUpOut 0.55s ease forwards',  in: 'slideUpIn 0.55s ease forwards'  },
            fadedownup: { out: 'fadeOutUp 0.55s ease forwards',   in: 'fadeInDown 0.55s ease forwards' },
            zoom:       { out: 'zoomOut 0.55s ease forwards',     in: 'zoomIn 0.55s ease forwards'     },
            flip:       { out: 'flipOut 0.55s ease forwards',     in: 'flipIn 0.55s ease forwards'     },
            spin3d:     { out: 'spin3dOut 0.55s ease forwards',   in: 'spin3dIn 0.55s ease forwards'   },
        };

        /* ── Parse config ── */
        let cfg;
        try {
            const raw = new URLSearchParams(window.location.search).get('c');
            cfg = JSON.parse(decodeURIComponent(escape(atob(raw))));
        } catch (_) {
            cfg = {
                platforms: [{ id: 'twitch', username: 'YourName' }, { id: 'youtube', username: '@YourChannel' }],
                effect: 'fade', font: 'Poppins', size: 28, color: '#ffffff',
                shadowType: 'glow', shadowOpts: null,
                logoSize: 'md', duration: 5,
                popupMode: false, popupInterval: 10,
                useLogo: false,
            };
        }

        const {
            platforms, effect, font, size, color,
            shadowType = 'glow', shadowOpts = null,
            logoSize, duration,
            popupMode = false, popupInterval = 10,
            useLogo = false,
            textStyle = 'normal', text3dDepth = 4,
        } = cfg;

        /* ── Compute text shadow ── */
        function computeBaseShadow(type, opts, platformColor) {
            if (type === 'none') return 'none';
            if (type === 'glow') return `0 0 18px ${platformColor}90, 0 0 35px ${platformColor}40`;
            if (!opts) return 'none';
            const { angle = 135, distance = 4, blur = 8, color: sColor = '#000000', opacity = 80 } = opts;
            const rad  = (angle * Math.PI) / 180;
            const hOff = Math.round(distance * Math.cos(rad));
            const vOff = Math.round(distance * Math.sin(rad));
            const r = parseInt(sColor.slice(1, 3), 16);
            const g = parseInt(sColor.slice(3, 5), 16);
            const b = parseInt(sColor.slice(5, 7), 16);
            return `${hOff}px ${vOff}px ${blur}px rgba(${r},${g},${b},${(opacity / 100).toFixed(2)})`;
        }

        function computeTextShadow(type, opts, platformColor) {
            const base = computeBaseShadow(type, opts, platformColor);
            if (textStyle === '3d') {
                const depth = text3dDepth || 4;
                const layers = Array.from({ length: depth }, (_, i) =>
                    `${i+1}px ${i+1}px 0 rgba(0,0,0,${(0.4 - i * 0.05).toFixed(2)})`
                ).join(', ');
                const softDrop = `${depth+1}px ${depth+1}px ${depth*2}px rgba(0,0,0,0.25)`;
                return base !== 'none' ? `${layers}, ${softDrop}, ${base}` : `${layers}, ${softDrop}`;
            }
            return base;
        }

        /* ── Load font ── */
        const fontLink = document.createElement('link');
        fontLink.rel  = 'stylesheet';
        fontLink.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(font)}:wght@600;700&display=swap`;
        document.head.appendChild(fontLink);

        /* ── Apply base styles ── */
        const rotatorEl  = document.getElementById('rotator');
        const logoEl     = document.getElementById('platform-logo');
        const usernameEl = document.getElementById('platform-username');
        const logoPx     = LOGO_SIZES[logoSize] || 40;
        const anim       = ANIMS[effect] || ANIMS.fade;

        /* ── Viewport scaling ── */
        const BASE_WIDTH   = 500;
        const vpScale      = window.innerWidth >= 50 ? window.innerWidth / BASE_WIDTH : 1;
        const scaledLogoPx = Math.round(logoPx * vpScale);
        const scaledFontPx = Math.round(size   * vpScale);

        rotatorEl.style.gap = Math.round(14 * vpScale) + 'px';

        usernameEl.style.fontFamily = `'${font}', Outfit, sans-serif`;
        usernameEl.style.fontSize   = `${scaledFontPx}px`;
        usernameEl.style.color      = color;

        /* ── Render a platform into the DOM ── */
        function render(idx) {
            const p    = platforms[idx];
            const pClr = COLORS[p.id] || '#ffffff';

            /* Logo — prefer BRAND_SVGS, then simpleicons CDN, then flat SVG */
            if (useLogo && BRAND_SVGS[p.id]) {
                logoEl.innerHTML = BRAND_SVGS[p.id];
                const svg = logoEl.querySelector('svg');
                if (svg) {
                    svg.style.width  = `${scaledLogoPx}px`;
                    svg.style.height = `${scaledLogoPx}px`;
                }
            } else if (useLogo) {
                const slug = SIMPLEICONS[p.id] || p.id;
                logoEl.innerHTML = `<img src="https://cdn.simpleicons.org/${slug}"
                    width="${scaledLogoPx}" height="${scaledLogoPx}" alt="${p.id}"
                    style="display:block;object-fit:contain;">`;
            } else {
                logoEl.innerHTML = SVGS[p.id] || '';
                const svg = logoEl.querySelector('svg');
                if (svg) {
                    svg.style.width  = `${scaledLogoPx}px`;
                    svg.style.height = `${scaledLogoPx}px`;
                    svg.style.color  = pClr;
                    svg.style.filter = `drop-shadow(0 0 6px ${pClr}70)`;
                }
            }

            usernameEl.textContent = p.username;
            usernameEl.style.textShadow = computeTextShadow(shadowType, shadowOpts, pClr);
        }

        /* ── Simple async sleep ── */
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        /* ── Rotation logic ── */
        let current = 0;

        if (popupMode) {
            /* ── Popup mode: cycle once, hide, wait, repeat ── */
            rotatorEl.style.transition = 'opacity 0.8s ease';
            rotatorEl.style.opacity    = '0';

            async function runPopupCycle() {
                /* Render first platform & fade in */
                current = 0;
                render(0);
                await sleep(50); /* allow paint */
                rotatorEl.style.opacity = '1';
                await sleep(duration * 1000 + 800);

                /* Cycle through remaining platforms */
                for (let i = 1; i < platforms.length; i++) {
                    rotatorEl.style.animation = anim.out;
                    await sleep(580);
                    current = i;
                    render(current);
                    rotatorEl.style.animation = anim.in;
                    await sleep(600);
                    rotatorEl.style.animation = '';
                    await sleep(duration * 1000);
                }

                /* Fade out, then wait for next popup */
                rotatorEl.style.opacity = '0';
                await sleep(800 + popupInterval * 60 * 1000);

                /* Repeat */
                runPopupCycle();
            }

            /* Wait one full interval before first appearance */
            sleep(popupInterval * 60 * 1000).then(runPopupCycle);

        } else {
            /* ── Normal always-visible mode ── */
            render(0);

            if (platforms.length > 1) {
                let busy = false;

                setInterval(() => {
                    if (busy) return;
                    busy = true;

                    rotatorEl.style.animation = anim.out;

                    setTimeout(() => {
                        current = (current + 1) % platforms.length;
                        render(current);
                        rotatorEl.style.animation = anim.in;

                        setTimeout(() => {
                            rotatorEl.style.animation = '';
                            busy = false;
                        }, 600);
                    }, 580);

                }, duration * 1000 + 700);
            }
        }
    </script>
</body>
</html>
