<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:type"        content="website">
    <meta property="og:site_name"   content="TrueBeast">
    <meta property="og:title"       content="Social Media Rotator — Free OBS Overlay Builder">
    <meta property="og:description" content="Build a free, transparent OBS overlay that cycles through your social media profiles. No sign-up required.">
    <meta property="og:url"         content="https://truebeast.io/tools/socials-rotator/">
    <title>Social Media Rotator Builder | TrueBeast Tools</title>
    <link rel="icon" href="../../favicon.ico">
    <script src="../../js/theme.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="../../js/config.js?v=6"></script>
    <link rel="stylesheet" href="../../css/shared.css">
    <link rel="stylesheet" href="../../css/glass.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@600;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    <style>
        .platform-card { transition: all 0.15s; cursor: pointer; user-select: none; }
        .platform-card:hover { transform: translateY(-2px); }
        .platform-card.selected { transform: translateY(-2px); }

        .pill-btn { transition: all 0.15s; cursor: pointer; }
        .pill-btn.active { background: rgba(147,51,234,0.2) !important; color: #c084fc !important; border-color: rgba(147,51,234,0.5) !important; }

        .preview-checker {
            background-image:
                linear-gradient(45deg, #2a2a2a 25%, transparent 25%),
                linear-gradient(-45deg, #2a2a2a 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #2a2a2a 75%),
                linear-gradient(-45deg, transparent 75%, #2a2a2a 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
            background-color: #1a1a1a;
        }

        .url-box { font-family: 'Courier New', monospace; font-size: 11px; word-break: break-all; }

        input[type="range"] { accent-color: #a855f7; }
        input[type="color"] { cursor: pointer; background: none; border: none; padding: 0; }

        .section-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 24px; }

        .username-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 8px 12px;
            color: inherit;
            font-size: 14px;
            width: 100%;
            outline: none;
            transition: border-color 0.15s;
        }
        .username-input:focus { border-color: rgba(147,51,234,0.5); }
        .username-input::placeholder { color: rgba(255,255,255,0.25); }

        .generate-btn {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: white;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            padding: 14px 32px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            width: 100%;
        }
        .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(168,85,247,0.35); }
        .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .copy-btn {
            background: rgba(147,51,234,0.15);
            border: 1px solid rgba(147,51,234,0.4);
            color: #c084fc;
            border-radius: 8px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .copy-btn:hover { background: rgba(147,51,234,0.25); }
        .copy-btn.success { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.4); color: #4ade80; }

        .remove-btn {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            color: #f87171;
            border-radius: 6px;
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.15s;
            flex-shrink: 0;
        }
        .remove-btn:hover { background: rgba(239,68,68,0.2); }

        .step-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #a855f7;
            margin-bottom: 6px;
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        /* ── Platform definitions ── */
        const PLATFORMS = [
            { id: 'twitch',    name: 'Twitch',      color: '#9147ff' },
            { id: 'youtube',   name: 'YouTube',     color: '#FF0000' },
            { id: 'kick',      name: 'Kick',        color: '#53fc18' },
            { id: 'tiktok',    name: 'TikTok',      color: '#fe2c55' },
            { id: 'instagram', name: 'Instagram',   color: '#E1306C' },
            { id: 'twitter',   name: 'X (Twitter)', color: '#e7e9ea' },
            { id: 'discord',   name: 'Discord',     color: '#5865F2' },
            { id: 'facebook',  name: 'Facebook',    color: '#1877F2' },
            { id: 'bluesky',   name: 'Bluesky',     color: '#0085ff' },
        ];

        const PLATFORM_MAP = Object.fromEntries(PLATFORMS.map(p => [p.id, p]));

        const SVGS = {
            twitch:    `<svg viewBox="0 0 24 24" fill="currentColor" style="display:block"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg>`,
            youtube:   `<svg viewBox="0 0 24 24" fill="currentColor" style="display:block"><path d="M23.495 6.205a3.007 3.007 0 0 0-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 0 0 .527 6.205a31.247 31.247 0 0 0-.522 5.805 31.247 31.247 0 0 0 .522 5.783 3.007 3.007 0 0 0 2.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3.007 3.007 0 0 0 2.088-2.088 31.247 31.247 0 0 0 .5-5.783 31.247 31.247 0 0 0-.5-5.805zM9.609 15.601V8.408l6.264 3.602z"/></svg>`,
            kick:      `<svg viewBox="0 0 24 24" fill="currentColor" style="display:block"><path d="M4 2h3.5v7.5L14.5 2H19l-7.5 8.5L19.5 22H15l-7.5-9V22H4V2z"/></svg>`,
            tiktok:    `<svg viewBox="0 0 24 24" fill="currentColor" style="display:block"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/></svg>`,
            instagram: `<svg viewBox="0 0 24 24" fill="currentColor" style="display:block"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>`,
            twitter:   `<svg viewBox="0 0 24 24" fill="currentColor" style="display:block"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.748l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>`,
            discord:   `<svg viewBox="0 0 24 24" fill="currentColor" style="display:block"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>`,
            facebook:  `<svg viewBox="0 0 24 24" fill="currentColor" style="display:block"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>`,
            bluesky:   `<svg viewBox="0 0 24 24" fill="currentColor" style="display:block"><path d="M12 10.8c-1.087-2.114-4.046-6.053-6.798-7.995C2.566.944 1.561 1.266.902 1.565.139 1.908 0 3.08 0 3.768c0 .69.378 5.65.624 6.479.815 2.736 3.713 3.66 6.383 3.364.136-.02.275-.039.415-.056-.138.022-.276.04-.415.056-3.912.58-7.387 2.005-2.83 7.078 5.013 5.19 6.87-1.113 7.823-4.308.953 3.195 2.05 9.271 7.733 4.308 4.267-4.308 1.172-6.498-2.74-7.078a8.741 8.741 0 0 1-.415-.056c.14.017.279.036.415.056 2.67.297 5.568-.628 6.383-3.364.246-.828.624-5.79.624-6.478 0-.69-.139-1.861-.902-2.206-.659-.299-1.664-.62-4.3 1.24C16.046 4.748 13.087 8.687 12 10.8z"/></svg>`,
        };

        const LOGO_SIZES = { sm: 28, md: 40, lg: 56 };
        const SHADOW_MAP = {
            none: 'none',
            soft: '0 2px 10px rgba(0,0,0,0.7)',
            hard: '2px 2px 0 rgba(0,0,0,1), 3px 3px 0 rgba(0,0,0,0.5)',
            glow: null,
        };

        /* ── ThemeToggle ── */
        const ThemeToggle = () => {
            const [light, setLight] = React.useState(() => document.documentElement.classList.contains('light'));
            React.useEffect(() => {
                const h = (e) => setLight(e.detail.light);
                window.addEventListener('tb-theme-change', h);
                return () => window.removeEventListener('tb-theme-change', h);
            }, []);
            return (
                <button onClick={() => window.TBTheme && window.TBTheme.toggle()}
                    className="liquid-glass p-2 rounded-xl transition-all flex-shrink-0"
                    title={light ? 'Switch to dark mode' : 'Switch to light mode'}>
                    {light
                        ? <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                        : <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
                    }
                </button>
            );
        };

        /* ── Navigation ── */
        const Navigation = () => {
            const [scrolled, setScrolled] = useState(false);
            const [mobileOpen, setMobileOpen] = useState(false);
            const discordUrl = (typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.social?.discord) || 'https://discord.gg/Nk8vekY';
            useEffect(() => {
                const h = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', h, { passive: true });
                return () => window.removeEventListener('scroll', h);
            }, []);
            const btn = "border border-white/10 bg-white/5 hover:bg-white/10 hover:border-white/20 px-3.5 py-2 rounded-xl text-sm font-medium text-gray-200 hover:text-white transition-all";
            return (
                <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-500 ${scrolled ? 'py-3' : 'py-6'}`}>
                    <div className="max-w-7xl mx-auto px-6">
                        <div className={`liquid-glass rounded-2xl px-6 py-4 transition-all duration-500 ${scrolled ? 'shadow-2xl' : ''}`}>
                            <div className="flex items-center justify-between">
                                <a href="../../" className="flex items-center gap-3 group flex-shrink-0">
                                    <img src="../../assets/logos/logo.png" alt="TrueBeast" className="w-10 h-10 object-contain rounded-full pulse-glow flex-shrink-0" />
                                    <span className="font-display font-bold text-xl tracking-tight group-hover:text-green-400 transition-colors">TrueBeast</span>
                                </a>
                                <div className="hidden md:flex items-center gap-2">
                                    <a href="../../" className={btn}>Home</a>
                                    <a href="../../giveaways/" className={btn}>Giveaways</a>
                                    <a href="../../tools/" className={`${btn} text-white bg-white/10`}>Toolkit</a>
                                    <a href="../../tech-support/" className={btn}>Tech Support</a>
                                </div>
                                <div className="flex items-center gap-2">
                                    <ThemeToggle />
                                    <button onClick={() => setMobileOpen(!mobileOpen)} className="md:hidden liquid-glass p-2 rounded-xl">
                                        {mobileOpen
                                            ? <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                            : <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                                        }
                                    </button>
                                </div>
                            </div>
                            {mobileOpen && (
                                <div className="md:hidden mt-4 pt-4 border-t border-white/10">
                                    <div className="flex flex-col gap-1">
                                        <a href="../../" onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-colors font-medium">Home</a>
                                        <a href="../../giveaways/" onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-colors font-medium">Giveaways</a>
                                        <a href="../../tools/" onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-white bg-white/5 transition-colors font-medium">Toolkit</a>
                                        <a href="../../tech-support/" onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-colors font-medium">Tech Support</a>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </nav>
            );
        };

        /* ── Live Preview ── */
        const Preview = ({ platforms, effect, font, size, color, shadow, logoSize }) => {
            const validPlatforms = platforms.filter(p => p.username.trim());
            const [displayIdx, setDisplayIdx] = useState(0);
            const [phase, setPhase] = useState('visible');
            const idxRef = useRef(0);
            const timerRef = useRef(null);

            useEffect(() => {
                idxRef.current = 0;
                setDisplayIdx(0);
                setPhase('visible');
            }, [validPlatforms.length]);

            useEffect(() => {
                if (timerRef.current) clearInterval(timerRef.current);
                if (validPlatforms.length <= 1) return;
                const ANIM = 500;
                const SHOW = 2200;
                timerRef.current = setInterval(() => {
                    setPhase('out');
                    setTimeout(() => {
                        idxRef.current = (idxRef.current + 1) % validPlatforms.length;
                        setDisplayIdx(idxRef.current);
                        setPhase('inStart');
                        requestAnimationFrame(() => requestAnimationFrame(() => setPhase('visible')));
                    }, ANIM + 30);
                }, SHOW);
                return () => clearInterval(timerRef.current);
            }, [validPlatforms.length, effect]);

            if (validPlatforms.length === 0) {
                return (
                    <div className="preview-checker rounded-xl flex items-center justify-center" style={{ minHeight: 90 }}>
                        <p className="text-gray-500 text-sm">Select platforms &amp; enter usernames to preview</p>
                    </div>
                );
            }

            const current = validPlatforms[displayIdx] || validPlatforms[0];
            const pInfo   = PLATFORM_MAP[current.id] || {};
            const pColor  = pInfo.color || '#ffffff';
            const logoPx  = LOGO_SIZES[logoSize] || 40;

            const EFFECT_TRANSFORMS = {
                fade:    { out: { opacity: 0 },                              inStart: { opacity: 0 },                              visible: { opacity: 1 } },
                slide:   { out: { transform: 'translateX(-30px)', opacity: 0 }, inStart: { transform: 'translateX(30px)', opacity: 0 },  visible: { transform: 'translateX(0)', opacity: 1 } },
                slideup: { out: { transform: 'translateY(-20px)', opacity: 0 }, inStart: { transform: 'translateY(20px)', opacity: 0 },  visible: { transform: 'translateY(0)', opacity: 1 } },
                zoom:    { out: { transform: 'scale(0.65)', opacity: 0 },    inStart: { transform: 'scale(1.35)', opacity: 0 },        visible: { transform: 'scale(1)', opacity: 1 } },
                flip:    { out: { transform: 'rotateY(90deg)', opacity: 0 }, inStart: { transform: 'rotateY(-90deg)', opacity: 0 },    visible: { transform: 'rotateY(0deg)', opacity: 1 } },
            };

            const states = EFFECT_TRANSFORMS[effect] || EFFECT_TRANSFORMS.fade;
            const phaseStyle = phase === 'visible' ? states.visible : phase === 'out' ? states.out : states.inStart;
            const transition = phase === 'inStart' ? 'none' : 'all 0.5s ease';

            const textShadow = shadow === 'glow'
                ? `0 0 18px ${pColor}90, 0 0 35px ${pColor}40`
                : (SHADOW_MAP[shadow] || SHADOW_MAP.soft);

            return (
                <div className="preview-checker rounded-xl flex items-center px-5" style={{ minHeight: 90, perspective: '800px' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 12, transition, ...phaseStyle }}>
                        <div dangerouslySetInnerHTML={{ __html: SVGS[current.id] || '' }}
                            style={{ width: logoPx, height: logoPx, color: pColor, filter: `drop-shadow(0 0 6px ${pColor}60)`, flexShrink: 0 }} />
                        <span style={{
                            fontFamily: `'${font}', Outfit, sans-serif`,
                            fontSize: Math.min(size, 42) + 'px',
                            fontWeight: 700,
                            color: color,
                            textShadow,
                            whiteSpace: 'nowrap',
                        }}>
                            {current.username}
                        </span>
                    </div>
                </div>
            );
        };

        /* ── App ── */
        const App = () => {
            const [selected, setSelected]     = useState([]); // [{id, username}]
            const [effect, setEffect]         = useState('fade');
            const [font, setFont]             = useState('Outfit');
            const [size, setSize]             = useState(28);
            const [color, setColor]           = useState('#ffffff');
            const [shadow, setShadow]         = useState('glow');
            const [logoSize, setLogoSize]     = useState('md');
            const [duration, setDuration]     = useState(5);
            const [generatedUrl, setGenUrl]   = useState('');
            const [copied, setCopied]         = useState(false);

            const isSelected = (id) => selected.some(p => p.id === id);

            const togglePlatform = (id) => {
                if (isSelected(id)) {
                    setSelected(prev => prev.filter(p => p.id !== id));
                } else {
                    setSelected(prev => [...prev, { id, username: '' }]);
                }
                setGenUrl('');
            };

            const updateUsername = (id, username) => {
                setSelected(prev => prev.map(p => p.id === id ? { ...p, username } : p));
                setGenUrl('');
            };

            const removePlatform = (id) => {
                setSelected(prev => prev.filter(p => p.id !== id));
                setGenUrl('');
            };

            const generateUrl = () => {
                const validPlatforms = selected.filter(p => p.username.trim());
                if (validPlatforms.length === 0) {
                    alert('Please select at least one platform and enter your username.');
                    return;
                }
                const cfg = { platforms: validPlatforms, effect, font, size, color, shadow, logoSize, duration };
                const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(cfg))));
                const base = window.location.href.replace(/\/[^/]*$/, '');
                setGenUrl(`${base}/rotator.html?c=${encoded}`);
            };

            const copyUrl = () => {
                navigator.clipboard.writeText(generatedUrl).then(() => {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2500);
                });
            };

            const validCount = selected.filter(p => p.username.trim()).length;

            const EFFECTS = [
                { id: 'fade',    label: 'Fade'      },
                { id: 'slide',   label: 'Slide'     },
                { id: 'slideup', label: 'Slide Up'  },
                { id: 'zoom',    label: 'Zoom'      },
                { id: 'flip',    label: 'Flip'      },
            ];

            const FONTS = ['Outfit', 'Space Grotesk', 'Orbitron', 'Montserrat', 'Roboto', 'Inter'];

            const SHADOWS = [
                { id: 'none', label: 'None'  },
                { id: 'soft', label: 'Soft'  },
                { id: 'hard', label: 'Hard'  },
                { id: 'glow', label: 'Glow'  },
            ];

            const LOGO_SIZE_OPTS = [
                { id: 'sm', label: 'Small'  },
                { id: 'md', label: 'Medium' },
                { id: 'lg', label: 'Large'  },
            ];

            return (
                <div className="relative min-h-screen">
                    <Navigation />

                    <main className="pt-32 pb-20 px-6">
                        <div className="max-w-5xl mx-auto">

                            {/* Hero */}
                            <div className="text-center mb-12 animate-fade-in">
                                <div className="inline-flex items-center gap-2 liquid-glass border border-purple-500/30 px-4 py-2 rounded-full mb-6 text-sm font-medium text-purple-400 mb-5">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                                    Free OBS Overlay Tool by Kiernen Irons
                                </div>
                                <h1 className="font-display font-bold text-5xl md:text-6xl mb-4">
                                    Social Media <span style={{ background: 'linear-gradient(135deg,#7c3aed,#a855f7,#c084fc)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>Rotator</span>
                                </h1>
                                <p className="text-gray-400 text-lg max-w-xl mx-auto">
                                    Build a transparent OBS browser source that cycles through your socials. Pick platforms, customize the look, paste the URL into OBS &mdash; done.
                                </p>
                            </div>

                            <div className="flex flex-col gap-6">

                                {/* Step 1 – Platforms */}
                                <div className="section-card">
                                    <div className="step-label">Step 1</div>
                                    <h2 className="font-display font-bold text-xl mb-1">Select Your Platforms</h2>
                                    <p className="text-gray-500 text-sm mb-5">Click a platform to add it. You can add as many as you like.</p>
                                    <div className="grid grid-cols-3 sm:grid-cols-5 gap-3">
                                        {PLATFORMS.map(p => {
                                            const sel = isSelected(p.id);
                                            return (
                                                <button key={p.id} onClick={() => togglePlatform(p.id)}
                                                    className={`platform-card liquid-glass rounded-xl p-3 flex flex-col items-center gap-2 border ${sel ? 'border-current' : 'border-white/10 hover:border-white/20'}`}
                                                    style={sel ? { borderColor: p.color + '70', background: p.color + '15' } : {}}>
                                                    <div dangerouslySetInnerHTML={{ __html: SVGS[p.id] || '' }}
                                                        style={{ width: 24, height: 24, color: sel ? p.color : '#9ca3af' }} />
                                                    <span className="text-xs font-medium" style={{ color: sel ? p.color : '#9ca3af' }}>{p.name}</span>
                                                    {sel && (
                                                        <div style={{ width: 6, height: 6, borderRadius: '50%', background: p.color }} />
                                                    )}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* Step 2 – Usernames */}
                                {selected.length > 0 && (
                                    <div className="section-card">
                                        <div className="step-label">Step 2</div>
                                        <h2 className="font-display font-bold text-xl mb-1">Enter Your Usernames</h2>
                                        <p className="text-gray-500 text-sm mb-5">They'll appear in this order in your overlay. Remove and re-add to reorder.</p>
                                        <div className="flex flex-col gap-3">
                                            {selected.map(p => {
                                                const pInfo = PLATFORM_MAP[p.id] || {};
                                                return (
                                                    <div key={p.id} className="flex items-center gap-3">
                                                        <div className="flex items-center gap-2 flex-shrink-0" style={{ width: 110 }}>
                                                            <div dangerouslySetInnerHTML={{ __html: SVGS[p.id] || '' }}
                                                                style={{ width: 18, height: 18, color: pInfo.color, flexShrink: 0 }} />
                                                            <span className="text-sm font-medium" style={{ color: pInfo.color }}>{pInfo.name}</span>
                                                        </div>
                                                        <input
                                                            className="username-input"
                                                            placeholder={`Your ${pInfo.name} username…`}
                                                            value={p.username}
                                                            onChange={e => updateUsername(p.id, e.target.value)}
                                                        />
                                                        <button className="remove-btn" onClick={() => removePlatform(p.id)} title="Remove">
                                                            <svg xmlns="http://www.w3.org/2000/svg" className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                                        </button>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}

                                {/* Step 3 – Appearance */}
                                <div className="section-card">
                                    <div className="step-label">Step 3</div>
                                    <h2 className="font-display font-bold text-xl mb-5">Customize Appearance</h2>

                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">

                                        {/* Transition */}
                                        <div>
                                            <div className="text-sm text-gray-400 font-medium mb-2">Transition Effect</div>
                                            <div className="flex flex-wrap gap-2">
                                                {EFFECTS.map(e => (
                                                    <button key={e.id} onClick={() => setEffect(e.id)}
                                                        className={`pill-btn liquid-glass border border-white/10 px-3 py-1.5 rounded-full text-sm font-medium ${effect === e.id ? 'active' : 'text-gray-400 hover:text-white'}`}>
                                                        {e.label}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        {/* Shadow */}
                                        <div>
                                            <div className="text-sm text-gray-400 font-medium mb-2">Text Shadow</div>
                                            <div className="flex flex-wrap gap-2">
                                                {SHADOWS.map(s => (
                                                    <button key={s.id} onClick={() => setShadow(s.id)}
                                                        className={`pill-btn liquid-glass border border-white/10 px-3 py-1.5 rounded-full text-sm font-medium ${shadow === s.id ? 'active' : 'text-gray-400 hover:text-white'}`}>
                                                        {s.label}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        {/* Font */}
                                        <div>
                                            <div className="text-sm text-gray-400 font-medium mb-2">Font</div>
                                            <select value={font} onChange={e => setFont(e.target.value)}
                                                className="username-input" style={{ cursor: 'pointer' }}>
                                                {FONTS.map(f => <option key={f} value={f}>{f}</option>)}
                                            </select>
                                        </div>

                                        {/* Logo size */}
                                        <div>
                                            <div className="text-sm text-gray-400 font-medium mb-2">Logo Size</div>
                                            <div className="flex flex-wrap gap-2">
                                                {LOGO_SIZE_OPTS.map(l => (
                                                    <button key={l.id} onClick={() => setLogoSize(l.id)}
                                                        className={`pill-btn liquid-glass border border-white/10 px-3 py-1.5 rounded-full text-sm font-medium ${logoSize === l.id ? 'active' : 'text-gray-400 hover:text-white'}`}>
                                                        {l.label}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        {/* Text size */}
                                        <div>
                                            <div className="text-sm text-gray-400 font-medium mb-2">Text Size <span className="text-purple-400 font-mono">{size}px</span></div>
                                            <input type="range" min="14" max="72" value={size}
                                                onChange={e => setSize(Number(e.target.value))}
                                                className="w-full" />
                                        </div>

                                        {/* Duration */}
                                        <div>
                                            <div className="text-sm text-gray-400 font-medium mb-2">Time Per Platform <span className="text-purple-400 font-mono">{duration}s</span></div>
                                            <input type="range" min="2" max="30" value={duration}
                                                onChange={e => setDuration(Number(e.target.value))}
                                                className="w-full" />
                                        </div>

                                        {/* Color */}
                                        <div>
                                            <div className="text-sm text-gray-400 font-medium mb-2">Text Color</div>
                                            <div className="flex items-center gap-3">
                                                <input type="color" value={color} onChange={e => setColor(e.target.value)}
                                                    className="w-10 h-10 rounded-lg cursor-pointer" />
                                                <span className="font-mono text-sm text-gray-400">{color.toUpperCase()}</span>
                                                <button onClick={() => setColor('#ffffff')}
                                                    className="text-xs text-gray-500 hover:text-gray-300 transition-colors">Reset</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Step 4 – Preview & Generate */}
                                <div className="section-card">
                                    <div className="step-label">Step 4</div>
                                    <h2 className="font-display font-bold text-xl mb-2">Preview &amp; Generate</h2>
                                    <p className="text-gray-500 text-sm mb-5">
                                        The checkerboard shows transparency &mdash; your overlay will be invisible in OBS except for the logo &amp; username.
                                    </p>

                                    {/* Live preview */}
                                    <div className="mb-6">
                                        <div className="text-xs text-gray-600 mb-2 font-medium uppercase tracking-wide">Live Preview</div>
                                        <Preview
                                            platforms={selected}
                                            effect={effect}
                                            font={font}
                                            size={size}
                                            color={color}
                                            shadow={shadow}
                                            logoSize={logoSize}
                                        />
                                    </div>

                                    {/* Generate */}
                                    <button className="generate-btn" onClick={generateUrl} disabled={validCount === 0}>
                                        {validCount === 0 ? 'Select platforms above to generate' : `Generate Overlay URL (${validCount} platform${validCount !== 1 ? 's' : ''})`}
                                    </button>

                                    {/* Generated URL */}
                                    {generatedUrl && (
                                        <div className="mt-5 flex flex-col gap-3">
                                            <div className="flex items-start gap-2">
                                                <div className="url-box liquid-glass rounded-xl p-4 flex-1 text-gray-300 leading-relaxed border border-purple-500/20">
                                                    {generatedUrl}
                                                </div>
                                                <button className={`copy-btn mt-0.5 ${copied ? 'success' : ''}`} onClick={copyUrl}>
                                                    {copied ? 'Copied!' : 'Copy'}
                                                </button>
                                            </div>

                                            {/* OBS Instructions */}
                                            <div className="liquid-glass rounded-xl p-5 border border-white/5 mt-2">
                                                <div className="flex items-center gap-2 mb-3">
                                                    <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 text-purple-400 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                                                    <span className="font-semibold text-sm text-gray-300">How to add in OBS</span>
                                                </div>
                                                <ol className="flex flex-col gap-2 text-sm text-gray-400 list-none">
                                                    {[
                                                        'In OBS, click the + button in your Sources panel',
                                                        'Choose "Browser" from the list',
                                                        'Give it a name like "Social Rotator" and click OK',
                                                        'Paste the URL above into the URL field',
                                                        'Set Width / Height to match your intended overlay size (e.g. 500 x 80)',
                                                        'Check "Shutdown source when not visible" for best performance',
                                                        'Click OK — done! Resize and position it on your scene.',
                                                    ].map((step, i) => (
                                                        <li key={i} className="flex items-start gap-2.5">
                                                            <span className="flex-shrink-0 w-5 h-5 rounded-full bg-purple-500/20 border border-purple-500/30 text-purple-400 text-xs flex items-center justify-center font-bold mt-0.5">{i + 1}</span>
                                                            <span>{step}</span>
                                                        </li>
                                                    ))}
                                                </ol>
                                                <div className="mt-4 p-3 rounded-lg bg-yellow-500/5 border border-yellow-500/20 text-yellow-400/80 text-xs">
                                                    Save your URL somewhere safe — it contains your full configuration. If you want to make changes, just rebuild here and generate a new one.
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>

                            </div>
                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="py-10 px-6 border-t border-white/5">
                        <div className="max-w-5xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <a href="../../tools/" className="flex items-center gap-2 text-gray-400 hover:text-white transition-colors text-sm">
                                <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                                Back to Toolkit
                            </a>
                            <p className="text-gray-600 text-sm">Built by Kiernen Irons &mdash; Free to use, no sign-up needed.</p>
                            <a href="../../" className="text-gray-500 hover:text-white transition-colors text-sm">TrueBeast.io</a>
                        </div>
                    </footer>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
