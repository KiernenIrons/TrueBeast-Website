    <style>
        .platform-card { transition: all 0.15s; cursor: pointer; user-select: none; }
        .platform-card:hover { transform: translateY(-2px); }
        .platform-card.selected { transform: translateY(-2px); }

        .pill-btn { transition: all 0.15s; cursor: pointer; }
        .pill-btn.active { background: rgba(147,51,234,0.2) !important; color: #c084fc !important; border-color: rgba(147,51,234,0.5) !important; }

        .preview-checker {
            background-image:
                linear-gradient(45deg, #2a2a2a 25%, transparent 25%),
                linear-gradient(-45deg, #2a2a2a 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #2a2a2a 75%),
                linear-gradient(-45deg, transparent 75%, #2a2a2a 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
            background-color: #1a1a1a;
        }

        .url-box { font-family: 'Courier New', monospace; font-size: 11px; word-break: break-all; }

        input[type="range"] { accent-color: #a855f7; }
        input[type="color"] { cursor: pointer; background: none; border: none; padding: 0; }

        .section-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 24px; }

        .username-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 8px 12px;
            color: inherit;
            font-size: 14px;
            width: 100%;
            outline: none;
            transition: border-color 0.15s;
        }
        .username-input:focus { border-color: rgba(147,51,234,0.5); }
        .username-input::placeholder { color: rgba(255,255,255,0.25); }

        /* Font select — explicit dark bg so options are always readable */
        select.username-input {
            background: rgba(12,12,24,0.97);
            color: rgba(255,255,255,0.9);
        }
        select.username-input option {
            background: #0c0c18;
            color: rgba(255,255,255,0.9);
        }

        /* ── Light mode overrides ── */
        html.light .section-card {
            background: rgba(0,0,0,0.03);
            border-color: rgba(0,0,0,0.08);
        }
        html.light .username-input {
            background: rgba(0,0,0,0.05);
            border-color: rgba(0,0,0,0.1);
        }
        html.light .username-input::placeholder { color: rgba(0,0,0,0.3); }
        html.light select.username-input {
            background: rgba(240,240,255,0.97);
            color: #111;
        }
        html.light select.username-input option {
            background: #f0f0ff;
            color: #111;
        }
        html.light .url-box { color: #222; }
        html.light .remove-btn {
            background: rgba(239,68,68,0.06);
            border-color: rgba(239,68,68,0.12);
        }
        html.light .shadow-row label { color: #555; }
        html.light .suggest-textarea {
            background: rgba(0,0,0,0.05);
            border-color: rgba(0,0,0,0.1);
        }
        html.light .suggest-textarea::placeholder { color: rgba(0,0,0,0.3); }
        html.light .toggle-track {
            background: rgba(0,0,0,0.1);
            border-color: rgba(0,0,0,0.15);
        }

        .generate-btn {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: white;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            padding: 14px 32px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            width: 100%;
        }
        .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(168,85,247,0.35); }
        .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .copy-btn {
            background: rgba(147,51,234,0.15);
            border: 1px solid rgba(147,51,234,0.4);
            color: #c084fc;
            border-radius: 8px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .copy-btn:hover { background: rgba(147,51,234,0.25); }
        .copy-btn.success { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.4); color: #4ade80; }

        .remove-btn {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            color: #f87171;
            border-radius: 6px;
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.15s;
            flex-shrink: 0;
        }
        .remove-btn:hover { background: rgba(239,68,68,0.2); }

        .step-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #a855f7;
            margin-bottom: 6px;
        }

        /* Shadow builder rows */
        .shadow-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .shadow-row label { font-size: 12px; color: #9ca3af; min-width: 72px; flex-shrink: 0; }
        .shadow-row span.val { font-size: 12px; color: #a855f7; font-family: monospace; min-width: 42px; text-align: right; flex-shrink: 0; }

        /* Toggle switch */
        .toggle-track {
            width: 44px; height: 24px; border-radius: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            position: relative; cursor: pointer; transition: background 0.2s, border-color 0.2s;
            flex-shrink: 0;
        }
        .toggle-track.on { background: rgba(147,51,234,0.4); border-color: rgba(147,51,234,0.6); }
        .toggle-thumb {
            width: 18px; height: 18px; border-radius: 50%;
            background: rgba(255,255,255,0.5);
            position: absolute; top: 2px; left: 2px;
            transition: left 0.2s, background 0.2s;
        }
        .toggle-track.on .toggle-thumb { left: 22px; background: #c084fc; }

        /* Suggestion box */
        .suggest-textarea {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 12px;
            color: inherit;
            font-size: 14px;
            resize: vertical;
            min-height: 100px;
            outline: none;
            font-family: inherit;
            transition: border-color 0.15s;
        }
        .suggest-textarea:focus { border-color: rgba(147,51,234,0.5); }
        .suggest-textarea::placeholder { color: rgba(255,255,255,0.25); }

        .suggest-btn {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: white;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            padding: 10px 24px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .suggest-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(168,85,247,0.3); }
        .suggest-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    </style>
</head>

        const SIMPLEICONS = {
            twitch: 'twitch', youtube: 'youtube', kick: 'kick',
            tiktok: 'tiktok', instagram: 'instagram', twitter: 'x',
            discord: 'discord', facebook: 'facebook', bluesky: 'bluesky',
            snapchat: 'snapchat',
        };

        /* Branded SVGs with real colors/gradients — used in logo mode when available */
        const BRAND_SVGS = {
            instagram: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:block">
  <defs>
    <radialGradient id="ig-brand" cx="25%" cy="110%" r="140%">
      <stop offset="0%"   stop-color="#ffd600"/>
      <stop offset="20%"  stop-color="#ff7a00"/>
      <stop offset="40%"  stop-color="#ff0069"/>
      <stop offset="65%"  stop-color="#d300c5"/>
      <stop offset="100%" stop-color="#7638fa"/>
    </radialGradient>
  </defs>
  <rect width="24" height="24" rx="5.5" fill="url(#ig-brand)"/>
  <rect x="2.5" y="2.5" width="19" height="19" rx="5" fill="none" stroke="white" stroke-width="1.5"/>
  <circle cx="12" cy="12" r="4.5" fill="none" stroke="white" stroke-width="1.5"/>
  <circle cx="17.3" cy="6.7" r="1.2" fill="white"/>
</svg>`,
        };

        /* Compute custom drop shadow CSS value */
        function computeCustomShadow({ angle = 135, distance = 4, blur = 8, color = '#000000', opacity = 80 }) {
            const rad = (angle * Math.PI) / 180;
            const hOff = Math.round(distance * Math.cos(rad));
            const vOff = Math.round(distance * Math.sin(rad));
            const r = parseInt(color.slice(1, 3), 16);
            const g = parseInt(color.slice(3, 5), 16);
            const b = parseInt(color.slice(5, 7), 16);
            return `${hOff}px ${vOff}px ${blur}px rgba(${r},${g},${b},${(opacity / 100).toFixed(2)})`;
        }

        /* ── ThemeToggle ── */
        const ThemeToggle = () => {
            const [light, setLight] = React.useState(() => document.documentElement.classList.contains('light'));
            React.useEffect(() => {
                const h = (e) => setLight(e.detail.light);
                window.addEventListener('tb-theme-change', h);
                return () => window.removeEventListener('tb-theme-change', h);
            }, []);
            return (
                <button onClick={() => window.TBTheme && window.TBTheme.toggle()}
                    className="liquid-glass p-2 rounded-xl transition-all flex-shrink-0"
                    title={light ? 'Switch to dark mode' : 'Switch to light mode'}>
                    {light
                        ? <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>

        /* ── Navigation ── */
        const Navigation = () => {

                            <div className="flex items-center justify-between">

                                    <span className="font-display font-bold text-xl tracking-tight group-hover:text-green-400 transition-colors">TrueBeast</span>

                                <div className="hidden md:flex items-center gap-2">

                                        <a href="../../tech-support/" onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-colors font-medium">Tech Support</a>
                                    </div>
                                </div>

                        </div>
                    </div>
                </nav>
            );
        };

        /* ── Live Preview ── */
        const Preview = ({ platforms, effect, font, size, color, shadowType, shadowOpts, logoSize, useLogo }) => {
            const validPlatforms = platforms.filter(p => p.username.trim());
            const [displayIdx, setDisplayIdx] = useState(0);
            const [phase, setPhase] = useState('visible');
            const idxRef = useRef(0);
            const timerRef = useRef(null);

            useEffect(() => {
                idxRef.current = 0;
                setDisplayIdx(0);
                setPhase('visible');
            }, [validPlatforms.length]);

            useEffect(() => {
                if (timerRef.current) clearInterval(timerRef.current);
                if (validPlatforms.length <= 1) return;
                const ANIM = 500;
                const SHOW = 2200;
                timerRef.current = setInterval(() => {
                    setPhase('out');
                    setTimeout(() => {
                        idxRef.current = (idxRef.current + 1) % validPlatforms.length;
                        setDisplayIdx(idxRef.current);
                        setPhase('inStart');
                        requestAnimationFrame(() => requestAnimationFrame(() => setPhase('visible')));
                    }, ANIM + 30);
                }, SHOW);
                return () => clearInterval(timerRef.current);
            }, [validPlatforms.length, effect]);

            if (validPlatforms.length === 0) {
                return (
                    <div className="preview-checker rounded-xl flex items-center justify-center" style={{ minHeight: 90 }}>
                        <p className="text-gray-500 text-sm">Select platforms &amp; enter usernames to preview</p>
                    </div>
                );
            }

            const current = validPlatforms[displayIdx] || validPlatforms[0];
            const pInfo   = PLATFORM_MAP[current.id] || {};
            const pColor  = pInfo.color || '#ffffff';
            const logoPx  = LOGO_SIZES[logoSize] || 40;

            const EFFECT_TRANSFORMS = {
                fade:       { out: { opacity: 0 },                                  inStart: { opacity: 0 },                                  visible: { opacity: 1 } },
                slide:      { out: { transform: 'translateX(-30px)', opacity: 0 },  inStart: { transform: 'translateX(30px)', opacity: 0 },    visible: { transform: 'translateX(0)', opacity: 1 } },
                slideup:    { out: { transform: 'translateY(-20px)', opacity: 0 },  inStart: { transform: 'translateY(20px)', opacity: 0 },    visible: { transform: 'translateY(0)', opacity: 1 } },
                fadedownup: { out: { transform: 'translateY(-20px)', opacity: 0 },  inStart: { transform: 'translateY(-20px)', opacity: 0 },   visible: { transform: 'translateY(0)', opacity: 1 } },
                zoom:       { out: { transform: 'scale(0.65)', opacity: 0 },        inStart: { transform: 'scale(1.35)', opacity: 0 },         visible: { transform: 'scale(1)', opacity: 1 } },
                flip:       { out: { transform: 'rotateY(90deg)', opacity: 0 },     inStart: { transform: 'rotateY(-90deg)', opacity: 0 },     visible: { transform: 'rotateY(0deg)', opacity: 1 } },
            };

            const states = EFFECT_TRANSFORMS[effect] || EFFECT_TRANSFORMS.fade;
            const phaseStyle = phase === 'visible' ? states.visible : phase === 'out' ? states.out : states.inStart;
            const transition = phase === 'inStart' ? 'none' : 'all 0.5s ease';

            const textShadow = shadowType === 'none'   ? 'none'
                : shadowType === 'glow' ? `0 0 18px ${pColor}90, 0 0 35px ${pColor}40`
                : computeCustomShadow(shadowOpts);

            /* Logo element — prefer BRAND_SVGS, then simpleicons CDN, then flat SVG */
            const logoEl = useLogo
                ? BRAND_SVGS[current.id]
                    ? <div dangerouslySetInnerHTML={{ __html: BRAND_SVGS[current.id] }}
                        style={{ width: logoPx, height: logoPx, flexShrink: 0 }} />
                    : <img src={`https://cdn.simpleicons.org/${SIMPLEICONS[current.id] || current.id}`}
                        width={logoPx} height={logoPx} alt={current.id}
                        style={{ display: 'block', flexShrink: 0, objectFit: 'contain' }} />
                : <div dangerouslySetInnerHTML={{ __html: SVGS[current.id] || '' }}
                    style={{ width: logoPx, height: logoPx, color: pColor, filter: `drop-shadow(0 0 6px ${pColor}60)`, flexShrink: 0 }} />;

            return (
                <div className="preview-checker rounded-xl flex items-center px-5" style={{ minHeight: 90, perspective: '800px' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 12, transition, ...phaseStyle }}>
                        {logoEl}
                        <span style={{
                            fontFamily: `'${font}', Outfit, sans-serif`,
                            fontSize: Math.min(size, 42) + 'px',
                            fontWeight: 700,
                            color: color,
                            textShadow,
                            whiteSpace: 'nowrap',
                        }}>
                            {current.username}
                        </span>
                    </div>
                </div>
            );
        };

        /* ── Suggestion Box ── */
        const SuggestionBox = () => {
            const [suggestion, setSuggestion] = useState('');
            const [name, setName] = useState('');
            const [status, setStatus] = useState('idle'); // idle | sending | success | error

            const emailjsCfg = typeof SITE_CONFIG !== 'undefined' ? SITE_CONFIG?.emailjs : null;
            const hasEmailjs = emailjsCfg?.publicKey && emailjsCfg?.serviceId &&
                (emailjsCfg?.submitReviewTemplateId || emailjsCfg?.ticketTemplateId);
            const discordUrl = typeof SITE_CONFIG !== 'undefined' ? SITE_CONFIG?.social?.discord : null;

            const submit = async () => {
                if (!suggestion.trim()) return;

                if (!hasEmailjs) {
                    /* Fallback: open mailto */
                    const body = name ? `From: ${name}\n\n${suggestion}` : suggestion;
                    window.open(`mailto:kiernenyt@gmail.com?subject=${encodeURIComponent('TrueBeast Tool Suggestion')}&body=${encodeURIComponent(body)}`);
                    setStatus('success');
                    setSuggestion('');
                    setName('');
                    return;
                }

                setStatus('sending');
                try {
                    emailjs.init(emailjsCfg.publicKey);
                    await emailjs.send(
                        emailjsCfg.serviceId,
                        emailjsCfg.submitReviewTemplateId || emailjsCfg.ticketTemplateId,
                        { name: name || 'Anonymous', message: suggestion, subject: 'Tool Suggestion – Social Rotator' }
                    );
                    setStatus('success');
                    setSuggestion('');
                    setName('');
                } catch (e) {
                    setStatus('error');
                }
            };

            return (
                <section className="py-16 px-6 border-t border-white/5">
                    <div className="max-w-2xl mx-auto">
                        <div className="section-card">
                            <div className="flex items-center gap-3 mb-2">
                                <div className="w-8 h-8 rounded-xl flex items-center justify-center flex-shrink-0" style={{ background: 'rgba(147,51,234,0.15)', border: '1px solid rgba(147,51,234,0.3)' }}>
                                    <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 text-purple-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                                </div>
                                <div>
                                    <h3 className="font-display font-bold text-lg">Got a Suggestion?</h3>
                                    <p className="text-gray-500 text-sm">Feature ideas, new tools, improvements — I read everything.</p>
                                </div>
                            </div>

                            {status === 'success' ? (
                                <div className="mt-5 p-4 rounded-xl text-center" style={{ background: 'rgba(34,197,94,0.08)', border: '1px solid rgba(34,197,94,0.2)' }}>
                                    <div className="text-2xl mb-1">🎉</div>
                                    <p className="text-green-400 font-semibold text-sm">Thanks for the suggestion!</p>
                                    <p className="text-gray-500 text-xs mt-1">I appreciate the feedback — it helps make these tools better.</p>
                                    <button onClick={() => setStatus('idle')} className="mt-3 text-xs text-gray-500 hover:text-gray-300 transition-colors underline">Submit another</button>
                                </div>
                            ) : (
                                <div className="mt-5 flex flex-col gap-3">
                                    <input
                                        className="username-input"
                                        placeholder="Your name (optional)"
                                        value={name}
                                        onChange={e => setName(e.target.value)}
                                    />
                                    <textarea
                                        className="suggest-textarea"
                                        placeholder="What feature would you like? Or suggest a new tool idea…"
                                        value={suggestion}
                                        onChange={e => setSuggestion(e.target.value)}
                                    />
                                    {status === 'error' && (
                                        <p className="text-red-400 text-xs">Something went wrong. Try the Discord link below or email kiernenyt@gmail.com.</p>
                                    )}
                                    <div className="flex items-center gap-3 flex-wrap">
                                        <button className="suggest-btn" onClick={submit} disabled={!suggestion.trim() || status === 'sending'}>
                                            {status === 'sending' ? 'Sending…' : 'Send Suggestion'}
                                        </button>
                                        {discordUrl && (
                                            <a href={discordUrl} target="_blank" rel="noopener noreferrer"
                                                className="text-sm text-gray-500 hover:text-indigo-400 transition-colors flex items-center gap-1.5">
                                                <svg viewBox="0 0 24 24" fill="currentColor" className="w-4 h-4"><path fill-rule="evenodd" d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
                                                Or post in Discord
                                            </a>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </section>
            );
        };

        /* ── App ── */
        const App = () => {
            const [selected, setSelected]         = useState([]);
            const [effect, setEffect]             = useState('fade');
            const [font, setFont]                 = useState('Poppins');
            const [size, setSize]                 = useState(28);
            const [color, setColor]               = useState('#ffffff');
            const [shadowType, setShadowType]     = useState('glow');  // none | glow | custom
            const [shadowAngle, setShadowAngle]   = useState(135);
            const [shadowDist, setShadowDist]     = useState(4);
            const [shadowBlur, setShadowBlur]     = useState(8);
            const [shadowColor, setShadowColor]   = useState('#000000');
            const [shadowOpacity, setShadowOpacity] = useState(80);
            const [logoSize, setLogoSize]         = useState('md');
            const [duration, setDuration]         = useState(5);
            const [popupMode, setPopupMode]       = useState(false);
            const [popupInterval, setPopupInterval] = useState(10);
            const [useLogo, setUseLogo]           = useState(false);
            const [generatedUrl, setGenUrl]       = useState('');
            const [copied, setCopied]             = useState(false);

            const shadowOpts = { angle: shadowAngle, distance: shadowDist, blur: shadowBlur, color: shadowColor, opacity: shadowOpacity };

            const isSelected = (id) => selected.some(p => p.id === id);

            const togglePlatform = (id) => {
                if (isSelected(id)) {
                    setSelected(prev => prev.filter(p => p.id !== id));
                } else {
                    setSelected(prev => [...prev, { id, username: '' }]);
                }
                setGenUrl('');
            };

            const updateUsername = (id, username) => {
                setSelected(prev => prev.map(p => p.id === id ? { ...p, username } : p));
                setGenUrl('');
            };

            const removePlatform = (id) => {
                setSelected(prev => prev.filter(p => p.id !== id));
                setGenUrl('');
            };

            const generateUrl = () => {
                const validPlatforms = selected.filter(p => p.username.trim());
                if (validPlatforms.length === 0) {
                    alert('Please select at least one platform and enter your username.');
                    return;
                }
                const cfg = {
                    platforms: validPlatforms,
                    effect, font, size, color,
                    shadowType,
                    shadowOpts: shadowType === 'custom' ? shadowOpts : null,
                    logoSize, duration,
                    popupMode, popupInterval,
                    useLogo,
                };
                const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(cfg))));
                const base = window.location.href.replace(/\/[^/]*$/, '');
                setGenUrl(`${base}/rotator.html?c=${encoded}`);
                if (window.TBAnalytics) {
                    window.TBAnalytics.track('link_gen', { tool: 'rotator', count: validPlatforms.length });
                }
            };

            const copyUrl = () => {
                navigator.clipboard.writeText(generatedUrl).then(() => {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2500);
                });
            };

            const validCount = selected.filter(p => p.username.trim()).length;

            const EFFECTS = [
                { id: 'fade',       label: 'Fade'          },
                { id: 'fadedownup', label: 'Fade ↓ / ↑'    },
                { id: 'slide',      label: 'Slide'         },
                { id: 'slideup',    label: 'Slide Up'      },
                { id: 'zoom',       label: 'Zoom'          },
                { id: 'flip',       label: 'Flip'          },
            ];

            const FONTS = [
                'Poppins', 'Outfit', 'Space Grotesk', 'Arimo', 'Barlow',
                'Oswald', 'Kanit', 'Quicksand', 'Teko', 'Chakra Petch',
                'Kalam', 'Neuton', 'Rokkitt', 'Cuprum', 'Blinker',
                'Edu TAS Beginner', 'Stardos Stencil', 'Orbitron', 'Montserrat', 'Inter',
            ];

            const LOGO_SIZE_OPTS = [
                { id: 'sm', label: 'Small'  },
                { id: 'md', label: 'Medium' },
                { id: 'lg', label: 'Large'  },
            ];

            return (
                <div className="relative min-h-screen">
                    <Navigation />

                    <main className="pt-32 pb-20 px-6">
                        <div className="max-w-5xl mx-auto">

                            {/* Hero */}
                            <div className="text-center mb-12 animate-fade-in">
                                <div className="inline-flex items-center gap-2 liquid-glass border border-purple-500/30 px-4 py-2 rounded-full mb-6 text-sm font-medium text-purple-400 mb-5">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                                    Free OBS Overlay Tool by Kiernen Irons
                                </div>
                                <h1 className="font-display font-bold text-5xl md:text-6xl mb-4">
                                    Social Media <span style={{ background: 'linear-gradient(135deg,#7c3aed,#a855f7,#c084fc)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>Rotator</span>
                                </h1>
                                <p className="text-gray-400 text-lg max-w-xl mx-auto">
                                    Build a transparent OBS browser source that cycles through your socials. Pick platforms, customize the look, paste the URL into OBS &mdash; done.
                                </p>
                            </div>

                            <div className="flex flex-col gap-6">

                                {/* Step 1 – Platforms */}
                                <div className="section-card">
                                    <div className="step-label">Step 1</div>
                                    <h2 className="font-display font-bold text-xl mb-1">Select Your Platforms</h2>
                                    <p className="text-gray-500 text-sm mb-5">Click a platform to add it. You can add as many as you like.</p>
                                    <div className="grid grid-cols-3 sm:grid-cols-5 gap-3">
                                        {PLATFORMS.map(p => {
                                            const sel = isSelected(p.id);
                                            return (
                                                <button key={p.id} onClick={() => togglePlatform(p.id)}
                                                    className={`platform-card liquid-glass rounded-xl p-3 flex flex-col items-center gap-2 border ${sel ? 'border-current' : 'border-white/10 hover:border-white/20'}`}
                                                    style={sel ? { borderColor: p.color + '70', background: p.color + '15' } : {}}>
                                                    <div dangerouslySetInnerHTML={{ __html: SVGS[p.id] || '' }}
                                                        style={{ width: 24, height: 24, color: sel ? p.color : '#9ca3af' }} />
                                                    <span className="text-xs font-medium" style={{ color: sel ? p.color : '#9ca3af' }}>{p.name}</span>
                                                    {sel && (
                                                        <div style={{ width: 6, height: 6, borderRadius: '50%', background: p.color }} />
                                                    )}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* Step 2 – Usernames */}
                                {selected.length > 0 && (
                                    <div className="section-card">
                                        <div className="step-label">Step 2</div>
                                        <h2 className="font-display font-bold text-xl mb-1">Enter Your Usernames</h2>

                                                                style={{ width: 18, height: 18, color: pInfo.color, flexShrink: 0 }} />

                                                        </div>

                                                            className="username-input"
                                                            placeholder={`Your ${pInfo.name} username…`}

                                                            onChange={e => updateUsername(p.id, e.target.value)}

                                                        </button>
                                                    </div>
                                                );

                                    </div>

                                {/* Step 3 – Appearance */}
                                <div className="section-card">
                                    <div className="step-label">Step 3</div>
                                    <h2 className="font-display font-bold text-xl mb-5">Customize Appearance</h2>

                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">

                                        {/* Transition */}
                                        <div>
                                            <div className="text-sm text-gray-400 font-medium mb-2">Transition Effect</div>
                                            <div className="flex flex-wrap gap-2">
                                                {EFFECTS.map(e => (
                                                    <button key={e.id} onClick={() => setEffect(e.id)}
                                                        className={`pill-btn liquid-glass border border-white/10 px-3 py-1.5 rounded-full text-sm font-medium ${effect === e.id ? 'active' : 'text-gray-400 hover:text-white'}`}>
                                                        {e.label}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        {/* Logo size */}
                                        <div>
                                            <div className="text-sm text-gray-400 font-medium mb-2">Logo Size</div>
                                            <div className="flex flex-wrap gap-2">
                                                {LOGO_SIZE_OPTS.map(l => (
                                                    <button key={l.id} onClick={() => setLogoSize(l.id)}
                                                        className={`pill-btn liquid-glass border border-white/10 px-3 py-1.5 rounded-full text-sm font-medium ${logoSize === l.id ? 'active' : 'text-gray-400 hover:text-white'}`}>
                                                        {l.label}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        {/* Font */}
                                        <div>
                                            <div className="text-sm text-gray-400 font-medium mb-2">Font</div>
                                            <select value={font} onChange={e => setFont(e.target.value)}
                                                className="username-input" style={{ cursor: 'pointer' }}>
                                                {FONTS.map(f => <option key={f} value={f}>{f}</option>)}
                                            </select>
                                        </div>

                                        {/* Text size */}
                                        <div>
                                            <div className="text-sm text-gray-400 font-medium mb-2">Text Size <span className="text-purple-400 font-mono">{size}px</span></div>
                                            <input type="range" min="14" max="72" value={size}
                                                onChange={e => setSize(Number(e.target.value))}
                                                className="w-full" />
                                        </div>

                                        {/* Duration */}
                                        <div>
                                            <div className="text-sm text-gray-400 font-medium mb-2">Time Per Platform <span className="text-purple-400 font-mono">{duration}s</span></div>
                                            <input type="range" min="2" max="30" value={duration}
                                                onChange={e => setDuration(Number(e.target.value))}
                                                className="w-full" />
                                        </div>

                                        {/* Color */}
                                        <div>
                                            <div className="text-sm text-gray-400 font-medium mb-2">Text Color</div>
                                            <div className="flex items-center gap-3">
                                                <input type="color" value={color} onChange={e => setColor(e.target.value)}
                                                    className="w-10 h-10 rounded-lg cursor-pointer" />
                                                <span className="font-mono text-sm text-gray-400">{color.toUpperCase()}</span>
                                                <button onClick={() => setColor('#ffffff')}
                                                    className="text-xs text-gray-500 hover:text-gray-300 transition-colors">Reset</button>
                                            </div>
                                        </div>

                                        {/* Drop Shadow — full column width */}
                                        <div className="sm:col-span-2">
                                            <div className="text-sm text-gray-400 font-medium mb-3">Drop Shadow</div>
                                            <div className="flex flex-wrap gap-2 mb-4">
                                                {['none', 'glow', 'custom'].map(t => (
                                                    <button key={t} onClick={() => setShadowType(t)}
                                                        className={`pill-btn liquid-glass border border-white/10 px-3 py-1.5 rounded-full text-sm font-medium capitalize ${shadowType === t ? 'active' : 'text-gray-400 hover:text-white'}`}>
                                                        {t === 'none' ? 'None' : t === 'glow' ? 'Glow' : 'Custom'}
                                                    </button>
                                                ))}
                                            </div>
                                            {shadowType === 'custom' && (
                                                <div className="liquid-glass rounded-xl p-4 border border-white/5">
                                                    <div className="shadow-row">
                                                        <label>Angle</label>
                                                        <input type="range" min="0" max="360" value={shadowAngle} onChange={e => setShadowAngle(Number(e.target.value))} className="flex-1" />
                                                        <span className="val">{shadowAngle}°</span>
                                                    </div>
                                                    <div className="shadow-row">
                                                        <label>Distance</label>
                                                        <input type="range" min="0" max="40" value={shadowDist} onChange={e => setShadowDist(Number(e.target.value))} className="flex-1" />
                                                        <span className="val">{shadowDist}px</span>
                                                    </div>
                                                    <div className="shadow-row">
                                                        <label>Blur</label>
                                                        <input type="range" min="0" max="50" value={shadowBlur} onChange={e => setShadowBlur(Number(e.target.value))} className="flex-1" />
                                                        <span className="val">{shadowBlur}px</span>
                                                    </div>
                                                    <div className="shadow-row">
                                                        <label>Opacity</label>
                                                        <input type="range" min="0" max="100" value={shadowOpacity} onChange={e => setShadowOpacity(Number(e.target.value))} className="flex-1" />
                                                        <span className="val">{shadowOpacity}%</span>
                                                    </div>
                                                    <div className="shadow-row" style={{ marginBottom: 0 }}>
                                                        <label>Color</label>
                                                        <div className="flex items-center gap-3 flex-1">
                                                            <input type="color" value={shadowColor} onChange={e => setShadowColor(e.target.value)} className="w-8 h-8 rounded-lg cursor-pointer" />
                                                            <span className="font-mono text-xs text-gray-400">{shadowColor.toUpperCase()}</span>
                                                        </div>
                                                    </div>
                                                    <div className="mt-3 pt-3 border-t border-white/5">
                                                        <span className="text-xs text-gray-600">Preview: </span>
                                                        <span className="text-xs font-mono text-purple-400/70">
                                                            {computeCustomShadow(shadowOpts)}
                                                        </span>
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                        {/* Logo mode toggle — full column width */}
                                        <div className="sm:col-span-2">
                                            <div className="text-sm text-gray-400 font-medium mb-3">Logo Style</div>
                                            <div className="flex flex-col gap-3">
                                                <div className="flex items-center gap-4">
                                                    <button onClick={() => setUseLogo(false)}
                                                        className={`pill-btn liquid-glass border border-white/10 px-3 py-1.5 rounded-full text-sm font-medium ${!useLogo ? 'active' : 'text-gray-400 hover:text-white'}`}>
                                                        Icon (SVG)
                                                    </button>
                                                    <button onClick={() => setUseLogo(true)}
                                                        className={`pill-btn liquid-glass border border-white/10 px-3 py-1.5 rounded-full text-sm font-medium ${useLogo ? 'active' : 'text-gray-400 hover:text-white'}`}>
                                                        Official Logo
                                                    </button>
                                                    {useLogo && (
                                                        <span className="text-xs text-gray-500">Brand colors from Simple Icons CDN</span>
                                                    )}
                                                </div>
                                                {useLogo && (
                                                    <div className="p-3 rounded-xl text-xs text-yellow-400/80" style={{ background: 'rgba(234,179,8,0.05)', border: '1px solid rgba(234,179,8,0.15)' }}>
                                                        Official logos load from simpleicons.org. Requires an internet connection in OBS.
                                                    </div>
                                                )}
                                            </div>
                                        </div>

                                    </div>
                                </div>

                                {/* Step 4 – Popup Timing */}
                                <div className="section-card">
                                    <div className="step-label">Step 4</div>
                                    <h2 className="font-display font-bold text-xl mb-1">Popup Timing</h2>
                                    <p className="text-gray-500 text-sm mb-5">
                                        By default the overlay is always visible. Enable Popup Mode to have it appear for one cycle, then hide until the next interval.
                                    </p>
                                    <div className="flex items-center gap-4 mb-4">
                                        <Toggle on={popupMode} onChange={setPopupMode} />
                                        <div>
                                            <span className="text-sm font-medium">Popup Mode</span>
                                            <p className="text-xs text-gray-500 mt-0.5">{popupMode ? 'Overlay hides between cycles' : 'Overlay always visible'}</p>
                                        </div>
                                    </div>
                                    {popupMode && (
                                        <div className="liquid-glass rounded-xl p-4 border border-white/5">
                                            <div className="text-sm text-gray-400 font-medium mb-2">
                                                Show every <span className="text-purple-400 font-mono">{popupInterval} minute{popupInterval !== 1 ? 's' : ''}</span>
                                            </div>
                                            <input type="range" min="1" max="60" value={popupInterval}
                                                onChange={e => setPopupInterval(Number(e.target.value))}
                                                className="w-full" />
                                            <div className="flex justify-between text-xs text-gray-600 mt-1">
                                                <span>1 min</span>
                                                <span>60 min</span>
                                            </div>
                                            <div className="mt-3 p-3 rounded-lg text-xs text-gray-400" style={{ background: 'rgba(255,255,255,0.03)' }}>
                                                The overlay will wait <strong className="text-gray-300">{popupInterval} min</strong>, show all {validCount > 0 ? validCount : '?'} platform{validCount !== 1 ? 's' : ''} once ({Math.round(validCount * (duration + 1))}s), then hide and repeat.
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {/* Step 5 – Preview & Generate */}
                                <div className="section-card">
                                    <div className="step-label">Step 5</div>
                                    <h2 className="font-display font-bold text-xl mb-2">Preview &amp; Generate</h2>
                                    <p className="text-gray-500 text-sm mb-5">
                                        The checkerboard shows transparency &mdash; your overlay will be invisible in OBS except for the logo &amp; username.
                                    </p>

                                    {/* Live preview */}
                                    <div className="mb-6">
                                        <div className="text-xs text-gray-600 mb-2 font-medium uppercase tracking-wide">Live Preview</div>
                                        <Preview
                                            platforms={selected}
                                            effect={effect}
                                            font={font}
                                            size={size}
                                            color={color}
                                            shadowType={shadowType}
                                            shadowOpts={shadowOpts}
                                            logoSize={logoSize}
                                            useLogo={useLogo}
                                        />
                                        {popupMode && validCount > 0 && (
                                            <div className="mt-2 text-xs text-purple-400/70 text-center">
                                                Popup mode active — overlay hides for {popupInterval} min between cycles
                                            </div>
                                        )}
                                    </div>

                                    {/* Generate */}
                                    <button className="generate-btn" onClick={generateUrl} disabled={validCount === 0}>
                                        {validCount === 0 ? 'Select platforms above to generate' : `Generate Overlay URL (${validCount} platform${validCount !== 1 ? 's' : ''})`}
                                    </button>

                                    {/* Generated URL */}
                                    {generatedUrl && (
                                        <div className="mt-5 flex flex-col gap-3">
                                            <div className="flex items-start gap-2">
                                                <div className="url-box liquid-glass rounded-xl p-4 flex-1 text-gray-300 leading-relaxed border border-purple-500/20">
                                                    {generatedUrl}
                                                </div>
                                                <button className={`copy-btn mt-0.5 ${copied ? 'success' : ''}`} onClick={copyUrl}>
                                                    {copied ? 'Copied!' : 'Copy'}
                                                </button>
                                            </div>

                                            {/* OBS Instructions */}
                                            <div className="liquid-glass rounded-xl p-5 border border-white/5 mt-2">
                                                <div className="flex items-center gap-2 mb-3">
                                                    <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 text-purple-400 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                                                    <span className="font-semibold text-sm text-gray-300">How to add in OBS</span>
                                                </div>
                                                <ol className="flex flex-col gap-2 text-sm text-gray-400 list-none">
                                                    {[
                                                        'In OBS, click the + button in your Sources panel',
                                                        'Choose "Browser" from the list',
                                                        'Give it a name like "Social Rotator" and click OK',
                                                        'Paste the URL above into the URL field',
                                                        'Set Width / Height to match your intended overlay size (e.g. 500 x 80)',
                                                        'Check "Shutdown source when not visible" for best performance',
                                                        'Click OK — done! Resize and position it on your scene.',
                                                    ].map((step, i) => (
                                                        <li key={i} className="flex items-start gap-2.5">
                                                            <span className="flex-shrink-0 w-5 h-5 rounded-full bg-purple-500/20 border border-purple-500/30 text-purple-400 text-xs flex items-center justify-center font-bold mt-0.5">{i + 1}</span>
                                                            <span>{step}</span>
                                                        </li>
                                                    ))}
                                                </ol>
                                                <div className="mt-4 p-3 rounded-lg bg-yellow-500/5 border border-yellow-500/20 text-yellow-400/80 text-xs">
                                                    Save your URL somewhere safe — it contains your full configuration. If you want to make changes, just rebuild here and generate a new one.
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>

                            </div>
                        </div>
                    </main>

                    {/* Suggestion Box */}
                    <SuggestionBox />

                    {/* Footer */}
                    <footer className="py-10 px-6 border-t border-white/5">
                        <div className="max-w-5xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <a href="../../tools/" className="flex items-center gap-2 text-gray-400 hover:text-white transition-colors text-sm">
                                <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                                Back to Toolkit
                            </a>
                            <p className="text-gray-600 text-sm">Built by Kiernen Irons &mdash; Free to use, no sign-up needed.</p>
                            <a href="../../" className="text-gray-500 hover:text-white transition-colors text-sm">TrueBeast.io</a>
                        </div>
                    </footer>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
