<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Open Graph / Discord embeds -->
    <meta property="og:type"        content="website">
    <meta property="og:site_name"   content="TrueBeast">
    <meta property="og:title"       content="My Toolkit — TrueBeast">
    <meta property="og:description" content="Software and tools TrueBeast actually uses and recommends for gaming, streaming, and more.">
    <meta property="og:url"         content="https://truebeast.io/tools/">
    <meta property="og:image"       content="https://truebeast.io/assets/images/og-image.png">
    <meta name="twitter:card"       content="summary_large_image">
    <title>My Toolkit | TrueBeast</title>
    <link rel="icon" href="../favicon.ico">
    <script src="../js/theme.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="../js/config.js?v=6"></script>
    <link rel="stylesheet" href="../css/shared.css">
    <link rel="stylesheet" href="../css/glass.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .tool-card    { transition: transform 0.2s, box-shadow 0.2s; }
        .tool-card:hover { transform: translateY(-3px); }

        .my-tool-card { transition: transform 0.2s, box-shadow 0.2s; }
        .my-tool-card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(147,51,234,0.15); }

        .filter-btn { transition: background 0.15s, color 0.15s; }
        .filter-btn.active { background: rgba(34,197,94,0.15); color: #4ade80; border-color: rgba(34,197,94,0.3); }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const ThemeToggle = () => {
            const [light, setLight] = React.useState(() => document.documentElement.classList.contains('light'));
            React.useEffect(() => {
                const h = (e) => setLight(e.detail.light);
                window.addEventListener('tb-theme-change', h);
                return () => window.removeEventListener('tb-theme-change', h);
            }, []);
            return (
                <button onClick={() => window.TBTheme && window.TBTheme.toggle()}
                    className="liquid-glass p-2 rounded-xl transition-all flex-shrink-0"
                    title={light ? 'Switch to dark mode' : 'Switch to light mode'}>
                    {light
                        ? <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                        : <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
                    }
                </button>
            );
        };

        const Navigation = () => {
            const [scrolled,   setScrolled]   = useState(false);
            const [mobileOpen, setMobileOpen] = useState(false);
            const discordUrl = (typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.social?.discord) || 'https://discord.gg/Nk8vekY';
            useEffect(() => {
                const h = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', h, { passive: true });
                return () => window.removeEventListener('scroll', h);
            }, []);
            const btn = "border border-white/10 bg-white/5 hover:bg-white/10 hover:border-white/20 px-3.5 py-2 rounded-xl text-sm font-medium text-gray-200 hover:text-white transition-all";
            return (
                <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-500 ${scrolled ? 'py-3' : 'py-6'}`}>
                    <div className="max-w-7xl mx-auto px-6">
                        <div className={`liquid-glass rounded-2xl px-6 py-4 transition-all duration-500 ${scrolled ? 'shadow-2xl' : ''}`}>
                            <div className="flex items-center justify-between">
                                <a href="../" className="flex items-center gap-3 group flex-shrink-0">
                                    <img src="../assets/logos/logo.png" alt="TrueBeast" className="w-10 h-10 object-contain rounded-full pulse-glow flex-shrink-0" />
                                    <span className="font-display font-bold text-xl tracking-tight group-hover:text-green-400 transition-colors">TrueBeast</span>
                                </a>
                                <div className="hidden md:flex items-center gap-2">
                                    <a href="../"            className={btn}>Home</a>
                                    <a href="../giveaways/"  className={btn}>Giveaways</a>
                                    <a href="../tools/"      className={`${btn} text-white bg-white/10`}>Toolkit</a>
                                    <a href="../tech-support/" className={btn}>Tech Support</a>
                                    <a href={discordUrl} target="_blank" rel="noopener noreferrer"
                                       className={`${btn} flex items-center gap-1.5 text-indigo-400 hover:text-indigo-300`}>
                                        <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor" fillRule="evenodd"><path fillRule="evenodd" d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
                                        Discord
                                    </a>
                                    <a href="https://www.youtube.com/@RealTrueBeast" target="_blank" rel="noopener noreferrer"
                                       className={`${btn} text-red-500 hover:text-red-400 flex items-center gap-1.5`}>
                                        <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2.5 17a24.12 24.12 0 0 1 0-10 2 2 0 0 1 1.4-1.4 49.56 49.56 0 0 1 16.2 0A2 2 0 0 1 21.5 7a24.12 24.12 0 0 1 0 10 2 2 0 0 1-1.4 1.4 49.55 49.55 0 0 1-16.2 0A2 2 0 0 1 2.5 17"/><path d="m10 15 5-3-5-3z"/></svg>
                                        Subscribe
                                    </a>
                                </div>
                                <div className="flex items-center gap-2">
                                    <ThemeToggle />
                                    <button onClick={() => setMobileOpen(!mobileOpen)} className="md:hidden liquid-glass p-2 rounded-xl">
                                        {mobileOpen
                                            ? <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                            : <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                                        }
                                    </button>
                                </div>
                            </div>
                            {mobileOpen && (
                                <div className="md:hidden mt-4 pt-4 border-t border-white/10">
                                    <div className="flex flex-col gap-1">
                                        <a href="../"            onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-colors font-medium">Home</a>
                                        <a href="../giveaways/"  onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-colors font-medium">Giveaways</a>
                                        <a href="../tools/"      onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-white bg-white/5 hover:bg-white/10 transition-colors font-medium">Toolkit</a>
                                        <a href="../tech-support/" onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-colors font-medium">Tech Support</a>
                                        <div className="h-px bg-white/10 my-2"></div>
                                        <a href={discordUrl} target="_blank" rel="noopener noreferrer" onClick={() => setMobileOpen(false)}
                                           className="px-3 py-2.5 rounded-xl text-indigo-400 hover:text-indigo-300 hover:bg-white/5 transition-colors font-medium flex items-center gap-2">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor" fillRule="evenodd"><path fillRule="evenodd" d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
                                            Discord
                                        </a>
                                        <a href="https://www.youtube.com/@RealTrueBeast" target="_blank" rel="noopener noreferrer" onClick={() => setMobileOpen(false)}
                                           className="border border-white/10 bg-white/5 hover:bg-white/10 hover:border-white/20 px-3 py-2.5 rounded-xl text-sm font-medium text-red-500 hover:text-red-400 transition-all flex items-center justify-center gap-2">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2.5 17a24.12 24.12 0 0 1 0-10 2 2 0 0 1 1.4-1.4 49.56 49.56 0 0 1 16.2 0A2 2 0 0 1 21.5 7a24.12 24.12 0 0 1 0 10 2 2 0 0 1-1.4 1.4 49.55 49.55 0 0 1-16.2 0A2 2 0 0 1 2.5 17"/><path d="m10 15 5-3-5-3z"/></svg>
                                            Subscribe
                                        </a>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </nav>
            );
        };

        const CATEGORIES = ['All', 'Gaming', 'Streaming', 'PC & Hardware', 'Utilities', 'Creative'];

        /* ── Tools built by Kiernen Irons ── */
        const MY_TOOLS = [
            {
                name: 'Social Media Rotator',
                description: 'A free OBS browser source overlay that smoothly cycles through your social media accounts. Pick platforms, customize fonts, transitions & effects, then paste one URL into OBS.',
                url: './socials-rotator/',
                emoji: '🔄',
                tag: 'Streaming Overlay',
            },
        ];

        const App = () => {
            const [scrolled,  setScrolled]  = useState(false);
            const [activeTab, setActiveTab] = useState('All');

            useEffect(() => {
                const onScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', onScroll);
                return () => window.removeEventListener('scroll', onScroll);
            }, []);

            const allTools = (typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.tools) || [];
            const filtered = activeTab === 'All' ? allTools : allTools.filter(t => t.category === activeTab);
            const usedCats = ['All', ...CATEGORIES.slice(1).filter(c => allTools.some(t => t.category === c))];

            return (
                <div className="relative min-h-screen">
                    <Navigation />

                    <main className="pt-32 pb-20 px-6">
                        <div className="max-w-5xl mx-auto">

                            {/* Hero */}
                            <div className="text-center mb-14 animate-fade-in">
                                <span className="inline-flex items-center gap-2 liquid-glass px-4 py-2 rounded-full mb-6 text-sm font-medium text-gray-300">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 text-green-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                                    The Arsenal
                                </span>
                                <h1 className="font-display font-bold text-5xl md:text-6xl mb-4">
                                    My <span className="text-gradient">Toolkit</span>
                                </h1>
                                <p className="text-gray-400 text-lg max-w-xl mx-auto">
                                    Software and tools I actually use — tried, tested, and TrueBeast approved.
                                </p>
                            </div>

                            {/* ── Kiernen's Creations ── */}
                            {MY_TOOLS.length > 0 && (
                                <div className="mb-16">
                                    {/* Section divider */}
                                    <div className="flex items-center gap-4 mb-6">
                                        <div className="flex-1 h-px" style={{ background: 'linear-gradient(to right, transparent, rgba(147,51,234,0.5))' }} />
                                        <div className="flex items-center gap-2 liquid-glass px-4 py-2 rounded-full border flex-shrink-0" style={{ borderColor: 'rgba(147,51,234,0.35)' }}>
                                            <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="#a855f7" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                                            <span className="text-sm font-bold whitespace-nowrap" style={{ color: '#a855f7' }}>Built by Kiernen Irons</span>
                                        </div>
                                        <div className="flex-1 h-px" style={{ background: 'linear-gradient(to left, transparent, rgba(147,51,234,0.5))' }} />
                                    </div>
                                    <p className="text-center text-gray-500 text-sm mb-8 max-w-sm mx-auto">
                                        Free tools I built for streamers &amp; gamers. No account needed, no strings attached.
                                    </p>

                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {MY_TOOLS.map((tool, i) => (
                                            <a key={i} href={tool.url}
                                                className="my-tool-card liquid-glass rounded-2xl p-6 flex flex-col gap-4 group cursor-pointer"
                                                style={{ textDecoration: 'none', color: 'inherit', border: '1px solid rgba(147,51,234,0.25)' }}>
                                                <div className="flex items-start justify-between gap-3">
                                                    <div className="text-4xl leading-none">{tool.emoji}</div>
                                                    <span className="liquid-glass text-xs px-2 py-1 rounded-full font-medium flex-shrink-0"
                                                        style={{ border: '1px solid rgba(147,51,234,0.35)', color: '#c084fc' }}>
                                                        {tool.tag}
                                                    </span>
                                                </div>
                                                <div>
                                                    <h3 className="font-display font-bold text-lg mb-1 transition-colors" style={{ color: 'inherit' }}
                                                        onMouseEnter={e => e.target.style.color = '#a855f7'}
                                                        onMouseLeave={e => e.target.style.color = 'inherit'}>
                                                        {tool.name}
                                                    </h3>
                                                    <p className="text-gray-400 text-sm leading-relaxed">{tool.description}</p>
                                                </div>
                                                <div className="flex items-center gap-1 text-sm font-medium mt-auto pt-2" style={{ color: '#a855f7', borderTop: '1px solid rgba(147,51,234,0.12)' }}>
                                                    Open Tool
                                                    <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 group-hover:translate-x-1 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                                                </div>
                                            </a>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* ── Regular tools ── */}
                            {allTools.length > 0 && (
                                <>
                                    {/* Divider label */}
                                    <div className="flex items-center gap-4 mb-8">
                                        <div className="flex-1 h-px bg-white/5" />
                                        <span className="text-xs font-bold uppercase tracking-widest text-gray-600 flex-shrink-0">Recommended by TrueBeast</span>
                                        <div className="flex-1 h-px bg-white/5" />
                                    </div>

                                    {/* Category filters */}
                                    {usedCats.length > 1 && (
                                        <div className="flex flex-wrap gap-2 justify-center mb-10">
                                            {usedCats.map(cat => (
                                                <button key={cat}
                                                    onClick={() => setActiveTab(cat)}
                                                    className={`filter-btn liquid-glass border border-white/10 px-4 py-2 rounded-full text-sm font-medium ${activeTab === cat ? 'active' : 'text-gray-400 hover:text-white'}`}>
                                                    {cat}
                                                </button>
                                            ))}
                                        </div>
                                    )}

                                    {/* Tool cards */}
                                    {filtered.length === 0 ? (
                                        <div className="text-center py-16">
                                            <div className="text-5xl mb-4">🔧</div>
                                            <p className="text-gray-500">No tools in this category yet.</p>
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                            {filtered.map((tool, i) => (
                                                <a key={i} href={tool.url} target="_blank" rel="noopener noreferrer"
                                                    className="tool-card liquid-glass rounded-2xl p-6 flex flex-col gap-4 group cursor-pointer"
                                                    style={{ textDecoration: 'none', color: 'inherit' }}>
                                                    <div className="flex items-start justify-between gap-3">
                                                        <div className="text-4xl leading-none">{tool.emoji}</div>
                                                        <span className="liquid-glass border border-white/10 text-xs px-2 py-1 rounded-full text-green-400 font-medium flex-shrink-0">{tool.category}</span>
                                                    </div>
                                                    <div>
                                                        <h3 className="font-display font-bold text-lg mb-1 group-hover:text-green-400 transition-colors">{tool.name}</h3>
                                                        <p className="text-gray-400 text-sm leading-relaxed">{tool.description}</p>
                                                    </div>
                                                    <div className="flex items-center gap-1 text-green-400 text-sm font-medium mt-auto pt-2 border-t border-white/5">
                                                        Get it
                                                        <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 group-hover:translate-x-1 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                                                    </div>
                                                </a>
                                            ))}
                                        </div>
                                    )}
                                </>
                            )}

                            {/* Empty state — no tools at all */}
                            {allTools.length === 0 && MY_TOOLS.length === 0 && (
                                <div className="text-center py-24">
                                    <div className="text-6xl mb-4">🔧</div>
                                    <h2 className="font-display font-bold text-2xl mb-3 text-gray-300">Tools coming soon</h2>
                                    <p className="text-gray-500 max-w-sm mx-auto">
                                        TrueBeast is building out this list. Check back soon — or join Discord and ask directly.
                                    </p>
                                    <a href={typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.social?.discord}
