const ThemeToggle = () => {
    const [light, setLight] = useState(document.documentElement.classList.contains('light'));
    useEffect(() => {
        const h = () => setLight(document.documentElement.classList.contains('light'));
        window.addEventListener('tb-theme-change', h);
        return () => window.removeEventListener('tb-theme-change', h);
    }, []);
    return (
        <button onClick={() => window.TBTheme && window.TBTheme.toggle()}
            className="liquid-glass p-2 rounded-xl transition-all flex-shrink-0"
            title={light ? 'Switch to dark mode' : 'Switch to light mode'}>
            {light
                ? <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>

};

// ── Reducer ───────────────────────────────────────────────────────────────────
function resumeReducer(state, action) {
    const now = new Date().toISOString();
    switch (action.type) {
        case 'SET_RESUME': return { ...action.resume, updatedAt: now };
        case 'SET_FIELD': {
            const keys = action.path.split('.');
            const s = JSON.parse(JSON.stringify(state));
            let obj = s;
            for (let i = 0; i < keys.length - 1; i++) obj = obj[keys[i]];
            obj[keys[keys.length - 1]] = action.value;
            s.updatedAt = now;
            return s;
        }
        case 'SET_TEMPLATE': return { ...state, template: action.value, updatedAt: now };
        case 'SET_ACCENT': return { ...state, accentColor: action.value, updatedAt: now };
        case 'SET_FONT': return { ...state, fontFamily: action.value, updatedAt: now };
        case 'SET_PHOTO': return { ...state, photo: { ...state.photo, ...action.value }, updatedAt: now };
        case 'TOGGLE_SECTION': {
            const s = JSON.parse(JSON.stringify(state));
            const sec = action.section;
            s.sections[sec].enabled = !s.sections[sec].enabled;
            if (s.sections[sec].enabled && !s.sectionOrder.includes(sec)) {
                s.sectionOrder.push(sec);
            }
            if (!s.sections[sec].enabled) {
                s.sectionOrder = s.sectionOrder.filter(k => k !== sec);
            }
            s.updatedAt = now;
            return s;
        }
        case 'REORDER_SECTIONS': return { ...state, sectionOrder: action.order, updatedAt: now };
        case 'ADD_ITEM': {
            const s = JSON.parse(JSON.stringify(state));
            s.sections[action.section].items.push(action.item);
            s.updatedAt = now;
            return s;
        }
        case 'REMOVE_ITEM': {
            const s = JSON.parse(JSON.stringify(state));
            s.sections[action.section].items = s.sections[action.section].items.filter(i => i.id !== action.id);
            s.updatedAt = now;
            return s;
        }
        case 'UPDATE_ITEM': {
            const s = JSON.parse(JSON.stringify(state));
            const items = s.sections[action.section].items;
            const idx = items.findIndex(i => i.id === action.id);
            if (idx >= 0) items[idx] = { ...items[idx], ...action.data };
            s.updatedAt = now;
            return s;
        }
        case 'REORDER_ITEMS': {
            const s = JSON.parse(JSON.stringify(state));
            s.sections[action.section].items = action.items;
            s.updatedAt = now;
            return s;
        }
        case 'ADD_BULLET': {
            const s = JSON.parse(JSON.stringify(state));
            const item = s.sections[action.section].items.find(i => i.id === action.itemId);
            if (item) item.bullets.push('');
            s.updatedAt = now;
            return s;
        }
        case 'REMOVE_BULLET': {
            const s = JSON.parse(JSON.stringify(state));
            const item = s.sections[action.section].items.find(i => i.id === action.itemId);
            if (item && item.bullets.length > 1) item.bullets.splice(action.bulletIdx, 1);
            s.updatedAt = now;
            return s;
        }
        case 'UPDATE_BULLET': {
            const s = JSON.parse(JSON.stringify(state));
            const item = s.sections[action.section].items.find(i => i.id === action.itemId);
            if (item) item.bullets[action.bulletIdx] = action.value;
            s.updatedAt = now;
            return s;
        }
        default: return state;
    }
}

// ── Storage ───────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'tb_resumes';
const ACTIVE_KEY  = 'tb_resume_active';

function loadResumes() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
}
function saveResumes(resumes) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(resumes));
}
function getActiveId() { return localStorage.getItem(ACTIVE_KEY); }
function setActiveId(id) { localStorage.setItem(ACTIVE_KEY, id); }

// ── Drag Hook ─────────────────────────────────────────────────────────────────
function useDragReorder(items, onReorder) {
    const [dragIdx, setDragIdx] = useState(null);
    const onDragStart = (e, idx) => { setDragIdx(idx); e.dataTransfer.effectAllowed = 'move'; };
    const onDragOver = (e, idx) => {
        e.preventDefault();
        if (dragIdx === null || dragIdx === idx) return;
        const next = [...items];
        const [moved] = next.splice(dragIdx, 1);
        next.splice(idx, 0, moved);
        onReorder(next);
        setDragIdx(idx);
    };
    const onDragEnd = () => setDragIdx(null);
    return { dragIdx, onDragStart, onDragOver, onDragEnd };
}

const PersonalInfoEditor = ({ data, photo, dispatch }) => {
    const f = (field) => (val) => dispatch({ type:'SET_FIELD', path:`sections.personal.data.${field}`, value:val });
    const handlePhoto = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => dispatch({ type:'SET_PHOTO', value:{ dataUrl: ev.target.result } });
        reader.readAsDataURL(file);
    };
    return (
        <div className="space-y-3">
            <div className="grid grid-cols-2 gap-3">
                <Field label="First Name" value={data.firstName} onChange={f('firstName')} placeholder="John" />
                <Field label="Last Name" value={data.lastName} onChange={f('lastName')} placeholder="Doe" />
            </div>
            <Field label="Job Title" value={data.title} onChange={f('title')} placeholder="Software Engineer" />
            <div className="grid grid-cols-2 gap-3">
                <Field label="Email" value={data.email} onChange={f('email')} placeholder="john@example.com" type="email" />
                <Field label="Phone" value={data.phone} onChange={f('phone')} placeholder="+1 234 567 890" />
            </div>
            <Field label="Location" value={data.location} onChange={f('location')} placeholder="New York, NY" />
            <div className="grid grid-cols-2 gap-3">
                <Field label="Website" value={data.website} onChange={f('website')} placeholder="yoursite.com" />
                <Field label="LinkedIn" value={data.linkedin} onChange={f('linkedin')} placeholder="linkedin.com/in/you" />
            </div>
            {/* Photo */}
            <div style={{borderTop:'1px solid var(--c-border)',paddingTop:12,marginTop:8}}>
                <label style={{color:'var(--c-text-label)',fontSize:'.75rem',fontWeight:500,display:'block',marginBottom:8}}>Photo (optional)</label>
                <div className="flex items-center gap-3">
                    {photo.dataUrl && (
                        <div style={{width:56,height:56,overflow:'hidden',flexShrink:0,
                            borderRadius: photo.shape==='circle'?'50%': photo.shape==='rounded'?'12px':'4px',
                            border:'2px solid var(--c-border)'}}>
                            <img src={photo.dataUrl} style={{width:'100%',height:'100%',objectFit:'cover'}} />
                        </div>
                    )}
                    <div className="flex flex-col gap-2">
                        <label className="ghost-btn" style={{cursor:'pointer'}}>
                            {photo.dataUrl ? 'Change Photo' : 'Upload Photo'}
                            <input type="file" accept="image/*" onChange={handlePhoto} style={{display:'none'}} />
                        </label>
                        {photo.dataUrl && (
                            <button className="pill-btn danger" onClick={() => dispatch({ type:'SET_PHOTO', value:{ dataUrl:null } })}>Remove</button>
                        )}
                    </div>
                </div>
                {photo.dataUrl && (
                    <div className="flex items-center gap-2 mt-2">
                        <span style={{color:'var(--c-text-muted)',fontSize:'.75rem'}}>Shape:</span>
                        {['circle','rounded','square'].map(s => (
                            <button key={s} className={`photo-shape-btn ${photo.shape===s?'active':''}`}
                                style={{borderRadius:s==='circle'?'50%':s==='rounded'?'8px':'4px'}}
                                onClick={() => dispatch({ type:'SET_PHOTO', value:{ shape:s } })}>
                                <div style={{width:16,height:16,background:'var(--c-text-medium)',borderRadius:s==='circle'?'50%':s==='rounded'?'4px':'2px'}} />
                            </button>
                        ))}
                    </div>
                )}
            </div>
        </div>
    );
};

const ItemEditor = ({ item, section, fields, dispatch, open, onToggle }) => {
    const title = fields[0]?.getter(item) || 'New Entry';
    return (
        <div className="section-card" style={{padding:12}}>
            <div className="flex items-center justify-between">
                <button className="collapse-btn" onClick={onToggle} style={{fontSize:'.85rem'}}>
                    <span style={{transition:'transform .15s',display:'inline-block',transform:open?'rotate(90deg)':'rotate(0)'}}>▶</span>
                    <span style={{color:'var(--c-text-strong)'}}>{title || 'New Entry'}</span>
                </button>
                <button className="pill-btn danger" onClick={() => dispatch({ type:'REMOVE_ITEM', section, id:item.id })}>Delete</button>
            </div>
            {open && (
                <div className="mt-3 space-y-3">
                    {fields.map((f, i) => {
                        if (f.type === 'bullets') return <BulletEditor key={i} bullets={item.bullets} section={section} itemId={item.id} dispatch={dispatch} />;
                        if (f.type === 'checkbox') return (
                            <label key={i} className="flex items-center gap-2 cursor-pointer" style={{color:'var(--c-text-medium)',fontSize:'.85rem'}}>
                                <input type="checkbox" checked={f.getter(item)} onChange={e => dispatch({ type:'UPDATE_ITEM', section, id:item.id, data:{[f.field]:e.target.checked} })} />
                                {f.label}
                            </label>
                        );
                        if (f.type === 'select') return (
                            <div key={i} className="flex flex-col gap-1">
                                <label style={{color:'var(--c-text-label)',fontSize:'.75rem',fontWeight:500}}>{f.label}</label>
                                <select className="inp" value={f.getter(item)} onChange={e => dispatch({ type:'UPDATE_ITEM', section, id:item.id, data:{[f.field]:e.target.value} })}>
                                    {f.options.map(o => <option key={o} value={o}>{o}</option>)}
                                </select>
                            </div>
                        );
                        if (f.type === 'textarea') return <TextArea key={i} label={f.label} value={f.getter(item)} onChange={val => dispatch({ type:'UPDATE_ITEM', section, id:item.id, data:{[f.field]:val} })} placeholder={f.placeholder} />;
                        return <Field key={i} label={f.label} value={f.getter(item)} onChange={val => dispatch({ type:'UPDATE_ITEM', section, id:item.id, data:{[f.field]:val} })} placeholder={f.placeholder} type={f.inputType||'text'} />;
                    })}
                </div>
            )}
        </div>
    );
};

const tfs = (fontSize) => ({ small: 0.85, medium: 1, large: 1.12 }[fontSize] || 1);
const tls = (ls) => ({ compact: 1.3, normal: 1.5, relaxed: 1.7 }[ls] || 1.5);

const ResumeHeader = ({ sections, photo, accentColor, fontFamily, fontSize, showPhoto=true }) => {
    const p = sections.personal.data;
    const fs = tfs(fontSize);
    const fullName = [p.firstName, p.lastName].filter(Boolean).join(' ');
    const contacts = [p.email, p.phone, p.location, p.website, p.linkedin].filter(Boolean);
    return (
        <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:16}}>
            {showPhoto && photo?.dataUrl && (
                <img src={photo.dataUrl} style={{width:64*fs,height:64*fs,objectFit:'cover',flexShrink:0,
                    borderRadius:photo.shape==='circle'?'50%':photo.shape==='rounded'?8:2}} />
            )}

                {fullName && <div style={{fontSize:24*fs,fontWeight:700,fontFamily,color:'#1a1a1a',lineHeight:1.2}}>{fullName}</div>}
                {p.title && <div style={{fontSize:14*fs,color:accentColor,fontWeight:500,marginTop:2,fontFamily}}>{p.title}</div>}
                {contacts.length > 0 && (
                    <div style={{fontSize:10*fs,color:'#666',marginTop:6,fontFamily,display:'flex',flexWrap:'wrap',gap:'4px 12px'}}>
                        {contacts.map((c,i) => <span key={i}>{c}</span>)}
                    </div>
                )}
            </div>
        </div>
    );
};

};

    const { sections, accentColor, fontFamily, fontSize } = props;
    const sec = sections[key];
    if (!sec || !sec.enabled) return null;
    if (key === 'personal') return null; // rendered as header
    if (key === 'summary') {
        if (!sec.data?.text) return null;
        return (
            <div key={key}>
                <SectionHeading text={sec.heading||'Professional Summary'} accentColor={accentColor} fontFamily={fontFamily} fontSize={fontSize} />
                <div style={{fontSize:11*tfs(fontSize),color:'#444',fontFamily,lineHeight:tls(props.lineSpacing)}}>{sec.data.text}</div>
            </div>
        );
    }
    if (key === 'experience') {
        if (!sec.items?.some(i=>i.title||i.company)) return null;
        return (
            <div key={key}>
                <SectionHeading text={sec.heading||'Work Experience'} accentColor={accentColor} fontFamily={fontFamily} fontSize={fontSize} />
                {sec.items.filter(i=>i.title||i.company).map(i => <ExpBlock key={i.id} item={i} fontFamily={fontFamily} fontSize={fontSize} />)}

        );

    if (key === 'education') {
        if (!sec.items?.some(i=>i.school||i.degree)) return null;
        return (
            <div key={key}>
                <SectionHeading text={sec.heading||'Education'} accentColor={accentColor} fontFamily={fontFamily} fontSize={fontSize} />
                {sec.items.filter(i=>i.school||i.degree).map(i => <EduBlock key={i.id} item={i} fontFamily={fontFamily} fontSize={fontSize} />)}
            </div>
        );
    }
    if (key === 'skills') {
        if (!sec.items?.some(i=>i.name)) return null;
        return (
            <div key={key}>
                <SectionHeading text={sec.heading||'Skills'} accentColor={accentColor} fontFamily={fontFamily} fontSize={fontSize} />
                <SkillsTags items={sec.items} accentColor={accentColor} fontFamily={fontFamily} fontSize={fontSize} />
            </div>
        );
    }
    // Generic sections
    if (!sec.items?.length) return null;
    return (
        <div key={key}>
            <SectionHeading text={sec.heading} accentColor={accentColor} fontFamily={fontFamily} fontSize={fontSize} />
            <GenericSection section={key} data={sec} accentColor={accentColor} fontFamily={fontFamily} fontSize={fontSize} />

    );

const PreviewPanel = ({ resume, previewRef }) => {

// ── Export Functions ───────────────────────────────────────────────────────────
async function exportPDF(previewRef, name) {
    if (!previewRef.current) return;
    const el = previewRef.current;
    await html2pdf().set({
        margin: 0,
        filename: `${(name||'resume').replace(/[^a-zA-Z0-9 ]/g,'_')}.pdf`,
        image: { type:'jpeg', quality:0.98 },
        html2canvas: { scale:2, useCORS:true, logging:false },
        jsPDF: { unit:'mm', format:'a4', orientation:'portrait' },
        pagebreak: { mode:['avoid-all','css','legacy'] },
    }).from(el).save();
}

function exportJSON(resume) {
    const blob = new Blob([JSON.stringify(resume, null, 2)], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${resume.name || 'resume'}.json`;
    a.click();
    URL.revokeObjectURL(url);
}

function importJSON(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                data.id = uid();
                data.updatedAt = new Date().toISOString();
                resolve(data);
            } catch { reject(new Error('Invalid JSON')); }
        };
        reader.readAsText(file);
    });
}

// ── App ───────────────────────────────────────────────────────────────────────
const App = () => {
    const [resumes, setResumes] = useState(() => {
        const loaded = loadResumes();
        return loaded.length > 0 ? loaded : [makeDefault()];
    });
    const [activeId, setActiveIdState] = useState(() => {
        const saved = getActiveId();
        const loaded = loadResumes();
        if (saved && loaded.find(r => r.id === saved)) return saved;
        return loaded[0]?.id || resumes[0].id;
    });
    const activeResume = resumes.find(r => r.id === activeId) || resumes[0];
    const [resume, dispatch] = useReducer(resumeReducer, activeResume);
    const previewRef = useRef(null);
    const [mobileView, setMobileView] = useState('edit');
    const [exporting, setExporting] = useState(false);
    const [toast, setToast] = useState(null);
    const saveTimerRef = useRef(null);

    // Sync reducer state back to resumes list
    useEffect(() => {
        if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
        saveTimerRef.current = setTimeout(() => {
            setResumes(prev => {
                const next = prev.map(r => r.id === resume.id ? resume : r);
                saveResumes(next);
                return next;
            });
        }, 500);
    }, [resume]);

    const switchResume = (id) => {
        const r = resumes.find(r => r.id === id);
        if (r) { dispatch({ type:'SET_RESUME', resume:r }); setActiveIdState(id); setActiveId(id); }
    };

    const createResume = () => {
        const r = makeDefault();
        setResumes(prev => { const next = [...prev, r]; saveResumes(next); return next; });
        dispatch({ type:'SET_RESUME', resume:r });
        setActiveIdState(r.id);
        setActiveId(r.id);
    };

    const duplicateResume = () => {
        const r = { ...JSON.parse(JSON.stringify(resume)), id:uid(), name:resume.name+' (Copy)', createdAt:new Date().toISOString() };
        setResumes(prev => { const next = [...prev, r]; saveResumes(next); return next; });
        dispatch({ type:'SET_RESUME', resume:r });
        setActiveIdState(r.id);
        setActiveId(r.id);
    };

    const deleteResume = () => {
        if (resumes.length <= 1) return;
        const next = resumes.filter(r => r.id !== resume.id);
        saveResumes(next);
        setResumes(next);
        dispatch({ type:'SET_RESUME', resume:next[0] });
        setActiveIdState(next[0].id);
        setActiveId(next[0].id);
    };

    const handleImport = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        try {
            const r = await importJSON(file);
            setResumes(prev => { const next = [...prev, r]; saveResumes(next); return next; });
            dispatch({ type:'SET_RESUME', resume:r });
            setActiveIdState(r.id);
            setActiveId(r.id);
            showToast('Resume imported!');
        } catch { showToast('Invalid file', true); }
        e.target.value = '';
    };

    const handleExportPDF = async () => {
        setExporting(true);
        try { await exportPDF(previewRef, resume.name); showToast('PDF downloaded!'); }
        catch { showToast('PDF export failed', true); }
        setExporting(false);
    };

    const showToast = (msg, err=false) => { setToast({msg,err}); setTimeout(() => setToast(null), 3000); };

    // Section drag reorder
    const { dragIdx: secDragIdx, onDragStart: secDragStart, onDragOver: secDragOver, onDragEnd: secDragEnd } =
        useDragReorder(resume.sectionOrder, (order) => dispatch({ type:'REORDER_SECTIONS', order }));

    // Disabled sections
    const disabledSections = Object.keys(SECTION_META).filter(k => !resume.sections[k]?.enabled);

    return (
        <div style={{minHeight:'100vh',paddingTop:100}}>
            <Navigation />

            {/* Toast */}
            {toast && (
                <div style={{position:'fixed',top:90,left:'50%',transform:'translateX(-50%)',zIndex:100,
                    background:toast.err?'#ef4444':'#22c55e',color:'white',padding:'8px 20px',borderRadius:10,fontWeight:600,fontSize:'.85rem',
                    boxShadow:'0 4px 12px rgba(0,0,0,0.3)'}}>{toast.msg}</div>
            )}

            {/* Top Bar */}
            <div className="max-w-7xl mx-auto px-4 mb-4 no-print">
                <div className="liquid-glass rounded-2xl p-4">
                    <div className="flex flex-wrap items-center gap-3">
                        {/* Resume Selector */}
                        <select className="inp" style={{maxWidth:200}} value={resume.id} onChange={e => switchResume(e.target.value)}>
                            {resumes.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
                        </select>
                        <input className="inp" style={{maxWidth:180}} value={resume.name}
                            onChange={e => dispatch({ type:'SET_FIELD', path:'name', value:e.target.value })} placeholder="Resume name" />

                        <button className="ghost-btn" onClick={createResume}>+ New</button>
                        <button className="ghost-btn" onClick={duplicateResume}>Duplicate</button>
                        {resumes.length > 1 && <button className="ghost-btn" style={{color:'#ef4444',borderColor:'rgba(239,68,68,0.3)'}} onClick={deleteResume}>Delete</button>}

                        <div style={{flex:1}} />

                        {/* Template Picker */}
                        <select className="inp" style={{maxWidth:160}} value={resume.template} onChange={e => dispatch({ type:'SET_TEMPLATE', value:e.target.value })}>
                            {Object.entries(TEMPLATES).map(([k,t]) => <option key={k} value={k}>{t.name}{t.ats?' (ATS)':''}</option>)}
                        </select>

                        {/* Font Picker */}
                        <select className="inp" style={{maxWidth:140}} value={resume.fontFamily} onChange={e => dispatch({ type:'SET_FONT', value:e.target.value })}>
                            {FONTS.map(f => <option key={f.id} value={f.id}>{f.label}</option>)}
                        </select>

                        {/* Accent Color */}
                        <div className="flex items-center gap-1">
                            {ACCENT_COLORS.slice(0,5).map(c => (
                                <div key={c} className={`color-swatch ${resume.accentColor===c?'active':''}`}
                                    style={{background:c}} onClick={() => dispatch({ type:'SET_ACCENT', value:c })} />
                            ))}
                            <div style={{position:'relative'}}>
                                <div className="color-swatch" style={{background:`conic-gradient(red,yellow,lime,aqua,blue,magenta,red)`}}
                                    onClick={() => document.getElementById('custom-color')?.click()} />
                                <input type="color" id="custom-color" value={resume.accentColor}
                                    onChange={e => dispatch({ type:'SET_ACCENT', value:e.target.value })} />
                            </div>
                        </div>
                    </div>

                    {/* Export Row */}
                    <div className="flex flex-wrap items-center gap-3 mt-3">

                            <input type="file" accept=".json" onChange={handleImport} style={{display:'none'}} />
                        </label>

                        {/* Mobile view toggle */}
                        <div className="flex md:hidden items-center gap-2 ml-auto">
                            <button className={`mobile-tab ${mobileView==='edit'?'active':''}`} onClick={() => setMobileView('edit')}>Edit</button>
                            <button className={`mobile-tab ${mobileView==='preview'?'active':''}`} onClick={() => setMobileView('preview')}>Preview</button>
                        </div>
                    </div>
                </div>
            </div>

            <div className="max-w-7xl mx-auto px-4 pb-20 no-print">

                            if (!resume.sections[key]?.enabled) return null;

                            const meta = SECTION_META[key];
                            const editorProps = key === 'personal'
                                ? { data:resume.sections.personal.data, photo:resume.photo, dispatch }

                            return (
                                <div key={key} className={`section-card ${secDragIdx===idx?'dragging':''}`}

                                        <span className="drag-handle" title="Drag to reorder">⠿</span>
                                        <span>{meta.icon}</span>
                                        <span style={{fontWeight:600,color:'var(--c-text-strong)',fontSize:'.9rem',flex:1}}>{meta.label}</span>
                                        {key !== 'personal' && (
                                            <button className="pill-btn danger" onClick={() => dispatch({ type:'TOGGLE_SECTION', section:key })}>Hide</button>
                                        )}
                                    </div>
                                    <Editor {...editorProps} />
                                </div>
                            );
                        })}

                        {/* Add Section */}
                        {disabledSections.length > 0 && (
                            <div className="section-card">
                                <div style={{color:'var(--c-text-label)',fontSize:'.85rem',fontWeight:500,marginBottom:8}}>Add Section</div>
                                <div className="flex flex-wrap gap-2">
                                    {disabledSections.map(k => (
                                        <button key={k} className="pill-btn" onClick={() => dispatch({ type:'TOGGLE_SECTION', section:k })}>
                                            {SECTION_META[k].icon} {SECTION_META[k].label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Preview Panel */}
                    <div className={`flex-1 min-w-0 ${mobileView==='edit'?'hidden md:block':''}`}
                        style={{position:'sticky',top:100,maxHeight:'calc(100vh - 120px)',overflow:'auto'}}>
                        <PreviewPanel resume={resume} previewRef={previewRef} />
                    </div>
                </div>
            </div>
        </div>
    );
};

// ── Mount ─────────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
setTimeout(() => { document.getElementById('root').style.opacity = '1'; }, 100);
</script>
</body>
</html>
