    <style>
        /* ── Theme colour tokens ── */
        :root {
            --c-text-faint:   rgba(255,255,255,0.22);

            --c-text-muted:   rgba(255,255,255,0.42);

            --c-border:       rgba(255,255,255,0.10);
            --c-surface:      rgba(255,255,255,0.05);
            --c-btn-inactive: rgba(255,255,255,0.04);
            --c-toggle-track: rgba(255,255,255,0.12);

        html.light {
            --c-text-faint:   rgba(0,0,0,0.38);
            --c-text-dim:     rgba(0,0,0,0.48);
            --c-text-muted:   rgba(0,0,0,0.56);
            --c-text-label:   rgba(0,0,0,0.62);
            --c-text-medium:  rgba(0,0,0,0.70);
            --c-text-strong:  rgba(0,0,0,0.76);
            --c-text-bolder:  rgba(0,0,0,0.85);
            --c-border-sub:   rgba(0,0,0,0.08);
            --c-border:       rgba(0,0,0,0.12);
            --c-surface:      rgba(255,255,255,0.65);
            --c-btn-inactive: rgba(0,0,0,0.04);
            --c-toggle-track: rgba(0,0,0,0.18);
            --c-acc-title:    rgba(0,0,0,0.72);
        }

        .mode-tab { transition: all 0.15s; cursor: pointer; border: 1px solid rgba(255,255,255,0.08); }
        .mode-tab.active { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.35); color: #4ade80; }
        .mode-tab:hover:not(.active) { border-color: rgba(255,255,255,0.2); }
        .ct-btn { transition: all 0.15s; cursor: pointer; border: 1px solid rgba(255,255,255,0.08); }
        .ct-btn.active { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.35); color: #4ade80; }
        .ct-btn:hover:not(.active) { border-color: rgba(255,255,255,0.2); }
        .shape-btn { transition: all 0.15s; cursor: pointer; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); }
        .shape-btn.active { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.35); color: #4ade80; }
        .shape-btn:hover:not(.active) { border-color: rgba(255,255,255,0.2); }
        .qs-pill { transition: all 0.15s; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); }
        .qs-pill:hover { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.08); }

        .range-input::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #22c55e; cursor: pointer; box-shadow: 0 0 0 3px rgba(34,197,94,0.2); }

        html.light .ct-btn { border-color: rgba(0,0,0,0.1); color: var(--c-text-medium); }
        html.light .ct-btn.active { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.4); color: #16a34a; }
        html.light .ct-btn:hover:not(.active) { border-color: rgba(0,0,0,0.2); }
        html.light .shape-btn { border-color: rgba(0,0,0,0.1); background: rgba(0,0,0,0.03); color: var(--c-text-medium); }
        html.light .shape-btn.active { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.4); color: #16a34a; }
        html.light .shape-btn:hover:not(.active) { border-color: rgba(0,0,0,0.2); }

        /* ── Suggestion box ── */

            outline: none; font-family: inherit; transition: border-color 0.15s;

        .suggest-name-inp:focus { border-color: rgba(34,197,94,0.5); }
        .suggest-name-inp::placeholder { color: rgba(255,255,255,0.25); }
        .suggest-submit-btn {
            background: linear-gradient(135deg, #16a34a, #22c55e); color: black; font-weight: 700;
            border: none; border-radius: 10px; padding: 9px 20px; cursor: pointer;
            font-size: 0.875rem; transition: all 0.2s;
        }
        .suggest-submit-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(34,197,94,0.3); }
        .suggest-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        html.light .suggest-textarea { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); color: #0e1a0e; }
        html.light .suggest-textarea::placeholder { color: rgba(0,0,0,0.3); }
        html.light .suggest-name-inp { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); color: #0e1a0e; }

<body>
<div class="gradient-bg"></div>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Theme Toggle & Nav ────────────────────────────────────────────────────────
const ThemeToggle = () => {
    const [light, setLight] = React.useState(() => document.documentElement.classList.contains('light'));
    React.useEffect(() => {
        const h = e => setLight(e.detail.light);
        window.addEventListener('tb-theme-change', h);
        return () => window.removeEventListener('tb-theme-change', h);
    }, []);
    return (
        <button onClick={() => window.TBTheme && window.TBTheme.toggle()}
            className="liquid-glass p-2 rounded-xl transition-all flex-shrink-0"
            title={light ? 'Switch to dark mode' : 'Switch to light mode'}>
            {light
                ? <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                : <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
            }
        </button>
    );
};

const Navigation = () => {
    const [scrolled, setScrolled] = useState(false);
    const [mobileOpen, setMobileOpen] = useState(false);
    const discordUrl = (typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.social?.discord) || 'https://discord.gg/Nk8vekY';
    useEffect(() => {
        const h = () => setScrolled(window.scrollY > 50);
        window.addEventListener('scroll', h, { passive: true });
        return () => window.removeEventListener('scroll', h);
    }, []);
    const btn = "border border-white/10 bg-white/5 hover:bg-white/10 hover:border-white/20 px-3.5 py-2 rounded-xl text-sm font-medium text-gray-200 hover:text-white transition-all";
    return (
        <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-500 ${scrolled ? 'py-3' : 'py-6'}`}>
            <div className="max-w-7xl mx-auto px-6">
                <div className={`liquid-glass rounded-2xl px-6 py-4 transition-all duration-500 ${scrolled ? 'shadow-2xl' : ''}`}>
                    <div className="flex items-center justify-between">
                        <a href="../../" className="flex items-center gap-3 group flex-shrink-0">
                            <img src="../../assets/logos/logo.png" alt="TrueBeast" className="w-10 h-10 object-contain rounded-full pulse-glow flex-shrink-0" />
                            <span className="font-display font-bold text-xl tracking-tight group-hover:text-green-400 transition-colors">TrueBeast</span>
                        </a>
                        <div className="hidden md:flex items-center gap-2">
                            <a href="../../" className={btn}>Home</a>
                            <a href="../../giveaways/" className={btn}>Giveaways</a>
                            <a href="../../tools/" className={`${btn} text-white bg-white/10`}>Toolkit</a>
                            <a href="../../tech-support/" className={btn}>Tech Support</a>
                        </div>
                        <div className="flex items-center gap-2">
                            <ThemeToggle />
                            <button onClick={() => setMobileOpen(!mobileOpen)} className="md:hidden liquid-glass p-2 rounded-xl">
                                {mobileOpen
                                    ? <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                    : <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                                }
                            </button>
                        </div>
                    </div>
                    {mobileOpen && (
                        <div className="md:hidden mt-4 pt-4 border-t border-white/10">
                            <div className="flex flex-col gap-1">
                                <a href="../../" onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-colors font-medium">Home</a>
                                <a href="../../giveaways/" onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-colors font-medium">Giveaways</a>
                                <a href="../../tools/" onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-white bg-white/5 transition-colors font-medium">Toolkit</a>
                                <a href="../../tech-support/" onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-colors font-medium">Tech Support</a>
                            </div>
                        </div>
                    )}
                </div>
            </div>
        </nav>
    );
};

// ── Constants ─────────────────────────────────────────────────────────────────
const CONTENT_TYPES = [
    { id:'url',   label:'URL',   icon:'🔗' },
    { id:'email', label:'Email', icon:'✉️' },
    { id:'phone', label:'Phone', icon:'📱' },
    { id:'wifi',  label:'WiFi',  icon:'📶' },
    { id:'sms',   label:'SMS',   icon:'💬' },
    { id:'geo',   label:'Geo',   icon:'📍' },
    { id:'text',  label:'Text',  icon:'📝' },
];
const DOT_STYLES   = [{ id:'square', label:'Boxy' },{ id:'extra-rounded', label:'Bouba' },{ id:'dots', label:'Braille' },{ id:'rounded', label:'Rounded' },{ id:'classy', label:'Classy' },{ id:'classy-rounded', label:'Kiki' }];
const EYE_STYLES   = [{ id:'square', label:'Boxy' },{ id:'dot', label:'Circular' },{ id:'extra-rounded', label:'Rounded' }];
const PUPIL_STYLES = [{ id:'square', label:'Square' },{ id:'dot', label:'Circle' }];
const QUICK_STYLES = [
    { id:'classic', label:'Classic', dot:'square',        cs:'square',        cd:'square', fg:'#000000', bg:'#ffffff', grad:false },
    { id:'rounded', label:'Rounded', dot:'extra-rounded', cs:'extra-rounded', cd:'dot',    fg:'#000000', bg:'#ffffff', grad:false },
    { id:'dots',    label:'Dots',    dot:'dots',          cs:'dot',           cd:'dot',    fg:'#000000', bg:'#ffffff', grad:false },
    { id:'classy',  label:'Classy',  dot:'classy',        cs:'square',        cd:'square', fg:'#1e1b4b', bg:'#ffffff', grad:false },
    { id:'indigo',  label:'Indigo',  dot:'extra-rounded', cs:'extra-rounded', cd:'dot',    fg:'#4f46e5', bg:'#ffffff', grad:false },
    { id:'rose',    label:'Rose',    dot:'dots',          cs:'dot',           cd:'dot',    fg:'#e11d48', bg:'#fff0f3', grad:false },
    { id:'teal',    label:'Teal',    dot:'rounded',       cs:'extra-rounded', cd:'dot',    fg:'#0d9488', bg:'#f0fdfa', grad:false },
    { id:'sunset',  label:'Sunset',  dot:'extra-rounded', cs:'extra-rounded', cd:'dot',    fg:'#ff6b35', bg:'#ffffff', grad:true, g1:'#ff6b35', g2:'#f7c59f' },
    { id:'neon',    label:'Neon',    dot:'dots',          cs:'dot',           cd:'dot',    fg:'#39ff14', bg:'#000000', grad:false },
];

// ── Data builders ─────────────────────────────────────────────────────────────
function buildSingleData(ct, s) {
    switch(ct) {
        case 'url':   return s.url || 'https://truebeast.io';
        case 'email': {
            let str = `mailto:${s.emailTo}`;
            const p = [];
            if (s.emailSubj) p.push(`subject=${encodeURIComponent(s.emailSubj)}`);
            if (s.emailBody) p.push(`body=${encodeURIComponent(s.emailBody)}`);
            return p.length ? str + '?' + p.join('&') : str;
        }
        case 'phone': return `tel:${s.phone}`;
        case 'wifi':  return `WIFI:T:${s.wifiSec};S:${s.wifiSsid};P:${s.wifiPass};${s.wifiHidden?'H:true;':''};`;
        case 'sms':   return `smsto:${s.smsPhone}${s.smsMsg?':'+s.smsMsg:''}`;
        case 'geo':   return `geo:${s.geoLat},${s.geoLng}`;
        default:      return s.text || 'Hello from TrueBeast!';
    }
}
function buildVCardData(v) {
    return ['BEGIN:VCARD','VERSION:3.0',
        `N:${v.lastName};${v.firstName}`,
        `FN:${(v.firstName+' '+v.lastName).trim()}`,
        v.org&&`ORG:${v.org}`, v.title&&`TITLE:${v.title}`,
        v.phone&&`TEL:${v.phone}`, v.email&&`EMAIL:${v.email}`,
        v.website&&`URL:${v.website}`, v.address&&`ADR:;;${v.address}`,
        'END:VCARD',
    ].filter(Boolean).join('\n');
}
function buildQROpts(data, st) {
    const primary = st.useGrad ? st.g1 : st.fg;
    const dotsOptions = { type: st.dotType };
    if (st.useGrad) {
        dotsOptions.gradient = { type: st.gradType, rotation: st.gradAngle * Math.PI / 180,
            colorStops: [{ offset:0, color:st.g1 },{ offset:1, color:st.g2 }] };
    } else { dotsOptions.color = st.fg; }
    return {
        type: 'svg',
        width: st.qrSize, height: st.qrSize, data,
        margin: st.padding,
        qrOptions: { errorCorrectionLevel: st.errLevel },
        dotsOptions,
        backgroundOptions: { color: st.bgTransparent ? 'rgba(0,0,0,0)' : st.bg },
        cornersSquareOptions: { type: st.eyeType,   color: st.customEye ? st.eyeColor   : primary },
        cornersDotOptions:    { type: st.pupilType, color: st.customEye ? st.pupilColor : primary },
        image: st.logoSrc || undefined,
        imageOptions: { crossOrigin:'anonymous', margin:st.logoMargin, imageSize:st.logoSize/100, hideBackgroundDots:st.logoExcavate },
    };
}

// ── Shared small components ───────────────────────────────────────────────────
const SL = ({ children }) => (
    <div className="text-xs font-bold uppercase tracking-widest mb-2.5" style={{ color:'var(--c-text-dim)' }}>{children}</div>
);
const Inp = ({ label, value, onChange, placeholder, type='text', rows, ...rest }) => {
    const cls = "w-full px-3 py-2 rounded-xl text-sm txt-inp";
    return (
        <div className="mb-3">
            {label && <label className="block text-xs mb-1.5" style={{ color:'var(--c-text-label)' }}>{label}</label>}
            {rows
                ? <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows} className={cls+" resize-none"} />
                : <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} className={cls} {...rest} />
            }
        </div>
    );
};
const Sel = ({ label, value, onChange, options }) => (
    <div className="mb-3">
        {label && <label className="block text-xs mb-1.5" style={{ color:'var(--c-text-label)' }}>{label}</label>}
        <select value={value} onChange={e=>onChange(e.target.value)} className="w-full px-3 py-2 rounded-xl text-sm txt-inp cursor-pointer">
            {options.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
        </select>
    </div>
);
const Range = ({ label, value, onChange, min, max, step=1, unit='' }) => (
    <div className="mb-3">
        <div className="flex justify-between items-center mb-2">
            <span className="text-sm" style={{ color:'var(--c-text-medium)' }}>{label}</span>

const App = () => {
    const [mode, setMode] = useState('Single');
    const [ct, setCt] = useState('url');
    const [sData, setSData] = useState({
        url:'https://truebeast.io', emailTo:'', emailSubj:'', emailBody:'',
        phone:'', wifiSsid:'', wifiPass:'', wifiSec:'WPA', wifiHidden:false,
        smsPhone:'', smsMsg:'', geoLat:'', geoLng:'', text:'',
    });
    const setS = (k,v) => setSData(p=>({...p,[k]:v}));

    const [vc, setVc] = useState({ firstName:'', lastName:'', org:'', title:'', phone:'', email:'', website:'', address:'' });
    const setV = (k,v) => setVc(p=>({...p,[k]:v}));

    const [batchItems, setBatchItems] = useState(['']);
    const [batchLoading, setBatchLoading] = useState(false);
    const batchFileRef = useRef(null);

    const [st, setSt] = useState({
        dotType:'square', eyeType:'square', pupilType:'square',
        fg:'#000000', bg:'#ffffff', bgTransparent:false,
        useGrad:false, g1:'#6366f1', g2:'#a855f7', gradType:'linear', gradAngle:0,
        customEye:false, eyeColor:'#000000', pupilColor:'#000000',
        logoSrc:'', logoSize:30, logoMargin:5, logoExcavate:true,
        qrSize:400, padding:10, errLevel:'H',
    });
    const updateSt = (k,v) => setSt(p=>({...p,[k]:v}));
    const setStMulti = obj => setSt(p=>({...p,...obj}));

    const [acc, setAcc] = useState({ basics:true, colours:false, shapes:false, logo:false });
    const togAcc = k => setAcc(p=>({...p,[k]:!p[k]}));

    const [copied, setCopied] = useState(false);

    const logoFileRef = useRef(null);
    const handleLogoUpload = e => {
        const f = e.target.files[0]; if(!f) return;
        const r = new FileReader();
        r.onload = ev => updateSt('logoSrc', ev.target.result);
        r.readAsDataURL(f);
    };

    // QR instance lives here — never inside a child component
    const PREVIEW_SIZE = 280;
    const previewRef = useRef(null);
    const qrRef = useRef(null);
    const qrAttachedTo = useRef(null); // track which DOM node QR is appended to

    const getQRData = () => {
        if (mode === 'vCard Builder') return buildVCardData(vc);
        return buildSingleData(ct, sData);
    };

    // Preview always renders at PREVIEW_SIZE so it fits the container exactly
    useEffect(() => {
        if (!previewRef.current) return;
        // Use canvas type — more reliable than SVG on mobile browsers
        const opts = { ...buildQROpts(getQRData(), { ...st, qrSize: PREVIEW_SIZE }), type: 'canvas' };
        if (!qrRef.current || qrAttachedTo.current !== previewRef.current) {
            // First mount OR mode switch (previewRef DOM node changed) — create fresh instance
            qrRef.current = new QRCodeStyling(opts);
            qrRef.current.append(previewRef.current);
            qrAttachedTo.current = previewRef.current;
        } else {
            qrRef.current.update(opts);
        }
    }); // no deps — runs every render, qr.update() is fast and idempotent

    // Downloads create a separate full-size QR instance so output = user's chosen size
    const makeTempQR = async (ext, cb) => {
        const div = document.createElement('div');
        div.style.cssText = 'position:absolute;left:-9999px;top:-9999px;';
        document.body.appendChild(div);
        const qr = new QRCodeStyling(buildQROpts(getQRData(), st));
        qr.append(div);
        await new Promise(r => setTimeout(r, 120));
        await cb(qr);
        document.body.removeChild(div);
    };

    const download = ext => makeTempQR(ext, qr => qr.download({ name:'qr-code', extension:ext }));

    const copyQR = async () => {
        try {
            await makeTempQR('png', async qr => {
                const blob = await qr.getRawData('png');
                await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
                setCopied(true); setTimeout(()=>setCopied(false),2000);
            });
        } catch(e) { alert('Copy failed — try downloading instead.'); }
    };

    const applyQuickStyle = qs => setStMulti({
        dotType:qs.dot, eyeType:qs.cs, pupilType:qs.cd,
        fg:qs.fg, bg:qs.bg, useGrad:qs.grad,
        g1:qs.g1||qs.fg, g2:qs.g2||qs.fg,
    });

    // Batch
    const addBatchItem   = () => setBatchItems(p=>[...p,'']);
    const setBatchItem   = (i,v) => setBatchItems(p=>p.map((x,j)=>j===i?v:x));
    const removeBatchItem= i => setBatchItems(p=>p.filter((_,j)=>j!==i));
    const handleBatchFile= e => {
        const f=e.target.files[0]; if(!f) return;
        const r=new FileReader();
        r.onload=ev=>{
            const lines=ev.target.result.split('\n').map(l=>l.trim()).filter(Boolean);
            if(lines.length) setBatchItems(lines);
        };
        r.readAsText(f);
    };
    const generateBatch = async () => {
        const items = batchItems.filter(Boolean); if(!items.length) return;
        setBatchLoading(true);
        try {
            const zip = new JSZip();
            for (let i=0;i<items.length;i++) {
                const div=document.createElement('div'); document.body.appendChild(div);
                const qr=new QRCodeStyling(buildQROpts(items[i],st));
                qr.append(div);
                await new Promise(r=>setTimeout(r,80));
                const blob=await qr.getRawData('png');
                zip.file(`qr-${i+1}-${items[i].slice(0,24).replace(/[^a-z0-9]/gi,'_')}.png`,blob);
                document.body.removeChild(div);
            }
            const content=await zip.generateAsync({type:'blob'});
            const url=URL.createObjectURL(content);
            const a=document.createElement('a'); a.href=url; a.download='qr-codes.zip'; a.click();
            URL.revokeObjectURL(url);
        } finally { setBatchLoading(false); }
    };

    // ── Preview + Download box — inlined JSX, not a sub-component ──────────
    const previewBox = (
        <div className="liquid-glass rounded-2xl p-5 flex flex-col gap-4">
            <SL>Preview</SL>
            {/* Checkerboard container — fixed 280px, SVG scales to fill */}
            <div className="qr-checker rounded-2xl flex items-center justify-center" style={{ padding:'16px' }}>
                <div id="qr-preview-inner" ref={previewRef} style={{ width:'280px', flexShrink:0 }} />
            </div>

            {/* Quick Styles */}
            <div>
                <div className="text-xs mb-2" style={{ color:'var(--c-text-dim)' }}>Quick Styles</div>
                <div className="flex flex-wrap gap-2">
                    {QUICK_STYLES.map(qs=>(
                        <button key={qs.id} onClick={()=>applyQuickStyle(qs)}
                            className="qs-pill px-3 py-1 rounded-full text-xs font-medium"
                            style={{ color:'var(--c-text-strong)' }}>
                            {qs.label}
                        </button>
                    ))}
                </div>
            </div>

            {/* Download */}
            <div className="flex flex-col gap-2">
                <button onClick={()=>download('png')}
                    className="dl-btn w-full py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2"
                    style={{ background:'linear-gradient(135deg,#16a34a,#22c55e)', color:'black' }}>
                    ⬇️ Download PNG
                </button>
                <div className="grid grid-cols-3 gap-2">
                    {[['SVG','svg'],['JPEG','jpeg'],['Copy',null]].map(([lbl,ext])=>(
                        <button key={lbl} onClick={()=>ext?download(ext):copyQR()}
                            className="dl-btn py-2 rounded-xl text-sm font-medium"
                            style={{ background:'var(--c-surface)', border:'1px solid var(--c-border)', color:'var(--c-text-bolder)' }}>
                            {lbl==='Copy'?(copied?'✓ Copied':'📋 Copy'):lbl}
                        </button>
                    ))}
                </div>
            </div>
            <div className="text-center text-xs" style={{ color:'var(--c-text-faint)' }}>
                Output: {st.qrSize} × {st.qrSize}px
            </div>
        </div>
    );

    const optionsProps = { st, update:updateSt, acc, togAcc, logoFileRef, onLogoUpload:handleLogoUpload };

    return (
        <div className="min-h-screen font-body">
            <Navigation />

            <div className="pt-28 pb-8 px-4 text-center">
                <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full text-xs font-medium mb-4"
                    style={{ background:'rgba(34,197,94,0.1)', color:'#4ade80', border:'1px solid rgba(34,197,94,0.2)' }}>
                    🆓 Free Tool by Kiernen Irons
                </div>
                <h1 className="font-display font-bold text-4xl md:text-5xl mb-3">
                    QR Code <span style={{ color:'#22c55e' }}>Generator</span>
                </h1>
                <p className="text-gray-400 max-w-md mx-auto">
                    Create beautiful, fully customizable QR codes. Dots, gradients, logos, batch export. Free, no account needed.
                </p>
                <div className="inline-flex items-start gap-2.5 mt-4 px-4 py-3 rounded-xl text-left max-w-sm mx-auto"
                    style={{ background:'rgba(34,197,94,0.07)', border:'1px solid rgba(34,197,94,0.2)' }}>
                    <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 flex-shrink-0 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="#4ade80" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    <p className="text-xs" style={{ color:'rgba(255,255,255,0.65)' }}>
                        <strong style={{ color:'#4ade80' }}>100% Static QR codes.</strong> All data is encoded directly into the image — no servers, no accounts, no subscriptions. Your QR code will <strong style={{ color:'rgba(255,255,255,0.85)' }}>never expire</strong> and will keep working forever.
                    </p>
                </div>
            </div>

            <div className="max-w-6xl mx-auto px-4 pb-20">

                {/* Mode tabs */}
                <div className="flex gap-2 mb-6">
                    {['Single','vCard Builder','Batch Mode'].map(m=>(
                        <button key={m} onClick={()=>setMode(m)}
                            className={`mode-tab px-4 py-2 rounded-xl text-sm font-semibold flex-1 sm:flex-none ${mode===m?'active':''}`}
                            style={{ background:mode===m?'rgba(34,197,94,0.12)':'var(--c-btn-inactive)', color:mode===m?'#4ade80':'var(--c-text-medium)' }}>
                            {m}
                        </button>
                    ))}
                </div>

                {/* ── Persistent two-column layout — preview ref NEVER unmounts ── */}
                <div className="flex flex-col lg:flex-row gap-6">

                    {/* Left column — mode-specific content */}
                    <div className="flex-1 min-w-0 flex flex-col gap-4">

                        {/* Single */}
                        {mode==='Single' && (
                            <div className="liquid-glass rounded-2xl p-5">
                                <SL>Content Type</SL>
                                <div className="flex flex-wrap gap-2 mb-4">
                                    {CONTENT_TYPES.map(c=>(
                                        <button key={c.id} onClick={()=>setCt(c.id)}
                                            className={`ct-btn flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-sm font-medium ${ct===c.id?'active':''}`}
                                            style={{ background:ct===c.id?'rgba(34,197,94,0.12)':'var(--c-btn-inactive)', color:ct===c.id?'#4ade80':'var(--c-text-medium)' }}>
                                            {c.icon} {c.label}
                                        </button>
                                    ))}
                                </div>
                                <ContentInputs ct={ct} s={sData} set={setS} />
                            </div>
                        )}

                        {/* vCard */}
                        {mode==='vCard Builder' && (
                            <div className="liquid-glass rounded-2xl p-5">
                                <SL>Contact Details</SL>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-4">
                                    <Inp label="First Name" value={vc.firstName} onChange={v=>setV('firstName',v)} placeholder="John" />
                                    <Inp label="Last Name" value={vc.lastName} onChange={v=>setV('lastName',v)} placeholder="Doe" />
                                    <Inp label="Organization" value={vc.org} onChange={v=>setV('org',v)} placeholder="Acme Inc." />
                                    <Inp label="Job Title" value={vc.title} onChange={v=>setV('title',v)} placeholder="Software Engineer" />
                                    <Inp label="Email" value={vc.email} onChange={v=>setV('email',v)} placeholder="john@example.com" />
                                    <Inp label="Phone" value={vc.phone} onChange={v=>setV('phone',v)} placeholder="+1 234 567 8900" type="tel" />
                                    <Inp label="Website" value={vc.website} onChange={v=>setV('website',v)} placeholder="https://example.com" />
                                    <Inp label="Address" value={vc.address} onChange={v=>setV('address',v)} placeholder="123 Main St, City" />
                                </div>
                            </div>
                        )}

                        {/* Batch */}
                        {mode==='Batch Mode' && (<>
                            <div className="liquid-glass rounded-2xl p-5">
                                <SL>Batch Items</SL>
                                <p className="text-sm mb-4" style={{ color:'var(--c-text-muted)' }}>
                                    Add one URL or piece of text per row, or upload a .txt file with one item per line.
                                </p>
                                <div className="flex gap-2 mb-4">
                                    <button onClick={addBatchItem}
                                        className="flex-1 py-2.5 rounded-xl text-sm font-medium flex items-center justify-center gap-2"
                                        style={{ background:'rgba(34,197,94,0.08)', border:'1px solid rgba(34,197,94,0.2)', color:'#4ade80' }}>
                                        + Add Item
                                    </button>
                                    <button onClick={()=>batchFileRef.current?.click()}
                                        className="flex-1 py-2.5 rounded-xl text-sm font-medium flex items-center justify-center gap-2"
                                        style={{ background:'var(--c-surface)', border:'1px solid var(--c-border)', color:'var(--c-text-strong)' }}>
                                        ↑ Upload List
                                    </button>
                                    <input ref={batchFileRef} type="file" accept=".txt,text/plain" style={{ display:'none' }} onChange={handleBatchFile} />
                                </div>
                                <div className="flex flex-col gap-2 mb-4">
                                    {batchItems.map((item,i)=>(
                                        <div key={i} className="batch-row flex items-center gap-2 rounded-xl px-3 py-2">
                                            <span className="text-xs font-mono w-5 text-center" style={{ color:'var(--c-text-dim)' }}>{i+1}</span>
                                            <input type="text" value={item} onChange={e=>setBatchItem(i,e.target.value)}
                                                placeholder="https://example.com or any text..."
                                                className="flex-1 bg-transparent text-sm outline-none"
                                                style={{ color:'white' }} />
                                            {batchItems.length>1 && (
                                                <button onClick={()=>removeBatchItem(i)}
                                                    className="text-xs px-2 py-1 rounded-lg"
                                                    style={{ background:'rgba(239,68,68,0.08)', color:'#f87171', border:'none', cursor:'pointer' }}>
                                                    ✕
                                                </button>
                                            )}
                                        </div>
                                    ))}
                                </div>
                                <button onClick={generateBatch} disabled={batchLoading||!batchItems.filter(Boolean).length}
                                    className="w-full py-3 rounded-xl text-sm font-bold flex items-center justify-center gap-2"
                                    style={{
                                        background:batchLoading?'rgba(34,197,94,0.3)':'linear-gradient(135deg,#16a34a,#22c55e)',
                                        color:batchLoading?'rgba(0,0,0,0.5)':'black',
                                        cursor:batchLoading?'not-allowed':'pointer',
                                    }}>
                                    {batchLoading?'⏳ Generating...':`📦 Generate & Download ZIP (${batchItems.filter(Boolean).length} QR codes)`}
                                </button>
                            </div>
                            <div className="liquid-glass rounded-2xl p-5">
                                <SL>About QR Codes</SL>
                                <div className="text-sm space-y-1" style={{ color:'var(--c-text-muted)' }}>
                                    <p><strong style={{ color:'var(--c-text-strong)' }}>Invented by:</strong> Masahiro Hara (Denso Wave)</p>
                                    <p><strong style={{ color:'var(--c-text-strong)' }}>Year:</strong> 1994</p>
                                    <p className="pt-1">Quick Response code, originally for automotive tracking. Now ubiquitous for URLs, payments, menus, and more.</p>
                                </div>
                            </div>
                        </>)}

                        <OptionsPanel {...optionsProps} />
                    </div>

                    {/* Right column — preview always mounted, ref is stable */}
                    <div className="lg:w-96 flex flex-col gap-4">
                        <div className="lg:sticky lg:top-24 flex flex-col gap-4">
                            {previewBox}

                            {/* Tips (Single only) */}
                            {mode==='Single' && (
                                <div className="liquid-glass rounded-2xl p-4">
                                    <div className="text-xs font-bold uppercase tracking-widest mb-2" style={{ color:'var(--c-text-dim)' }}>Tips</div>
                                    <ul className="text-xs space-y-1.5" style={{ color:'var(--c-text-muted)' }}>
                                        <li>• Use <strong style={{ color:'var(--c-text-strong)' }}>Error Level H</strong> when adding a logo</li>
                                        <li>• SVG scales to any size without blur</li>
                                        <li>• Keep high contrast between FG and BG</li>
                                        <li>• Always test before printing</li>
                                    </ul>
                                </div>
                            )}

                            {/* Note (Batch only) */}
                            {mode==='Batch Mode' && (
                                <div className="liquid-glass rounded-2xl p-4 text-xs" style={{ color:'var(--c-text-muted)' }}>
                                    <div className="font-bold uppercase tracking-widest mb-1.5" style={{ color:'var(--c-text-dim)' }}>Note</div>
                                    <p>Preview shows QR #1. All items use the same style.</p>
                                </div>
                            )}
                        </div>
                    </div>

                </div>
            </div>

            <SuggestionBox />

            <footer className="border-t py-8 px-4" style={{ borderColor:'var(--c-border-sub)' }}>
                <div className="max-w-6xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
                    <div className="font-display font-bold text-lg">
                        <span className="text-white">True</span><span style={{ color:'#22c55e' }}>Beast</span>
                    </div>
                    <p className="text-sm" style={{ color:'var(--c-text-dim)' }}>Free QR Code Generator — no account, no limits</p>
                    <a href="../" style={{ color:'var(--c-text-muted)', textDecoration:'none', fontSize:'0.875rem' }}>← Back to Tools</a>
                </div>
            </footer>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
