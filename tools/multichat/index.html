<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:type"        content="website">
    <meta property="og:site_name"   content="TrueBeast">
    <meta property="og:title"       content="Multi-Stream Chat — Free OBS Chat Combiner">
    <meta property="og:description" content="Combine Twitch, Kick, and YouTube live chats into one OBS dock or overlay. No account needed for Twitch and Kick.">
    <title>Multi-Stream Chat Builder | TrueBeast Tools</title>
    <link rel="icon" href="../../favicon.ico">
    <script src="../../js/theme.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="../../js/config.js?v=6"></script>
    <script src="../../js/analytics.js"></script>
    <link rel="stylesheet" href="../../css/shared.css">
    <link rel="stylesheet" href="../../css/glass.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        #root { opacity: 0; transition: opacity 0.15s ease; }
        .section-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 24px; }
        .step-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #a855f7; margin-bottom: 6px; }

        .field-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 9px 12px;
            color: inherit; font-size: 14px; width: 100%; outline: none;
            transition: border-color 0.15s;
        }
        .field-input:focus { border-color: rgba(147,51,234,0.5); }
        .field-input::placeholder { color: rgba(255,255,255,0.22); }

        .mode-btn {
            flex: 1; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.03);
            border-radius: 12px; padding: 14px 16px; cursor: pointer;
            transition: all 0.15s; text-align: center;
        }
        .mode-btn.active { border-color: rgba(147,51,234,0.5); background: rgba(147,51,234,0.1); }

        .pill-btn { transition: all 0.15s; cursor: pointer; }
        .pill-btn.active { background: rgba(147,51,234,0.2) !important; color: #c084fc !important; border-color: rgba(147,51,234,0.5) !important; }

        .toggle-label { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
        .toggle { width: 38px; height: 22px; background: rgba(255,255,255,0.1); border-radius: 11px; position: relative; transition: background 0.2s; flex-shrink: 0; }
        .toggle.on { background: #7c3aed; }
        .toggle::after { content: ''; position: absolute; left: 3px; top: 3px; width: 16px; height: 16px; background: white; border-radius: 50%; transition: left 0.2s; }
        .toggle.on::after { left: 19px; }

        input[type="range"] { accent-color: #a855f7; }

        .generate-btn {
            background: linear-gradient(135deg, #7c3aed, #a855f7); color: white;
            font-weight: 700; border: none; border-radius: 12px;
            padding: 14px 32px; cursor: pointer; font-size: 16px;
            transition: all 0.2s; width: 100%;
        }
        .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(168,85,247,0.35); }
        .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .copy-btn {
            background: rgba(147,51,234,0.15); border: 1px solid rgba(147,51,234,0.4);
            color: #c084fc; border-radius: 8px; padding: 8px 16px;
            cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.15s; white-space: nowrap;
        }
        .copy-btn:hover { background: rgba(147,51,234,0.25); }
        .copy-btn.success { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.4); color: #4ade80; }

        .url-box { font-family: 'Courier New', monospace; font-size: 11px; word-break: break-all; }

        .platform-row {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px; padding: 14px 16px;
            display: flex; flex-direction: column; gap: 8px;
        }
        .platform-row-header { display: flex; align-items: center; gap: 8px; }

        .badge-optional { font-size: 10px; padding: 2px 7px; border-radius: 20px; background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.4); font-weight: 600; }
        .badge-api { font-size: 10px; padding: 2px 7px; border-radius: 20px; background: rgba(234,179,8,0.1); color: #facc15; font-weight: 600; }
        .badge-free { font-size: 10px; padding: 2px 7px; border-radius: 20px; background: rgba(34,197,94,0.1); color: #4ade80; font-weight: 600; }

        /* ── Suggestion box ── */
        .suggest-textarea {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 10px 12px; color: white; font-size: 0.875rem;
            min-height: 90px; resize: vertical; outline: none; font-family: inherit;
            transition: border-color 0.15s;
        }
        .suggest-textarea:focus { border-color: rgba(147,51,234,0.5); }
        .suggest-textarea::placeholder { color: rgba(255,255,255,0.25); }
        .suggest-name-inp {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 8px 12px; color: white; font-size: 0.875rem;
            outline: none; font-family: inherit; transition: border-color 0.15s;
        }
        .suggest-name-inp:focus { border-color: rgba(147,51,234,0.5); }
        .suggest-name-inp::placeholder { color: rgba(255,255,255,0.25); }
        .suggest-submit-btn {
            background: linear-gradient(135deg, #7c3aed, #a855f7); color: white; font-weight: 700;
            border: none; border-radius: 10px; padding: 9px 20px; cursor: pointer;
            font-size: 0.875rem; transition: all 0.2s;
        }
        .suggest-submit-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(168,85,247,0.3); }
        .suggest-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        html.light .suggest-textarea { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); color: #0e1a0e; }
        html.light .suggest-textarea::placeholder { color: rgba(0,0,0,0.3); }
        html.light .suggest-name-inp { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); color: #0e1a0e; }
        html.light .suggest-name-inp::placeholder { color: rgba(0,0,0,0.3); }
        html.light .section-card { background: rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.08); }
        /* Page-specific gradient: purple + green (streaming/chat theme) */
        .gradient-bg {
            background:
                radial-gradient(ellipse at 15% 20%, rgba(168, 85,  247, 0.20) 0%, transparent 52%),
                radial-gradient(ellipse at 85% 75%, rgba(34,  197, 94,  0.16) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(139, 92,  246, 0.10) 0%, transparent 65%),
                #0b0b12;
        }
        .gradient-bg::after {
            background: radial-gradient(ellipse at 72% 18%, rgba(192, 132, 252, 0.12) 0%, transparent 48%);
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        /* ── ThemeToggle ── */
        const ThemeToggle = () => {
            const [light, setLight] = React.useState(() => document.documentElement.classList.contains('light'));
            React.useEffect(() => {
                const h = (e) => setLight(e.detail.light);
                window.addEventListener('tb-theme-change', h);
                return () => window.removeEventListener('tb-theme-change', h);
            }, []);
            return (
                <button onClick={() => window.TBTheme && window.TBTheme.toggle()}
                    className="liquid-glass p-2 rounded-xl transition-all flex-shrink-0">
                    {light
                        ? <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                        : <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
                    }
                </button>
            );
        };

        /* ── Navigation ── */
        const Navigation = () => {
            const [scrolled, setScrolled] = useState(false);
            const [mobileOpen, setMobileOpen] = useState(false);
            const discordUrl = (typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.social?.discord) || 'https://discord.gg/Nk8vekY';
            useEffect(() => {
                const h = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', h, { passive: true });
                return () => window.removeEventListener('scroll', h);
            }, []);
            const btn = "border border-white/10 bg-white/5 hover:bg-white/10 hover:border-white/20 px-3.5 py-2 rounded-xl text-sm font-medium text-gray-200 hover:text-white transition-all";
            return (
                <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-500 ${scrolled ? 'py-3' : 'py-6'}`}>
                    <div className="max-w-7xl mx-auto px-6">
                        <div className={`liquid-glass rounded-2xl px-6 py-4 transition-all duration-500 ${scrolled ? 'shadow-2xl' : ''}`}>
                            <div className="flex items-center justify-between">
                                <a href="../../" className="flex items-center gap-3 group flex-shrink-0">
                                    <img src="../../assets/logos/logo.png" alt="TrueBeast" className="w-10 h-10 object-contain rounded-full pulse-glow flex-shrink-0" />
                                    <span className="font-display font-bold text-xl tracking-tight group-hover:text-green-400 transition-colors">TrueBeast</span>
                                </a>
                                <div className="hidden md:flex items-center gap-2">
                                    <a href="../../" className={btn}>Home</a>
                                    <a href="../../giveaways/" className={btn}>Giveaways</a>
                                    <a href="../../tools/" className={`${btn} text-white bg-white/10`}>Toolkit</a>
                                    <a href="../../tech-support/" className={btn}>Tech Support</a>
                                    <a href="../../games/" className={`${btn} text-green-400 hover:text-green-300`}>Games</a>
                                </div>
                                <div className="flex items-center gap-2">
                                    <ThemeToggle />
                                    <button onClick={() => setMobileOpen(!mobileOpen)} className="md:hidden liquid-glass p-2 rounded-xl">
                                        {mobileOpen
                                            ? <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                            : <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                                        }
                                    </button>
                                </div>
                            </div>
                            {mobileOpen && (
                                <div className="md:hidden mt-4 pt-4 border-t border-white/10">
                                    <div className="flex flex-col gap-1">
                                        <a href="../../" onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-colors font-medium">Home</a>
                                        <a href="../../giveaways/" onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-colors font-medium">Giveaways</a>
                                        <a href="../../tools/" onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-white bg-white/5 transition-colors font-medium">Toolkit</a>
                                        <a href="../../tech-support/" onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-colors font-medium">Tech Support</a>
                                        <a href="../../games/" onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-green-400 hover:text-green-300 hover:bg-white/5 transition-colors font-medium">Games</a>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </nav>
            );
        };

        /* ── Suggestion Box ── */
        const SuggestionBox = () => {
            const [suggestion, setSuggestion] = useState('');
            const [name, setName] = useState('');
            const [status, setStatus] = useState('idle');

            const emailjsCfg = typeof SITE_CONFIG !== 'undefined' ? SITE_CONFIG?.emailjs : null;
            const hasEmailjs = emailjsCfg?.publicKey && emailjsCfg?.serviceId &&
                (emailjsCfg?.submitReviewTemplateId || emailjsCfg?.ticketTemplateId);
            const discordUrl = typeof SITE_CONFIG !== 'undefined' ? SITE_CONFIG?.social?.discord : null;

            const submit = async () => {
                if (!suggestion.trim()) return;
                if (!hasEmailjs) {
                    const body = name ? `From: ${name}\n\n${suggestion}` : suggestion;
                    window.open(`mailto:kiernenyt@gmail.com?subject=${encodeURIComponent('TrueBeast Tool Suggestion')}&body=${encodeURIComponent(body)}`);
                    setStatus('success'); setSuggestion(''); setName('');
                    return;
                }
                setStatus('sending');
                try {
                    emailjs.init(emailjsCfg.publicKey);
                    await emailjs.send(
                        emailjsCfg.serviceId,
                        emailjsCfg.submitReviewTemplateId || emailjsCfg.ticketTemplateId,
                        { name: name || 'Anonymous', message: suggestion, subject: 'Tool Suggestion – Multistream Chat' }
                    );
                    setStatus('success'); setSuggestion(''); setName('');
                } catch(e) { setStatus('error'); }
            };

            return (
                <section className="py-16 px-6 border-t border-white/5">
                    <div className="max-w-2xl mx-auto">
                        <div className="section-card">
                            <div className="flex items-center gap-3 mb-2">
                                <div className="w-8 h-8 rounded-xl flex items-center justify-center flex-shrink-0"
                                    style={{ background: 'rgba(147,51,234,0.15)', border: '1px solid rgba(147,51,234,0.3)' }}>
                                    <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 text-purple-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                                </div>
                                <div>
                                    <h3 className="font-display font-bold text-lg">Got a Suggestion?</h3>
                                    <p className="text-gray-500 text-sm">Feature ideas, new tools, improvements — I read everything.</p>
                                </div>
                            </div>
                            {status === 'success' ? (
                                <div className="mt-5 p-4 rounded-xl text-center" style={{ background: 'rgba(34,197,94,0.08)', border: '1px solid rgba(34,197,94,0.2)' }}>
                                    <div className="text-2xl mb-1">🎉</div>
                                    <p className="text-green-400 font-semibold text-sm">Thanks for the suggestion!</p>
                                    <p className="text-gray-500 text-xs mt-1">I appreciate the feedback — it helps make these tools better.</p>
                                    <button onClick={() => setStatus('idle')} className="mt-3 text-xs text-gray-500 hover:text-gray-300 transition-colors underline" style={{ background:'none', border:'none', cursor:'pointer' }}>Submit another</button>
                                </div>
                            ) : (
                                <div className="mt-5 flex flex-col gap-3">
                                    <input className="suggest-name-inp" placeholder="Your name (optional)" value={name} onChange={e => setName(e.target.value)} />
                                    <textarea className="suggest-textarea" placeholder="What feature would you like? Or suggest a new tool idea…" value={suggestion} onChange={e => setSuggestion(e.target.value)} />
                                    {status === 'error' && (
                                        <p className="text-red-400 text-xs">Something went wrong. Try the Discord link below or email kiernenyt@gmail.com.</p>
                                    )}
                                    <div className="flex items-center gap-3 flex-wrap">
                                        <button className="suggest-submit-btn" onClick={submit} disabled={!suggestion.trim() || status === 'sending'}>
                                            {status === 'sending' ? 'Sending…' : 'Send Suggestion'}
                                        </button>
                                        {discordUrl && (
                                            <a href={discordUrl} target="_blank" rel="noopener noreferrer"
                                                className="text-sm text-gray-500 hover:text-indigo-400 transition-colors flex items-center gap-1.5">
                                                <svg viewBox="0 0 24 24" fill="currentColor" className="w-4 h-4"><path fillRule="evenodd" d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
                                                Or post in Discord
                                            </a>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </section>
            );
        };

        /* ── App ── */
        const App = () => {
            const [twitch,         setTwitch]         = useState('');
            const [kick,           setKick]           = useState('');
            const [yt,             setYt]             = useState('');
            const [ytkey,          setYtkey]          = useState('');
            const [mode,           setMode]           = useState('overlay');
            const [font,           setFont]           = useState('Outfit');
            const [size,           setSize]           = useState(14);
            const [maxmsgs,        setMaxmsgs]        = useState(30);
            const [msgTimeout,     setMsgTimeout]     = useState(10);
            const [showTimestamps, setShowTimestamps] = useState(false);
            const [msgBg,          setMsgBg]          = useState(50);
            const [genUrl,         setGenUrl]         = useState('');
            const [copied,         setCopied]         = useState(false);

            const hasValidInput = twitch.trim() || kick.trim() || (yt.trim() && ytkey.trim());

            const generate = () => {
                if (!hasValidInput) {
                    alert('Please enter at least one platform to connect.');
                    return;
                }
                const cfg = {
                    twitch:     twitch.trim()  || null,
                    kick:       kick.trim()    || null,
                    yt:         yt.trim()      || null,
                    ytkey:      ytkey.trim()   || null,
                    mode, font, size, maxmsgs, msgTimeout,
                    timestamps: showTimestamps,
                    msgBg,
                };
                const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(cfg))));
                const base = window.location.href.replace(/\/[^/]*$/, '');
                setGenUrl(`${base}/chat.html?c=${encoded}`);
                const platforms = [cfg.twitch && 'twitch', cfg.kick && 'kick', cfg.yt && 'youtube'].filter(Boolean);
                if (window.TBAnalytics) {
                    window.TBAnalytics.track('link_gen', { tool: 'multichat', platforms });
                }
            };

            const copyUrl = () => {
                navigator.clipboard.writeText(genUrl).then(() => {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2500);
                });
            };

            const FONTS = ['Outfit', 'Space Grotesk', 'Roboto', 'Inter', 'Montserrat', 'Orbitron'];

            const dockInstructions = [
                'In OBS, go to View > Docks > Custom Browser Docks',
                'Click the + icon, give it a name (e.g. "Multi-Chat"), paste the URL',
                'Click OK — the dock will appear as a panel you can drag anywhere in OBS',
                'You can dock it on the side, bottom, or float it as a separate window',
            ];

            const overlayInstructions = [
                'In OBS, click + in your Sources panel and choose "Browser"',
                'Give it a name like "Multi-Chat Overlay" and click OK',
                'Paste the URL above into the URL field',
                'Recommended size: 350 wide × 500–700 tall (adjust to fit your layout)',
                'The background is transparent — only the chat messages show',
                'Click OK, then resize and position it on your scene',
            ];

            return (
                <div className="relative min-h-screen">
                    <Navigation />

                    <main className="pt-32 pb-20 px-6">
                        <div className="max-w-3xl mx-auto">

                            {/* Hero */}
                            <div className="text-center mb-12 animate-fade-in">
                                <div className="inline-flex items-center gap-2 liquid-glass border px-4 py-2 rounded-full mb-5 text-sm font-medium flex-shrink-0"
                                    style={{ borderColor: 'rgba(147,51,234,0.35)', color: '#a855f7' }}>
                                    <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                                    Free Multi-Chat Tool by Kiernen Irons
                                </div>
                                <h1 className="font-display font-bold text-5xl md:text-6xl mb-4">
                                    Multi-Stream{' '}
                                    <span style={{ background: 'linear-gradient(135deg,#7c3aed,#a855f7,#c084fc)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>
                                        Chat
                                    </span>
                                </h1>
                                <p className="text-gray-400 text-lg max-w-xl mx-auto">
                                    Combine Twitch, Kick, and YouTube live chats into one OBS dock or chat overlay. No login needed for Twitch and Kick.
                                </p>
                            </div>

                            <div className="flex flex-col gap-6">

                                {/* Step 1 – Platforms */}
                                <div className="section-card">
                                    <div className="step-label">Step 1</div>
                                    <h2 className="font-display font-bold text-xl mb-1">Connect Your Platforms</h2>
                                    <p className="text-gray-500 text-sm mb-5">Enter the channel names you want to pull chat from. Leave a platform blank to skip it.</p>

                                    <div className="flex flex-col gap-4">

                                        {/* Twitch */}
                                        <div className="platform-row">
                                            <div className="platform-row-header">
                                                <svg className="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="#9147ff"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg>
                                                <span className="font-semibold text-sm" style={{ color: '#9147ff' }}>Twitch</span>
                                                <span className="badge-free">No login needed</span>
                                            </div>
                                            <input className="field-input" placeholder="Your Twitch channel name…"
                                                value={twitch} onChange={e => { setTwitch(e.target.value); setGenUrl(''); }} />
                                        </div>

                                        {/* Kick */}
                                        <div className="platform-row">
                                            <div className="platform-row-header">
                                                <svg className="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="#53fc18"><path d="M4 2h3.5v7.5L14.5 2H19l-7.5 8.5L19.5 22H15l-7.5-9V22H4V2z"/></svg>
                                                <span className="font-semibold text-sm" style={{ color: '#53fc18' }}>Kick</span>
                                                <span className="badge-free">No login needed</span>
                                            </div>
                                            <input className="field-input" placeholder="Your Kick channel name…"
                                                value={kick} onChange={e => { setKick(e.target.value); setGenUrl(''); }} />
                                            <p className="text-xs text-gray-600">Kick works best inside OBS. Some browsers may block the connection due to CORS restrictions.</p>
                                        </div>

                                        {/* YouTube */}
                                        <div className="platform-row">
                                            <div className="platform-row-header">
                                                <svg className="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="#FF0000"><path d="M23.495 6.205a3.007 3.007 0 0 0-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 0 0 .527 6.205a31.247 31.247 0 0 0-.522 5.805 31.247 31.247 0 0 0 .522 5.783 3.007 3.007 0 0 0 2.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3.007 3.007 0 0 0 2.088-2.088 31.247 31.247 0 0 0 .5-5.783 31.247 31.247 0 0 0-.5-5.805zM9.609 15.601V8.408l6.264 3.602z"/></svg>
                                                <span className="font-semibold text-sm" style={{ color: '#FF0000' }}>YouTube</span>
                                                <span className="badge-optional">Optional</span>
                                                <span className="badge-api">Needs API key</span>
                                            </div>
                                            <input className="field-input" placeholder="YouTube Channel ID (starts with UC…)"
                                                value={yt} onChange={e => { setYt(e.target.value); setGenUrl(''); }} />
                                            <input className="field-input" placeholder="YouTube Data API key…"
                                                type="password"
                                                value={ytkey} onChange={e => { setYtkey(e.target.value); setGenUrl(''); }} />
                                            <div className="p-3 rounded-lg text-xs text-gray-500 leading-relaxed"
                                                style={{ background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.06)' }}>
                                                YouTube requires a free API key because Google doesn't allow anonymous chat reads.
                                                Get one free at <span className="text-purple-400">console.cloud.google.com</span> — enable "YouTube Data API v3", create an API key, and restrict it to your domain for safety. Free tier gives 10,000 units/day which is plenty.
                                                Your Channel ID can be found in YouTube Studio &rarr; Settings &rarr; Channel &rarr; Basic info.
                                            </div>
                                        </div>

                                    </div>
                                </div>

                                {/* Step 2 – Mode */}
                                <div className="section-card">
                                    <div className="step-label">Step 2</div>
                                    <h2 className="font-display font-bold text-xl mb-1">Choose Display Mode</h2>
                                    <p className="text-gray-500 text-sm mb-5">How will you use this in OBS?</p>

                                    <div className="flex gap-4">
                                        <button className={`mode-btn ${mode === 'overlay' ? 'active' : ''}`}
                                            onClick={() => { setMode('overlay'); setGenUrl(''); }}>
                                            <div className="text-2xl mb-2">🎮</div>
                                            <div className="font-bold text-sm mb-1" style={{ color: mode === 'overlay' ? '#a855f7' : 'inherit' }}>Overlay</div>
                                            <div className="text-xs text-gray-500">Transparent browser source. Messages float over your stream.</div>
                                        </button>
                                        <button className={`mode-btn ${mode === 'dock' ? 'active' : ''}`}
                                            onClick={() => { setMode('dock'); setGenUrl(''); }}>
                                            <div className="text-2xl mb-2">🖥️</div>
                                            <div className="font-bold text-sm mb-1" style={{ color: mode === 'dock' ? '#a855f7' : 'inherit' }}>OBS Dock</div>
                                            <div className="text-xs text-gray-500">Dark sidebar panel inside OBS. Like a native chat window.</div>
                                        </button>
                                    </div>
                                </div>

                                {/* Step 3 – Appearance */}
                                <div className="section-card">
                                    <div className="step-label">Step 3</div>
                                    <h2 className="font-display font-bold text-xl mb-5">Appearance</h2>

                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">

                                        <div>
                                            <div className="text-sm text-gray-400 font-medium mb-2">Font</div>
                                            <select className="field-input" style={{ cursor: 'pointer' }}
                                                value={font} onChange={e => { setFont(e.target.value); setGenUrl(''); }}>
                                                {FONTS.map(f => <option key={f} value={f}>{f}</option>)}
                                            </select>
                                        </div>

                                        <div>
                                            <div className="text-sm text-gray-400 font-medium mb-2">Font Size <span className="text-purple-400 font-mono">{size}px</span></div>
                                            <input type="range" min="10" max="22" value={size} className="w-full"
                                                onChange={e => { setSize(Number(e.target.value)); setGenUrl(''); }} />
                                        </div>

                                        <div>
                                            <div className="text-sm text-gray-400 font-medium mb-2">Max Messages <span className="text-purple-400 font-mono">{maxmsgs}</span></div>
                                            <input type="range" min="5" max="100" value={maxmsgs} className="w-full"
                                                onChange={e => { setMaxmsgs(Number(e.target.value)); setGenUrl(''); }} />
                                        </div>

                                        <div>
                                            <div className="text-sm text-gray-400 font-medium mb-2">
                                                Message Timeout <span className="text-purple-400 font-mono">{msgTimeout === 0 ? 'Never' : `${msgTimeout}s`}</span>
                                            </div>
                                            <input type="range" min="0" max="60" value={msgTimeout} className="w-full"
                                                onChange={e => { setMsgTimeout(Number(e.target.value)); setGenUrl(''); }} />
                                            <div className="text-xs text-gray-600 mt-1">0 = messages stay until scrolled off. Recommended for overlay mode.</div>
                                        </div>

                                        {mode === 'overlay' && (
                                            <div>
                                                <div className="text-sm text-gray-400 font-medium mb-2">Message Background Opacity <span className="text-purple-400 font-mono">{msgBg}%</span></div>
                                                <input type="range" min="0" max="85" value={msgBg} className="w-full"
                                                    onChange={e => { setMsgBg(Number(e.target.value)); setGenUrl(''); }} />
                                                <div className="text-xs text-gray-600 mt-1">Adds a dark backdrop behind each message for readability.</div>
                                            </div>
                                        )}

                                        <div className="flex items-center">
                                            <label className="toggle-label" onClick={() => { setShowTimestamps(p => !p); setGenUrl(''); }}>
                                                <div className={`toggle ${showTimestamps ? 'on' : ''}`} />
                                                <span className="text-sm text-gray-400">Show timestamps</span>
                                            </label>
                                        </div>

                                    </div>
                                </div>

                                {/* Step 4 – Generate */}
                                <div className="section-card">
                                    <div className="step-label">Step 4</div>
                                    <h2 className="font-display font-bold text-xl mb-2">Generate Your URL</h2>
                                    <p className="text-gray-500 text-sm mb-5">Click generate to get your OBS URL. Paste it into OBS as a Browser Source or Custom Dock.</p>

                                    <button className="generate-btn" onClick={generate} disabled={!hasValidInput}>
                                        {hasValidInput ? `Generate ${mode === 'dock' ? 'Dock' : 'Overlay'} URL` : 'Enter at least one channel above'}
                                    </button>

                                    {genUrl && (
                                        <div className="mt-5 flex flex-col gap-4">
                                            <div className="flex items-start gap-2">
                                                <div className="url-box liquid-glass rounded-xl p-4 flex-1 text-gray-300 leading-relaxed border border-purple-500/20">
                                                    {genUrl}
                                                </div>
                                                <button className={`copy-btn mt-0.5 ${copied ? 'success' : ''}`} onClick={copyUrl}>
                                                    {copied ? 'Copied!' : 'Copy'}
                                                </button>
                                            </div>

                                            {/* OBS Instructions */}
                                            <div className="liquid-glass rounded-xl p-5 border border-white/5">
                                                <div className="flex items-center gap-2 mb-3">
                                                    <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 text-purple-400 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                                                    <span className="font-semibold text-sm text-gray-300">
                                                        How to add in OBS — {mode === 'dock' ? 'Custom Dock' : 'Browser Source (Overlay)'}
                                                    </span>
                                                </div>
                                                <ol className="flex flex-col gap-2 text-sm text-gray-400 list-none">
                                                    {(mode === 'dock' ? dockInstructions : overlayInstructions).map((step, i) => (
                                                        <li key={i} className="flex items-start gap-2.5">
                                                            <span className="flex-shrink-0 w-5 h-5 rounded-full text-purple-400 text-xs flex items-center justify-center font-bold mt-0.5"
                                                                style={{ background: 'rgba(147,51,234,0.2)', border: '1px solid rgba(147,51,234,0.35)' }}>{i + 1}</span>
                                                            <span>{step}</span>
                                                        </li>
                                                    ))}
                                                </ol>

                                                {mode === 'overlay' && (
                                                    <div className="mt-4 p-3 rounded-lg text-xs leading-relaxed"
                                                        style={{ background: 'rgba(234,179,8,0.06)', border: '1px solid rgba(234,179,8,0.2)', color: '#d4a800' }}>
                                                        Kick may show as "blocked" if your browser prevents the connection. It always works inside OBS's built-in browser. If Kick isn't connecting, that's why.
                                                    </div>
                                                )}

                                                <div className="mt-3 p-3 rounded-lg text-xs leading-relaxed"
                                                    style={{ background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.06)', color: 'rgba(255,255,255,0.4)' }}>
                                                    Save your URL. If you want to change settings, rebuild here and generate a new one.
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>

                            </div>
                        </div>
                    </main>

                    {/* Suggestion Box */}
                    <SuggestionBox />

                    {/* Footer */}
                    <footer className="py-10 px-6 border-t border-white/5">
                        <div className="max-w-3xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <a href="../../tools/" className="flex items-center gap-2 text-gray-400 hover:text-white transition-colors text-sm">
                                <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                                Back to Toolkit
                            </a>
                            <p className="text-gray-600 text-sm">Built by Kiernen Irons &mdash; Free, no sign-up needed.</p>
                            <a href="../../" className="text-gray-500 hover:text-white transition-colors text-sm">TrueBeast.io</a>
                        </div>
                    </footer>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
        requestAnimationFrame(() => requestAnimationFrame(() => {
            document.getElementById('root').style.opacity = '1';
        }));
    </script>
</body>
</html>
