<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Open Graph / Discord embeds -->
    <meta property="og:type"        content="website">
    <meta property="og:site_name"   content="TrueBeast">
    <meta property="og:title"       content="Giveaways — TrueBeast">
    <meta property="og:description" content="TrueBeast giveaway winners, open giveaways, and upcoming prizes for the community.">
    <meta property="og:url"         content="https://truebeast.io/giveaways/">
    <meta property="og:image"       content="https://truebeast.io/assets/images/og-image.png">
    <meta name="twitter:card"       content="summary_large_image">
    <title>Giveaways | TrueBeast</title>
    <link rel="icon" href="../favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="../js/config.js?v=6"></script>
    <link rel="stylesheet" href="../css/shared.css">
    <link rel="stylesheet" href="../css/glass.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .giveaway-card { transition: transform 0.2s, box-shadow 0.2s; }
        .giveaway-card:hover { transform: translateY(-3px); }
        .filter-btn { transition: background 0.15s, color 0.15s; }
        .filter-btn.active-all    { background: rgba(255,255,255,0.08); color: #fff; border-color: rgba(255,255,255,0.2); }
        .filter-btn.active-open   { background: rgba(34,197,94,0.15); color: #4ade80; border-color: rgba(34,197,94,0.3); }
        .filter-btn.active-upcoming { background: rgba(251,191,36,0.15); color: #fbbf24; border-color: rgba(251,191,36,0.3); }
        .filter-btn.active-ended  { background: rgba(107,114,128,0.2); color: #9ca3af; border-color: rgba(107,114,128,0.3); }
        .prize-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .prize-img-placeholder { width: 100%; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.03); }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Navigation = () => {
            const [scrolled,   setScrolled]   = useState(false);
            const [mobileOpen, setMobileOpen] = useState(false);
            const discordUrl = (typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.social?.discord) || 'https://discord.gg/Nk8vekY';
            useEffect(() => {
                const h = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', h, { passive: true });
                return () => window.removeEventListener('scroll', h);
            }, []);
            const btn = "liquid-glass px-3 py-2 rounded-xl text-sm font-medium text-gray-200 hover:text-white hover:bg-white/10 transition-colors";
            return (
                <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-500 ${scrolled ? 'py-3' : 'py-6'}`}>
                    <div className="max-w-7xl mx-auto px-6">
                        <div className={`liquid-glass rounded-2xl px-6 py-4 transition-all duration-500 ${scrolled ? 'shadow-2xl' : ''}`}>
                            <div className="flex items-center justify-between">
                                <a href="../" className="flex items-center gap-3 group flex-shrink-0">
                                    <div className="w-10 h-10 rounded-xl overflow-hidden pulse-glow flex-shrink-0"><img src="../assets/logos/logo.png" alt="TrueBeast" className="w-full h-full object-contain" /></div>
                                    <span className="font-display font-bold text-xl tracking-tight group-hover:text-green-400 transition-colors">TrueBeast</span>
                                </a>
                                <div className="hidden md:flex items-center gap-2">
                                    <a href="../"            className={btn}>Home</a>
                                    <a href="../giveaways/"  className={`${btn} text-white bg-white/10`}>Giveaways</a>
                                    <a href="../tools/"      className={btn}>Toolkit</a>
                                    <a href="../tech-support/" className={btn}>Tech Support</a>
                                    <a href="../my-tickets/" className={btn}>My Tickets</a>
                                    <a href={discordUrl} target="_blank" rel="noopener noreferrer" title="Discord"
                                       className="liquid-glass p-2.5 rounded-xl text-indigo-400 hover:text-indigo-300 hover:bg-white/10 transition-colors">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.492c-1.53-.69-3.17-1.2-4.885-1.49a.075.075 0 0 0-.079.036c-.21.369-.444.85-.608 1.23a18.566 18.566 0 0 0-5.487 0 12.36 12.36 0 0 0-.617-1.23A.077.077 0 0 0 8.562 3c-1.714.29-3.354.8-4.885 1.491a.07.07 0 0 0-.032.027C.533 9.093-.32 13.555.099 17.961a.08.08 0 0 0 .031.055 20.03 20.03 0 0 0 5.993 2.98.078.078 0 0 0 .084-.026c.462-.62.874-1.275 1.226-1.963a.074.074 0 0 0-.041-.104 13.201 13.201 0 0 1-1.872-.878.075.075 0 0 1-.008-.125c.126-.093.252-.19.372-.287a.075.075 0 0 1 .078-.01c3.927 1.764 8.18 1.764 12.061 0a.075.075 0 0 1 .079.009c.12.098.245.195.372.288a.075.075 0 0 1-.006.125c-.598.344-1.22.635-1.873.877a.075.075 0 0 0-.041.105c.36.687.772 1.341 1.225 1.962a.077.077 0 0 0 .084.028 19.963 19.963 0 0 0 6.002-2.981.076.076 0 0 0 .032-.054c.5-5.094-.838-9.52-3.549-13.442a.06.06 0 0 0-.031-.028z"/></svg>
                                    </a>
                                    <a href="https://www.youtube.com/@RealTrueBeast" target="_blank" rel="noopener noreferrer"
                                       className="bg-red-600 hover:bg-red-500 px-3 py-2 rounded-xl text-sm font-medium text-white transition-colors flex items-center gap-1.5">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.95 1.96A29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58A2.78 2.78 0 0 0 3.4 19.54C5.12 20 12 20 12 20s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"/></svg>
                                        Subscribe
                                    </a>
                                </div>
                                <button onClick={() => setMobileOpen(!mobileOpen)} className="md:hidden liquid-glass p-2 rounded-xl">
                                    {mobileOpen
                                        ? <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                        : <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                                    }
                                </button>
                            </div>
                            {mobileOpen && (
                                <div className="md:hidden mt-4 pt-4 border-t border-white/10">
                                    <div className="flex flex-col gap-1">
                                        <a href="../"            onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-colors font-medium">Home</a>
                                        <a href="../giveaways/"  onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-white bg-white/5 hover:bg-white/10 transition-colors font-medium">Giveaways</a>
                                        <a href="../tools/"      onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-colors font-medium">Toolkit</a>
                                        <a href="../tech-support/" onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-colors font-medium">Tech Support</a>
                                        <a href="../my-tickets/" onClick={() => setMobileOpen(false)} className="px-3 py-2.5 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-colors font-medium">My Tickets</a>
                                        <div className="h-px bg-white/10 my-2"></div>
                                        <a href={discordUrl} target="_blank" rel="noopener noreferrer" onClick={() => setMobileOpen(false)}
                                           className="px-3 py-2.5 rounded-xl text-indigo-400 hover:text-indigo-300 hover:bg-white/5 transition-colors font-medium flex items-center gap-2">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.492c-1.53-.69-3.17-1.2-4.885-1.49a.075.075 0 0 0-.079.036c-.21.369-.444.85-.608 1.23a18.566 18.566 0 0 0-5.487 0 12.36 12.36 0 0 0-.617-1.23A.077.077 0 0 0 8.562 3c-1.714.29-3.354.8-4.885 1.491a.07.07 0 0 0-.032.027C.533 9.093-.32 13.555.099 17.961a.08.08 0 0 0 .031.055 20.03 20.03 0 0 0 5.993 2.98.078.078 0 0 0 .084-.026c.462-.62.874-1.275 1.226-1.963a.074.074 0 0 0-.041-.104 13.201 13.201 0 0 1-1.872-.878.075.075 0 0 1-.008-.125c.126-.093.252-.19.372-.287a.075.075 0 0 1 .078-.01c3.927 1.764 8.18 1.764 12.061 0a.075.075 0 0 1 .079.009c.12.098.245.195.372.288a.075.075 0 0 1-.006.125c-.598.344-1.22.635-1.873.877a.075.075 0 0 0-.041.105c.36.687.772 1.341 1.225 1.962a.077.077 0 0 0 .084.028 19.963 19.963 0 0 0 6.002-2.981.076.076 0 0 0 .032-.054c.5-5.094-.838-9.52-3.549-13.442a.06.06 0 0 0-.031-.028z"/></svg>
                                            Discord
                                        </a>
                                        <a href="https://www.youtube.com/@RealTrueBeast" target="_blank" rel="noopener noreferrer" onClick={() => setMobileOpen(false)}
                                           className="bg-red-600 hover:bg-red-500 px-3 py-2.5 rounded-xl font-medium text-white flex items-center justify-center gap-2">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.95 1.96A29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58A2.78 2.78 0 0 0 3.4 19.54C5.12 20 12 20 12 20s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"/></svg>
                                            Subscribe
                                        </a>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </nav>
            );
        };

        const STATUS_META = {
            open:     { label: 'Open Now',    color: 'text-green-400',  bg: 'bg-green-500/10',  border: 'border-green-500/20',  dot: true  },
            upcoming: { label: 'Coming Soon', color: 'text-yellow-400', bg: 'bg-yellow-500/10', border: 'border-yellow-500/20', dot: false },
            ended:    { label: 'Ended',       color: 'text-gray-400',   bg: 'bg-gray-500/10',   border: 'border-gray-500/20',   dot: false },
        };

        const FILTERS = [
            { key: 'all',      label: 'All',         activeClass: 'active-all'      },
            { key: 'open',     label: 'Open Now',    activeClass: 'active-open'     },
            { key: 'upcoming', label: 'Coming Soon', activeClass: 'active-upcoming' },
            { key: 'ended',    label: 'Ended',       activeClass: 'active-ended'    },
        ];

        const GiveawayCard = ({ g }) => {
            const meta   = STATUS_META[g.status] || STATUS_META.ended;
            const siteUrl = (typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.siteUrl) || '';
            const imgSrc  = g.image ? (g.image.startsWith('http') ? g.image : `${siteUrl}/${g.image}`) : null;
            const dateStr = g.date ? new Date(g.date + 'T00:00:00').toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) : '';

            return (
                <div className="giveaway-card liquid-glass rounded-2xl overflow-hidden flex flex-col">
                    {/* Image */}
                    <div className="relative overflow-hidden">
                        {imgSrc ? (
                            <img src={imgSrc} alt={g.item} className="prize-img" />
                        ) : (
                            <div className="prize-img-placeholder">
                                <svg xmlns="http://www.w3.org/2000/svg" className="w-12 h-12 text-gray-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
                            </div>
                        )}
                        {/* Status tag — top left, matching YouTube card style */}
                        <div className={`absolute top-3 left-3 liquid-glass px-2 py-1 rounded-lg text-xs font-medium flex items-center gap-1 ${meta.color}`}>
                            {meta.dot && <span className="w-2 h-2 rounded-full bg-green-400 animate-pulse inline-block"></span>}
                            {meta.label}
                        </div>
                    </div>

                    {/* Content */}
                    <div className="p-5 flex flex-col gap-3 flex-1">
                        <h3 className="font-display font-bold text-lg leading-snug">{g.item}</h3>

                        {g.description && (
                            <p className="text-gray-400 text-sm leading-relaxed">{g.description}</p>
                        )}

                        <div className="mt-auto pt-3 border-t border-white/5 flex items-center justify-between gap-2 text-sm">
                            <div className="flex items-center gap-1.5">
                                {g.status === 'ended' ? (
                                    <>
                                        <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 text-yellow-400 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>
                                        <span className="text-gray-300 font-medium truncate">{g.winner || 'No winner set'}</span>
                                    </>
                                ) : (
                                    <>
                                        <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 text-gray-500 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                                        <span className="text-gray-500 italic">Winner TBD</span>
                                    </>
                                )}
                            </div>
                            {dateStr && (
                                <span className="text-gray-600 text-xs flex-shrink-0">{dateStr}</span>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [scrolled,  setScrolled]  = useState(false);
            const [activeTab, setActiveTab] = useState('all');

            useEffect(() => {
                const onScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', onScroll);
                return () => window.removeEventListener('scroll', onScroll);
            }, []);

            const allGiveaways = (typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.giveaways) || [];
            const filtered = activeTab === 'all' ? allGiveaways : allGiveaways.filter(g => g.status === activeTab);

            // Only show filter buttons for statuses that actually exist
            const usedStatuses = new Set(allGiveaways.map(g => g.status));
            const visibleFilters = FILTERS.filter(f => f.key === 'all' || usedStatuses.has(f.key));

            // Stats
            const openCount     = allGiveaways.filter(g => g.status === 'open').length;
            const upcomingCount = allGiveaways.filter(g => g.status === 'upcoming').length;
            const endedCount    = allGiveaways.filter(g => g.status === 'ended').length;

            return (
                <div className="relative min-h-screen">
                    <Navigation />

                    <main className="pt-32 pb-20 px-6">
                        <div className="max-w-5xl mx-auto">

                            {/* Hero */}
                            <div className="text-center mb-14 animate-fade-in">
                                <span className="inline-flex items-center gap-2 liquid-glass px-4 py-2 rounded-full mb-6 text-sm font-medium text-gray-300">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 text-yellow-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>
                                    Community Giveaways
                                </span>
                                <h1 className="font-display font-bold text-5xl md:text-6xl mb-4">
                                    Give<span className="text-gradient">aways</span>
                                </h1>
                                <p className="text-gray-400 text-lg max-w-xl mx-auto">
                                    Prizes for the TrueBeast squad. Past winners, open giveaways, and what's coming next.
                                </p>

                                {/* Quick stats */}
                                {allGiveaways.length > 0 && (
                                    <div className="flex items-center justify-center gap-6 mt-8 flex-wrap">
                                        {openCount > 0 && (
                                            <div className="flex items-center gap-2">
                                                <span className="w-2 h-2 rounded-full bg-green-400 animate-pulse inline-block"></span>
                                                <span className="text-green-400 font-semibold">{openCount} open</span>
                                            </div>
                                        )}
                                        {upcomingCount > 0 && (
                                            <div className="flex items-center gap-2">
                                                <span className="w-2 h-2 rounded-full bg-yellow-400 inline-block"></span>
                                                <span className="text-yellow-400 font-semibold">{upcomingCount} coming soon</span>
                                            </div>
                                        )}
                                        {endedCount > 0 && (
                                            <div className="flex items-center gap-2">
                                                <span className="w-2 h-2 rounded-full bg-gray-500 inline-block"></span>
                                                <span className="text-gray-400 font-semibold">{endedCount} ended</span>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>

                            {/* Filters */}
                            {visibleFilters.length > 1 && (
                                <div className="flex flex-wrap gap-2 justify-center mb-10">
                                    {visibleFilters.map(f => (
                                        <button key={f.key}
                                            onClick={() => setActiveTab(f.key)}
                                            className={`filter-btn liquid-glass border border-white/10 px-4 py-2 rounded-full text-sm font-medium ${activeTab === f.key ? f.activeClass : 'text-gray-400 hover:text-white'}`}>
                                            {f.label}
                                        </button>
                                    ))}
                                </div>
                            )}

                            {/* Cards */}
                            {filtered.length === 0 && allGiveaways.length === 0 ? (
                                <div className="text-center py-24">
                                    <div className="text-6xl mb-4">🎁</div>
                                    <h2 className="font-display font-bold text-2xl mb-3 text-gray-300">No giveaways yet</h2>
                                    <p className="text-gray-500 max-w-sm mx-auto">
                                        TrueBeast's first giveaway is coming. Join the Discord to be the first to know.
                                    </p>
                                    <a href={typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.social?.discord}
                                        target="_blank" rel="noopener noreferrer"
                                        className="inline-flex items-center gap-2 btn-glass liquid-glass px-6 py-3 rounded-xl mt-6 text-indigo-400 font-medium">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.492c-1.53-.69-3.17-1.2-4.885-1.49a.075.075 0 0 0-.079.036c-.21.369-.444.85-.608 1.23a18.566 18.566 0 0 0-5.487 0 12.36 12.36 0 0 0-.617-1.23A.077.077 0 0 0 8.562 3c-1.714.29-3.354.8-4.885 1.491a.07.07 0 0 0-.032.027C.533 9.093-.32 13.555.099 17.961a.08.08 0 0 0 .031.055 20.03 20.03 0 0 0 5.993 2.98.078.078 0 0 0 .084-.026c.462-.62.874-1.275 1.226-1.963a.074.074 0 0 0-.041-.104 13.201 13.201 0 0 1-1.872-.878.075.075 0 0 1-.008-.125c.126-.093.252-.19.372-.287a.075.075 0 0 1 .078-.01c3.927 1.764 8.18 1.764 12.061 0a.075.075 0 0 1 .079.009c.12.098.245.195.372.288a.075.075 0 0 1-.006.125c-.598.344-1.22.635-1.873.877a.075.075 0 0 0-.041.105c.36.687.772 1.341 1.225 1.962a.077.077 0 0 0 .084.028 19.963 19.963 0 0 0 6.002-2.981.076.076 0 0 0 .032-.054c.5-5.094-.838-9.52-3.549-13.442a.06.06 0 0 0-.031-.028z"/></svg>
                                        Join Discord
                                    </a>
                                </div>
                            ) : filtered.length === 0 ? (
                                <div className="text-center py-16 text-gray-500">No giveaways in this category right now.</div>
                            ) : (
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {filtered.map((g, i) => <GiveawayCard key={i} g={g} />)}
                                </div>
                            )}
                        </div>
                    </main>

                    <footer className="py-8 px-6 border-t border-white/5 text-center">
                        <p className="text-gray-600 text-sm">© 2026 TrueBeast. Built for the community.</p>
                    </footer>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
